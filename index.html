        ${exBox(String.raw`\[\int\cos^{2}x\,dx=\int\frac{1+\cos 2x}{2}\,dx=\frac{x}{2}+\frac{\sin 2x}{4}+C\]`)}
      </div>
    </div>
  </div>
  <div class="refblock">
    <h3>Partielle Integration in der Praxis</h3>
    <table class="reftable">
      <tr><td>\(\displaystyle\int u'(x)\,v(x)\,dx=u(x)v(x)-\int u(x)\,v'(x)\,dx\)</td></tr>
      <tr><td><b>Was ableiten (= \(v\))?</b> Reihenfolge „LIATE": <b>L</b>ogarithmen → <b>I</b>nverse (arcsin, arctan) → <b>A</b>lgebraisch (Polynome) → <b>T</b>rig → <b>E</b>xponential. Was weiter links steht, wird abgeleitet.</td></tr>
    </table>
    ${exBox(String.raw`<p><b>Einfach:</b> \(\displaystyle\int x\,e^{x}\,dx\) — Polynom ableiten, \(e^{x}\) integrieren:</p>\[\int x\,e^{x}\,dx=x\,e^{x}-\int 1\cdot e^{x}\,dx=(x-1)\,e^{x}+C\]<p><b>Faktor-1-Trick</b> für \(\ln\): \(\displaystyle\int\ln x\,dx=\int 1\cdot\ln x\,dx=x\ln x-\int x\cdot\frac{1}{x}\,dx=x\ln x-x+C.\)</p>`)}
    ${exBox(String.raw`<p><b>Doppelt („Phönix"):</b> \(I=\displaystyle\int e^{x}\sin x\,dx\) — zweimal partiell, dann nach \(I\) auflösen:</p>\[I=e^{x}\sin x-\int e^{x}\cos x\,dx=e^{x}\sin x-\Big(e^{x}\cos x+\int e^{x}\sin x\,dx\Big)\]\[\Rightarrow\ I=e^{x}\sin x-e^{x}\cos x-I\ \Rightarrow\ I=\frac{e^{x}}{2}\big(\sin x-\cos x\big)+C\]<p>Das ursprüngliche Integral taucht rechts wieder auf → als Gleichung lösen.</p>`)}
  </div>`; }

function addHtml(){ return String.raw`
  <div class="twocol">
    <div class="refblock">
      <h3>Summen &amp; Differenzen</h3>
      <table class="reftable">
        <tr><td>\(\sin(x\pm y)=\sin x\cos y\pm\cos x\sin y\)</td></tr>
        <tr><td>\(\cos(x\pm y)=\cos x\cos y\mp\sin x\sin y\)</td></tr>
        <tr><td>\(\tan(x\pm y)=\dfrac{\tan x\pm\tan y}{1\mp\tan x\tan y}\)</td></tr>
      </table>
      <h3 style="margin-top:16px">Doppelwinkel</h3>
      <table class="reftable">
        <tr><td>\(\sin 2x=2\sin x\cos x\)</td></tr>
        <tr><td>\(\cos 2x=\cos^{2}x-\sin^{2}x=1-2\sin^{2}x=2\cos^{2}x-1\)</td></tr>
        <tr><td>\(\tan 2x=\dfrac{2\tan x}{1-\tan^{2}x}\)</td></tr>
      </table>
      <h3 style="margin-top:16px">Halbwinkel</h3>
      <table class="reftable">
        <tr><td>\(\sin^{2}\dfrac{x}{2}=\dfrac{1-\cos x}{2}\)</td></tr>
        <tr><td>\(\cos^{2}\dfrac{x}{2}=\dfrac{1+\cos x}{2}\)</td></tr>
        <tr><td>\(\tan\dfrac{x}{2}=\dfrac{1-\cos x}{\sin x}=\dfrac{\sin x}{1+\cos x}\)</td></tr>
      </table>
    </div>
    <div class="refblock">
      <h3>Pythagoras &amp; Umrechnung</h3>
      <table class="reftable">
        <tr><td>\(\sin^{2}x+\cos^{2}x=1\)</td></tr>
        <tr><td>\(1+\tan^{2}x=\dfrac{1}{\cos^{2}x}\)</td></tr>
        <tr><td>\(1+\cot^{2}x=\dfrac{1}{\sin^{2}x}\)</td></tr>
      </table>
      <h3 style="margin-top:16px">Produkt → Summe</h3>
      <table class="reftable">
        <tr><td>\(\sin x\cos y=\tfrac{1}{2}\big[\sin(x{+}y)+\sin(x{-}y)\big]\)</td></tr>
        <tr><td>\(\cos x\cos y=\tfrac{1}{2}\big[\cos(x{-}y)+\cos(x{+}y)\big]\)</td></tr>
        <tr><td>\(\sin x\sin y=\tfrac{1}{2}\big[\cos(x{-}y)-\cos(x{+}y)\big]\)</td></tr>
      </table>
      <h3 style="margin-top:16px">Summe → Produkt</h3>
      <table class="reftable">
        <tr><td>\(\sin x+\sin y=2\sin\dfrac{x+y}{2}\cos\dfrac{x-y}{2}\)</td></tr>
        <tr><td>\(\cos x+\cos y=2\cos\dfrac{x+y}{2}\cos\dfrac{x-y}{2}\)</td></tr>
        <tr><td>\(\cos x-\cos y=-2\sin\dfrac{x+y}{2}\sin\dfrac{x-y}{2}\)</td></tr>
      </table>
    </div>
  </div>
  <div class="refblock">
    <h3>Euler-Formel &amp; Anwendung</h3>
    <table class="reftable">
      <tr><td>\(e^{ix}=\cos x+i\sin x\)</td><td>\(\cos x=\dfrac{e^{ix}+e^{-ix}}{2},\quad \sin x=\dfrac{e^{ix}-e^{-ix}}{2i}\)</td></tr>
    </table>
    ${exBox(String.raw`<p>Doppelwinkel beim Integrieren:</p>\[\int\sin^{2}x\,dx=\int\frac{1-\cos 2x}{2}\,dx=\frac{x}{2}-\frac{\sin 2x}{4}+C\]`)}
  </div>
  <div class="refblock">
    <h3>Hyperbelfunktionen \(\sinh,\cosh,\tanh\)</h3>
    <p class="sub">\(\sinh x=\frac{e^{x}-e^{-x}}{2},\quad \cosh x=\frac{e^{x}+e^{-x}}{2},\quad \tanh x=\frac{\sinh x}{\cosh x}\). Fast wie trig — aber auf die Vorzeichen achten!</p>
    <div class="twocol">
      <div class="refblock">
        <h3>Additionstheoreme</h3>
        <table class="reftable">
          <tr><td>\(\sinh(x\pm y)=\sinh x\cosh y\pm\cosh x\sinh y\)</td></tr>
          <tr><td>\(\cosh(x\pm y)=\cosh x\cosh y\pm\sinh x\sinh y\)</td></tr>
          <tr><td>\(\tanh(x\pm y)=\dfrac{\tanh x\pm\tanh y}{1\pm\tanh x\tanh y}\)</td></tr>
          <tr><td>\(\sinh 2x=2\sinh x\cosh x\)</td></tr>
          <tr><td>\(\cosh 2x=\cosh^{2}x+\sinh^{2}x=2\cosh^{2}x-1\)</td></tr>
        </table>
      </div>
      <div class="refblock">
        <h3>Identitäten & Ableitungen</h3>
        <table class="reftable">
          <tr><td>\(\cosh^{2}x-\sinh^{2}x=1\)</td><td class="cond">„Pythagoras"</td></tr>
          <tr><td>\(1-\tanh^{2}x=\dfrac{1}{\cosh^{2}x}\)</td></tr>
          <tr><td>\((\sinh x)'=\cosh x,\ (\cosh x)'=\sinh x\)</td></tr>
          <tr><td>\((\tanh x)'=\dfrac{1}{\cosh^{2}x}=1-\tanh^{2}x\)</td></tr>
          <tr><td>\(\cosh(ix)=\cos x,\ \sinh(ix)=i\sin x\)</td><td class="cond">Brücke zu trig</td></tr>
        </table>
      </div>
    </div>
    ${exBox(String.raw`<p>Vorzeichen-Merker: bei \(\cosh(x+y)\) steht ein <b>Plus</b> (nicht Minus wie bei \(\cos\)), und \(\cosh^{2}-\sinh^{2}=1\) (nicht \(+\)). Check über die Definition:</p>\[\cosh^{2}x-\sinh^{2}x=\frac{(e^{x}+e^{-x})^{2}-(e^{x}-e^{-x})^{2}}{4}=\frac{4}{4}=1.\]`)}
  </div>`; }

function reihenHtml(){ return String.raw`
  <div class="twocol">
    <div class="refblock">
      <h3>Endliche Summen</h3>
      <table class="reftable">
        <tr><td>\(\displaystyle\sum_{k=1}^{n}k=\frac{n(n+1)}{2}\)</td><td class="cond">Gauß-Summe</td></tr>
        <tr><td>\(\displaystyle\sum_{k=m}^{n}q^{k}=\frac{q^{m}-q^{n+1}}{1-q}\)</td><td class="cond">geometrisch, \(q\neq1\)</td></tr>
        <tr><td>\(\displaystyle\sum_{k=1}^{n}\big(b_{k}-b_{k+1}\big)=b_{1}-b_{n+1}\)</td><td class="cond">Teleskop</td></tr>
      </table>
      <h3 style="margin-top:16px">Geometrische Reihe</h3>
      <table class="reftable">
        <tr><td>\(\displaystyle\sum_{k=m}^{\infty}q^{k}=\frac{q^{m}}{1-q}\)</td><td class="cond">\(|q|<1\)</td></tr>
        <tr><td>Merke: \(\dfrac{\text{erster Summand}}{1-q}\) — der Start \(m\) steckt nur im Zähler</td><td class="cond"></td></tr>
      </table>
      ${exBox(String.raw`<p>Geometrisch, \(q=\tfrac12\), Start \(m=1\):</p>\[\sum_{k=1}^{\infty}\Big(\tfrac{1}{2}\Big)^{k}=\frac{1/2}{1-1/2}=1\]<p>Genau die Merkregel: erster Summand \(\tfrac12\) durch \(1-q=\tfrac12\).</p>`,"Beispiel: q = ½, Start m = 1")}
      <h3 style="margin-top:16px">Werte &amp; Konvergenz-Fakten</h3>
      <table class="reftable">
        <tr><td>\(\displaystyle\sum_{k=1}^{\infty}\frac{1}{k}=\infty\)</td><td class="cond">harmonisch</td></tr>
        <tr><td>\(\displaystyle\sum_{k=1}^{\infty}\frac{1}{k^{p}}\) konv. \(\Leftrightarrow p>1\)</td><td class="cond">p-Reihe</td></tr>
        <tr><td>\(\displaystyle\sum_{k=1}^{\infty}\frac{1}{k^{2}}=\frac{\pi^{2}}{6}\)</td><td class="cond">Basel</td></tr>
        <tr><td>\(\displaystyle\sum_{k=1}^{\infty}\frac{(-1)^{k+1}}{k}=\ln 2\)</td><td class="cond">Leibniz</td></tr>
        <tr><td>\(\displaystyle\sum_{k=0}^{\infty}\frac{(-1)^{k}}{2k+1}=\frac{\pi}{4}\)</td><td class="cond">Leibniz</td></tr>
      </table>
    </div>
    <div class="refblock">
      <h3>Potenzreihen-Klassiker (um \(0\))</h3>
      <table class="reftable">
        <tr><td>\(\displaystyle\sum_{k=0}^{\infty}\frac{x^{k}}{k!}=e^{x}\)</td><td class="cond">\(\forall x\)</td></tr>
        <tr><td>\(\displaystyle\sum_{k=0}^{\infty}\frac{(-1)^{k}x^{2k}}{(2k)!}=\cos x\)</td><td class="cond">\(\forall x\)</td></tr>
        <tr><td>\(\displaystyle\sum_{k=0}^{\infty}\frac{(-1)^{k}x^{2k+1}}{(2k+1)!}=\sin x\)</td><td class="cond">\(\forall x\)</td></tr>
        <tr><td>\(\displaystyle\sum_{k=0}^{\infty}x^{k}=\frac{1}{1-x}\)</td><td class="cond">\(|x|<1\)</td></tr>
        <tr><td>\(\displaystyle\sum_{k=1}^{\infty}\frac{(-1)^{k+1}}{k}x^{k}=\ln(1+x)\)</td><td class="cond">\(-1<x\le1\)</td></tr>
        <tr><td>\(\displaystyle\sum_{k=0}^{\infty}\frac{(-1)^{k}}{2k+1}x^{2k+1}=\arctan x\)</td><td class="cond">\(|x|\le1\)</td></tr>
        <tr><td>\(\displaystyle(1+x)^{\alpha}=\sum_{k=0}^{\infty}\binom{\alpha}{k}x^{k}\)</td><td class="cond">\(|x|<1\)</td></tr>
      </table>
      ${exBox(String.raw`<p>Quotientenkriterium für \(\sum\frac{x^{k}}{k!}\):</p>\[\left|\frac{a_{k+1}}{a_{k}}\right|=\frac{|x|}{k+1}\to 0<1\quad(k\to\infty)\ \Rightarrow\ \text{konvergent }\forall x\]`,"Beispiel: warum e-Reihe überall konvergiert")}
    </div>
  </div>
  <div class="refblock">
    <h3>Teleskopreihen</h3>
    <table class="reftable">
      <tr><td>\(\displaystyle\sum_{k=1}^{n}\big(b_{k}-b_{k+1}\big)=b_{1}-b_{n+1}\) — die mittleren Terme heben sich alle weg</td></tr>
      <tr><td>\(\displaystyle\sum_{k=1}^{\infty}\big(b_{k}-b_{k+1}\big)=b_{1}-\lim_{n\to\infty}b_{n+1}\)</td><td class="cond">falls der Limes existiert</td></tr>
    </table>
    ${exBox(String.raw`<p>Mit Partialbruch \(\dfrac{1}{k(k+1)}=\dfrac{1}{k}-\dfrac{1}{k+1}\) (also \(b_k=\tfrac1k\)):</p>\[\sum_{k=1}^{n}\frac{1}{k(k+1)}=1-\frac{1}{n+1}\ \longrightarrow\ 1.\]<p>Typisches Muster: Bruch per PBZ in eine Differenz \(b_k-b_{k+1}\) verwandeln.</p>`,"Teleskop-Klassiker")}
  </div>
  <div class="refblock">
    <h3>Fourierreihen &amp; Orthogonalität</h3>
    <p class="sub">Für \(2\pi\)-periodische Funktionen: \(f\) als Überlagerung von Sinus/Kosinus schreiben.</p>
    <table class="reftable">
      <tr><td>\(\displaystyle f(x)\sim\frac{a_0}{2}+\sum_{k=1}^{\infty}\big(a_k\cos kx+b_k\sin kx\big)\)</td></tr>
      <tr><td>\(\displaystyle a_k=\frac{1}{\pi}\int_{-\pi}^{\pi}f(x)\cos kx\,dx,\qquad b_k=\frac{1}{\pi}\int_{-\pi}^{\pi}f(x)\sin kx\,dx\)</td></tr>
      <tr><td><b>Orthogonalität</b> (\(k,m\ge1\)): \(\displaystyle\int_{-\pi}^{\pi}\sin kx\,\sin mx\,dx=\pi\,\delta_{km},\quad \int_{-\pi}^{\pi}\cos kx\,\cos mx\,dx=\pi\,\delta_{km},\quad \int_{-\pi}^{\pi}\sin kx\,\cos mx\,dx=0\)</td></tr>
      <tr><td>Praktisch: \(f\) gerade \(\Rightarrow b_k=0\); \(f\) ungerade \(\Rightarrow a_k=0\)</td></tr>
    </table>
    ${exBox(String.raw`<p>Multipliziere die Reihe mit \(\sin mx\) und integriere über \([-\pi,\pi]\):</p>\[\int_{-\pi}^{\pi}f(x)\sin mx\,dx=\sum_{k}a_k\underbrace{\int\cos kx\sin mx}_{=0}+\sum_{k}b_k\underbrace{\int\sin kx\sin mx}_{=\pi\delta_{km}}=b_m\,\pi.\]<p>Wegen der Orthogonalität überlebt nur der Term \(k=m\) — genau das liefert die Koeffizientenformel. Die Orthogonalität selbst folgt aus Produkt→Summe: \(\sin kx\sin mx=\tfrac12[\cos(k-m)x-\cos(k+m)x]\), und \(\int_{-\pi}^{\pi}\cos(jx)\,dx=0\) für \(j\neq0\).</p>`,"Warum das klappt (Orthogonalität)")}
    ${exBox(String.raw`<p>\(f(x)=x\) auf \((-\pi,\pi)\) ist ungerade \(\Rightarrow a_k=0\). Für \(b_k\) (partielle Integration):</p>\[b_k=\frac{1}{\pi}\int_{-\pi}^{\pi}x\sin kx\,dx=\frac{2}{\pi}\Big[-\frac{x\cos kx}{k}\Big]_{0}^{\pi}=-\frac{2\cos k\pi}{k}=\frac{2(-1)^{k+1}}{k}\]\[\Rightarrow\ x\sim 2\sum_{k=1}^{\infty}\frac{(-1)^{k+1}}{k}\sin kx.\]`,"Beispiel: Sägezahn f(x) = x")}
  </div>`; }

function grenzHtml(){ return String.raw`
  <div class="twocol">
    <div class="refblock">
      <h3>Bei \(x\to0\)</h3>
      <table class="reftable">
        <tr><td>\(\displaystyle\lim_{x\to0}\frac{\sin x}{x}=1\)</td></tr>
        <tr><td>\(\displaystyle\lim_{x\to0}\frac{\tan x}{x}=1\)</td></tr>
        <tr><td>\(\displaystyle\lim_{x\to0}\frac{1-\cos x}{x^{2}}=\frac{1}{2}\)
          ${exBox(String.raw`<p>Über die \(\cos\)-Reihe:</p>\[\frac{1-\cos x}{x^{2}}=\frac{\frac{x^{2}}{2}-\frac{x^{4}}{24}+\cdots}{x^{2}}=\frac{1}{2}-\frac{x^{2}}{24}+\cdots\to\frac{1}{2}\quad(x\to0)\]`,"Herleitung über die cos-Reihe")}</td></tr>
        <tr><td>\(\displaystyle\lim_{x\to0}\frac{e^{x}-1}{x}=1\)
          ${exBox(String.raw`<p>Über die \(e^{x}\)-Reihe:</p>\[\frac{e^{x}-1}{x}=\frac{x+\frac{x^{2}}{2}+\cdots}{x}=1+\frac{x}{2}+\cdots\to 1\quad(x\to0)\]`,"Herleitung über die e-Reihe")}</td></tr>
        <tr><td>\(\displaystyle\lim_{x\to0}\frac{\ln(1+x)}{x}=1\)</td></tr>
        <tr><td>\(\displaystyle\lim_{x\to0}\frac{\arcsin x}{x}=1\)</td></tr>
      </table>
    </div>
    <div class="refblock">
      <h3>Bei \(x\to\infty\), \(n\to\infty\)</h3>
      <table class="reftable">
        <tr><td>\(\displaystyle\lim_{n\to\infty}\Big(1+\frac{1}{n}\Big)^{n}=e\)</td></tr>
        <tr><td>\(\displaystyle\lim_{x\to\infty}\Big(1+\frac{a}{x}\Big)^{x}=e^{a}\)</td></tr>
        <tr><td>\(\displaystyle\lim_{x\to\infty}\frac{x^{n}}{e^{x}}=0\)</td><td class="cond">\(n\) fest</td></tr>
        <tr><td>\(\displaystyle\lim_{x\to\infty}\frac{\ln x}{x}=0\)</td></tr>
        <tr><td>\(\displaystyle\lim_{x\to0^{+}}x\ln x=0\)</td></tr>
        <tr><td>\(\displaystyle\lim_{n\to\infty}\sqrt[n]{n}=1,\ \lim_{n\to\infty}\sqrt[n]{a}=1\)</td><td class="cond">\(a>0\)</td></tr>
        <tr><td>\(\displaystyle\lim_{n\to\infty}\frac{\sqrt[n]{n!}}{n}=\frac{1}{e}\)</td><td class="cond">Stirling</td></tr>
      </table>
      <p class="sub" style="margin-top:8px">Merke: <b>exp \(\gg\) Potenz \(\gg\) Logarithmus</b>.</p>
    </div>
  </div>
  <div class="refblock">
    <h3>Häufige Umformungen — je mit Beispiel</h3>
    <table class="reftable">
      <tr><td><b>Konjugiert erweitern</b> (3. binomische) bei \(\sqrt{\ }-\sqrt{\ }\)
        ${exBox(String.raw`\[\sqrt{n^{2}+n}-n=\frac{(n^{2}+n)-n^{2}}{\sqrt{n^{2}+n}+n}=\frac{n}{\sqrt{n^{2}+n}+n}=\frac{1}{\sqrt{1+\frac1n}+1}\ \longrightarrow\ \frac{1}{2}\]`,"Beispiel: √(n²+n) − n → ½")}</td></tr>
      <tr><td><b>Potenz-Trick:</b> \(f(x)^{g(x)}=e^{\,g(x)\ln f(x)}\) — nur den Exponenten untersuchen
        ${exBox(String.raw`<p>\(\displaystyle\lim_{x\to0^{+}}x^{x}\):</p>\[x^{x}=e^{x\ln x},\qquad x\ln x\to0\ (x\to0^{+})\ \Rightarrow\ x^{x}\to e^{0}=1\]`,"Beispiel: x^x → 1 für x→0⁺")}</td></tr>
      <tr><td><b>Höchste Potenz ausklammern</b> bei rationalen Ausdrücken
        ${exBox(String.raw`\[\frac{3n^{2}+n}{2n^{2}+5}=\frac{n^{2}\big(3+\frac1n\big)}{n^{2}\big(2+\frac{5}{n^{2}}\big)}=\frac{3+\frac1n}{2+\frac{5}{n^{2}}}\ \longrightarrow\ \frac{3}{2}\]`,"Beispiel: (3n²+n)/(2n²+5) → 3/2")}</td></tr>
      <tr><td>\(\Big(1+\dfrac{a_n}{n}\Big)^{n}\to e^{a}\), falls \(a_n\to a\)
        ${exBox(String.raw`\[\Big(\frac{n+2}{n}\Big)^{n}=\Big(1+\frac{2}{n}\Big)^{n}\ \longrightarrow\ e^{2}\]`,"Beispiel: ((n+2)/n)ⁿ → e²")}</td></tr>
    </table>
  </div>
  <div class="refblock">
    <h3>Landau-Symbole \(o\) und \(O\)</h3>
    <p class="sub">Vergleichen das Verhalten zweier Funktionen für \(x\to a\) — <b>immer dazu sagen, wohin \(x\) läuft!</b> Die Idee auf einen Blick:</p>
    <div class="subgrid">
      <div class="subcard">
        <div class="subhead">\(f=o(g)\):\quad \(\displaystyle\lim_{x\to a}\left|\frac{f(x)}{g(x)}\right|=0\)</div>
        <div class="subrule">Der Quotient geht gegen <b>null</b>: \(f\) wird <b>vernachlässigbar klein</b> gegen \(g\).</div>
      </div>
      <div class="subcard">
        <div class="subhead">\(f=O(g)\):\quad \(\displaystyle\limsup_{x\to a}\left|\frac{f(x)}{g(x)}\right|<\infty\)</div>
        <div class="subrule">Der Quotient bleibt <b>beschränkt</b> („kleiner \(\infty\)"): \(f\) wächst <b>höchstens wie</b> \(g\) — muss aber nicht gegen 0 gehen.</div>
      </div>
    </div>
    <table class="reftable">
      <tr><td><b>klein-o:</b> \(f=o(g)\) für \(x\to a\)<span class="when">Einsetzen für Restglieder: \(f(x)=T_n(x)+o\big((x-x_0)^{n}\big)\), z. B. \(\sin x=x+o(x)\) für \(x\to0\).</span>
        ${exBox(String.raw`<p><b>Zutreffend:</b> \(x^{2}=o(x)\) für \(x\to0\), denn</p>\[\frac{x^{2}}{x}=x\ \longrightarrow\ 0\quad(x\to0).\]<p><b>Ähnlich, aber falsch:</b> \(x^{2}\) ist <b>nicht</b> \(o(x)\) für \(x\to\infty\) — gleicher Quotient, anderer Grenzpunkt:</p>\[\frac{x^{2}}{x}=x\ \longrightarrow\ \infty\quad(x\to\infty).\]<p>Und: \(\sin x=o(1)\) gilt <b>nicht</b> für \(x\to\infty\) (\(\sin x\not\to0\)), obwohl \(\sin x=O(1)\) stimmt.</p>`,"Beispiel & Gegenbeispiel: o")}</td></tr>
      <tr><td><b>groß-O:</b> \(f=O(g)\) für \(x\to a\)<span class="when">Einsetzen für Schranken und Fehlerordnungen, z. B. Trapezregel-Fehler \(=O(h^{2})\).</span>
        ${exBox(String.raw`<p><b>Zutreffend:</b> \(5x^{2}+3x=O(x^{2})\) für \(x\to\infty\), denn</p>\[\frac{5x^{2}+3x}{x^{2}}=5+\frac{3}{x}\ \longrightarrow\ 5\quad(\text{beschränkt}).\]<p><b>Ähnlich, aber falsch:</b> \(5x^{2}+3x\) ist <b>nicht</b> \(O(x)\) für \(x\to\infty\):</p>\[\frac{5x^{2}+3x}{x}=5x+3\ \longrightarrow\ \infty\quad(\text{unbeschränkt}).\]<p>Auch: \(\sin x=O(x)\) für \(x\to0\) (\(|\sin x|\le|x|\)) ✓ — aber \(\sqrt{x}\neq O(x)\) für \(x\to0^{+}\) (\(\frac{\sqrt x}{x}=\frac{1}{\sqrt x}\to\infty\)).</p>`,"Beispiel & Gegenbeispiel: O")}</td></tr>
      <tr><td><b>Rechenregeln:</b> \(o(g)\pm o(g)=o(g)\); \(O(g)\cdot O(h)=O(gh)\); \(f=o(g)\Rightarrow f=O(g)\) — die Umkehrung gilt <b>nicht</b> (\(\sin x=O(1)\), aber \(\neq o(1)\), \(x\to\infty\)).</td></tr>
    </table>
  </div>`; }

/* Referenz-Seiten (eigene Ergänzungen, Route #/ref/<key>) */
function konvSummenHtml(){ return String.raw`
  <p class="sub"><b>Fahrplan:</b> ① \(a_k\to0\)? Nein → divergent, fertig. &nbsp;② Struktur erkennen: \(k!\) oder \(q^{k}\) → <b>Quotient</b> · \((\dots)^{k}\) → <b>Wurzel</b> · alternierend → <b>Leibniz</b>. &nbsp;③ Sonst gegen p-Reihe/geometrische Reihe vergleichen (<b>Majorante/Minorante</b>).</p>
  <div class="twocol">
    <div class="refblock">
      <h3>Basis-Checks &amp; Vergleichskriterien</h3>
      <table class="reftable">
        <tr><td><b>Notwendig:</b> \(a_k\to0\)<span class="when">Immer zuerst prüfen: gilt \(a_k\not\to0\) → sofort divergent, fertig.</span></td><td class="cond">sonst div.</td></tr>
        <tr><td><b>Absolut:</b> \(\sum|a_k|\) konv. \(\Rightarrow\sum a_k\) konv.<span class="when">Einsetzen bei Vorzeichenwechseln oder komplexen Gliedern — erst \(\sum|a_k|\) testen.</span></td></tr>
        <tr><td><b>Majorante:</b> \(|a_k|\le b_k,\ \sum b_k\) konv. \(\Rightarrow\) konv.<span class="when">Einsetzen, wenn sich \(|a_k|\) gegen p-Reihe oder geometrische Reihe abschätzen lässt.</span>
          ${exBox(String.raw`<p>\(\displaystyle\sum\frac{\ln k}{k^{2}}\): ab großem \(k\) ist \(\ln k\le\sqrt{k}\):</p>\[\frac{\ln k}{k^{2}}\le\frac{1}{k^{3/2}}\quad\Rightarrow\quad\text{konvergent }(p=\tfrac32>1).\]`,"Beispiel: Σ ln k / k²")}</td></tr>
        <tr><td><b>Minorante:</b> \(0\le c_k\le a_k,\ \sum c_k\) div. \(\Rightarrow\) div.<span class="when">Einsetzen für Divergenz-Nachweise — meist mit der harmonischen Reihe als Minorante.</span>
          ${exBox(String.raw`<p>\(\displaystyle\sum\frac{1}{\sqrt{k(k+1)}}\): wegen \(k(k+1)\le (k+1)^{2}\):</p>\[\frac{1}{\sqrt{k(k+1)}}\ge\frac{1}{k+1}\quad\Rightarrow\quad\text{divergent (harmonische Minorante).}\]`,"Beispiel: Σ 1/√(k(k+1))")}</td></tr>
        <tr><td><b>p-Reihe:</b> \(\sum \frac{1}{k^{p}}\) konv. \(\Leftrightarrow p>1\)<span class="when">Der Standard-Vergleichspartner für Majorante/Minorante.</span></td></tr>
        <tr><td><b>Geometrisch:</b> \(\sum q^{k}\) konv. \(\Leftrightarrow |q|<1\)<span class="when">Vergleichspartner bei exponentiell fallenden Gliedern.</span></td></tr>
      </table>
    </div>
    <div class="refblock">
      <h3>An der Struktur von \(a_k\) erkennbar</h3>
      <table class="reftable">
        <tr><td><b>Quotient:</b> \(L=\lim\left|\frac{a_{k+1}}{a_k}\right|\)<span class="when">Einsetzen bei Fakultäten \(k!\) und Potenzen \(q^{k}\) — alles, was sich beim Schritt \(k\to k{+}1\) gut kürzt.</span>
          ${exBox(String.raw`<p>\(\displaystyle\sum \frac{k}{2^{k}}\):</p>\[\frac{a_{k+1}}{a_k}=\frac{k+1}{2k}\to\frac{1}{2}<1\ \Rightarrow\ \text{konvergent.}\]`,"Beispiel: Σ k/2^k")}</td><td class="cond">\(L<1\) konv, \(L>1\) div</td></tr>
        <tr><td><b>Wurzel:</b> \(L=\limsup_{k}\sqrt[k]{|a_k|}\)<span class="when">Einsetzen, wenn \(a_k\) selbst eine \(k\)-te Potenz \((\dots)^{k}\) ist — die Wurzel räumt den Exponenten ab.</span>
          ${exBox(String.raw`<p>\(\displaystyle\sum\Big(\tfrac{k}{k+1}\Big)^{k^{2}}\):</p>\[\sqrt[k]{a_k}=\Big(\frac{k}{k+1}\Big)^{k}=\Big(1+\tfrac{1}{k}\Big)^{-k}\to\frac{1}{e}<1\ \Rightarrow\ \text{konvergent.}\]`,"Beispiel: Σ (k/(k+1))^(k²)")}</td><td class="cond">\(L<1\) konv, \(L>1\) div</td></tr>
        <tr><td><b>Leibniz</b> (alternierend): \(a_k=(-1)^{k}b_k\), \(b_k\ge0\) monoton \(\downarrow 0\) \(\Rightarrow\) konv.<span class="when">Einsetzen bei \((-1)^{k}\cdot(\text{monoton fallende Nullfolge})\) — der Rettungsanker, wenn absolute Konvergenz scheitert.</span>
          ${exBox(String.raw`<p>\(\displaystyle\sum\frac{(-1)^{k+1}}{k}\): \(b_k=\tfrac1k\downarrow0\ \Rightarrow\) konvergent (bedingt, \(=\ln 2\)); \(\sum\tfrac1k\) selbst divergiert.</p>`,"Beispiel: Σ (−1)^(k+1)/k")}</td><td class="cond">\(|R_n|\le b_{n+1}\)</td></tr>
        <tr><td><b>Integralkriterium:</b> \(f\ge0\) fallend, \(a_k=f(k)\): \(\sum f(k)\) und \(\int_1^{\infty}\!f\) gleiches Verhalten.<span class="when">Einsetzen, wenn \(f\) leicht integrierbar ist — Klassiker: \(\sum\frac{1}{k\ln k}\) div., denn \(\int\frac{dx}{x\ln x}=\ln\ln x\to\infty\).</span></td></tr>
      </table>
      <p class="sub" style="margin-top:8px">Bei \(L=1\): keine Aussage. Das Wurzel- ist „stärker" als das Quotientenkriterium.</p>
    </div>
  </div>
  <div class="refblock">
    <h3>Tricks: typische Majoranten, Minoranten &amp; Umformungen</h3>
    <table class="reftable">
      <tr><td><b>Vergleichs-Skala:</b> \(\sum\frac{1}{k^{p}}\) (konv. \(\Leftrightarrow p>1\)), \(\sum q^{k}\) (\(|q|<1\)), \(\sum k^{a}q^{k}\) konv. für \(|q|<1\) (jedes \(a\))</td></tr>
      <tr><td><b>„Nur höchste Potenzen zählen":</b> \(\dfrac{P(k)}{Q(k)}\sim\dfrac{c}{k^{\deg Q-\deg P}}\) → Grenzwertvergleich mit \(\frac{1}{k^{p}}\)
        ${exBox(String.raw`<p>\(\displaystyle\sum\frac{2k+3}{k^{3}-k+1}\). Höchste Potenzen: \(\sim\frac{2}{k^{2}}\). Prüfen mit \(b_k=\frac{1}{k^{2}}\):</p>\[\frac{a_k}{b_k}=\frac{(2k+3)k^{2}}{k^{3}-k+1}\longrightarrow 2\in(0,\infty)\ \Rightarrow\ \text{wie }\sum\frac{1}{k^{2}}\ \text{konvergent.}\]`,"Beispiel: Grenzwertvergleich")}</td></tr>
      <tr><td><b>Beschränktes wegschätzen:</b> \(|\sin k|,|\cos k|\le1\) → \(\Big|\dfrac{\sin k}{k^{2}}\Big|\le\dfrac{1}{k^{2}}\)</td></tr>
      <tr><td><b>Logs sind klein:</b> \(\ln k\le C_\varepsilon\,k^{\varepsilon}\) → z. B. \(\dfrac{\ln k}{k^{2}}\le\dfrac{C\,k^{1/2}}{k^{2}}=\dfrac{C}{k^{3/2}}\) (konv.)</td></tr>
      <tr><td><b>Minoranten für Divergenz:</b> \(\dfrac{1}{\sqrt{k}}\ge\dfrac{1}{k}\); \(\dfrac{k+1}{k^{2}+5}\sim\dfrac{1}{k}\) (div.)</td></tr>
    </table>
  </div>
  <div class="refblock">
    <h3>Summierbarkeit divergenter Reihen</h3>
    <p class="sub">Divergente Reihen bekommen über gemittelte/geglättete Grenzwerte einen sinnvollen „Wert". Beide Verfahren sind <b>regulär</b>: eine schon konvergente Reihe behält ihren Wert. Durchgängiges Beispiel: die <b>Grandi-Reihe</b> \(1-1+1-1+\cdots\) (\(a_k=(-1)^{k}\)).</p>
    <table class="reftable">
      <tr><td><b>Cesàro (C,1)</b> — über die <b>Partialsummen</b>: bilde \(s_n=a_0+\cdots+a_n\), dann ihr Mittel \(\displaystyle\sigma_n=\frac{s_0+s_1+\cdots+s_n}{n+1}\). Cesàro-Summe \(=\lim_{n\to\infty}\sigma_n\).<span class="when">Einsetzen, wenn die Partialsummen beschränkt hin- und herspringen — das Mitteln glättet die Sprünge.</span>
        ${exBox(String.raw`<p><b>Schritt 1 — Partialsummen:</b> \(s_n=1,0,1,0,\dots\) (springt, divergent).</p><p><b>Schritt 2 — aufsummieren:</b> \(S_n=s_0+\cdots+s_n\): \(1,1,2,2,3,3,\dots\), allgemein \(S_{2m}=S_{2m+1}=m+1\).</p><p><b>Schritt 3 — mitteln:</b></p>\[\sigma_{2m}=\frac{m+1}{2m+1}\ \longrightarrow\ \frac12,\qquad \sigma_{2m+1}=\frac{m+1}{2m+2}=\frac12\ \text{(exakt!)}\]<p>Beide Teilfolgen \(\to\tfrac12\) \(\Rightarrow\) <b>Cesàro-Summe \(=\tfrac12\)</b>.</p>`,"Rechenbeispiel: Grandi nach Cesàro")}</td></tr>
      <tr><td><b>Abel / Poisson-Abel</b> — über die <b>Potenzreihe</b>: bilde \(f(x)=\sum_k a_k x^{k}\) (\(|x|<1\)), dann lasse \(x\to1^{-}\). Abel-Summe \(=\lim_{x\to1^{-}}f(x)\).<span class="when">Einsetzen, wenn \(\sum a_k x^{k}\) eine geschlossene Form hat — meist geometrische Reihe oder deren Ableitung.</span>
        ${exBox(String.raw`<p><b>Schritt 1 — Potenzreihe aufstellen:</b> mit \(a_k=(-1)^{k}\):</p>\[f(x)=\sum_{k=0}^{\infty}(-1)^{k}x^{k}=\sum_{k=0}^{\infty}(-x)^{k}\]<p><b>Schritt 2 — geschlossene Form</b> (geometrische Reihe mit \(q=-x\), \(|q|<1\)):</p>\[f(x)=\frac{1}{1-(-x)}=\frac{1}{1+x},\qquad |x|<1\]<p><b>Schritt 3 — Randlimes:</b></p>\[\lim_{x\to1^{-}}\frac{1}{1+x}=\frac12\ \Rightarrow\ \textbf{Abel-Summe }=\tfrac12\]<p>— gleicher Wert wie Cesàro, wie es Frobenius verlangt.</p>`,"Rechenbeispiel: Grandi nach Poisson-Abel")}</td></tr>
      <tr><td><b>Hierarchie:</b> konvergent \(\Rightarrow\) Cesàro \(\Rightarrow\) Abel (jeweils derselbe Wert). Also: <b>aus Cesàro folgt Abel</b> (Satz von Frobenius) — Abel ist das stärkste Verfahren. Rückrichtung nur mit Tauber-Bedingung (z. B. \(a_k\to0\)).<span class="when">Merk-Beispiel dafür, dass Abel echt stärker ist: \(1-2+3-4+\cdots\).</span>
        ${exBox(String.raw`<p>\(1-2+3-4+\cdots\), also \(a_k=(-1)^{k}(k+1)\).</p><p><b>Cesàro scheitert:</b> \(s_n=1,-1,2,-2,3,\dots\); aufsummiert \(S_{2m}=m+1,\ S_{2m+1}=0\), also</p>\[\sigma_{2m}=\frac{m+1}{2m+1}\to\frac12,\qquad \sigma_{2m+1}=0\to0\]<p>— zwei verschiedene Häufungswerte \(\Rightarrow\) \(\sigma_n\) divergiert, <b>nicht Cesàro-summierbar</b>.</p><p><b>Abel klappt:</b> Ableiten der geometrischen Reihe \(\sum_{k\ge0}u^{k}=\frac{1}{1-u}\) gibt \(\sum_{k\ge0}(k+1)u^{k}=\frac{1}{(1-u)^{2}}\). Mit \(u=-x\):</p>\[\sum_{k=0}^{\infty}(-1)^{k}(k+1)x^{k}=\frac{1}{(1+x)^{2}}\ \longrightarrow\ \frac14\quad(x\to1^{-})\]<p>\(\Rightarrow\) <b>Abel-Summe \(=\tfrac14\)</b> — Abel summiert echt „mehr" als Cesàro.</p>`,"Rechenbeispiel: 1 − 2 + 3 − 4 + ⋯")}</td></tr>
    </table>
  </div>`; }

function konvIntegraleHtml(){ return String.raw`
  <p class="sub"><b>Fahrplan:</b> ① Alle kritischen Stellen finden (\(\pm\infty\), Polstellen, Randsingularitäten) und das Integral dort <b>aufspalten</b>. &nbsp;② An jeder kritischen Stelle das Verhalten mit \(x^{-p}\) vergleichen (<b>p-Test</b>). &nbsp;③ Bei Vorzeichenwechseln: absolute Konvergenz. &nbsp;④ Pol im Inneren / symmetrische Grenzen: <b>Hauptwert</b>.</p>
  <div class="twocol">
    <div class="refblock">
      <h3>Definition (immer über Grenzwerte)</h3>
      <table class="reftable">
        <tr><td>Unbeschränktes Intervall: \(\displaystyle\int_a^{\infty}\!f=\lim_{R\to\infty}\int_a^{R}\!f\)<span class="when">Existiert der Limes in \(\mathbb R\), heißt das Integral <b>konvergent</b>, sonst divergent.</span></td></tr>
        <tr><td>Singularität am Rand \(b\): \(\displaystyle\int_a^{b}\!f=\lim_{\varepsilon\to0^{+}}\int_a^{b-\varepsilon}\!f\)</td></tr>
        <tr><td><b>Mehrere kritische Stellen → aufspalten:</b> \(\displaystyle\int_{-\infty}^{\infty}=\int_{-\infty}^{c}+\int_{c}^{\infty}\), Pol bei \(c\) innen: \(\int_a^{c}+\int_c^{b}\). <b>Jedes Teilintegral muss einzeln konvergieren</b> (unabhängige Grenzwerte!).</td></tr>
        <tr><td><b>Warnung:</b> \(f(x)\to0\) allein reicht <b>nicht</b>: \(\displaystyle\int_1^{\infty}\frac{dx}{x}=\infty\), obwohl \(\tfrac1x\to0\).</td></tr>
      </table>
      <h3 style="margin-top:16px">p-Test — der erste Reflex</h3>
      <table class="reftable">
        <tr><td>\(\displaystyle\int_1^{\infty}\frac{dx}{x^{p}}\) konv. \(\Leftrightarrow p>1\)<span class="when">Bei \(\infty\) helfen <b>große</b> Exponenten (schneller Abfall).</span></td></tr>
        <tr><td>\(\displaystyle\int_0^{1}\frac{dx}{x^{p}}\) konv. \(\Leftrightarrow p<1\)<span class="when">Bei \(0\) genau umgekehrt: <b>kleine</b> Exponenten sind harmlos. Grenzfall \(p=1\) divergiert an beiden Enden (\(\ln\)).</span>
          ${exBox(String.raw`<p>Direkt nachrechnen (\(p\neq1\)): \(\int x^{-p}dx=\frac{x^{1-p}}{1-p}\).</p>\[\int_1^{\infty}\frac{dx}{x^{2}}=\Big[-\frac1x\Big]_1^{\infty}=1\ (\text{konv.}),\qquad \int_1^{\infty}\frac{dx}{x}=\ln x\Big|_1^{\infty}=\infty\ (\text{div.})\]\[\int_0^{1}\frac{dx}{\sqrt{x}}=\big[2\sqrt{x}\big]_0^{1}=2\ (\text{konv., }p=\tfrac12<1),\qquad \int_0^{1}\frac{dx}{x^{2}}=\infty\ (\text{div., }p=2>1)\]`,"Beispiele: p-Test an beiden Rändern")}</td></tr>
      </table>
    </div>
    <div class="refblock">
      <h3>Vergleichs-Kriterien</h3>
      <table class="reftable">
        <tr><td><b>Majorante</b> (für Konvergenz): \(0\le f\le g,\ \int g\) konv. \(\Rightarrow\int f\) konv.<span class="when">Einsetzen, wenn sich \(f\) gegen \(x^{-p}\) oder \(e^{-x}\) abschätzen lässt.</span>
          ${exBox(String.raw`<p>\(\displaystyle\int_1^{\infty}e^{-x^{2}}dx\) konvergiert: für \(x\ge1\) ist \(x^{2}\ge x\), also</p>\[e^{-x^{2}}\le e^{-x},\qquad \int_1^{\infty}e^{-x}\,dx=e^{-1}<\infty.\]`,"Beispiel: ∫ e^(−x²)")}</td></tr>
        <tr><td><b>Minorante</b> (für Divergenz): \(f\ge g\ge0,\ \int g\) div. \(\Rightarrow\int f\) div.<span class="when">Einsetzen für Divergenz-Nachweise — meist mit \(\tfrac{c}{x}\) als Minorante.</span>
          ${exBox(String.raw`<p>\(\displaystyle\int_1^{\infty}\frac{dx}{\sqrt{x^{2}+1}}\) divergiert: für \(x\ge1\) ist \(x^{2}+1\le 2x^{2}\), also</p>\[\frac{1}{\sqrt{x^{2}+1}}\ \ge\ \frac{1}{\sqrt{2}\,x},\qquad \int_1^{\infty}\frac{dx}{\sqrt{2}\,x}=\infty.\]`,"Beispiel: ∫ dx/√(x²+1)")}</td></tr>
        <tr><td><b>Grenzwertvergleich:</b> \(f,g>0,\ \frac{f}{g}\to c\in(0,\infty)\Rightarrow\) gleiches Verhalten.<span class="when">Einsetzen, wenn nur das führende Verhalten am kritischen Rand zählt (Polynome, Wurzeln) — erspart das Basteln expliziter Schranken.</span>
          ${exBox(String.raw`<p>\(\displaystyle\int_1^{\infty}\frac{dx}{\sqrt{x^{3}+1}}\): führendes Verhalten \(x^{-3/2}\). Vergleich mit \(g=x^{-3/2}\):</p>\[\frac{f}{g}=\frac{x^{3/2}}{\sqrt{x^{3}+1}}=\frac{1}{\sqrt{1+x^{-3}}}\ \longrightarrow\ 1\in(0,\infty)\]<p>\(\Rightarrow\) verhält sich wie \(\int x^{-3/2}\) → <b>konvergent</b> (\(p=\tfrac32>1\)).</p>`,"Beispiel: ∫ dx/√(x³+1)")}</td></tr>
        <tr><td><b>Absolut:</b> \(\int|f|\) konv. \(\Rightarrow\int f\) konv.<span class="when">Einsetzen bei Vorzeichenwechseln — z. B. \(\int_1^{\infty}\frac{\sin x}{x^{2}}dx\): \(\big|\frac{\sin x}{x^{2}}\big|\le\frac{1}{x^{2}}\).</span></td></tr>
      </table>
      <h3 style="margin-top:16px">Beide Ränder kritisch</h3>
      ${exBox(String.raw`<p>\(\displaystyle\int_0^{\infty}\frac{dx}{\sqrt{x}\,(1+x)}\) — kritisch bei \(0\) <b>und</b> \(\infty\). Aufspalten bei \(1\):</p><p>Bei \(0\): \(\dfrac{1}{\sqrt{x}(1+x)}\sim\dfrac{1}{\sqrt{x}}\) → konv. (\(p=\tfrac12<1\)).</p><p>Bei \(\infty\): \(\sim\dfrac{1}{x^{3/2}}\) → konv. (\(p=\tfrac32>1\)).</p><p>Beide Teile konvergieren → Integral konvergent (Substitution \(t=\sqrt{x}\) liefert sogar den Wert \(\pi\)).</p>`,"Beispiel: ∫₀^∞ dx/(√x·(1+x))")}
    </div>
  </div>
  <div class="refblock">
    <h3>Cauchy-Hauptwert (v.p.)</h3>
    <p class="sub">Symmetrischer Grenzwert — kann existieren, obwohl das Integral (mit unabhängigen Grenzwerten) divergiert. Einsetzen, wenn ein Pol <b>im Inneren</b> liegt oder \(\pm\infty\) symmetrisch behandelt werden soll.</p>
    <table class="reftable">
      <tr><td>\(\displaystyle \mathrm{v.p.}\!\int_{-\infty}^{\infty}\!f=\lim_{R\to\infty}\int_{-R}^{R}\!f\)<span class="when">Eine gemeinsame Schranke \(R\) statt zwei unabhängiger — deshalb „schwächer" als echte Konvergenz: konvergent \(\Rightarrow\) v.p. existiert (gleicher Wert), aber nicht umgekehrt.</span></td></tr>
      <tr><td>Pol bei \(c\in(a,b)\): \(\displaystyle \mathrm{v.p.}\!\int_a^{b}\!f=\lim_{\varepsilon\to0^{+}}\Big(\int_a^{c-\varepsilon}\!+\int_{c+\varepsilon}^{b}\Big)f\)<span class="when">Symmetrisches Ausschneiden des Pols — dieselbe \(\varepsilon\)-Breite links und rechts.</span>
        ${exBox(String.raw`<p><b>Schritt für Schritt</b> für \(\mathrm{v.p.}\!\int_{-1}^{1}\frac{dx}{x}\) (Pol bei \(0\)) — beide Teilintegrale mit der Stammfunktion \(\ln|x|\) ausrechnen:</p>\[\int_{-1}^{-\varepsilon}\frac{dx}{x}=\ln|x|\Big|_{-1}^{-\varepsilon}=\ln\varepsilon-\ln1=\ln\varepsilon\]\[\int_{\varepsilon}^{1}\frac{dx}{x}=\ln|x|\Big|_{\varepsilon}^{1}=\ln1-\ln\varepsilon=-\ln\varepsilon\]<p>Summe: \(\ln\varepsilon-\ln\varepsilon=0\) für <b>jedes</b> \(\varepsilon>0\), also</p>\[\mathrm{v.p.}\!\int_{-1}^{1}\frac{dx}{x}=\lim_{\varepsilon\to0^{+}}0=0.\]<p>Das gewöhnliche Integral divergiert (jedes Teilintegral einzeln \(=\mp\infty\)) — nur im Hauptwert heben sich die \(\ln\varepsilon\)-Terme exakt weg.</p>`,"Rechenbeispiel: v.p. ∫₋₁¹ dx/x = 0")}
        ${exBox(String.raw`<p><b>Unsymmetrische Grenzen</b> liefern einen echten Wert: \(\mathrm{v.p.}\!\int_{-1}^{2}\frac{dx}{x}\):</p>\[\int_{-1}^{-\varepsilon}\frac{dx}{x}=\ln\varepsilon,\qquad \int_{\varepsilon}^{2}\frac{dx}{x}=\ln2-\ln\varepsilon\]\[\Rightarrow\ \mathrm{v.p.}\!\int_{-1}^{2}\frac{dx}{x}=\lim_{\varepsilon\to0^{+}}\big(\ln\varepsilon+\ln2-\ln\varepsilon\big)=\ln 2.\]<p>Die \(\ln\varepsilon\)-Terme heben sich weg; übrig bleibt \(\ln2\) — der Hauptwert „sieht" nur den unsymmetrischen Überhang \([1,2]\).</p>`,"Rechenbeispiel: v.p. ∫₋₁² dx/x = ln 2")}</td></tr>
      <tr><td>Analog: \(\displaystyle\mathrm{v.p.}\!\int_{-\infty}^{\infty}x\,dx=0\), obwohl \(\int_{-\infty}^{\infty}x\,dx\) divergiert (\(\infty-\infty\)).</td></tr>
    </table>
  </div>`; }

function potenzreihenHtml(){ return String.raw`
  <p class="sub">Potenzreihe \(\displaystyle\sum_{k=0}^{\infty} a_k (x-x_0)^{k}\) um den Entwicklungspunkt \(x_0\).</p>
  <div class="twocol">
    <div class="refblock">
      <h3>Konvergenzradius \(R\)</h3>
      <table class="reftable">
        <tr><td><b>Cauchy-Hadamard:</b> \(\displaystyle \frac{1}{R}=\limsup_{k}\sqrt[k]{|a_k|}\)<span class="when">Funktioniert <b>immer</b> (limsup existiert stets) — einsetzen bei \(k\)-ten Potenzen und Lücken-Reihen.</span></td></tr>
        <tr><td><b>Quotienten-Form:</b> \(\displaystyle R=\lim_{k}\left|\frac{a_k}{a_{k+1}}\right|\) (falls existent)<span class="when">Einsetzen bei Fakultäten und einfachen Brüchen — nur wenn (fast) alle \(a_k\neq0\), sonst Wurzel-Form nehmen.</span></td></tr>
        <tr><td>\(|x-x_0|<R\): absolut konvergent</td><td class="cond">innen</td></tr>
        <tr><td>\(|x-x_0|>R\): divergent</td><td class="cond">außen</td></tr>
        <tr><td>\(|x-x_0|=R\): Randverhalten <b>einzeln</b> prüfen</td></tr>
      </table>
      <p class="sub" style="margin-top:8px">Konvention: \(\tfrac{1}{0}=\infty,\ \tfrac{1}{\infty}=0\).</p>
    </div>
    <div class="refblock">
      <h3>Eigenschaften & Beispiele</h3>
      <table class="reftable">
        <tr><td>Innerhalb \((x_0-R,\,x_0+R)\) darf man <b>gliedweise differenzieren/integrieren</b> (gleicher Radius \(R\)); die Summe ist dort beliebig oft differenzierbar.</td></tr>
      </table>
      <h3 style="margin-top:12px">Beispiele</h3>
      ${exBox(String.raw`<p>\(\sum \frac{x^{k}}{k!}\) (Quotienten-Form):</p>\[R=\lim_k\left|\frac{a_k}{a_{k+1}}\right|=\lim_k (k+1)=\infty\quad(\,=e^{x}\,).\]`)}
      ${exBox(String.raw`<p>\(\sum \frac{x^{k}}{k}\): \(R=1\), aber der Rand ist verschieden:</p>\[x=-1:\ \sum\frac{(-1)^{k}}{k}\ \text{konv. (Leibniz)};\qquad x=1:\ \sum\frac{1}{k}\ \text{div. (harmonisch)}.\]`)}
      ${exBox(String.raw`<p>Extremfälle:</p>\[\sum k!\,x^{k}:\ R=0\ (\text{nur }x=0);\qquad \sum \frac{x^{k}}{k^{2}}:\ R=1,\ \text{Rand konvergiert }(p=2).\]`)}
    </div>
  </div>
  <div class="refblock">
    <h3>Tricks beim Konvergenzradius</h3>
    <table class="reftable">
      <tr><td><b>Lücken-Reihen</b> (nur \(x^{2k}\) o. ä.): Quotienten-Formel versagt (\(a_k=0\) dazwischen) → Wurzelkriterium direkt oder Substitution \(u=x^{2}\).</td></tr>
      <tr><td><b>Nützliche \(k\)-te Wurzeln:</b> \(\sqrt[k]{k}\to1,\quad \sqrt[k]{k^{a}}\to1,\quad \sqrt[k]{k!}\sim\dfrac{k}{e},\quad \big(1+\tfrac1k\big)^{k}\to e\)</td></tr>
      <tr><td><b>Substitution:</b> \(\sum a_k x^{2k}=\sum a_k u^{k}\) mit \(u=x^{2}\) → \(R_x=\sqrt{R_u}\)</td></tr>
    </table>
    ${exBox(String.raw`<p>\(\displaystyle\sum\frac{x^{2k}}{4^{k}}\): mit \(u=x^{2}\) ist das \(\sum\big(\tfrac{u}{4}\big)^{k}\) — geometrisch, konvergent für \(|u|<4\):</p>\[|x|^{2}<4\ \Longleftrightarrow\ |x|<2\ \Rightarrow\ R=2.\]`)}
    ${exBox(String.raw`<p>\(\displaystyle\sum\Big(1+\frac1k\Big)^{k^{2}}x^{k}\) (Wurzelkriterium):</p>\[\sqrt[k]{|a_k|}=\Big(1+\frac1k\Big)^{k}\ \longrightarrow\ e\quad\Rightarrow\quad R=\frac{1}{e}.\]`)}
  </div>`; }

function entwickelnHtml(){ return String.raw`
  <p class="sub">Eine glatte Funktion lokal durch Polynome/Potenzreihen ersetzen — samt Fehler (Restglied).</p>
  <div class="twocol">
    <div class="refblock">
      <h3>Taylor-Polynom & -Reihe</h3>
      <table class="reftable">
        <tr><td>\(\displaystyle T_n(x)=\sum_{k=0}^{n}\frac{f^{(k)}(x_0)}{k!}(x-x_0)^{k}\)</td></tr>
        <tr><td>Taylorreihe: \(n\to\infty\); um \(x_0=0\) heißt sie Maclaurin-Reihe.</td></tr>
      </table>
      <h3 style="margin-top:14px">Restglied \(R_n=f-T_n\)</h3>
      <table class="reftable">
        <tr><td><b>Lagrange:</b> \(\displaystyle R_n(x)=\frac{f^{(n+1)}(\xi)}{(n+1)!}(x-x_0)^{n+1}\)</td><td class="cond">\(\xi\) zw. \(x_0,x\)</td></tr>
        <tr><td><b>Integral:</b> \(\displaystyle R_n(x)=\frac{1}{n!}\int_{x_0}^{x}f^{(n+1)}(t)\,(x-t)^{n}\,dt\)</td></tr>
      </table>
      ${exBox(String.raw`<p>\(\sin x\) um \(0\): \(T_3(x)=x-\frac{x^{3}}{6}\).</p><p>Da bei \(\sin\) der \(x^{4}\)-Term fehlt (\(T_3=T_4\)), gilt sogar</p>\[|R_3(x)|\le\frac{|x|^{5}}{120}\quad(\text{denn }|f^{(5)}|=|\cos|\le1).\]`)}
    </div>
    <div class="refblock">
      <h3>Klassische Reihen (um \(0\))</h3>
      <table class="reftable">
        <tr><td>\(\displaystyle e^{x}=\sum\frac{x^{k}}{k!}\)</td><td class="cond">\(\forall x\)</td></tr>
        <tr><td>\(\displaystyle\frac{1}{1-x}=\sum x^{k}\)</td><td class="cond">\(|x|<1\)</td></tr>
        <tr><td>\(\displaystyle\ln(1+x)=\sum\frac{(-1)^{k+1}}{k}x^{k}\)</td><td class="cond">\(-1<x\le1\)</td></tr>
        <tr><td>\(\displaystyle\arctan x=\sum\frac{(-1)^{k}}{2k+1}x^{2k+1}\)</td><td class="cond">\(|x|\le1\)</td></tr>
        <tr><td>\(\displaystyle(1+x)^{\alpha}=\sum\binom{\alpha}{k}x^{k}\)</td><td class="cond">\(|x|<1\)</td></tr>
      </table>
      <h3 style="margin-top:14px">Trick: als Potenzreihe schreiben</h3>
      <p class="sub">Aus der geometrischen Reihe per <b>Substitution</b> und gliedweisem <b>Ableiten/Integrieren</b>.</p>
      ${exBox(String.raw`<p>\(\frac{1}{1+x^{2}}\) via \(x\to-x^{2}\) in \(\frac{1}{1-x}\):</p>\[\frac{1}{1+x^{2}}=\sum_{k=0}^{\infty}(-1)^{k}x^{2k}.\]<p>Gliedweise integrieren \(\Rightarrow \arctan x=\sum\frac{(-1)^{k}}{2k+1}x^{2k+1}\).</p>`)}
      ${exBox(String.raw`<p>Ableiten von \(\frac{1}{1-x}=\sum x^{k}\):</p>\[\frac{1}{(1-x)^{2}}=\sum_{k=0}^{\infty}(k+1)x^{k}.\]`)}
    </div>
  </div>
  <div class="refblock">
    <h3>Lagrange-Interpolation</h3>
    <p class="sub">Eindeutiges Polynom vom Grad \(\le n\) durch \(n+1\) Punkte \((x_i,y_i)\).</p>
    <table class="reftable">
      <tr><td>\(\displaystyle p(x)=\sum_{i=0}^{n} y_i\,L_i(x),\qquad L_i(x)=\prod_{j\neq i}\frac{x-x_j}{x_i-x_j}\)</td></tr>
      <tr><td>\(L_i(x_i)=1,\quad L_i(x_j)=0\ (j\neq i)\)</td><td class="cond">Basis-Eigenschaft</td></tr>
    </table>
    ${exBox(String.raw`<p>Polynom durch \((0,1),(1,3),(2,7)\):</p>\[p(x)=1\cdot\frac{(x-1)(x-2)}{2}+3\cdot\frac{x(x-2)}{-1}+7\cdot\frac{x(x-1)}{2}=x^{2}+x+1.\]<p>Check: \(p(0)=1,\ p(1)=3,\ p(2)=7\). ✓</p>`)}
  </div>`; }

function vertauschenHtml(){ return String.raw`
  <p class="sub">Wann darf man \(\lim\) mit \(\lim\), \(\int\) oder \(\frac{d}{dx}\) vertauschen? Kurz: bei <b>gleichmäßiger</b> Konvergenz. Die Idee: nicht nur jeder Punkt für sich, sondern der <b>ganze Graph</b> muss sich der Grenzfunktion nähern.</p>
  <div class="refblock">
    <h3>So prüft man gleichmäßige Konvergenz</h3>
    <table class="reftable">
      <tr><td>1. <b>Grenzfunktion</b> punktweise bestimmen: \(f(x)=\lim_{n\to\infty}f_n(x)\) (für jedes \(x\) einzeln).</td></tr>
      <tr><td>2. <b>Fehlerfunktion</b> bilden: \(e_n(x)=f_n(x)-f(x)\).</td></tr>
      <tr><td>3. <b>Supremum</b> über \(x\) nehmen: \(M_n=\sup_{x\in D}|e_n(x)|\) (Maximum oft über \(e_n'(x)=0\) suchen).</td></tr>
      <tr><td>4. Ist \(M_n\to0\)? &nbsp;<b>Ja</b> \(\Rightarrow\) gleichmäßig. &nbsp;<b>Nein</b> \(\Rightarrow\) nur punktweise.</td></tr>
    </table>
    <p class="sub" style="margin-top:6px">Bild: gleichmäßig heißt, ab einem \(N\) liegt der ganze Graph von \(f_n\) im \(\varepsilon\)-Schlauch um \(f\) — <b>ein</b> \(N(\varepsilon)\) für alle \(x\). Punktweise darf \(N=N(\varepsilon,x)\) von \(x\) abhängen.</p>
  </div>
  <div class="twocol">
    <div class="refblock">
      <h3>Punktweise vs. gleichmäßig</h3>
      <table class="reftable">
        <tr><td><b>Punktweise:</b> \(\forall x:\ f_n(x)\to f(x)\). Das \(N=N(\varepsilon,x)\) darf von \(x\) abhängen.</td></tr>
        <tr><td><b>Gleichmäßig:</b> \(\displaystyle\sup_{x\in D}|f_n(x)-f(x)|\to0\). Ein \(N(\varepsilon)\) für <b>alle</b> \(x\).</td></tr>
        <tr><td>gleichmäßig \(\Rightarrow\) punktweise (nicht umgekehrt).</td></tr>
        <tr><td><b>Weierstraß-M-Test</b> (Reihen): \(|f_k|\le M_k,\ \sum M_k<\infty \Rightarrow \sum f_k\) gleichm. konv.</td></tr>
      </table>
    </div>
    <div class="refblock">
      <h3>Was gleichmäßige Konvergenz erlaubt</h3>
      <table class="reftable">
        <tr><td><b>\(\lim\)–\(\lim\) (Stetigkeit):</b> \(\displaystyle\lim_{x\to x_0}\lim_{n}f_n=\lim_{n}\lim_{x\to x_0}f_n\)</td><td class="cond">\(f_n\) stetig + <b>gleichm.</b></td></tr>
        <tr><td><b>\(\lim\)–\(\int\):</b> \(\displaystyle\lim_{n}\int_a^b f_n=\int_a^b\lim_{n}f_n\)</td><td class="cond"><b>gleichm.</b> auf \([a,b]\)</td></tr>
        <tr><td><b>\(\lim\)–\(\tfrac{d}{dx}\):</b> \(\big(\lim f_n\big)'=\lim f_n'\)</td><td class="cond"><b>\(f_n'\) gleichm.</b> + \(f_n(x_0)\) konv.</td></tr>
      </table>
    </div>
  </div>
  <div class="refblock">
    <h3>Gegenbeispiele (nur punktweise!)</h3>
    ${exBox(String.raw`<p>\(f_n(x)=x^{n}\) auf \([0,1]\). <b>1. Grenzfunktion:</b></p>\[f(x)=\lim_{n}x^{n}=\begin{cases}0,&0\le x<1\\1,&x=1\end{cases}\]<p><b>2.–3. Fehler-Supremum:</b> \(\displaystyle\sup_{0\le x<1}|x^{n}-0|=1\) (Wert wird für \(x\to1\) erreicht).</p><p><b>4.</b> \(M_n=1\not\to0\) \(\Rightarrow\) <b>nur punktweise</b>. Deshalb darf der Grenzwert unstetig sein, obwohl alle \(f_n\) stetig sind.</p>`)}
    ${exBox(String.raw`<p>Integral nicht vertauschbar: \(f_n=n\) auf \((0,\tfrac1n)\), sonst \(0\).</p>\[\int_0^1 f_n\,dx=1\ \text{für alle }n,\quad\text{aber}\quad f_n(x)\to0\ \text{punktweise}\]\[\Rightarrow\ \lim_n\int_0^1 f_n\,dx=1\neq0=\int_0^1\lim_n f_n\,dx.\]`)}
  </div>`; }

function kurvenHtml(){ return String.raw`
  <p class="sub">Bogenlänge \(L\) und Krümmung \(\kappa\) je nach Darstellung. \(\kappa\) misst, wie schnell sich die Richtung dreht; \(\rho=1/\kappa\) ist der Krümmungsradius.</p>
  <div class="twocol">
    <div class="refblock">
      <h3>Bogenlänge \(L\)</h3>
      <table class="reftable">
        <tr><td>Graph \(y=f(x),\ x\in[a,b]\): \(\displaystyle L=\int_a^b\sqrt{1+f'(x)^{2}}\,dx\)
          ${exBox(String.raw`<p>\(f(x)=\tfrac{2}{3}x^{3/2}\) auf \([0,3]\): \(f'(x)=\sqrt{x}\), also \(\sqrt{1+f'^{2}}=\sqrt{1+x}\):</p>\[L=\int_{0}^{3}\sqrt{1+x}\,dx=\Big[\tfrac{2}{3}(1+x)^{3/2}\Big]_{0}^{3}=\tfrac{2}{3}(8-1)=\tfrac{14}{3}.\]`,"Beispiel: f(x) = ⅔·x^(3/2)")}</td></tr>
        <tr><td>Parametrisch \((x(t),y(t))\): \(\displaystyle L=\int_a^b\sqrt{\dot x^{2}+\dot y^{2}}\,dt\)
          ${exBox(String.raw`<p>Kreis \((R\cos t,\ R\sin t)\), \(t\in[0,2\pi]\): \(\dot x=-R\sin t,\ \dot y=R\cos t\):</p>\[L=\int_{0}^{2\pi}\sqrt{R^{2}\sin^{2}t+R^{2}\cos^{2}t}\,dt=\int_{0}^{2\pi}R\,dt=2\pi R.\ \checkmark\]`,"Beispiel: Kreis")}</td></tr>
        <tr><td>Polar \(r=r(\varphi),\ \varphi\in[\alpha,\beta]\): \(\displaystyle L=\int_\alpha^\beta\sqrt{r^{2}+r'^{2}}\,d\varphi\)
          ${exBox(String.raw`<p>Logarithmische Spirale \(r=e^{\varphi}\), \(\varphi\in[0,2\pi]\): \(r'=e^{\varphi}\):</p>\[L=\int_{0}^{2\pi}\sqrt{e^{2\varphi}+e^{2\varphi}}\,d\varphi=\sqrt{2}\int_{0}^{2\pi}e^{\varphi}\,d\varphi=\sqrt{2}\,\big(e^{2\pi}-1\big).\]`,"Beispiel: Spirale r = e^φ")}</td></tr>
      </table>
    </div>
    <div class="refblock">
      <h3>Krümmung \(\kappa\)</h3>
      <table class="reftable">
        <tr><td>Graph \(y=f(x)\): \(\displaystyle \kappa=\frac{|f''|}{\big(1+f'^{2}\big)^{3/2}}\)
          ${exBox(String.raw`<p>Parabel \(y=x^{2}\): \(f'=2x,\ f''=2\):</p>\[\kappa(x)=\frac{2}{(1+4x^{2})^{3/2}},\qquad \kappa(0)=2,\ \rho(0)=\tfrac12.\]<p>Im Scheitel am stärksten gekrümmt, außen flacher.</p>`,"Beispiel: Parabel y = x²")}</td></tr>
        <tr><td>Parametrisch: \(\displaystyle \kappa=\frac{|\dot x\ddot y-\dot y\ddot x|}{\big(\dot x^{2}+\dot y^{2}\big)^{3/2}}\)
          ${exBox(String.raw`<p>Ellipse \((a\cos t,\ b\sin t)\): \(\dot x=-a\sin t,\ \dot y=b\cos t,\ \ddot x=-a\cos t,\ \ddot y=-b\sin t\):</p>\[\dot x\ddot y-\dot y\ddot x=ab\sin^{2}t+ab\cos^{2}t=ab\ \Rightarrow\ \kappa(t)=\frac{ab}{(a^{2}\sin^{2}t+b^{2}\cos^{2}t)^{3/2}}\]<p>Am Scheitel \(t=0\): \(\kappa=\dfrac{ab}{b^{3}}=\dfrac{a}{b^{2}}\).</p>`,"Beispiel: Ellipse")}</td></tr>
        <tr><td>Polar \(r(\varphi)\): \(\displaystyle \kappa=\frac{\big|r^{2}+2r'^{2}-r\,r''\big|}{\big(r^{2}+r'^{2}\big)^{3/2}}\)
          ${exBox(String.raw`<p>Kreis \(r=R\): \(r'=r''=0\):</p>\[\kappa=\frac{|R^{2}+0-0|}{(R^{2})^{3/2}}=\frac{1}{R},\qquad \rho=R.\]<p>Genau der Kreisradius — gutes Kontrollbeispiel. ✓</p>`,"Beispiel: Kreis r = R")}</td></tr>
      </table>
      <p class="sub" style="margin-top:8px">Krümmungsradius \(\rho=\dfrac{1}{\kappa}\).</p>
    </div>
  </div>
  <div class="refblock">
    <h3>Vektorielle Schreibweise</h3>
    <p class="sub">Für eine Kurve \(\mathbf r(t)\) (Ortsvektor); \(\times\) ist das Kreuzprodukt.</p>
    <table class="reftable">
      <tr><td>Krümmung: \(\displaystyle \kappa(t)=\frac{\|\mathbf r'(t)\times\mathbf r''(t)\|}{\|\mathbf r'(t)\|^{3}}\)</td><td class="cond">in \(\mathbb R^{2},\mathbb R^{3}\)</td></tr>
      <tr><td>Einheits-Tangente: \(\displaystyle \mathbf T(t)=\frac{\mathbf r'(t)}{\|\mathbf r'(t)\|}\)</td></tr>
      <tr><td>Hauptnormale \(\displaystyle \mathbf N=\frac{\mathbf T'}{\|\mathbf T'\|}\); außerdem \(\displaystyle \kappa=\frac{\|\mathbf T'(t)\|}{\|\mathbf r'(t)\|}=\Big\|\frac{d\mathbf T}{ds}\Big\|\)</td></tr>
    </table>
    <p class="sub" style="margin-top:6px">In \(\mathbb R^{2}\) ist \(\mathbf r'\times\mathbf r''=\dot x\ddot y-\dot y\ddot x\) (Skalar) — daraus wird direkt die Parameter-Formel oben.</p>
  </div>
  <div class="refblock">
    <h3>Rektifizierbarkeit — zeigen &amp; widerlegen</h3>
    <p class="sub">Eine Kurve heißt <b>rektifizierbar</b>, wenn die Längen aller einbeschriebenen Polygonzüge beschränkt sind; das Supremum ist dann die Länge \(L\).</p>
    <table class="reftable">
      <tr><td><b>Rektifizierbar zeigen:</b> Parametrisierung \(\varphi\in C^{1}([a,b])\) (oder stückweise \(C^{1}\), oder Lipschitz) \(\Rightarrow\) rektifizierbar mit \(\displaystyle L=\int_a^b\|\varphi'(t)\|\,dt<\infty\).</td></tr>
      <tr><td><b>Nicht rektifizierbar — Weg 1 (Polygonzug, per Definition):</b> Folge von Stützstellen wählen, deren Polygonlängen \(\to\infty\) — typisch dort, wo die Kurve unendlich oft „hin- und herpendelt".</td></tr>
      <tr><td><b>Nicht rektifizierbar — Weg 2 (Integral ausschöpfen):</b> Länge ist monoton in der Teilkurve. Ist \(\varphi\) auf \([\varepsilon,b]\) \(C^{1}\), gilt \(L\ge\int_{\varepsilon}^{b}\|\varphi'\|\,dt\). Divergiert das für \(\varepsilon\to a^{+}\) → \(L=\infty\).</td></tr>
    </table>
    ${exBox(String.raw`<p><b>Aufgabe:</b> \(f(t)=\big(t\cos\tfrac1t,\ t\sin\tfrac1t\big)\) für \(0<t\le\tfrac1\pi\), \(f(0)=(0,0)\). Zeige: die Kurve ist <b>nicht rektifizierbar</b>.</p>
<p><b>Weg 2 (Integral):</b> Für \(t>0\) (mit \(u=\tfrac1t\)):</p>\[x'=\cos u+\tfrac1t\sin u,\qquad y'=\sin u-\tfrac1t\cos u\]\[\|f'(t)\|^{2}=1+\frac{1}{t^{2}}\qquad(\text{die Mischterme heben sich weg!})\]<p>\(f\) ist auf \([\varepsilon,\tfrac1\pi]\) glatt, also für jedes \(\varepsilon>0\):</p>\[L\ \ge\ \int_{\varepsilon}^{1/\pi}\sqrt{1+\tfrac{1}{t^{2}}}\,dt\ \ge\ \int_{\varepsilon}^{1/\pi}\frac{dt}{t}\ =\ \ln\frac{1}{\pi}-\ln\varepsilon\ \xrightarrow[\ \varepsilon\to0^{+}\ ]{}\ \infty\]<p>Das Längenintegral divergiert bei \(0\) → \(L=\infty\). ✓ (Wichtig: \(f\) ist in \(0\) nicht diff'bar — deshalb über \([\varepsilon,\tfrac1\pi]\) argumentieren und \(\varepsilon\to0\) schicken, nicht direkt \(\int_0\) hinschreiben.)</p>
<p><b>Weg 1 (Polygonzug):</b> Bei \(t_k=\tfrac{1}{k\pi}\) ist \(\sin(k\pi)=0,\ \cos(k\pi)=(-1)^{k}\), also \(f(t_k)=\big(\tfrac{(-1)^{k}}{k\pi},\,0\big)\) — die Punkte springen abwechselnd links/rechts vom Ursprung:</p>\[\|f(t_k)-f(t_{k+1})\|=\frac{1}{\pi}\Big(\frac{1}{k}+\frac{1}{k+1}\Big)\ \ge\ \frac{1}{\pi k}\]<p>Der Polygonzug durch \(t_1,\dots,t_n\) hat Länge \(\ge\frac{1}{\pi}\sum_{k=1}^{n-1}\frac1k\to\infty\) (harmonische Reihe) → unbeschränkt → nicht rektifizierbar. ✓</p>`,"Klausur-Beispiel: Spirale t·(cos 1/t, sin 1/t) — beide Wege")}
  </div>`; }

function diffHtml(){ return String.raw`
  <p class="sub">Differentialrechnung mehrerer Variablen: Ableitungen, Matrizen, der \(\nabla\)-Operator. Bei den anspruchsvolleren Dingen (ab der Leibniz-Regel) je ein Beispiel.</p>
  <div class="twocol">
    <div class="refblock">
      <h3>Partielle Ableitung & Gradient</h3>
      <table class="reftable">
        <tr><td><b>Partiell:</b> \(\displaystyle \frac{\partial f}{\partial x_i}=\lim_{h\to0}\frac{f(\dots,x_i+h,\dots)-f}{h}\) — alle anderen Variablen fest halten.</td></tr>
        <tr><td><b>Gradient:</b> \(\displaystyle \nabla f=\Big(\frac{\partial f}{\partial x_1},\dots,\frac{\partial f}{\partial x_n}\Big)^{\!\top}\)</td><td class="cond">steilster Anstieg, \(\perp\) Niveaumengen</td></tr>
        <tr><td><b>Richtungsableitung:</b> \(\displaystyle \partial_{\mathbf v}f=\nabla f\cdot\mathbf v\) mit \(\|\mathbf v\|=1\)</td></tr>
        <tr><td><b>Totales Differential:</b> \(\displaystyle df=\sum_i\frac{\partial f}{\partial x_i}\,dx_i=\nabla f\cdot d\mathbf x\)</td></tr>
        <tr><td><b>Satz von Schwarz:</b> \(f\in C^2\Rightarrow \dfrac{\partial^2 f}{\partial x_i\partial x_j}=\dfrac{\partial^2 f}{\partial x_j\partial x_i}\)</td></tr>
      </table>
      ${exBox(String.raw`<p>\(f(x,y)=x^2+y^2\): \(\nabla f=(2x,2y)=2(x,y)\).</p><p>Zeigt radial nach außen (steilster Anstieg) und steht \(\perp\) auf den Kreisen \(x^2+y^2=c\) (Niveaulinien).</p>`)}
    </div>
    <div class="refblock">
      <h3>Jacobi- & Hesse-Matrix</h3>
      <table class="reftable">
        <tr><td><b>Jacobi</b> \(f:\mathbb R^{n}\to\mathbb R^{m}\): \(\displaystyle (Df)_{ij}=\frac{\partial f_i}{\partial x_j}\) (\(m\times n\)). Für \(m=1\): Zeile \(=\nabla f^{\top}\).</td></tr>
        <tr><td><b>Hesse</b> \(f:\mathbb R^{n}\to\mathbb R\): \(\displaystyle (Hf)_{ij}=\frac{\partial^2 f}{\partial x_i\partial x_j}\) (\(n\times n\), symmetrisch).</td></tr>
        <tr><td><b>Extrema</b> in \(\nabla f=0\): \(Hf\) pos. definit \(\Rightarrow\) Min, neg. definit \(\Rightarrow\) Max, indefinit \(\Rightarrow\) Sattel.</td></tr>
      </table>
      ${exBox(String.raw`<p><b>Jacobi</b> der Polarkoordinaten \(g(r,\varphi)=(r\cos\varphi,\ r\sin\varphi)\):</p>\[Dg=\begin{pmatrix}\cos\varphi & -r\sin\varphi\\ \sin\varphi & r\cos\varphi\end{pmatrix},\qquad \det Dg=r.\]<p>Genau das \(r\) in \(dx\,dy=r\,dr\,d\varphi\).</p>`)}
      ${exBox(String.raw`<p><b>Hesse</b> & Extremum für \(f(x,y)=x^2+xy+y^2\): \(\nabla f=(2x+y,\ x+2y)=0\Rightarrow(0,0)\).</p>\[Hf=\begin{pmatrix}2&1\\1&2\end{pmatrix},\quad \det=3>0,\ \operatorname{Spur}=4>0\ \Rightarrow\ \text{pos. definit}\]<p>\(\Rightarrow\) lokales <b>Minimum</b> in \((0,0)\).</p>`)}
    </div>
  </div>
  <div class="refblock">
    <h3>Der Nabla-Operator \(\nabla\)</h3>
    <p class="sub">\(\displaystyle \nabla=\Big(\frac{\partial}{\partial x_1},\dots,\frac{\partial}{\partial x_n}\Big)\) — ein <b>formaler</b> Vektor-Operator, der auf das wirkt, was rechts von ihm steht.</p>
    <div class="twocol">
      <div class="refblock">
        <table class="reftable">
          <tr><td><b>Gradient</b> (Skalar\(\to\)Vektor): \(\nabla f=\operatorname{grad}f\)</td></tr>
          <tr><td><b>Divergenz</b> (Vektor\(\to\)Skalar): \(\displaystyle \nabla\cdot\mathbf F=\operatorname{div}\mathbf F=\sum_i\frac{\partial F_i}{\partial x_i}\)</td></tr>
          <tr><td><b>Rotation</b> (Vektor\(\to\)Vektor, \(\mathbb R^3\)): \(\nabla\times\mathbf F=\operatorname{rot}\mathbf F\)</td></tr>
          <tr><td><b>Laplace:</b> \(\displaystyle \Delta f=\nabla\cdot\nabla f=\sum_i\frac{\partial^2 f}{\partial x_i^2}\)</td></tr>
        </table>
      </div>
      <div class="refblock">
        <p class="sub" style="margin-top:0"><b>Worauf achten:</b></p>
        <table class="reftable">
          <tr><td>\(\nabla\) ist <i>kein</i> echter Vektor — die Reihenfolge zählt: \(\nabla f\neq f\nabla\) (Letzteres bleibt ein Operator).</td></tr>
          <tr><td>Die Ergebnisse sind verschiedene Objekte: \(\operatorname{grad},\operatorname{rot}\) liefern Vektoren, \(\operatorname{div}\) einen Skalar.</td></tr>
          <tr><td>Nützliche Identitäten: \(\nabla\times(\nabla f)=\mathbf 0\) und \(\nabla\cdot(\nabla\times\mathbf F)=0\).</td></tr>
        </table>
      </div>
    </div>
    ${exBox(String.raw`<p>\(\mathbf F(x,y,z)=(-y,\ x,\ 0)\):</p>\[\operatorname{div}\mathbf F=\frac{\partial(-y)}{\partial x}+\frac{\partial x}{\partial y}+0=0,\qquad \operatorname{rot}\mathbf F=\nabla\times\mathbf F=(0,\,0,\,2).\]<p>Divergenzfrei, aber es „rotiert" — ein Wirbel um die \(z\)-Achse.</p>`)}
  </div>
  <div class="refblock">
    <h3>Fréchet-Ableitung</h3>
    <p class="sub">Verallgemeinert die Ableitung auf normierte Räume \(f:X\to Y\) — die Ableitung ist eine <b>lineare Abbildung</b>.</p>
    <table class="reftable">
      <tr><td>\(f\) ist in \(x\) <b>Fréchet-differenzierbar</b>, wenn es eine stetige lineare Abbildung \(A=f'(x)\) gibt mit \(\displaystyle \frac{\|f(x+h)-f(x)-Ah\|}{\|h\|}\xrightarrow[h\to0]{}0\).</td></tr>
      <tr><td>Im \(\mathbb R^n\): \(A=\) Jacobi-Matrix \(Df(x)\).</td></tr>
      <tr><td><b>Gâteaux</b> (alle Richtungsableitungen existieren) ist schwächer als Fréchet.</td></tr>
    </table>
    ${exBox(String.raw`<p>\(f(x)=\|x\|^2=x^{\top}x\) auf \(\mathbb R^n\):</p>\[f(x+h)-f(x)=2x^{\top}h+\|h\|^2.\]<p>Der lineare Teil ist \(Ah=2x^{\top}h\), der Rest \(\|h\|^2=o(\|h\|)\). Also \(f'(x)=2x^{\top}\), d. h. \(\nabla f=2x\).</p>`)}
  </div>
  <div class="refblock">
    <h3>Leibniz-Regel (Ableiten unter dem Integral)</h3>
    <table class="reftable">
      <tr><td>Feste Grenzen: \(\displaystyle \frac{d}{dt}\int_a^b f(x,t)\,dx=\int_a^b \frac{\partial f}{\partial t}(x,t)\,dx\)</td><td class="cond">\(f,\ \partial_t f\) stetig</td></tr>
      <tr><td>Variable Grenzen: \(\displaystyle \frac{d}{dt}\int_{a(t)}^{b(t)} f(x,t)\,dx=f(b,t)\,b'(t)-f(a,t)\,a'(t)+\int_{a(t)}^{b(t)}\frac{\partial f}{\partial t}\,dx\)</td></tr>
    </table>
    ${exBox(String.raw`<p>\(\displaystyle F(t)=\int_0^{t}(x^2+t)\,dx\) (variable obere Grenze):</p>\[F'(t)=\underbrace{(t^2+t)}_{f(t,t)\cdot 1}+\int_0^{t}\underbrace{1}_{\partial_t(x^2+t)}\,dx=t^2+t+t=t^2+2t.\]<p>Check direkt: \(F(t)=\tfrac{t^3}{3}+t^2\Rightarrow F'(t)=t^2+2t\). ✓</p>`)}
  </div>`; }

function bruecheHtml(){ return String.raw`
  <p class="sub"><b>Fahrplan:</b> ① Zählergrad \(\ge\) Nennergrad? → erst <b>Polynomdivision</b>. &nbsp;② Nenner <b>faktorisieren</b>. &nbsp;③ <b>Ansatz</b> nach Schema. &nbsp;④ <b>Koeffizienten</b> bestimmen. &nbsp;⑤ Summanden einzeln integrieren.</p>
  <div class="refblock">
    <h3>Ansatz-Schemata (Nenner-Faktor → Ansatz)</h3>
    <table class="reftable">
      <tr><td>\((x-a)\)</td><td>\(\dfrac{A}{x-a}\)</td></tr>
      <tr><td>\((x-a)^{k}\)</td><td>\(\dfrac{A_1}{x-a}+\dfrac{A_2}{(x-a)^{2}}+\cdots+\dfrac{A_k}{(x-a)^{k}}\)</td></tr>
      <tr><td>\(x^{2}+px+q\) irreduzibel</td><td>\(\dfrac{Bx+C}{x^{2}+px+q}\)</td></tr>
      <tr><td>\((x^{2}+px+q)^{k}\)</td><td>\(\displaystyle\sum_{j=1}^{k}\frac{B_j x+C_j}{(x^{2}+px+q)^{j}}\)</td></tr>
    </table>
  </div>
  <div class="refblock">
    <h3>Methoden zur Koeffizienten-Bestimmung — je mit Mini-Beispiel</h3>
    <div class="subgrid">
      <div class="subcard">
        <div class="subhead">① Zuhalten („Handauflegen")</div>
        <div class="subrule">Faktor \((x-a)\) zuhalten, \(x=a\) in den Rest einsetzen. <b>Nur</b> bei einfachen Nullstellen — bei \((x-a)^{k}\) nur für die höchste Potenz \(A_k\), bei quadratischen Faktoren gar nicht.</div>
        ${exBox(String.raw`<p>\(\dfrac{5x+1}{(x-1)(x+2)}=\dfrac{A}{x-1}+\dfrac{B}{x+2}\)</p><p>\((x-1)\) zuhalten, \(x=1\): \(A=\dfrac{5\cdot1+1}{1+2}=2\). \((x+2)\) zuhalten, \(x=-2\): \(B=\dfrac{-10+1}{-2-1}=3\).</p>\[\Rightarrow\ \frac{5x+1}{(x-1)(x+2)}=\frac{2}{x-1}+\frac{3}{x+2}\]<p>Probe: \(2(x+2)+3(x-1)=5x+1\). ✓</p>`,"Mini-Beispiel")}
      </div>
      <div class="subcard">
        <div class="subhead">② Grenzwert-Trick</div>
        <div class="subrule">Beide Seiten mit \(x\) multiplizieren, \(x\to\infty\) → eine Zusatzgleichung. Immer möglich — ideal, um fehlende Koeffizienten nachzuziehen.</div>
        ${exBox(String.raw`<p>\(\dfrac{1}{x(x^{2}+1)}=\dfrac{A}{x}+\dfrac{Bx+C}{x^{2}+1}\) — \(A=1\) per Zuhalten (\(x=0\)). Dann:</p>\[\underbrace{\frac{x}{x(x^{2}+1)}}_{\to\,0}=\underbrace{A+\frac{(Bx+C)x}{x^{2}+1}}_{\to\,A+B}\quad\Rightarrow\quad B=-1.\]<p>Rest (\(x=1\)): \(\tfrac12=1+\tfrac{-1+C}{2}\Rightarrow C=0\). Ergebnis: \(\dfrac{1}{x}-\dfrac{x}{x^{2}+1}\).</p>`,"Mini-Beispiel")}
      </div>
      <div class="subcard">
        <div class="subhead">③ Koeffizientenvergleich</div>
        <div class="subrule">Auf den Hauptnenner bringen, Potenzen von \(x\) vergleichen. Funktioniert <b>immer</b> — auch bei quadratischen Faktoren — ist aber am aufwendigsten.</div>
        ${exBox(String.raw`<p>\(\dfrac{3x+5}{(x+1)(x+2)}=\dfrac{A}{x+1}+\dfrac{B}{x+2}\). Hauptnenner:</p>\[3x+5=A(x+2)+B(x+1)=(A+B)\,x+(2A+B)\]<p>Vergleich von \(x^{1}\) und \(x^{0}\):</p>\[A+B=3,\qquad 2A+B=5\ \Rightarrow\ A=2,\ B=1.\]`,"Mini-Beispiel")}
      </div>
      <div class="subcard">
        <div class="subhead">④ Werte einsetzen</div>
        <div class="subrule">Bequeme \(x\)-Werte in die Hauptnenner-Gleichung einsetzen → kleines lineares Gleichungssystem. Immer möglich.</div>
        ${exBox(String.raw`<p>\(\dfrac{2x}{(x-1)(x+1)}=\dfrac{A}{x-1}+\dfrac{B}{x+1}\), Hauptnenner-Gleichung \(2x=A(x+1)+B(x-1)\).</p>\[x=0:\ 0=A-B,\qquad x=2:\ 4=3A+B\ \Rightarrow\ A=B=1.\]<p>Ergebnis: \(\dfrac{1}{x-1}+\dfrac{1}{x+1}\).</p>`,"Mini-Beispiel")}
      </div>
    </div>
  </div>
  <div class="refblock">
    <h3>Komplette Rechnungen</h3>
    ${exBox(String.raw`<p>\(\dfrac{1}{x^{2}-1}=\dfrac{1}{(x-1)(x+1)}=\dfrac{A}{x-1}+\dfrac{B}{x+1}\)</p><p><b>Zuhalten:</b> \((x-1)\) zuhalten, \(x=1\): \(A=\dfrac{1}{1+1}=\dfrac12\). \((x+1)\) zuhalten, \(x=-1\): \(B=-\dfrac12\).</p>\[\Rightarrow\ \int\frac{dx}{x^{2}-1}=\frac12\ln\left|\frac{x-1}{x+1}\right|+C\]`,"Beispiel 1 — nur einfache Nullstellen (reines Zuhalten)")}
    ${exBox(String.raw`<p>\(\dfrac{x+1}{x(x-1)^{2}}=\dfrac{A}{x}+\dfrac{B}{x-1}+\dfrac{C}{(x-1)^{2}}\)</p><p><b>Zuhalten</b> \(x\) (bei \(x=0\)): \(A=\dfrac{0+1}{(0-1)^{2}}=1\).</p><p><b>Zuhalten</b> \((x-1)^{2}\) (bei \(x=1\)): \(C=\dfrac{1+1}{1}=2\). <i>(B so nicht bestimmbar!)</i></p><p><b>Grenzwert-Trick:</b> mit \(x\) multiplizieren, \(x\to\infty\): links \(\to0\), rechts \(\to A+B\) \(\Rightarrow B=-1\).</p><p><b>Probe</b> bei \(x=2\): links \(\frac{3}{2}\); rechts \(\frac12-1+2=\frac32\). ✓</p>`,"Beispiel 2 — mehrfache Nullstelle (Methoden-Mix)")}
  </div>
  <div class="refblock">
    <h3>Bruch-Tricks &amp; praktische Identitäten</h3>
    <table class="reftable">
      <tr><td>\(\dfrac{t}{t+2}=1-\dfrac{2}{t+2}\)</td><td class="cond">\(+1{-}1\)-Trick (Zähler ↦ Nenner + Rest)</td></tr>
      <tr><td>\(\dfrac{1}{ab}=\dfrac{1}{b-a}\Big(\dfrac{1}{a}-\dfrac{1}{b}\Big)\) \((a\neq b)\)</td><td class="cond">Teleskop-Basis</td></tr>
      <tr><td>\(\dfrac{1}{x(x+1)}=\dfrac{1}{x}-\dfrac{1}{x+1}\)</td><td class="cond">Spezialfall</td></tr>
      <tr><td>\(\dfrac{1}{\sqrt{a}+\sqrt{b}}=\dfrac{\sqrt{a}-\sqrt{b}}{a-b}\)</td><td class="cond">3. binomische</td></tr>
      <tr><td>\(\dfrac{a/b}{c/d}=\dfrac{ad}{bc}\)</td><td class="cond">Doppelbruch</td></tr>
    </table>
    ${exBox(String.raw`<p><b>Teleskopsumme</b> mit der Identität \(\frac{1}{k(k+1)}=\frac1k-\frac{1}{k+1}\):</p>\[\sum_{k=1}^{n}\frac{1}{k(k+1)}=\Big(1-\frac12\Big)+\Big(\frac12-\frac13\Big)+\cdots+\Big(\frac1n-\frac{1}{n+1}\Big)=1-\frac{1}{n+1}\ \longrightarrow\ 1\]`)}
  </div>`; }

function funktionswerteHtml(){ return String.raw`

  <div class="twocol">

      <h3>Sinus, Kosinus, Tangens</h3>

        <tr><td>\(\sin\)</td><td>\(0\)</td><td>\(\frac{1}{2}\)</td><td>\(\frac{\sqrt{2}}{2}\)</td><td>\(\frac{\sqrt{3}}{2}\)</td><td>\(1\)</td><td>\(0\)</td></tr>

        <tr><td>\(\tan\)</td><td>\(0\)</td><td>\(\frac{1}{\sqrt{3}}\)</td><td>\(1\)</td><td>\(\sqrt{3}\)</td><td>—</td><td>\(0\)</td></tr>
