        def: String.raw`Die Funktionenreihe \(\sum_{k=1}^{+\infty}a_k(x)\) konvergiert <b>gleichmäßig</b> auf \(X\), wenn ihre Partialsummen \(S_m(x)=\sum_{k=1}^{m}a_k(x)\rightrightarrows S(x)\). <b>Satz (Tafel V19):</b> sind zusätzlich alle \(a_k\) stetig in \(\xi\in\mathrm{acc}(X)\), so gilt\[\lim_{x\to\xi}\ \sum_{k=1}^{+\infty}a_k(x)\ =\ \sum_{k=1}^{+\infty}\ \lim_{x\to\xi}a_k(x)\]— Grenzwert und Summe dürfen getauscht werden; \(S\) ist stetig.`,
        worte: String.raw`<p>Eine Reihe von Funktionen ist die Folge ihrer Partialsummen — „gleichmäßig konvergente Reihe" heißt also nichts Neues, sondern: die <b>Folge</b> \(S_m\) konvergiert gleichmäßig. Dann vererbt 6.3 alle guten Eigenschaften (Stetigkeit, Vertauschen) von den endlichen Summen auf die Reihe. Beweisidee: endliche Linearität des Grenzwerts + Grenzübergang \(m\to\infty\).</p>`,
        erfuellt: String.raw`<p>Geometrische Reihe auf \([-q,q]\) mit festem \(q<1\): \(|x^{k}|\le q^{k}\), \(\sum q^{k}<\infty\) ⇒ gleichmäßig (M-Test). Also darf man z. B. \(\lim_{x\to\xi}\sum x^{k}=\sum\xi^{k}=\frac{1}{1-\xi}\) für \(|\xi|\le q\) direkt tauschen.</p>`,
        verletzt: String.raw`<p>Dieselbe Reihe auf ganz \(\left]-1,1\right[\): <b>nicht</b> gleichmäßig, denn</p>\[\sup_{|x|<1}\Big|\sum_{k=m+1}^{+\infty}x^{k}\Big|=\sup_{|x|<1}\frac{|x|^{m+1}}{1-|x|}=+\infty\]<p>(Restglied explodiert nahe \(1\)). Auf jedem kompakten Teilintervall aber schon — „lokal gleichmäßig".</p>`,
        plus: String.raw`<p>Das Muster „glm. auf jedem Kompaktum in \(\left]x_0-R,x_0+R\right[\)" ist der Normalfall bei Potenzreihen (6.10) — für Stetigkeit/Integrieren im Innern reicht das völlig.</p>`}},
       {id:"6.4.2", title:"Majorantenkriterium von Weierstraß (M-Test)", body:{
        def: String.raw`<b>Satz (Tafel V19):</b> \(a:\mathbb N\times X\to Y\), \(Y\) Banachraum. Gibt es Konstanten \(C_k\) mit\[\|a_k(x)\|\le C_k\ \ \forall x\in X\qquad\text{und}\qquad \sum_{k=1}^{+\infty}C_k<+\infty,\]so konvergiert \(\sum_{k=1}^{+\infty}a_k(x)\) <b>absolut und gleichmäßig</b> auf \(X\).`,
        worte: String.raw`<p>Eine \(x\)-freie summierbare „Deckel-Folge" \(C_k\) erledigt alles auf einmal: das Cauchy-Restglied \(\big\|\sum_{n+1}^{m}a_k(x)\big\|\le\sum_{n+1}^{m}C_k\) wird klein — <b>gleichzeitig für alle \(x\)</b>. Das ist DER Standardweg, gleichmäßige Konvergenz von Reihen zu zeigen.</p>`,
        erfuellt: String.raw`<p>\(\displaystyle\sum_{k=1}^{+\infty}\frac{\sin(kx)}{k^{2}}\) auf \(\mathbb R\) (Tafel-Beispiel \(\sum\alpha_k\sin(kx)\)):</p>\[\Big\|\frac{\sin(kx)}{k^{2}}\Big\|\le\frac{1}{k^{2}}=C_k,\qquad\sum C_k<\infty\]<p>⇒ absolut & gleichmäßig auf ganz \(\mathbb R\); Summe stetig.</p>`,
        verletzt: String.raw`<p>\(\sum x^{k}\) auf \(\left]-1,1\right[\): die beste \(x\)-freie Schranke ist \(C_k=\sup_{|x|<1}|x|^{k}=1\), und \(\sum1=+\infty\) — M-Test <b>nicht anwendbar</b>; die Reihe ist dort tatsächlich nicht gleichmäßig konvergent (6.4.1).</p>`,
        plus: String.raw`<p>Der M-Test ist hinreichend, nicht notwendig: es gibt gleichmäßig konvergente Reihen ohne summierbare Majorante (z. B. \(\sum\frac{(-1)^{k}}{k+x^{2}}\), Leibniz gleichmäßig). Notation der Vorlesung: \(C_k\) statt \(M_k\).</p>`}}]},
    {id:"6.5",  t:"Doppelte Grenzwerte limₓ, limᵧ", topics:[], body:{
        def: String.raw`<b>Satz (Tafel V19):</b> \(X\subset M_1\), \(Y\subset M_2\), \(M_3\) vollständig, \(f:X\times Y\to M_3\), \(\xi\in\mathrm{acc}(X)\), \(\eta\in\mathrm{acc}(Y)\). Es gelte\[(1)\ \lim_{y\to\eta}f(x,y)=\varphi(x)\ \ \forall x\in X\qquad(2)\ \lim_{x\to\xi}f(x,y)=\psi(y)\ \ \forall y\in Y,\]wobei <b>einer</b> der beiden Grenzwerte gleichmäßig angenommen wird. Dann existieren beide iterierten Limites und\[\lim_{x\to\xi}\varphi(x)\ =\ \lim_{y\to\eta}\psi(y)\qquad\text{d.h.}\qquad \lim_{x\to\xi}\lim_{y\to\eta}f(x,y)=\lim_{y\to\eta}\lim_{x\to\xi}f(x,y).\]`,
        worte: String.raw`<p>Das \(n\)-\(x\)-Vertauschen (6.3) mit zwei kontinuierlichen Variablen: erst \(y\), dann \(x\) — oder umgekehrt? Ohne Zusatzbedingung können die Reihenfolgen verschiedene Ergebnisse liefern. Ist eine der beiden Konvergenzen <b>gleichmäßig</b> (im \(\varepsilon\)-\(\delta\)-Sinn unabhängig von der anderen Variablen), stimmen beide überein. Beweis über Folgendefinition: \(a_{j,k}=f(x_j,y_k)\) führt alles auf 6.3 zurück (Tafel).</p>`,
        verletzt: String.raw`<p>Der Klassiker \(f(x,y)=\dfrac{x^{2}}{x^{2}+y^{2}}\) bei \((\xi,\eta)=(0,0)\):</p>\[\lim_{x\to0}\lim_{y\to0}f=\lim_{x\to0}\frac{x^{2}}{x^{2}}=1,\qquad \lim_{y\to0}\lim_{x\to0}f=\lim_{y\to0}\,0=0\]<p>— verschiedene Werte, also war <b>keine</b> der Konvergenzen gleichmäßig.</p>`,
        erfuellt: String.raw`<p>\(f(x,y)=x+y\) bei \((0,0)\): \(\lim_{y\to0}f=x\) gleichmäßig in \(x\) (Fehler \(|y|\) hängt nicht von \(x\) ab) ⇒ beide iterierten Limites existieren und sind \(=0\). ✓</p>`,
        plus: String.raw`<p>Dieses Schema steckt hinter vielen „darf ich vertauschen?"-Fragen: Doppelfolgen \(a_{j,k}\), \(\lim\)–\(\int\), \(\partial\)-Ableitungen von Parameterintegralen. Immer fragen: <b>welcher der beiden Prozesse läuft gleichmäßig?</b></p>`}},
    {id:"6.6",  t:"Vertauschen von Grenzwert und Integral", topics:[
       {id:"6.6.1", title:"Gleichmäßige Konvergenz und ∫ auf [a,b]", body:{
        def: String.raw`<b>Satz (Tafel V19):</b> \(f_n\in C([a,b],\mathbb K^{d})\) (oder \(f_n\in R[a,b]\)) und \(f_n\rightrightarrows f\) auf \([a,b]\). Dann existiert\[\lim_{n\to\infty}\int_a^{b}f_n(x)\,dx\ =\ \int_a^{b}f(x)\,dx.\]`,
        worte: String.raw`<p>Der Beweis ist eine Zeile Dreiecksungleichung:\[\Big\|\int_a^b f_n-\int_a^b f\Big\|\le\int_a^b\|f_n-f\|\,dx\le (b-a)\,\|f_n-f\|_C\ \to\ 0.\]Der maximale Fehler mal Intervalllänge kontrolliert den Flächenfehler — deshalb braucht es die <b>gleichmäßige</b> Schranke und ein <b>endliches</b> Intervall.</p>`,
        erfuellt: String.raw`<p>\(f_n(x)=\frac{\sin(nx)}{n}\rightrightarrows0\) auf \([0,\pi]\) (\(M_n=\frac1n\)):</p>\[\int_0^{\pi}\frac{\sin(nx)}{n}dx=\frac{1-\cos(n\pi)}{n^{2}}\ \longrightarrow\ 0=\int_0^{\pi}0\,dx.\ \checkmark\]`,
        verletzt: String.raw`<p>Spike \(f_n=n\) auf \(\left]0,\tfrac1n\right[\), sonst \(0\): nur punktweise \(f_n\to0\), und</p>\[\int_0^{1}f_n\,dx=1\ \neq\ 0=\int_0^{1}\lim_n f_n\,dx\]<p>— die Fläche flieht in den Turm. Ohne Gleichmäßigkeit kein Tausch.</p>`,
        plus: String.raw`<p>Für <b>Ableitungen</b> ist es subtiler: man braucht \(f_n'\rightrightarrows\) (nicht \(f_n\)!) plus Konvergenz in einem Punkt — Ableiten verstärkt Fehler, Integrieren glättet sie.</p>`}},
       {id:"6.6.2", title:"Gliedweise Integration von Reihen", body:{
        def: String.raw`<b>Satz (Tafel V19):</b> \(a_k\in C([a,b],\mathbb K^{d})\) und \(S(x)=\sum_{k=1}^{+\infty}a_k(x)\) konvergiere <b>gleichmäßig</b> bzgl. \(x\in[a,b]\). Dann\[\int_a^{b}\Big(\sum_{k=1}^{+\infty}a_k(x)\Big)dx\ =\ \sum_{k=1}^{+\infty}\int_a^{b}a_k(x)\,dx.\]`,
        worte: String.raw`<p>6.6.1, angewandt auf die Partialsummen: \(\int S_m=\sum_{k\le m}\int a_k\) (endliche Linearität), und \(S_m\rightrightarrows S\) erlaubt den Grenzübergang links. Kurz: bei gleichmäßiger Konvergenz darf man <b>Summe und Integral tauschen</b>.</p>`,
        beispiel: String.raw`<p>Geometrische Reihe auf \([0,q]\), \(q<1\) (glm. per M-Test):</p>\[\int_0^{q}\frac{dx}{1-x}=\sum_{k=0}^{+\infty}\int_0^{q}x^{k}dx=\sum_{k=0}^{+\infty}\frac{q^{k+1}}{k+1}\ \Rightarrow\ -\ln(1-q)=\sum_{k=1}^{+\infty}\frac{q^{k}}{k}\]<p>— die \(\ln\)-Reihe, gratis durch gliedweises Integrieren. (Tafel-Anwendung: Orthogonalitäts-Rechnung \(A_m=\sum\alpha_k\int\sin(kx)\sin(mx)\,dx\) bei Fourierreihen.)</p>`,
        plus: String.raw`<p>Genauso entsteht \(\arctan x=\sum\frac{(-1)^{k}}{2k+1}x^{2k+1}\) aus \(\frac{1}{1+x^{2}}=\sum(-1)^{k}x^{2k}\). Bei Potenzreihen ist gliedweises Integrieren im Innern des Konvergenzkreises immer erlaubt (6.10.2).</p>`}}]},
    {id:"6.7",  t:"Parameterintegrale", topics:[], body:{
        def: String.raw`<b>Satz (Tafel V20):</b> Sei \(\Omega=[\alpha,\beta]\times[a,b]\subset\mathbb R^{2}\) und \(f\in C(\Omega,\mathbb K^{d})\). Dann ist\[I(x)\ :=\ \int_a^{b}f(x,y)\,dy\qquad\textbf{stetig auf }[\alpha,\beta].\]`,
        worte: String.raw`<p>Ein Integral, dessen Integrand von einem Parameter \(x\) abhängt, definiert eine neue Funktion \(I(x)\) — und die erbt Stetigkeit. Kern des Beweises (Tafel): \(f\) ist auf dem <b>Kompaktum</b> \(\Omega\) automatisch <b>gleichmäßig stetig</b>; also gilt \(f(x,y)\to f(\xi,y)\) für \(x\to\xi\) <b>gleichmäßig in \(y\)</b>, und 6.6.1 erlaubt den Tausch von \(\lim_{x\to\xi}\) und \(\int_a^b\).</p>`,
        beispiel: String.raw`<p>\(I(x)=\displaystyle\int_0^{1}e^{xy}\,dy\): für \(x\neq0\) ist \(I(x)=\frac{e^{x}-1}{x}\), und \(I(0)=1\). Der Satz garantiert Stetigkeit — tatsächlich:</p>\[\lim_{x\to0}\frac{e^{x}-1}{x}=1=I(0)\ \checkmark\]<p>(der Standardgrenzwert aus dem Spickzettel).</p>`,
        plus: String.raw`<p>Nächste Stufe: <b>Differenzieren unter dem Integral</b> — ist auch \(\partial f/\partial x\) stetig auf \(\Omega\), gilt \(I'(x)=\int_a^b \frac{\partial f}{\partial x}(x,y)\,dy\) (Leibniz-Regel, siehe Spickzettel <a href="#/ref/diffrechnung">Differentialrechnung</a>).</p>`}},
    {id:"6.9",  t:"Grenzwerte und uneigentliche Integrale", topics:[], body:{
        def: String.raw`<b>Satz (Tafel V21):</b> \(f_n:[A,+\infty[\,\to\mathbb K^{d}\) stetig, mit\[(1)\ \lim_{R\to+\infty}\int_A^{R}f_n=\int_A^{+\infty}f_n\ \ \text{gleichmäßig bzgl. }n\quad\Big(\forall\varepsilon\ \exists R_\varepsilon\ \forall n\ \forall R\ge R_\varepsilon:\ \big\|{\textstyle\int_A^{R}f_n-\int_A^{+\infty}f_n}\big\|<\varepsilon\Big)\]\[(2)\ f_n\rightrightarrows f\ \text{auf jedem festen }[A,R].\]Dann existiert \(\displaystyle\lim_{n\to\infty}\int_A^{+\infty}f_n=\int_A^{+\infty}f\).`,
        worte: String.raw`<p>Beim unendlichen Intervall reicht „gleichmäßig auf Kompakta" <b>nicht</b> — die Masse könnte nach \(+\infty\) entwischen. Bedingung (1) verbietet genau das: die „Schwänze" \(\int_R^{+\infty}f_n\) müssen <b>gleichmäßig in \(n\)</b> klein sein. Dann: Doppel-Grenzwert-Schema (6.5) mit den Variablen \(n\) und \(R\).</p>`,
        verletzt: String.raw`<p>Wandernde Masse: \(f_n=\frac1n\) auf \([0,n]\), sonst \(0\) (geglättet): sogar \(f_n\rightrightarrows0\) auf ganz \([0,+\infty[\) (\(M_n=\frac1n\)), aber</p>\[\int_0^{+\infty}f_n\,dx=\frac1n\cdot n=1\ \neq\ 0=\int_0^{+\infty}0\,dx\]<p>— Bedingung (1) ist verletzt: \(\int_R^{+\infty}f_n=\frac{n-R}{n}\to1\) für \(n\gg R\).</p>`,
        erfuellt: String.raw`<p>\(f_n(x)=e^{-x}\big(1+\tfrac{\sin x}{n}\big)\): (2) klar (\(M_n\le\frac1n\sup e^{-x}\)), (1): \(\big\|\int_R^{+\infty}f_n\big\|\le2e^{-R}\) unabhängig von \(n\) ⇒</p>\[\lim_n\int_0^{+\infty}f_n=\int_0^{+\infty}e^{-x}dx=1.\ \checkmark\]`,
        plus: String.raw`<p>Merkregel: unendliches Intervall = <b>zwei</b> Grenzprozesse (\(n\to\infty\) und \(R\to+\infty\)) — einer davon muss gleichmäßig laufen. Das Spike- und das Wander-Beispiel sind die zwei Arten, wie Fläche „verloren geht".</p>`}},
    {id:"6.10", t:"Potenzreihen", topics:[
       {id:"6.10.1", title:"Konvergenzradius (Cauchy-Hadamard)", body:{
        def: String.raw`Für die Potenzreihe \(S(z)=\sum_{k=0}^{+\infty}a_k(z-z_0)^{k}\) (\(z,z_0,a_k\in\mathbb C\)) definiert (Tafel V22)\[\frac{1}{R}\ =\ \limsup_{k\to\infty}\ \sqrt[k]{|a_k|}\qquad(\tfrac10:=\infty,\ \tfrac{1}{\infty}:=0)\]den <b>Konvergenzradius</b>: \(S\) konvergiert <b>absolut</b> im Inneren des Konvergenzkreises \(U_R(z_0)=\{|z-z_0|<R\}\) und divergiert für \(|z-z_0|>R\).`,
        worte: String.raw`<p>Wurzelkriterium auf \(|a_k||z-z_0|^{k}\) angewandt: \(\limsup\sqrt[k]{\cdot}=\frac{|z-z_0|}{R}\) — kleiner 1 innen, größer 1 außen. Auf dem <b>Rand</b> \(|z-z_0|=R\) sagt der Satz nichts: dort muss man jeden Punkt einzeln prüfen. Auf jedem kompakten Teilkreis \(|z-z_0|\le r<R\) ist die Konvergenz gleichmäßig (M-Test mit \(C_k=|a_k|r^{k}\)).</p>`,
        erfuellt: String.raw`<p>\(\displaystyle\sum_{k=0}^{+\infty}\frac{z^{k}}{k!}\): Quotienten-Form \(R=\lim\big|\frac{a_k}{a_{k+1}}\big|=\lim(k+1)=\infty\) — konvergiert in ganz \(\mathbb C\) (das ist \(e^{z}\)).</p>`,
        verletzt: String.raw`<p>\(\displaystyle\sum_{k=0}^{+\infty}k!\,z^{k}\): \(\sqrt[k]{k!}\sim\frac ke\to\infty\) ⇒ \(R=0\) — konvergiert <b>nur</b> in \(z=0\). Und Randverhalten ist individuell: \(\sum\frac{z^{k}}{k}\) hat \(R=1\), divergiert bei \(z=1\), konvergiert bei \(z=-1\).</p>`,
        plus: String.raw`<p>Radius-Tricks (Lücken-Reihen, \(u=z^{2}\)-Substitution, nützliche \(k\)-te Wurzeln): Spickzettel <a href="#/ref/potenzreihen">Potenzreihen</a>. Cauchy-Hadamard funktioniert <b>immer</b> — der limsup existiert stets.</p>`}},
       {id:"6.10.2", title:"Termweise Differentiation & Integration", body:{
        def: String.raw`<b>Satz (Tafel V22):</b> \(S(z)=\sum_{k=0}^{+\infty}a_k(z-z_0)^{k}\) ist im Inneren des Konvergenzkreises <b>termweise (komplex) differenzierbar</b>:\[S'(z)=\sum_{k=1}^{+\infty}k\,a_k\,(z-z_0)^{k-1},\]und die Reihe der Ableitungen hat <b>denselben Konvergenzradius</b> \(R\) (ebenso beim gliedweisen Integrieren).`,
        worte: String.raw`<p>Im Konvergenzkreis darf man mit Potenzreihen wie mit Polynomen umgehen: Glied für Glied ableiten und integrieren, beliebig oft — der Radius ändert sich nicht, weil \(\sqrt[k]{k}\to1\) den limsup nicht verschiebt. Folge: \(S\) ist innen beliebig oft differenzierbar und \(a_k=\frac{S^{(k)}(z_0)}{k!}\) (die Potenzreihe ist ihre eigene Taylorreihe).</p>`,
        beispiel: String.raw`<p>Geometrische Reihe \(\frac{1}{1-z}=\sum_{k\ge0}z^{k}\) (\(R=1\)) termweise ableiten:</p>\[\frac{1}{(1-z)^{2}}=\sum_{k=1}^{+\infty}k\,z^{k-1}=\sum_{k=0}^{+\infty}(k+1)\,z^{k},\qquad |z|<1\]<p>— dieselbe Formel, die bei der Abel-Summation von \(1-2+3-\cdots\) (5.6.4) benutzt wird.</p>`,
        plus: String.raw`<p>Der Beweis (Tafel) läuft über die Abschätzung \(\big|\frac{z^{k}-z'^{k}}{z-z'}\big|\le k\,r^{k-1}\) für \(|z|,|z'|\le r<R\) + Majorantenkriterium. Das ist der Einstieg in die Funktionentheorie: Potenzreihen = holomorphe Funktionen.</p>`}}]}
   ]}
];

const byId = new Map();
const flat = [];           // alle "Blätter" (Themen, oder Abschnitt ohne Themen) in Reihenfolge
CH.forEach(ch=>{
  byId.set(ch.id, ch);
  ch.kind="chapter"; ch.parent=null;
  ch.sections.forEach(se=>{
    se.kind="section"; se.parent=ch; se.title=se.t; se.kw = KW[se.id]||[];
    se.topics = (se.topics||[]).map(a=> Array.isArray(a) ? {id:a[0], title:a[1], src:a[2], kind:"topic", parent:se} : Object.assign({kind:"topic", parent:se}, a));
    byId.set(se.id, se);
    if(se.topics.length===0){ flat.push(se); }       // Abschnitt ist selbst ein Blatt
    se.topics.forEach(tp=>{ byId.set(tp.id, tp); flat.push(tp); });
  });
});
const TOTAL = flat.length;

/* =========================================================================
   3) Fortschritt (localStorage)
   ========================================================================= */
const PKEY="ana34-progress-v1";
let done = {};
try{ done = JSON.parse(localStorage.getItem(PKEY)||"{}"); }catch(e){ done={}; }
function isDone(id){ return !!done[id]; }
function setDone(id,v){ if(v) done[id]=1; else delete done[id]; localStorage.setItem(PKEY, JSON.stringify(done)); updateProgress(); }
function doneCount(){ return flat.reduce((n,l)=> n + (isDone(l.id)?1:0), 0); }
function sectionDone(se){ const ls = se.topics.length? se.topics : [se]; return ls.every(l=>isDone(l.id)); }
function updateProgress(){
  const d=doneCount();
  document.getElementById("progtext").textContent = d+" / "+TOTAL;
  document.getElementById("progfill").style.width = (TOTAL? (100*d/TOTAL):0)+"%";
}

const esc = s => String(s).replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

function crumbHtml(node){
  const parts=[`<a href="#/">Start</a>`];
  const chain=[]; let n=node; while(n){ chain.unshift(n); n=n.parent; }
  chain.forEach((nd,i)=>{
    parts.push('<span class="sep">›</span>');
    const label = (nd.kind==="chapter"? "Kap. "+nd.id : nd.id) + "  " + (nd.title|| "");
    if(i===chain.length-1) parts.push(`<span>${esc(label)}</span>`);
    else parts.push(`<a href="#/${nd.id}">${esc(nd.kind==="chapter"?("Kap. "+nd.id):nd.id)}</a>`);
  });
  return `<nav class="crumbs">${parts.join(" ")}</nav>`;
}

function intHtml(){ return String.raw`
  <div class="twocol">
    <div class="refblock">
      <h3>Potenzen, Exponential &amp; Co.</h3>
      <table class="reftable">
        <tr><td>\(\displaystyle\int x^{n}\,dx=\frac{x^{n+1}}{n+1}+C\)</td><td class="cond">\(n\neq-1\)</td></tr>
        <tr><td>\(\displaystyle\int \frac{dx}{x}=\ln|x|+C\)</td><td class="cond"></td></tr>
        <tr><td>\(\displaystyle\int e^{x}\,dx=e^{x}+C\)</td><td class="cond"></td></tr>
        <tr><td>\(\displaystyle\int a^{x}\,dx=\frac{a^{x}}{\ln a}+C\)</td><td class="cond">\(a>0,\ a\neq1\)</td></tr>
        <tr><td>\(\displaystyle\int \ln x\,dx=x\ln x-x+C\)</td><td class="cond"></td></tr>
        <tr><td>\(\displaystyle\int \sinh x\,dx=\cosh x+C\)</td><td class="cond"></td></tr>
        <tr><td>\(\displaystyle\int \cosh x\,dx=\sinh x+C\)</td><td class="cond"></td></tr>
      </table>
      <h3 style="margin-top:16px">Auf arctan &amp; arcsin führend</h3>
      <table class="reftable">
        <tr><td>\(\displaystyle\int \frac{dx}{1+x^{2}}=\arctan x+C\)</td><td class="cond"></td></tr>
        <tr><td>\(\displaystyle\int \frac{dx}{\sqrt{1-x^{2}}}=\arcsin x+C\)</td><td class="cond"></td></tr>
      </table>
      <h3 style="margin-top:16px">Mit Konstante \(a\)</h3>
      <table class="reftable">
        <tr><td>\(\displaystyle\int \frac{dx}{a^{2}+x^{2}}=\frac{1}{a}\arctan\frac{x}{a}+C\)</td></tr>
        <tr><td>\(\displaystyle\int \frac{dx}{\sqrt{a^{2}-x^{2}}}=\arcsin\frac{x}{a}+C\)</td></tr>
        <tr><td>\(\displaystyle\int \frac{dx}{\sqrt{x^{2}+a^{2}}}=\ln\!\big(x+\sqrt{x^{2}+a^{2}}\big)+C\)</td></tr>
        <tr><td>\(\displaystyle\int \frac{dx}{x^{2}-a^{2}}=\frac{1}{2a}\ln\left|\frac{x-a}{x+a}\right|+C\)</td></tr>
      </table>
    </div>
    <div class="refblock">
      <h3>Trigonometrisch</h3>
      <table class="reftable">
        <tr><td>\(\displaystyle\int \sin x\,dx=-\cos x+C\)</td><td class="cond"></td></tr>
        <tr><td>\(\displaystyle\int \cos x\,dx=\sin x+C\)</td><td class="cond"></td></tr>
        <tr><td>\(\displaystyle\int \tan x\,dx=-\ln|\cos x|+C\)</td><td class="cond"></td></tr>
        <tr><td>\(\displaystyle\int \frac{dx}{\cos^{2}x}=\tan x+C\)</td><td class="cond"></td></tr>
        <tr><td>\(\displaystyle\int \frac{dx}{\sin^{2}x}=-\cot x+C\)</td><td class="cond"></td></tr>
        <tr><td>\(\displaystyle\int \frac{dx}{\sin x}=\ln\left|\tan\frac{x}{2}\right|+C\)</td><td class="cond"></td></tr>
        <tr><td>\(\displaystyle\int \frac{dx}{\cos x}=\ln\left|\tan\Big(\frac{x}{2}+\frac{\pi}{4}\Big)\right|+C\)</td><td class="cond"></td></tr>
      </table>
      <h3 style="margin-top:16px">Produkte \(e^{x}\cdot\sin/\cos\)</h3>
      <table class="reftable">
        <tr><td>\(\displaystyle\int e^{x}\cos x\,dx=\tfrac12\,e^{x}\big(\sin x+\cos x\big)+C\)</td><td class="cond">2× part. Int.</td></tr>
        <tr><td>\(\displaystyle\int e^{x}\sin x\,dx=\tfrac12\,e^{x}\big(\sin x-\cos x\big)+C\)</td><td class="cond">2× part. Int.</td></tr>
      </table>
      <h3 style="margin-top:16px">Beispiele</h3>
      ${exBox(String.raw`<p>Mit \(a=2\):</p>\[\int \frac{dx}{4+x^{2}}=\frac{1}{2}\arctan\frac{x}{2}+C\]`)}
      ${exBox(String.raw`<p>Partialbruch:</p>\[\frac{1}{x^{2}-1}=\frac{1}{2}\Big(\frac{1}{x-1}-\frac{1}{x+1}\Big)\]\[\int\frac{dx}{x^{2}-1}=\frac{1}{2}\ln\left|\frac{x-1}{x+1}\right|+C\]`)}
    </div>
  </div>`; }

function subHtml(){ return String.raw`
  <p class="sub">Jede Substitution mit ausklappbarem Rechenweg.</p>
  <div class="subgrid">
    <div class="subcard">
      <div class="subhead">\(\sqrt{a^{2}-x^{2}}\)</div>
      <div class="subrule">Setze \(x=a\sin t,\ dx=a\cos t\,dt\)</div>
      ${exBox(String.raw`<p>Mit \(x=\sin t\):</p>\[\int\sqrt{1-x^{2}}\,dx=\int\cos^{2}t\,dt=\int\frac{1+\cos 2t}{2}\,dt=\frac{t}{2}+\frac{\sin 2t}{4}+C\]<p>Rücksubstitution \(t=\arcsin x,\ \sin 2t=2x\sqrt{1-x^{2}}\):</p>\[=\tfrac{1}{2}\big(\arcsin x+x\sqrt{1-x^{2}}\big)+C\]`)}
    </div>
    <div class="subcard">
      <div class="subhead">\(\sqrt{a^{2}+x^{2}}\)</div>
      <div class="subrule">Setze \(x=a\sinh t\) (oder \(x=a\tan t\))</div>
      ${exBox(String.raw`<p>Mit \(x=\sinh t\):</p>\[\int\frac{dx}{\sqrt{x^{2}+1}}=\int\frac{\cosh t}{\cosh t}\,dt=\int dt=t+C=\operatorname{arsinh}x+C=\ln\!\big(x+\sqrt{x^{2}+1}\big)+C\]`)}
    </div>
    <div class="subcard">
      <div class="subhead">\(\sqrt{x^{2}-a^{2}}\)</div>
      <div class="subrule">Setze \(x=a\cosh t\)</div>
      ${exBox(String.raw`<p>Mit \(x=\cosh t\), \(x\ge1\):</p>\[\int\frac{dx}{\sqrt{x^{2}-1}}=\int dt=t+C=\operatorname{arcosh}x+C=\ln\!\big(x+\sqrt{x^{2}-1}\big)+C\]`)}
    </div>
    <div class="subcard">
      <div class="subhead">\(R(\sin x,\cos x)\) rational</div>
      <div class="subrule">Weierstraß \(t=\tan\frac{x}{2}\): \(\sin x=\frac{2t}{1+t^{2}},\ \cos x=\frac{1-t^{2}}{1+t^{2}},\ dx=\frac{2}{1+t^{2}}dt\)</div>
      ${exBox(String.raw`<p>Mit \(t=\tan\frac{x}{2}\):</p>\[\int\frac{dx}{\sin x}=\int\frac{2/(1+t^{2})}{2t/(1+t^{2})}\,dt=\int\frac{dt}{t}=\ln|t|+C=\ln\left|\tan\frac{x}{2}\right|+C\]`)}
    </div>
    <div class="subcard">
      <div class="subhead">\(\displaystyle\int f(g(x))\,g'(x)\,dx\)</div>
      <div class="subrule">Setze \(u=g(x),\ du=g'(x)\,dx\)</div>
      ${exBox(String.raw`<p>Mit \(u=x^{2}\), \(du=2x\,dx\):</p>\[\int 2x\cos(x^{2})\,dx=\int\cos u\,du=\sin u+C=\sin(x^{2})+C\]`)}
    </div>
    <div class="subcard">
      <div class="subhead">\(\displaystyle\int\frac{f'(x)}{f(x)}\,dx=\ln|f(x)|+C\)</div>
      <div class="subrule">Zähler = Ableitung des Nenners</div>
      ${exBox(String.raw`\[\int\frac{2x}{x^{2}+1}\,dx=\ln(x^{2}+1)+C\]`)}
    </div>
    <div class="subcard">
      <div class="subhead">Lineare Subst. \(\displaystyle\int f(ax+b)\,dx\)</div>
      <div class="subrule">\(=\frac{1}{a}F(ax+b)+C\)</div>
      ${exBox(String.raw`\[\int e^{3x+1}\,dx=\frac{1}{3}e^{3x+1}+C\]`)}
    </div>
    <div class="subcard">
      <div class="subhead">Wurzeln loswerden: \(x=t^{k}\)</div>
      <div class="subrule">Bei \(\sqrt[n]{x}\)-Termen: \(x=t^{k}\) mit \(k=\) kgV der Wurzelexponenten (z. B. \(\sqrt{x}\) und \(\sqrt[3]{x}\) → \(k=6\)).</div>
      ${exBox(String.raw`<p>\(\displaystyle\int\frac{dx}{1+\sqrt{x}}\) mit \(t=\sqrt{x}\), also \(x=t^{2},\ dx=2t\,dt\):</p>\[\int\frac{2t}{1+t}\,dt=2\int\Big(1-\frac{1}{1+t}\Big)dt=2t-2\ln(1+t)+C\]<p>(im zweiten Schritt der \(+1{-}1\)-Trick!) Rücksubstitution:</p>\[=2\sqrt{x}-2\ln\big(1+\sqrt{x}\big)+C.\]`)}
    </div>
  </div>
  <div class="refblock" style="margin-top:16px">
    <h3>Umformungs-Tricks vor dem Integrieren</h3>
    <div class="subgrid">
      <div class="subcard">
        <div class="subhead">Der \(+1{-}1\)-Trick (Grad abbauen)</div>
        <div class="subrule">Im Zähler den Nenner künstlich erzeugen: \(\dfrac{t}{t+2}=\dfrac{(t+2)-2}{t+2}=1-\dfrac{2}{t+2}\).</div>
        ${exBox(String.raw`\[\int\frac{t}{t+2}\,dt=\int\Big(1-\frac{2}{t+2}\Big)dt=t-2\ln|t+2|+C\]<p>Gleicher Trick: \(\dfrac{x^{2}}{1+x^{2}}=1-\dfrac{1}{1+x^{2}}\ \Rightarrow\ \displaystyle\int\frac{x^{2}}{1+x^{2}}\,dx=x-\arctan x+C.\)</p>`)}
      </div>
      <div class="subcard">
        <div class="subhead">Quadratische Ergänzung</div>
        <div class="subrule">\(x^{2}+px+q=\big(x+\tfrac{p}{2}\big)^{2}+q-\tfrac{p^{2}}{4}\) → führt auf die \(a^{2}+u^{2}\)-Integrale (arctan!).</div>
        ${exBox(String.raw`<p>\(x^{2}+2x+5=(x+1)^{2}+4\):</p>\[\int\frac{dx}{x^{2}+2x+5}=\int\frac{du}{u^{2}+2^{2}}\ \ (u=x+1)\ =\frac{1}{2}\arctan\frac{x+1}{2}+C\]`)}
      </div>
      <div class="subcard">
        <div class="subhead">3. binomische Formel (konjugiert erweitern)</div>
        <div class="subrule">\(\dfrac{1}{\sqrt{a}+\sqrt{b}}=\dfrac{\sqrt{a}-\sqrt{b}}{a-b}\) — Wurzeln aus dem Nenner schaffen.</div>
        ${exBox(String.raw`\[\int\frac{dx}{\sqrt{x+1}+\sqrt{x}}=\int\big(\sqrt{x+1}-\sqrt{x}\big)dx=\frac{2}{3}\Big[(x+1)^{3/2}-x^{3/2}\Big]+C\]<p>denn \((\sqrt{x+1}+\sqrt{x})(\sqrt{x+1}-\sqrt{x})=(x+1)-x=1\).</p>`)}
      </div>
      <div class="subcard">
        <div class="subhead">Trig-Potenzen abbauen</div>
        <div class="subrule">\(\sin^{2},\cos^{2}\) über Doppelwinkel: \(\sin^{2}x=\frac{1-\cos 2x}{2}\), \(\cos^{2}x=\frac{1+\cos 2x}{2}\).</div>
        ${exBox(String.raw`\[\int\cos^{2}x\,dx=\int\frac{1+\cos 2x}{2}\,dx=\frac{x}{2}+\frac{\sin 2x}{4}+C\]`)}
      </div>
    </div>
  </div>
  <div class="refblock">
    <h3>Partielle Integration in der Praxis</h3>
    <table class="reftable">
      <tr><td>\(\displaystyle\int u'(x)\,v(x)\,dx=u(x)v(x)-\int u(x)\,v'(x)\,dx\)</td></tr>
      <tr><td><b>Was ableiten (= \(v\))?</b> Reihenfolge „LIATE": <b>L</b>ogarithmen → <b>I</b>nverse (arcsin, arctan) → <b>A</b>lgebraisch (Polynome) → <b>T</b>rig → <b>E</b>xponential. Was weiter links steht, wird abgeleitet.</td></tr>
    </table>
    ${exBox(String.raw`<p><b>Einfach:</b> \(\displaystyle\int x\,e^{x}\,dx\) — Polynom ableiten, \(e^{x}\) integrieren:</p>\[\int x\,e^{x}\,dx=x\,e^{x}-\int 1\cdot e^{x}\,dx=(x-1)\,e^{x}+C\]<p><b>Faktor-1-Trick</b> für \(\ln\): \(\displaystyle\int\ln x\,dx=\int 1\cdot\ln x\,dx=x\ln x-\int x\cdot\frac{1}{x}\,dx=x\ln x-x+C.\)</p>`)}
    ${exBox(String.raw`<p><b>Doppelt („Phönix"):</b> \(I=\displaystyle\int e^{x}\sin x\,dx\) — zweimal partiell, dann nach \(I\) auflösen:</p>\[I=e^{x}\sin x-\int e^{x}\cos x\,dx=e^{x}\sin x-\Big(e^{x}\cos x+\int e^{x}\sin x\,dx\Big)\]\[\Rightarrow\ I=e^{x}\sin x-e^{x}\cos x-I\ \Rightarrow\ I=\frac{e^{x}}{2}\big(\sin x-\cos x\big)+C\]<p>Das ursprüngliche Integral taucht rechts wieder auf → als Gleichung lösen.</p>`)}
  </div>`; }

function addHtml(){ return String.raw`
  <div class="twocol">
    <div class="refblock">
      <h3>Summen &amp; Differenzen</h3>
      <table class="reftable">
        <tr><td>\(\sin(x\pm y)=\sin x\cos y\pm\cos x\sin y\)</td></tr>
        <tr><td>\(\cos(x\pm y)=\cos x\cos y\mp\sin x\sin y\)</td></tr>
        <tr><td>\(\tan(x\pm y)=\dfrac{\tan x\pm\tan y}{1\mp\tan x\tan y}\)</td></tr>
      </table>
      <h3 style="margin-top:16px">Doppelwinkel</h3>
      <table class="reftable">
        <tr><td>\(\sin 2x=2\sin x\cos x\)</td></tr>
        <tr><td>\(\cos 2x=\cos^{2}x-\sin^{2}x=1-2\sin^{2}x=2\cos^{2}x-1\)</td></tr>
        <tr><td>\(\tan 2x=\dfrac{2\tan x}{1-\tan^{2}x}\)</td></tr>
      </table>
      <h3 style="margin-top:16px">Halbwinkel</h3>
      <table class="reftable">
        <tr><td>\(\sin^{2}\dfrac{x}{2}=\dfrac{1-\cos x}{2}\)</td></tr>
        <tr><td>\(\cos^{2}\dfrac{x}{2}=\dfrac{1+\cos x}{2}\)</td></tr>
        <tr><td>\(\tan\dfrac{x}{2}=\dfrac{1-\cos x}{\sin x}=\dfrac{\sin x}{1+\cos x}\)</td></tr>
      </table>
    </div>
    <div class="refblock">
      <h3>Pythagoras &amp; Umrechnung</h3>
      <table class="reftable">
        <tr><td>\(\sin^{2}x+\cos^{2}x=1\)</td></tr>
        <tr><td>\(1+\tan^{2}x=\dfrac{1}{\cos^{2}x}\)</td></tr>
        <tr><td>\(1+\cot^{2}x=\dfrac{1}{\sin^{2}x}\)</td></tr>
      </table>
      <h3 style="margin-top:16px">Produkt → Summe</h3>
      <table class="reftable">
        <tr><td>\(\sin x\cos y=\tfrac{1}{2}\big[\sin(x{+}y)+\sin(x{-}y)\big]\)</td></tr>
        <tr><td>\(\cos x\cos y=\tfrac{1}{2}\big[\cos(x{-}y)+\cos(x{+}y)\big]\)</td></tr>
        <tr><td>\(\sin x\sin y=\tfrac{1}{2}\big[\cos(x{-}y)-\cos(x{+}y)\big]\)</td></tr>
      </table>
      <h3 style="margin-top:16px">Summe → Produkt</h3>
      <table class="reftable">
        <tr><td>\(\sin x+\sin y=2\sin\dfrac{x+y}{2}\cos\dfrac{x-y}{2}\)</td></tr>
        <tr><td>\(\cos x+\cos y=2\cos\dfrac{x+y}{2}\cos\dfrac{x-y}{2}\)</td></tr>
        <tr><td>\(\cos x-\cos y=-2\sin\dfrac{x+y}{2}\sin\dfrac{x-y}{2}\)</td></tr>
      </table>
    </div>
  </div>
  <div class="refblock">
    <h3>Euler-Formel &amp; Anwendung</h3>
    <table class="reftable">
      <tr><td>\(e^{ix}=\cos x+i\sin x\)</td><td>\(\cos x=\dfrac{e^{ix}+e^{-ix}}{2},\quad \sin x=\dfrac{e^{ix}-e^{-ix}}{2i}\)</td></tr>
    </table>
    ${exBox(String.raw`<p>Doppelwinkel beim Integrieren:</p>\[\int\sin^{2}x\,dx=\int\frac{1-\cos 2x}{2}\,dx=\frac{x}{2}-\frac{\sin 2x}{4}+C\]`)}
  </div>
  <div class="refblock">
    <h3>Hyperbelfunktionen \(\sinh,\cosh,\tanh\)</h3>
    <p class="sub">\(\sinh x=\frac{e^{x}-e^{-x}}{2},\quad \cosh x=\frac{e^{x}+e^{-x}}{2},\quad \tanh x=\frac{\sinh x}{\cosh x}\). Fast wie trig — aber auf die Vorzeichen achten!</p>
    <div class="twocol">
      <div class="refblock">
        <h3>Additionstheoreme</h3>
        <table class="reftable">
          <tr><td>\(\sinh(x\pm y)=\sinh x\cosh y\pm\cosh x\sinh y\)</td></tr>
          <tr><td>\(\cosh(x\pm y)=\cosh x\cosh y\pm\sinh x\sinh y\)</td></tr>
          <tr><td>\(\tanh(x\pm y)=\dfrac{\tanh x\pm\tanh y}{1\pm\tanh x\tanh y}\)</td></tr>
          <tr><td>\(\sinh 2x=2\sinh x\cosh x\)</td></tr>
          <tr><td>\(\cosh 2x=\cosh^{2}x+\sinh^{2}x=2\cosh^{2}x-1\)</td></tr>
        </table>
      </div>
      <div class="refblock">
        <h3>Identitäten & Ableitungen</h3>
        <table class="reftable">
          <tr><td>\(\cosh^{2}x-\sinh^{2}x=1\)</td><td class="cond">„Pythagoras"</td></tr>
          <tr><td>\(1-\tanh^{2}x=\dfrac{1}{\cosh^{2}x}\)</td></tr>
          <tr><td>\((\sinh x)'=\cosh x,\ (\cosh x)'=\sinh x\)</td></tr>
          <tr><td>\((\tanh x)'=\dfrac{1}{\cosh^{2}x}=1-\tanh^{2}x\)</td></tr>
          <tr><td>\(\cosh(ix)=\cos x,\ \sinh(ix)=i\sin x\)</td><td class="cond">Brücke zu trig</td></tr>
        </table>
      </div>
    </div>
    ${exBox(String.raw`<p>Vorzeichen-Merker: bei \(\cosh(x+y)\) steht ein <b>Plus</b> (nicht Minus wie bei \(\cos\)), und \(\cosh^{2}-\sinh^{2}=1\) (nicht \(+\)). Check über die Definition:</p>\[\cosh^{2}x-\sinh^{2}x=\frac{(e^{x}+e^{-x})^{2}-(e^{x}-e^{-x})^{2}}{4}=\frac{4}{4}=1.\]`)}
  </div>`; }

function reihenHtml(){ return String.raw`
  <div class="twocol">
    <div class="refblock">
      <h3>Endliche Summen</h3>
      <table class="reftable">
        <tr><td>\(\displaystyle\sum_{k=1}^{n}k=\frac{n(n+1)}{2}\)</td><td class="cond">Gauß-Summe</td></tr>
        <tr><td>\(\displaystyle\sum_{k=m}^{n}q^{k}=\frac{q^{m}-q^{n+1}}{1-q}\)</td><td class="cond">geometrisch, \(q\neq1\)</td></tr>
        <tr><td>\(\displaystyle\sum_{k=1}^{n}\big(b_{k}-b_{k+1}\big)=b_{1}-b_{n+1}\)</td><td class="cond">Teleskop</td></tr>
      </table>
      <h3 style="margin-top:16px">Geometrische Reihe</h3>
      <table class="reftable">
        <tr><td>\(\displaystyle\sum_{k=m}^{\infty}q^{k}=\frac{q^{m}}{1-q}\)</td><td class="cond">\(|q|<1\)</td></tr>
        <tr><td>Merke: \(\dfrac{\text{erster Summand}}{1-q}\) — der Start \(m\) steckt nur im Zähler</td><td class="cond"></td></tr>
      </table>
      ${exBox(String.raw`<p>Geometrisch, \(q=\tfrac12\), Start \(m=1\):</p>\[\sum_{k=1}^{\infty}\Big(\tfrac{1}{2}\Big)^{k}=\frac{1/2}{1-1/2}=1\]<p>Genau die Merkregel: erster Summand \(\tfrac12\) durch \(1-q=\tfrac12\).</p>`,"Beispiel: q = ½, Start m = 1")}
      <h3 style="margin-top:16px">Werte &amp; Konvergenz-Fakten</h3>
      <table class="reftable">
        <tr><td>\(\displaystyle\sum_{k=1}^{\infty}\frac{1}{k}=\infty\)</td><td class="cond">harmonisch</td></tr>
        <tr><td>\(\displaystyle\sum_{k=1}^{\infty}\frac{1}{k^{p}}\) konv. \(\Leftrightarrow p>1\)</td><td class="cond">p-Reihe</td></tr>
        <tr><td>\(\displaystyle\sum_{k=1}^{\infty}\frac{1}{k^{2}}=\frac{\pi^{2}}{6}\)</td><td class="cond">Basel</td></tr>
        <tr><td>\(\displaystyle\sum_{k=1}^{\infty}\frac{(-1)^{k+1}}{k}=\ln 2\)</td><td class="cond">Leibniz</td></tr>
        <tr><td>\(\displaystyle\sum_{k=0}^{\infty}\frac{(-1)^{k}}{2k+1}=\frac{\pi}{4}\)</td><td class="cond">Leibniz</td></tr>
      </table>
    </div>
    <div class="refblock">
      <h3>Potenzreihen-Klassiker (um \(0\))</h3>
      <table class="reftable">
        <tr><td>\(\displaystyle\sum_{k=0}^{\infty}\frac{x^{k}}{k!}=e^{x}\)</td><td class="cond">\(\forall x\)</td></tr>
        <tr><td>\(\displaystyle\sum_{k=0}^{\infty}\frac{(-1)^{k}x^{2k}}{(2k)!}=\cos x\)</td><td class="cond">\(\forall x\)</td></tr>
        <tr><td>\(\displaystyle\sum_{k=0}^{\infty}\frac{(-1)^{k}x^{2k+1}}{(2k+1)!}=\sin x\)</td><td class="cond">\(\forall x\)</td></tr>
        <tr><td>\(\displaystyle\sum_{k=0}^{\infty}x^{k}=\frac{1}{1-x}\)</td><td class="cond">\(|x|<1\)</td></tr>
        <tr><td>\(\displaystyle\sum_{k=1}^{\infty}\frac{(-1)^{k+1}}{k}x^{k}=\ln(1+x)\)</td><td class="cond">\(-1<x\le1\)</td></tr>
        <tr><td>\(\displaystyle\sum_{k=0}^{\infty}\frac{(-1)^{k}}{2k+1}x^{2k+1}=\arctan x\)</td><td class="cond">\(|x|\le1\)</td></tr>
        <tr><td>\(\displaystyle(1+x)^{\alpha}=\sum_{k=0}^{\infty}\binom{\alpha}{k}x^{k}\)</td><td class="cond">\(|x|<1\)</td></tr>
      </table>
      ${exBox(String.raw`<p>Quotientenkriterium für \(\sum\frac{x^{k}}{k!}\):</p>\[\left|\frac{a_{k+1}}{a_{k}}\right|=\frac{|x|}{k+1}\to 0<1\quad(k\to\infty)\ \Rightarrow\ \text{konvergent }\forall x\]`,"Beispiel: warum e-Reihe überall konvergiert")}
    </div>
  </div>
  <div class="refblock">
    <h3>Teleskopreihen</h3>
    <table class="reftable">
      <tr><td>\(\displaystyle\sum_{k=1}^{n}\big(b_{k}-b_{k+1}\big)=b_{1}-b_{n+1}\) — die mittleren Terme heben sich alle weg</td></tr>
      <tr><td>\(\displaystyle\sum_{k=1}^{\infty}\big(b_{k}-b_{k+1}\big)=b_{1}-\lim_{n\to\infty}b_{n+1}\)</td><td class="cond">falls der Limes existiert</td></tr>
    </table>
    ${exBox(String.raw`<p>Mit Partialbruch \(\dfrac{1}{k(k+1)}=\dfrac{1}{k}-\dfrac{1}{k+1}\) (also \(b_k=\tfrac1k\)):</p>\[\sum_{k=1}^{n}\frac{1}{k(k+1)}=1-\frac{1}{n+1}\ \longrightarrow\ 1.\]<p>Typisches Muster: Bruch per PBZ in eine Differenz \(b_k-b_{k+1}\) verwandeln.</p>`,"Teleskop-Klassiker")}
  </div>
  <div class="refblock">
    <h3>Fourierreihen &amp; Orthogonalität</h3>
    <p class="sub">Für \(2\pi\)-periodische Funktionen: \(f\) als Überlagerung von Sinus/Kosinus schreiben.</p>
    <table class="reftable">
      <tr><td>\(\displaystyle f(x)\sim\frac{a_0}{2}+\sum_{k=1}^{\infty}\big(a_k\cos kx+b_k\sin kx\big)\)</td></tr>
      <tr><td>\(\displaystyle a_k=\frac{1}{\pi}\int_{-\pi}^{\pi}f(x)\cos kx\,dx,\qquad b_k=\frac{1}{\pi}\int_{-\pi}^{\pi}f(x)\sin kx\,dx\)</td></tr>
      <tr><td><b>Orthogonalität</b> (\(k,m\ge1\)): \(\displaystyle\int_{-\pi}^{\pi}\sin kx\,\sin mx\,dx=\pi\,\delta_{km},\quad \int_{-\pi}^{\pi}\cos kx\,\cos mx\,dx=\pi\,\delta_{km},\quad \int_{-\pi}^{\pi}\sin kx\,\cos mx\,dx=0\)</td></tr>
      <tr><td>Praktisch: \(f\) gerade \(\Rightarrow b_k=0\); \(f\) ungerade \(\Rightarrow a_k=0\)</td></tr>
    </table>
    ${exBox(String.raw`<p>Multipliziere die Reihe mit \(\sin mx\) und integriere über \([-\pi,\pi]\):</p>\[\int_{-\pi}^{\pi}f(x)\sin mx\,dx=\sum_{k}a_k\underbrace{\int\cos kx\sin mx}_{=0}+\sum_{k}b_k\underbrace{\int\sin kx\sin mx}_{=\pi\delta_{km}}=b_m\,\pi.\]<p>Wegen der Orthogonalität überlebt nur der Term \(k=m\) — genau das liefert die Koeffizientenformel. Die Orthogonalität selbst folgt aus Produkt→Summe: \(\sin kx\sin mx=\tfrac12[\cos(k-m)x-\cos(k+m)x]\), und \(\int_{-\pi}^{\pi}\cos(jx)\,dx=0\) für \(j\neq0\).</p>`,"Warum das klappt (Orthogonalität)")}
    ${exBox(String.raw`<p>\(f(x)=x\) auf \(\left]-\pi,\pi\right[\) ist ungerade \(\Rightarrow a_k=0\). Für \(b_k\) (partielle Integration):</p>\[b_k=\frac{1}{\pi}\int_{-\pi}^{\pi}x\sin kx\,dx=\frac{2}{\pi}\Big[-\frac{x\cos kx}{k}\Big]_{0}^{\pi}=-\frac{2\cos k\pi}{k}=\frac{2(-1)^{k+1}}{k}\]\[\Rightarrow\ x\sim 2\sum_{k=1}^{\infty}\frac{(-1)^{k+1}}{k}\sin kx.\]`,"Beispiel: Sägezahn f(x) = x")}
  </div>`; }

function grenzHtml(){ return String.raw`
  <div class="twocol">
    <div class="refblock">
      <h3>Bei \(x\to0\)</h3>
      <table class="reftable">
        <tr><td>\(\displaystyle\lim_{x\to0}\frac{\sin x}{x}=1\)</td></tr>
        <tr><td>\(\displaystyle\lim_{x\to0}\frac{\tan x}{x}=1\)</td></tr>
        <tr><td>\(\displaystyle\lim_{x\to0}\frac{1-\cos x}{x^{2}}=\frac{1}{2}\)
          ${exBox(String.raw`<p>Über die \(\cos\)-Reihe:</p>\[\frac{1-\cos x}{x^{2}}=\frac{\frac{x^{2}}{2}-\frac{x^{4}}{24}+\cdots}{x^{2}}=\frac{1}{2}-\frac{x^{2}}{24}+\cdots\to\frac{1}{2}\quad(x\to0)\]`,"Herleitung über die cos-Reihe")}</td></tr>
        <tr><td>\(\displaystyle\lim_{x\to0}\frac{e^{x}-1}{x}=1\)
          ${exBox(String.raw`<p>Über die \(e^{x}\)-Reihe:</p>\[\frac{e^{x}-1}{x}=\frac{x+\frac{x^{2}}{2}+\cdots}{x}=1+\frac{x}{2}+\cdots\to 1\quad(x\to0)\]`,"Herleitung über die e-Reihe")}</td></tr>
        <tr><td>\(\displaystyle\lim_{x\to0}\frac{\ln(1+x)}{x}=1\)</td></tr>
        <tr><td>\(\displaystyle\lim_{x\to0}\frac{\arcsin x}{x}=1\)</td></tr>
      </table>
    </div>
    <div class="refblock">
      <h3>Bei \(x\to\infty\), \(n\to\infty\)</h3>
      <table class="reftable">
        <tr><td>\(\displaystyle\lim_{n\to\infty}\Big(1+\frac{1}{n}\Big)^{n}=e\)</td></tr>
        <tr><td>\(\displaystyle\lim_{x\to\infty}\Big(1+\frac{a}{x}\Big)^{x}=e^{a}\)</td></tr>
        <tr><td>\(\displaystyle\lim_{x\to\infty}\frac{x^{n}}{e^{x}}=0\)</td><td class="cond">\(n\) fest</td></tr>
        <tr><td>\(\displaystyle\lim_{x\to\infty}\frac{\ln x}{x}=0\)</td></tr>
        <tr><td>\(\displaystyle\lim_{x\to0^{+}}x\ln x=0\)</td></tr>
        <tr><td>\(\displaystyle\lim_{n\to\infty}\sqrt[n]{n}=1,\ \lim_{n\to\infty}\sqrt[n]{a}=1\)</td><td class="cond">\(a>0\)</td></tr>
        <tr><td>\(\displaystyle\lim_{n\to\infty}\frac{\sqrt[n]{n!}}{n}=\frac{1}{e}\)</td><td class="cond">Stirling</td></tr>
      </table>
      <p class="sub" style="margin-top:8px">Merke: <b>exp \(\gg\) Potenz \(\gg\) Logarithmus</b>.</p>
    </div>
  </div>
  <div class="refblock">
    <h3>Häufige Umformungen — je mit Beispiel</h3>
    <table class="reftable">
      <tr><td><b>Konjugiert erweitern</b> (3. binomische) bei \(\sqrt{\ }-\sqrt{\ }\)
        ${exBox(String.raw`\[\sqrt{n^{2}+n}-n=\frac{(n^{2}+n)-n^{2}}{\sqrt{n^{2}+n}+n}=\frac{n}{\sqrt{n^{2}+n}+n}=\frac{1}{\sqrt{1+\frac1n}+1}\ \longrightarrow\ \frac{1}{2}\]`,"Beispiel: √(n²+n) − n → ½")}</td></tr>
      <tr><td><b>Potenz-Trick:</b> \(f(x)^{g(x)}=e^{\,g(x)\ln f(x)}\) — nur den Exponenten untersuchen
        ${exBox(String.raw`<p>\(\displaystyle\lim_{x\to0^{+}}x^{x}\):</p>\[x^{x}=e^{x\ln x},\qquad x\ln x\to0\ (x\to0^{+})\ \Rightarrow\ x^{x}\to e^{0}=1\]`,"Beispiel: x^x → 1 für x→0⁺")}</td></tr>
      <tr><td><b>Höchste Potenz ausklammern</b> bei rationalen Ausdrücken
        ${exBox(String.raw`\[\frac{3n^{2}+n}{2n^{2}+5}=\frac{n^{2}\big(3+\frac1n\big)}{n^{2}\big(2+\frac{5}{n^{2}}\big)}=\frac{3+\frac1n}{2+\frac{5}{n^{2}}}\ \longrightarrow\ \frac{3}{2}\]`,"Beispiel: (3n²+n)/(2n²+5) → 3/2")}</td></tr>
      <tr><td>\(\Big(1+\dfrac{a_n}{n}\Big)^{n}\to e^{a}\), falls \(a_n\to a\)
        ${exBox(String.raw`\[\Big(\frac{n+2}{n}\Big)^{n}=\Big(1+\frac{2}{n}\Big)^{n}\ \longrightarrow\ e^{2}\]`,"Beispiel: ((n+2)/n)ⁿ → e²")}</td></tr>
    </table>
  </div>
  <div class="refblock">
    <h3>Landau-Symbole \(o\) und \(O\)</h3>
    <p class="sub">Vergleichen das Verhalten zweier Funktionen für \(x\to a\) — <b>immer dazu sagen, wohin \(x\) läuft!</b> Die Idee auf einen Blick:</p>
    <div class="subgrid">
      <div class="subcard">
        <div class="subhead">\(f=o(g)\):\quad \(\displaystyle\lim_{x\to a}\left|\frac{f(x)}{g(x)}\right|=0\)</div>
        <div class="subrule">Der Quotient geht gegen <b>null</b>: \(f\) wird <b>vernachlässigbar klein</b> gegen \(g\).</div>
      </div>
      <div class="subcard">
        <div class="subhead">\(f=O(g)\):\quad \(\displaystyle\limsup_{x\to a}\left|\frac{f(x)}{g(x)}\right|<\infty\)</div>
        <div class="subrule">Der Quotient bleibt <b>beschränkt</b> („kleiner \(\infty\)"): \(f\) wächst <b>höchstens wie</b> \(g\) — muss aber nicht gegen 0 gehen.</div>
      </div>
    </div>
    <table class="reftable">
      <tr><td><b>klein-o:</b> \(f=o(g)\) für \(x\to a\)<span class="when">Einsetzen für Restglieder: \(f(x)=T_n(x)+o\big((x-x_0)^{n}\big)\), z. B. \(\sin x=x+o(x)\) für \(x\to0\).</span>
        ${exBox(String.raw`<p><b>Zutreffend:</b> \(x^{2}=o(x)\) für \(x\to0\), denn</p>\[\frac{x^{2}}{x}=x\ \longrightarrow\ 0\quad(x\to0).\]<p><b>Ähnlich, aber falsch:</b> \(x^{2}\) ist <b>nicht</b> \(o(x)\) für \(x\to\infty\) — gleicher Quotient, anderer Grenzpunkt:</p>\[\frac{x^{2}}{x}=x\ \longrightarrow\ \infty\quad(x\to\infty).\]<p>Und: \(\sin x=o(1)\) gilt <b>nicht</b> für \(x\to\infty\) (\(\sin x\not\to0\)), obwohl \(\sin x=O(1)\) stimmt.</p>`,"Beispiel & Gegenbeispiel: o")}</td></tr>
      <tr><td><b>groß-O:</b> \(f=O(g)\) für \(x\to a\)<span class="when">Einsetzen für Schranken und Fehlerordnungen, z. B. Trapezregel-Fehler \(=O(h^{2})\).</span>
        ${exBox(String.raw`<p><b>Zutreffend:</b> \(5x^{2}+3x=O(x^{2})\) für \(x\to\infty\), denn</p>\[\frac{5x^{2}+3x}{x^{2}}=5+\frac{3}{x}\ \longrightarrow\ 5\quad(\text{beschränkt}).\]<p><b>Ähnlich, aber falsch:</b> \(5x^{2}+3x\) ist <b>nicht</b> \(O(x)\) für \(x\to\infty\):</p>\[\frac{5x^{2}+3x}{x}=5x+3\ \longrightarrow\ \infty\quad(\text{unbeschränkt}).\]<p>Auch: \(\sin x=O(x)\) für \(x\to0\) (\(|\sin x|\le|x|\)) ✓ — aber \(\sqrt{x}\neq O(x)\) für \(x\to0^{+}\) (\(\frac{\sqrt x}{x}=\frac{1}{\sqrt x}\to\infty\)).</p>`,"Beispiel & Gegenbeispiel: O")}</td></tr>
      <tr><td><b>Rechenregeln:</b> \(o(g)\pm o(g)=o(g)\); \(O(g)\cdot O(h)=O(gh)\); \(f=o(g)\Rightarrow f=O(g)\) — die Umkehrung gilt <b>nicht</b> (\(\sin x=O(1)\), aber \(\neq o(1)\), \(x\to\infty\)).</td></tr>
    </table>
  </div>`; }

/* Referenz-Seiten (eigene Ergänzungen, Route #/ref/<key>) */
function konvSummenHtml(){ return String.raw`
  <div class="refblock">
    <h3>🧭 Roadmap — Vorgehen Konvergenzanalyse</h3>
    <div class="roadmap">
      <div class="rmtrack">
        <div class="rmstep">
          <button type="button" class="rmnode" data-rm="rms1"><span class="rmn">1</span><span class="rmt">Nullfolge?</span></button>
          <span class="rmexit no">nein → ⛔</span>
        </div>
        <div class="rmlink yes"><span class="rml">ja</span><span class="rma">━━━▶</span></div>
        <div class="rmstep">
          <button type="button" class="rmnode" data-rm="rms2"><span class="rmn">2</span><span class="rmt">Quotient / Wurzel</span></button>
          <span class="rmexit yes">L &lt; 1 → ✅</span><span class="rmexit no">L &gt; 1 → ⛔</span>
        </div>
        <div class="rmlink mid"><span class="rml">L = 1</span><span class="rma">━━━▶</span></div>
        <div class="rmstep">
          <button type="button" class="rmnode" data-rm="rms3"><span class="rmn">3</span><span class="rmt">p-Reihen-Vergleich</span></button>
          <span class="rmexit yes">p &gt; 1 → ✅</span><span class="rmexit no">p ≤ 1 → ⛔</span>
        </div>
        <div class="rmlink mid"><span class="rml">passt nicht</span><span class="rma">━━━▶</span></div>
        <div class="rmstep">
          <button type="button" class="rmnode" data-rm="rms4"><span class="rmn">4</span><span class="rmt">Integral&shy;kriterium</span></button>
          <span class="rmexit yes">∫ konv → ✅</span><span class="rmexit no">∫ div → ⛔</span>
        </div>
        <div class="rmlink mid"><span class="rml">Vorzeichen?</span><span class="rma">━━━▶</span></div>
        <div class="rmstep">
          <button type="button" class="rmnode" data-rm="rms5"><span class="rmn">5</span><span class="rmt">Alternierend?</span></button>
          <span class="rmexit yes">Leibniz → ✅</span><span class="rmexit no">sonst → ⛔</span>
        </div>
      </div>
      <p class="rmhint">Station anklicken → Details und ✓/✗-Beispiele öffnen sich hier darunter.</p>
      <div class="rmpanels">
        <div class="rmpanel fnode" id="rms1" hidden>
          <div class="ftit"><span class="fnum">1</span><span>Nullfolgen-Test: gilt \(a_k\to0\)?</span></div>
          <div class="fout"><span class="fno">NEIN → ⛔ divergent, fertig</span><span class="fyes">JA → weiter zu Station 2 (sagt noch nichts!)</span></div>
          ${exBox(String.raw`<p>\(\displaystyle\sum\frac{k}{k+1}\): \(a_k\to1\neq0\) ⇒ <b>divergent</b> — eine Zeile, Analyse beendet.</p>`,"✓ Test entscheidet: divergent")}
          ${exBox(String.raw`<p>\(\displaystyle\sum\frac1k\): \(a_k\to0\) ✓ — aber die Reihe ist trotzdem <b>divergent</b> (Station 3/4 zeigt es). Der Test kann nur aussortieren, nie Konvergenz beweisen.</p>`,"✗ Test entscheidet nicht: weiter prüfen")}
        </div>
        <div class="rmpanel fnode" id="rms2" hidden>
          <div class="ftit"><span class="fnum">2</span><span>Struktur-Check: \(k!\) oder \(q^{k}\) drin → <b>Quotientenkriterium</b>; \(a_k=(\dots)^{k}\) → <b>Wurzelkriterium</b>. Grenzwert \(L\) bilden.</span></div>
          <div class="fout"><span class="fyes">L &lt; 1 → ✅ konvergent (sogar absolut)</span><span class="fno">L &gt; 1 → ⛔ divergent</span><span class="fnext">L = 1 → keine Aussage, Station 3</span></div>
          ${exBox(String.raw`<p>\(\displaystyle\sum\frac{k^{2}}{2^{k}}\) (Potenz im Nenner → Quotient):</p>\[\frac{a_{k+1}}{a_k}=\frac{(k+1)^{2}}{2k^{2}}\ \longrightarrow\ \frac12<1\ \Rightarrow\ \text{✅ konvergent.}\]`,"✓ Beispiel: L < 1")}
          ${exBox(String.raw`<p>\(\displaystyle\sum\frac{1}{k^{2}}\): \(\frac{a_{k+1}}{a_k}=\frac{k^{2}}{(k+1)^{2}}\to1\) — <b>keine Aussage</b>, obwohl die Reihe konvergiert. Bei rationalen Ausdrücken in \(k\) ist Station 3 das richtige Werkzeug.</p>`,"✗ Beispiel: L = 1, Kriterium stumm")}
        </div>
        <div class="rmpanel fnode" id="rms3" hidden>
          <div class="ftit"><span class="fnum">3</span><span>Rational in \(k\)? Nur die <b>höchsten Potenzen</b> zählen: \(a_k\sim\frac{c}{k^{p}}\) → Grenzwertvergleich mit der p-Reihe.</span></div>
          <div class="fout"><span class="fyes">p &gt; 1 → ✅ konvergent</span><span class="fno">p ≤ 1 → ⛔ divergent</span><span class="fnext">passt nicht → Station 4</span></div>
          ${exBox(String.raw`<p>\(\displaystyle\sum\frac{2k+3}{k^{3}-k+1}\): führend \(\sim\frac{2}{k^{2}}\), Grenzwertvergleich mit \(\frac{1}{k^{2}}\) liefert \(\frac{a_k}{b_k}\to2\in\left]0,+\infty\right[\) ⇒ wie \(\sum k^{-2}\): <b>✅ konvergent</b> (\(p=2>1\)).</p>`,"✓ Beispiel: p = 2 > 1")}
          ${exBox(String.raw`<p>\(\displaystyle\sum\frac{k+1}{k^{2}+5}\): führend \(\sim\frac1k\) ⇒ wie die harmonische Reihe: <b>⛔ divergent</b> (\(p=1\)).</p>`,"✗ Beispiel: p = 1, harmonisch")}
        </div>
        <div class="rmpanel fnode" id="rms4" hidden>
          <div class="ftit"><span class="fnum">4</span><span>Logarithmen / \(f(k)\) leicht integrierbar? → <b>Integralkriterium</b> (\(f\ge0\) fallend).</span></div>
          <div class="fout"><span class="fyes">\(\int_1^{+\infty}f\) konv. → ✅</span><span class="fno">\(\int_1^{+\infty}f\) div. → ⛔</span><span class="fnext">Vorzeichenwechsel? → Station 5</span></div>
          ${exBox(String.raw`<p>\(\displaystyle\sum\frac{1}{k\,(\ln k)^{2}}\):</p>\[\int_2^{+\infty}\frac{dx}{x(\ln x)^{2}}=\Big[-\frac{1}{\ln x}\Big]_2^{+\infty}=\frac{1}{\ln 2}<\infty\ \Rightarrow\ \text{✅ konvergent.}\]`,"✓ Beispiel: Σ 1/(k ln²k)")}
          ${exBox(String.raw`<p>\(\displaystyle\sum\frac{1}{k\ln k}\):</p>\[\int_2^{+\infty}\frac{dx}{x\ln x}=\ln\ln x\Big|_2^{+\infty}=+\infty\ \Rightarrow\ \text{⛔ divergent}\]<p>— der Unterschied zwischen \(\ln k\) und \((\ln k)^{2}\) im Nenner entscheidet!</p>`,"✗ Beispiel: Σ 1/(k ln k)")}
        </div>
        <div class="rmpanel fnode" id="rms5" hidden>
          <div class="ftit"><span class="fnum">5</span><span>Vorzeichenwechsel: erst <b>absolute</b> Konvergenz testen (\(|a_k|\) durch Stationen 2–4 schicken); scheitert das → <b>Leibniz/Dirichlet</b> (monoton fallende Nullfolge?).</span></div>
          <div class="fout"><span class="fyes">absolut konv. → ✅ (robust)</span><span class="fyes">Leibniz greift → ✅ (bedingt)</span><span class="fno">nichts greift + \(a_k\not\to0\) → ⛔</span></div>
          ${exBox(String.raw`<p>\(\displaystyle\sum\frac{(-1)^{k}}{\sqrt k}\): absolut? \(\sum\frac{1}{\sqrt k}\) divergiert (\(p=\tfrac12\)). Leibniz: \(\frac{1}{\sqrt k}\downarrow0\) monoton ⇒ <b>✅ konvergent (bedingt)</b> — Umordnen verboten!</p>`,"✓ Beispiel: Leibniz rettet")}
          ${exBox(String.raw`<p>\(\displaystyle\sum(-1)^{k}\frac{k}{k+1}\): sieht alternierend aus, aber \(|a_k|\to1\neq0\) ⇒ <b>⛔ divergent</b>. Moral: Station 1 gilt auch für alternierende Reihen — Leibniz braucht zwingend eine <i>Nullfolge</i>.</p>`,"✗ Beispiel: alternierend, aber keine Nullfolge")}
        </div>
      </div>
    </div>
  </div>
  <div class="twocol">
    <div class="refblock">
      <h3>Basis-Checks &amp; Vergleichskriterien</h3>
      <table class="reftable">
        <tr><td><b>Notwendig:</b> \(a_k\to0\)<span class="when">Immer zuerst prüfen: gilt \(a_k\not\to0\) → sofort divergent, fertig.</span></td><td class="cond">sonst div.</td></tr>
        <tr><td><b>Absolut:</b> \(\sum|a_k|\) konv. \(\Rightarrow\sum a_k\) konv.<span class="when">Einsetzen bei Vorzeichenwechseln oder komplexen Gliedern — erst \(\sum|a_k|\) testen.</span></td></tr>
        <tr><td><b>Majorante:</b> \(|a_k|\le b_k,\ \sum b_k\) konv. \(\Rightarrow\) konv.<span class="when">Einsetzen, wenn sich \(|a_k|\) gegen p-Reihe oder geometrische Reihe abschätzen lässt.</span>
          ${exBox(String.raw`<p>\(\displaystyle\sum\frac{\ln k}{k^{2}}\): ab großem \(k\) ist \(\ln k\le\sqrt{k}\):</p>\[\frac{\ln k}{k^{2}}\le\frac{1}{k^{3/2}}\quad\Rightarrow\quad\text{konvergent }(p=\tfrac32>1).\]`,"Beispiel: Σ ln k / k²")}</td></tr>
        <tr><td><b>Minorante:</b> \(0\le c_k\le a_k,\ \sum c_k\) div. \(\Rightarrow\) div.<span class="when">Einsetzen für Divergenz-Nachweise — meist mit der harmonischen Reihe als Minorante.</span>
          ${exBox(String.raw`<p>\(\displaystyle\sum\frac{1}{\sqrt{k(k+1)}}\): wegen \(k(k+1)\le (k+1)^{2}\):</p>\[\frac{1}{\sqrt{k(k+1)}}\ge\frac{1}{k+1}\quad\Rightarrow\quad\text{divergent (harmonische Minorante).}\]`,"Beispiel: Σ 1/√(k(k+1))")}</td></tr>
        <tr><td><b>p-Reihe:</b> \(\sum \frac{1}{k^{p}}\) konv. \(\Leftrightarrow p>1\)<span class="when">Der Standard-Vergleichspartner für Majorante/Minorante.</span></td></tr>
        <tr><td><b>Geometrisch:</b> \(\sum q^{k}\) konv. \(\Leftrightarrow |q|<1\)<span class="when">Vergleichspartner bei exponentiell fallenden Gliedern.</span></td></tr>
      </table>
    </div>
    <div class="refblock">
      <h3>An der Struktur von \(a_k\) erkennbar</h3>
      <table class="reftable">
        <tr><td><b>Quotient:</b> \(L=\lim\left|\frac{a_{k+1}}{a_k}\right|\)<span class="when">Einsetzen bei Fakultäten \(k!\) und Potenzen \(q^{k}\) — alles, was sich beim Schritt \(k\to k{+}1\) gut kürzt.</span>
          ${exBox(String.raw`<p>\(\displaystyle\sum \frac{k}{2^{k}}\):</p>\[\frac{a_{k+1}}{a_k}=\frac{k+1}{2k}\to\frac{1}{2}<1\ \Rightarrow\ \text{konvergent.}\]`,"Beispiel: Σ k/2^k")}</td><td class="cond">\(L<1\) konv, \(L>1\) div</td></tr>
        <tr><td><b>Wurzel:</b> \(L=\limsup_{k}\sqrt[k]{|a_k|}\)<span class="when">Einsetzen, wenn \(a_k\) selbst eine \(k\)-te Potenz \((\dots)^{k}\) ist — die Wurzel räumt den Exponenten ab.</span>
          ${exBox(String.raw`<p>\(\displaystyle\sum\Big(\tfrac{k}{k+1}\Big)^{k^{2}}\):</p>\[\sqrt[k]{a_k}=\Big(\frac{k}{k+1}\Big)^{k}=\Big(1+\tfrac{1}{k}\Big)^{-k}\to\frac{1}{e}<1\ \Rightarrow\ \text{konvergent.}\]`,"Beispiel: Σ (k/(k+1))^(k²)")}</td><td class="cond">\(L<1\) konv, \(L>1\) div</td></tr>
        <tr><td><b>Leibniz</b> (alternierend): \(a_k=(-1)^{k}b_k\), \(b_k\ge0\) monoton \(\downarrow 0\) \(\Rightarrow\) konv.<span class="when">Einsetzen bei \((-1)^{k}\cdot(\text{monoton fallende Nullfolge})\) — der Rettungsanker, wenn absolute Konvergenz scheitert.</span>
          ${exBox(String.raw`<p>\(\displaystyle\sum\frac{(-1)^{k+1}}{k}\): \(b_k=\tfrac1k\downarrow0\ \Rightarrow\) konvergent (bedingt, \(=\ln 2\)); \(\sum\tfrac1k\) selbst divergiert.</p>`,"Beispiel: Σ (−1)^(k+1)/k")}</td><td class="cond">\(|R_n|\le b_{n+1}\)</td></tr>
        <tr><td><b>Integralkriterium:</b> \(f\ge0\) fallend, \(a_k=f(k)\): \(\sum f(k)\) und \(\int_1^{+\infty}\!f\) gleiches Verhalten.<span class="when">Einsetzen, wenn \(f\) leicht integrierbar ist — Klassiker: \(\sum\frac{1}{k\ln k}\) div., denn \(\int\frac{dx}{x\ln x}=\ln\ln x\to\infty\).</span></td></tr>
      </table>
      <p class="sub" style="margin-top:8px">Bei \(L=1\): keine Aussage. Das Wurzel- ist „stärker" als das Quotientenkriterium — und wenn auch das mit \(L=1\) versagt, helfen die feineren Kriterien von <b>Raabe &amp; Kummer</b> (unten).</p>
    </div>
  </div>
  <div class="refblock">
    <h3>Wenn \(L=1\): die feineren Kriterien von Raabe &amp; Kummer</h3>
    <p class="sub">Genau für den blinden Fleck des Quotientenkriteriums (\(\frac{a_{k+1}}{a_k}\to1\)) gedacht. Beide brauchen \(a_k&gt;0\).</p>
    <table class="reftable">
      <tr><td><b>Raabe:</b> bilde \(\displaystyle R_k=k\Big(\frac{a_k}{a_{k+1}}-1\Big)\) (gleichwertig \(k\big(1-\frac{a_{k+1}}{a_k}\big)\)). Ist \(\liminf_k R_k&gt;1\) ⇒ <b>konvergent</b>; ist \(\limsup_k R_k&lt;1\) ⇒ <b>divergent</b>.<span class="when">Einsetzen, wenn das Quotientenkriterium \(L=1\) liefert: \(R_k\) misst die <i>Rate</i>, mit der \(\frac{a_{k+1}}{a_k}\to1\). Für die p-Reihe \(a_k=k^{-p}\) ist \(R_k\to p\) — Raabe „sieht" also den Exponenten und gibt konvergent \(\Leftrightarrow p&gt;1\).</span>
        ${exBox(String.raw`<p>Die Reihe \(\displaystyle\sum_{k\ge1}a_k\) mit \(\displaystyle a_k=\frac{1\cdot3\cdot5\cdots(2k-1)}{2\cdot4\cdot6\cdots(2k)}=\frac{1}{4^{k}}\binom{2k}{k}\).</p><p><b>1. Quotientenkriterium versagt:</b> beim Schritt \(k\to k{+}1\) kommt im Zähler \((2k+1)\), im Nenner \((2k+2)\) hinzu:</p>\[\frac{a_{k+1}}{a_k}=\frac{2k+1}{2k+2}\longrightarrow 1\qquad(L=1,\ \text{keine Aussage}).\]<p><b>2. Raabe ansetzen:</b> mit \(\displaystyle\frac{a_k}{a_{k+1}}=\frac{2k+2}{2k+1}=1+\frac{1}{2k+1}\) folgt</p>\[R_k=k\Big(\frac{a_k}{a_{k+1}}-1\Big)=\frac{k}{2k+1}\longrightarrow\frac12<1.\]<p><b>3. Ergebnis:</b> \(\lim R_k=\tfrac12<1\ \Rightarrow\ \textbf{divergent}\). Passt zur Asymptotik \(a_k\sim\frac{1}{\sqrt{\pi k}}\) (verhält sich wie \(\sum k^{-1/2}\), \(p=\tfrac12\)).</p>`,"Rechenbeispiel: Raabe an der Mittelbinomial-Reihe")}</td><td class="cond">\(R>1\) konv, \(R<1\) div</td></tr>
      <tr><td><b>Kummer:</b> wähle eine Hilfsfolge \(p_k&gt;0\) und bilde \(\displaystyle K_k=p_k\,\frac{a_k}{a_{k+1}}-p_{k+1}\). Gibt es ein \(c&gt;0\) mit \(K_k\ge c\) für große \(k\) (also \(\liminf_k K_k&gt;0\)) ⇒ <b>konvergent</b>. Ist \(K_k\le 0\) ab einem Index <b>und</b> divergiert \(\sum\frac{1}{p_k}\) ⇒ <b>divergent</b>.<span class="when">Das „Meister-Kriterium", aus dem die anderen fallen: \(p_k=1\) ⇒ Quotientenkriterium, \(p_k=k\) ⇒ Raabe (\(K_k=R_k-1\)), \(p_k=k\ln k\) ⇒ Bertrand. Freie Wahl von \(p_k\) = mehr Feinschärfe.</span>
        ${exBox(String.raw`<p>Gleiche Reihe \(\displaystyle a_k=\frac{1}{4^{k}}\binom{2k}{k}\), jetzt mit Kummer und der Wahl \(p_k=k\).</p><p><b>1. \(K_k\) ausrechnen</b> (mit \(\frac{a_k}{a_{k+1}}=\frac{2k+2}{2k+1}\)):</p>\[K_k=k\cdot\frac{2k+2}{2k+1}-(k+1)=\frac{k(2k+2)-(k+1)(2k+1)}{2k+1}=\frac{-(k+1)}{2k+1}\longrightarrow-\frac12.\]<p><b>2. Divergenz-Ast:</b> \(K_k<0\) ab \(k=1\) <i>und</i> \(\sum\frac{1}{p_k}=\sum\frac1k\) divergiert \(\Rightarrow\) <b>divergent</b> — dieselbe Aussage wie oben, denn \(p_k=k\) liefert genau \(K_k=R_k-1\).</p><p><b>3. Konvergenz-Ast zur Gegenprobe</b> (\(a_k=\frac1{k^2}\), \(p_k=k\)):</p>\[K_k=k\cdot\frac{(k+1)^2}{k^2}-(k+1)=\frac{(k+1)^2}{k}-(k+1)=\frac{k+1}{k}\longrightarrow 1>0\ \Rightarrow\ \textbf{konvergent.}\]`,"Rechenbeispiel: Kummer mit Hilfsfolge p_k = k")}</td><td class="cond">\(\liminf K_k>0\) konv</td></tr>
    </table>
    <p class="sub" style="margin-top:8px">Auch Raabe/Kummer haben einen Grenzfall (\(R=1\) bzw. \(\liminf K_k=0\)) ohne Aussage — dann eine feinere Hilfsfolge \(p_k\) (z. B. Bertrand \(k\ln k\)) wählen oder direkt vergleichen.</p>
  </div>
  <div class="refblock">
    <h3>Tricks: typische Majoranten, Minoranten &amp; Umformungen</h3>
    <table class="reftable">
      <tr><td><b>Vergleichs-Skala:</b> \(\sum\frac{1}{k^{p}}\) (konv. \(\Leftrightarrow p>1\)), \(\sum q^{k}\) (\(|q|<1\)), \(\sum k^{a}q^{k}\) konv. für \(|q|<1\) (jedes \(a\))</td></tr>
      <tr><td><b>„Nur höchste Potenzen zählen":</b> \(\dfrac{P(k)}{Q(k)}\sim\dfrac{c}{k^{\deg Q-\deg P}}\) → Grenzwertvergleich mit \(\frac{1}{k^{p}}\)
        ${exBox(String.raw`<p>\(\displaystyle\sum\frac{2k+3}{k^{3}-k+1}\). Höchste Potenzen: \(\sim\frac{2}{k^{2}}\). Prüfen mit \(b_k=\frac{1}{k^{2}}\):</p>\[\frac{a_k}{b_k}=\frac{(2k+3)k^{2}}{k^{3}-k+1}\longrightarrow 2\in\left]0,+\infty\right[\ \Rightarrow\ \text{wie }\sum\frac{1}{k^{2}}\ \text{konvergent.}\]`,"Beispiel: Grenzwertvergleich")}</td></tr>
      <tr><td><b>Beschränktes wegschätzen:</b> \(|\sin k|,|\cos k|\le1\) → \(\Big|\dfrac{\sin k}{k^{2}}\Big|\le\dfrac{1}{k^{2}}\)</td></tr>
      <tr><td><b>Logs sind klein:</b> \(\ln k\le C_\varepsilon\,k^{\varepsilon}\) → z. B. \(\dfrac{\ln k}{k^{2}}\le\dfrac{C\,k^{1/2}}{k^{2}}=\dfrac{C}{k^{3/2}}\) (konv.)</td></tr>
      <tr><td><b>Minoranten für Divergenz:</b> \(\dfrac{1}{\sqrt{k}}\ge\dfrac{1}{k}\); \(\dfrac{k+1}{k^{2}+5}\sim\dfrac{1}{k}\) (div.)</td></tr>
    </table>
  </div>
  <div class="refblock">
    <h3>Summierbarkeit divergenter Reihen</h3>
    <p class="sub">Divergente Reihen bekommen über gemittelte/geglättete Grenzwerte einen sinnvollen „Wert". Beide Verfahren sind <b>regulär</b>: eine schon konvergente Reihe behält ihren Wert. Durchgängiges Beispiel: die <b>Grandi-Reihe</b> \(1-1+1-1+\cdots\) (\(a_k=(-1)^{k+1}\), Start \(k=1\) wie in der Vorlesung).</p>
    <table class="reftable">
      <tr><td><b>Cesàro (C,1)</b> — über die <b>Partialsummen</b>: bilde \(S_n=a_1+\cdots+a_n\), dann ihr Mittel \(\displaystyle\sigma_n=\frac{S_1+S_2+\cdots+S_n}{n}\). Cesàro-Summe \(S_c=\lim_{n\to\infty}\sigma_n\).<span class="when">Einsetzen, wenn die Partialsummen beschränkt hin- und herspringen — das Mitteln glättet die Sprünge.</span>
        ${exBox(String.raw`<p><b>Schritt 1 — Partialsummen:</b> \(S_n=1,0,1,0,\dots\) (springt, divergent).</p><p><b>Schritt 2 — aufsummieren:</b> \(S_1+\cdots+S_n\): \(1,1,2,2,3,3,\dots\) — allgemein \(=m\) für \(n=2m\) wie für \(n=2m-1\).</p><p><b>Schritt 3 — mitteln:</b></p>\[\sigma_{2m}=\frac{m}{2m}=\frac12\ \text{(exakt!)},\qquad \sigma_{2m-1}=\frac{m}{2m-1}\ \longrightarrow\ \frac12\]<p>Beide Teilfolgen \(\to\tfrac12\) \(\Rightarrow\) <b>Cesàro-Summe \(S_c=\tfrac12\)</b>.</p>`,"Rechenbeispiel: Grandi nach Cesàro")}</td></tr>
      <tr><td><b>Abel / Poisson-Abel</b> — über die <b>Potenzreihe</b>: bilde \(f(x)=\sum_k a_k x^{k}\) (\(|x|<1\)), dann lasse \(x\to1^{-}\). Abel-Summe \(=\lim_{x\to1^{-}}f(x)\).<span class="when">Einsetzen, wenn \(\sum a_k x^{k}\) eine geschlossene Form hat — meist geometrische Reihe oder deren Ableitung.</span>
        ${exBox(String.raw`<p><b>Schritt 1 — Potenzreihe aufstellen:</b> mit \(a_k=(-1)^{k+1}\), \(k\ge1\):</p>\[f(x)=\sum_{k=1}^{\infty}(-1)^{k+1}x^{k}=x\sum_{j=0}^{\infty}(-x)^{j}\]<p><b>Schritt 2 — geschlossene Form</b> (geometrische Reihe mit \(q=-x\), \(|q|<1\)):</p>\[f(x)=x\cdot\frac{1}{1-(-x)}=\frac{x}{1+x},\qquad |x|<1\]<p><b>Schritt 3 — Randlimes:</b></p>\[\lim_{x\to1^{-}}\frac{x}{1+x}=\frac12\ \Rightarrow\ \textbf{Abel-Summe }=\tfrac12\]<p>— gleicher Wert wie Cesàro, wie es Frobenius verlangt.</p>`,"Rechenbeispiel: Grandi nach Poisson-Abel")}</td></tr>
      <tr><td><b>Hierarchie:</b> konvergent \(\Rightarrow\) Cesàro \(\Rightarrow\) Abel (jeweils derselbe Wert). Also: <b>aus Cesàro folgt Abel</b> (Satz von Frobenius) — Abel ist das stärkste Verfahren. Rückrichtung nur mit Tauber-Bedingung (z. B. \(a_k\to0\)).<span class="when">Merk-Beispiel dafür, dass Abel echt stärker ist: \(1-2+3-4+\cdots\).</span>
        ${exBox(String.raw`<p>\(1-2+3-4+\cdots\), also \(a_k=(-1)^{k+1}k\), \(k\ge1\).</p><p><b>Cesàro scheitert:</b> \(S_n=1,-1,2,-2,3,\dots\); aufsummiert \(S_1+\cdots+S_n\): \(1,0,2,0,3,0,\dots\), also</p>\[\sigma_{2m-1}=\frac{m}{2m-1}\to\frac12,\qquad \sigma_{2m}=0\to0\]<p>— zwei verschiedene Häufungswerte \(\Rightarrow\) \(\sigma_n\) divergiert, <b>nicht Cesàro-summierbar</b>.</p><p><b>Abel klappt:</b> Ableiten der geometrischen Reihe \(\sum_{k\ge0}u^{k}=\frac{1}{1-u}\) gibt \(\sum_{k\ge1}k\,u^{k}=\frac{u}{(1-u)^{2}}\). Mit \(u=-x\):</p>\[\sum_{k=1}^{\infty}(-1)^{k+1}k\,x^{k}=\frac{x}{(1+x)^{2}}\ \longrightarrow\ \frac14\quad(x\to1^{-})\]<p>\(\Rightarrow\) <b>Abel-Summe \(=\tfrac14\)</b> — Abel summiert echt „mehr" als Cesàro.</p>`,"Rechenbeispiel: 1 − 2 + 3 − 4 + ⋯")}</td></tr>
    </table>
  </div>`; }

          ${exBox(String.raw`<p>Direkt nachrechnen (\(p\neq1\)): \(\int x^{-p}dx=\frac{x^{1-p}}{1-p}\).</p>\[\int_1^{+\infty}\frac{dx}{x^{2}}=\Big[-\frac1x\Big]_1^{+\infty}=1\ (\text{konv.}),\qquad \int_1^{+\infty}\frac{dx}{x}=\ln x\Big|_1^{+\infty}=\infty\ (\text{div.})\]\[\int_0^{1}\frac{dx}{\sqrt{x}}=\big[2\sqrt{x}\big]_0^{1}=2\ (\text{konv., }p=\tfrac12<1),\qquad \int_0^{1}\frac{dx}{x^{2}}=\infty\ (\text{div., }p=2>1)\]`,"Beispiele: p-Test an beiden Rändern")}</td></tr>
