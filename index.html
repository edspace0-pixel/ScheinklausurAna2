function beweiseHtml(){ return String.raw`
  <p class="sub">Die Abschätzungen und Tricks, die in fast jedem Analysis-Beweis auftauchen — je mit typischem Einsatz zum Aufklappen.</p>
  <div class="subgrid">
    <div class="subcard">
      <div class="subhead">Dreiecksungleichung</div>
      <div class="subrule">\(|a+b|\le|a|+|b|\) — auch für Summen \(\big|\sum a_k\big|\le\sum|a_k|\), Integrale \(\big|\int f\big|\le\int|f|\), Normen \(\|x+y\|\le\|x\|+\|y\|\)</div>
      ${exBox(String.raw`<p>Summenregel für Grenzwerte (\(a_n\to a,\ b_n\to b\)):</p>\[|(a_n+b_n)-(a+b)|\le|a_n-a|+|b_n-b|<\tfrac{\varepsilon}{2}+\tfrac{\varepsilon}{2}=\varepsilon\]`,"Typischer Einsatz")}
    </div>
    <div class="subcard">
      <div class="subhead">Umgekehrte Dreiecksungleichung</div>
      <div class="subrule">\(\big|\,|a|-|b|\,\big|\le|a-b|\) — Beträge vergleichen, Nenner nach unten abschätzen.</div>
      ${exBox(String.raw`<p>\(a_n\to a\ \Rightarrow\ |a_n|\to|a|\):</p>\[\big|\,|a_n|-|a|\,\big|\le|a_n-a|\to0.\]<p>Oder Nenner absichern: \(|x-3|\le1\Rightarrow|x|\ge2\Rightarrow\dfrac{1}{|x|}\le\dfrac12\).</p>`,"Typischer Einsatz")}
    </div>
    <div class="subcard">
      <div class="subhead">Cauchy-Schwarz-Ungleichung</div>
      <div class="subrule">\(|\langle x,y\rangle|\le\|x\|\,\|y\|\); Summen: \(\big(\sum a_kb_k\big)^{2}\le\sum a_k^{2}\cdot\sum b_k^{2}\); Integrale: \(\big(\int fg\big)^{2}\le\int f^{2}\cdot\int g^{2}\)</div>
      ${exBox(String.raw`<p>Mit \(b_k=1\):</p>\[\Big(\sum_{k=1}^{n}a_k\Big)^{2}\le n\,\sum_{k=1}^{n}a_k^{2}\]<p>— Summe gegen quadratische Summe tauschen; Startpunkt vieler Abschätzungen.</p>`,"Typischer Einsatz")}
    </div>
    <div class="subcard">
      <div class="subhead">Bernoulli-Ungleichung</div>
      <div class="subrule">\((1+x)^{n}\ge 1+nx\) für \(x\ge-1\)</div>
      ${exBox(String.raw`<p>\(q^{n}\to\infty\) für \(q>1\): schreibe \(q=1+h\), \(h>0\):</p>\[q^{n}=(1+h)^{n}\ge 1+nh\ \longrightarrow\ \infty.\]`,"Typischer Einsatz")}
    </div>
    <div class="subcard">
      <div class="subhead">AM–GM &amp; Co.</div>
      <div class="subrule">\(\sqrt{ab}\le\dfrac{a+b}{2}\) (\(a,b\ge0\)); \(ab\le\dfrac{a^{2}+b^{2}}{2}\); \(x+\dfrac1x\ge2\) für \(x>0\)</div>
      ${exBox(String.raw`<p>Produkt gegen Quadrate tauschen:</p>\[\sum|a_k b_k|\le\frac12\sum a_k^{2}+\frac12\sum b_k^{2}\]<p>— aus einem unhandlichen Produkt werden zwei handliche Summen.</p>`,"Typischer Einsatz")}
    </div>
    <div class="subcard">
      <div class="subhead">Nullergänzung (±-Trick)</div>
      <div class="subrule">Zwischenterm einschieben und Dreiecksungleichung: \(fg-\tilde f\tilde g=(f-\tilde f)g+\tilde f(g-\tilde g)\)</div>
      ${exBox(String.raw`<p>Produktregel für Grenzwerte:</p>\[|a_nb_n-ab|=|(a_n-a)b_n+a(b_n-b)|\le|a_n-a|\,|b_n|+|a|\,|b_n-b|\]<p>\(|b_n|\) ist beschränkt (konvergent) → beide Summanden \(\to0\).</p>`,"Typischer Einsatz")}
    </div>
    <div class="subcard">
      <div class="subhead">ε/2-Trick</div>
      <div class="subrule">Zwei Fehlerquellen? Jede unter \(\varepsilon/2\) drücken, dann \(N=\max(N_1,N_2)\). (Drei Quellen: \(\varepsilon/3\), …)</div>
      ${exBox(String.raw`<p>Konvergent \(\Rightarrow\) Cauchy: für \(m,n\ge N_{\varepsilon/2}\):</p>\[|a_n-a_m|\le|a_n-a|+|a-a_m|<\tfrac{\varepsilon}{2}+\tfrac{\varepsilon}{2}=\varepsilon.\]`,"Typischer Einsatz")}
    </div>
    <div class="subcard">
      <div class="subhead">Sandwich-Lemma (Einschließung)</div>
      <div class="subrule">\(a_n\le c_n\le b_n\) und \(a_n,b_n\to L\ \Rightarrow\ c_n\to L\)</div>
      ${exBox(String.raw`\[-\frac1n\ \le\ \frac{\sin n}{n}\ \le\ \frac1n\qquad\Rightarrow\qquad \frac{\sin n}{n}\to0.\]`,"Typischer Einsatz")}
    </div>
    <div class="subcard">
      <div class="subhead">Standard-Abschätzungen</div>
      <div class="subrule">\(|\sin x|\le|x|\); \(|\sin x|,|\cos x|\le1\); \(e^{x}\ge1+x\); \(\ln x\le x-1\)</div>
      ${exBox(String.raw`<p>\(\displaystyle\sum\sin\frac{1}{k^{2}}\) konvergiert absolut:</p>\[\Big|\sin\frac{1}{k^{2}}\Big|\le\frac{1}{k^{2}}\qquad\text{(Majorante, }p=2>1\text{).}\]`,"Typischer Einsatz")}
    </div>
  </div>`; }

function saetzeHtml(){ return String.raw`
  <p class="sub">Die zentralen Definitionen und Sätze — je Feld: die <b>mathematische Definition</b>, darunter zum Aufklappen: <b>in Worten</b>, <b>✓ wie man „erfüllt" zeigt</b> und <b>✗ wie man „verletzt" zeigt</b>.</p>
  <div class="subgrid">
    <div class="subcard">
      <div class="subhead">Stetigkeit (ε-δ &amp; Folgenkriterium)</div>
      <div class="subrule">\(f:D\to\mathbb R\), \(x_0\in D\). Beide Fassungen sind äquivalent.</div>
      \[f\ \text{stetig in }x_0\ :\Longleftrightarrow\ \forall\varepsilon>0\ \exists\delta>0\ \forall x\in D:\ |x-x_0|<\delta\ \Rightarrow\ |f(x)-f(x_0)|<\varepsilon\]
      \[\textbf{Folgenkriterium:}\quad x_n\to x_0\ \Longrightarrow\ f(x_n)\to f(x_0)\quad\text{für jede Folge }(x_n)\subset D\]
      ${exBox(String.raw`<p>Zu jeder <b>Ziel-Toleranz</b> \(\varepsilon\) um \(f(x_0)\) gibt es eine <b>Start-Toleranz</b> \(\delta\) um \(x_0\): alle \(x\) im \(\delta\)-Fenster landen mit ihren Werten im \(\varepsilon\)-Fenster — kleine Eingabe-Wackler erzeugen kleine Ausgabe-Wackler, kein Sprung. Praxis: <b>Nachweisen</b> per ε-δ (δ konstruieren) oder per „Baukasten" (Summen, Produkte, Quotienten, Verkettungen stetiger Funktionen sind stetig); <b>Widerlegen</b> fast immer per Folgenkriterium — eine einzige böse Folge reicht.</p>`,"In Worten")}
      ${exBox(String.raw`<p>\(f(x)=x^{2}\) ist stetig in jedem \(x_0\) — \(\delta\) explizit konstruieren:</p>\[|x^{2}-x_0^{2}|=|x-x_0|\cdot|x+x_0|\]<p>Beschränke zuerst \(|x-x_0|<1\): dann \(|x+x_0|\le|x-x_0|+2|x_0|\le 2|x_0|+1\). Wähle also</p>\[\delta=\min\Big(1,\ \frac{\varepsilon}{2|x_0|+1}\Big)\ \Rightarrow\ |x^{2}-x_0^{2}|\le\delta\,\big(2|x_0|+1\big)\le\varepsilon.\ \checkmark\]<p>(Schneller im Alltag: \(x^{2}=x\cdot x\) ist ein Produkt stetiger Funktionen.)</p>`,"✓ So zeigt man: erfüllt")}
      ${exBox(String.raw`<p>\(f=\operatorname{sgn}\) ist in \(0\) unstetig — <b>Folgenkriterium</b> mit zwei Folgen:</p>\[x_n=\tfrac1n\to0:\ f(x_n)=1\to1,\qquad y_n=-\tfrac1n\to0:\ f(y_n)=-1\to-1\]<p>Zwei Folgen gegen \(x_0=0\), aber die Funktionswerte haben <b>verschiedene Limites</b> (und keiner ist \(f(0)=0\)) \(\Rightarrow\) nicht stetig in \(0\). Merke: schon <b>eine</b> Folge mit \(f(x_n)\not\to f(x_0)\) genügt.</p>`,"✗ So zeigt man: verletzt")}
    </div>
    <div class="subcard">
      <div class="subhead">Riemann-Integrierbarkeit \(f\in R[a,b]\)</div>
      <div class="subrule">\(f:[a,b]\to\mathbb R\) beschränkt; \(X\) Zerlegung mit Feinheit \(\lambda(X)\), \(\Xi\) Stützstellen.</div>
      \[f\in R[a,b]\ :\Longleftrightarrow\ \exists\,I\in\mathbb{R}:\ \sigma(f,X,\Xi)=\sum_{k=1}^{n}f(\xi_k)\,\Delta x_k\ \xrightarrow[\ \lambda(X)\to0\ ]{}\ I\]
      <div class="subrule">für <b>jede</b> Zerlegungsfolge und <b>beliebige</b> Stützstellen; dann \(I=\int_a^b f\). Praktische Kriterien: stetig \(\Rightarrow\) intb.; monoton \(\Rightarrow\) intb.; Lebesgue: beschränkt + stetig bis auf Nullmenge \(\Leftrightarrow\) intb.</div>
      ${exBox(String.raw`<p>Zerhacke \([a,b]\) beliebig fein und lies die Funktionshöhe an beliebigen Zwischenstellen ab — bilde Rechtecksummen. \(f\) ist integrierbar, wenn <b>alle</b> diese Summen (egal wie zerlegt, egal wo abgelesen) gegen <b>denselben</b> Wert \(I\) streben. Beschränktheit ist Pflicht; im Alltag prüft man nicht die Definition, sondern: stetig? monoton? höchstens „harmlose" Sprungstellen?</p>`,"In Worten")}
      ${exBox(String.raw`<p>\(f(x)=x^{2}\) auf \([0,1]\): \(f\) ist <b>stetig</b> auf dem kompakten Intervall \(\Rightarrow f\in R[0,1]\) (Satz „stetig ⇒ integrierbar"; Hintergrund: stetig auf Kompaktum \(\Rightarrow\) gleichmäßig stetig \(\Rightarrow\) Ober- und Untersummen rücken zusammen).</p><p>So läuft der Nachweis fast immer: <b>auf ein Kriterium zurückziehen</b>, nicht die Definition prüfen.</p>`,"✓ So zeigt man: erfüllt")}
      ${exBox(String.raw`<p><b>Dirichlet-Funktion</b> \(f=\mathbf 1_{\mathbb Q}\) auf \([0,1]\) (1 auf rationalen, 0 auf irrationalen Zahlen): jedes noch so kleine Teilintervall enthält beide Sorten Punkte. Wählt man <b>rationale</b> Stützstellen, ist \(\sigma=1\); wählt man <b>irrationale</b>, ist \(\sigma=0\):</p>\[\lim \sigma\ \text{hängt von der Stützstellenwahl ab}\ \Rightarrow\ f\notin R[0,1].\]<p>Verletzt-Nachweis = <b>zwei Ablesearten mit verschiedenen Limites</b> angeben.</p>`,"✗ So zeigt man: verletzt")}
    </div>
    <div class="subcard">
      <div class="subhead">Konvergenz uneigentlicher Integrale</div>
      <div class="subrule">Voraussetzung: \(f\) ist auf <b>jedem kompakten</b> Intervall \([A,R]\) Riemann-integrierbar (sonst ist \(F(R)\) gar nicht definiert).</div>
      \[\int_A^{\infty}\!f(x)\,dx\ \text{konvergiert}\ :\Longleftrightarrow\ \lim_{R\to\infty}\ \underbrace{\int_A^{R}\!f(x)\,dx}_{=:F(R)}\ \text{existiert in }\mathbb R\]
      <div class="subrule">Analog bei Randsingularität: \(\lim_{\varepsilon\to0^{+}}\int_a^{b-\varepsilon}f\).</div>
      ${exBox(String.raw`<p>Zwei Zutaten: <b>(1)</b> bis zu jeder endlichen Schranke \(R\) muss \(f\) ganz normal integrierbar sein — deshalb „auf jedem kompakten Intervall R-integrierbar". <b>(2)</b> Die Werte \(F(R)\) müssen sich für \(R\to\infty\) auf eine feste Zahl <b>einpendeln</b>. Divergenz heißt: \(F(R)\to\pm\infty\) <i>oder</i> \(F(R)\) oszilliert ohne Limes.</p>`,"In Worten")}
      ${exBox(String.raw`<p>\(\displaystyle\int_1^{\infty}\frac{dx}{x^{2}}\): \(x^{-2}\) ist stetig auf jedem \([1,R]\) ✓. Dann \(F(R)\) explizit ausrechnen und den Limes bilden:</p>\[F(R)=\int_1^{R}\frac{dx}{x^{2}}=1-\frac{1}{R}\ \xrightarrow[R\to\infty]{}\ 1\]<p>Limes existiert \(\Rightarrow\) konvergent mit Wert \(1\).</p>`,"✓ So zeigt man: erfüllt")}
      ${exBox(String.raw`<p>\(\displaystyle\int_0^{\infty}\cos x\,dx\): hier ist \(F(R)=\sin R\) — <b>beschränkt, aber ohne Grenzwert</b> (oszilliert ewig zwischen \(-1\) und \(1\)): divergent, obwohl nichts „explodiert"!</p><p>Und \(\displaystyle\int_1^{\infty}\frac{dx}{x}\): \(F(R)=\ln R\to\infty\) — divergent durch Explosion. Verletzt-Nachweis = \(F(R)\) ausrechnen und zeigen: \(\to\infty\) oder zwei Folgen \(R_n\) mit verschiedenen Limites (z. B. \(\sin\) bei \(2\pi n\) vs. \(2\pi n+\tfrac\pi2\)).</p>`,"✗ So zeigt man: verletzt")}
    </div>
    <div class="subcard">
      <div class="subhead">Konvergenz einer Reihe</div>
      <div class="subrule">Eine Reihe ist per Definition die Folge ihrer Partialsummen.</div>
      \[\sum_{k=0}^{\infty}a_k=S\ :\Longleftrightarrow\ s_n=\sum_{k=0}^{n}a_k\ \xrightarrow[\ n\to\infty\ ]{}\ S\]
      ${exBox(String.raw`<p>Hinter jeder Reihe steckt eine gewöhnliche <b>Folge</b>: die Zwischensummen \(s_0,s_1,s_2,\dots\) Konvergiert diese Folge, „ist" die Reihe ihr Grenzwert. Alle Reihen-Kriterien sind letztlich Aussagen über diese Folge.</p>`,"In Worten")}
      ${exBox(String.raw`<p>Geometrische Reihe \(q=\tfrac12\): Partialsummen <b>explizit</b> hinschreiben und Limes ablesen:</p>\[s_n=\sum_{k=0}^{n}\Big(\tfrac12\Big)^{k}=\frac{1-(\tfrac12)^{n+1}}{1-\tfrac12}=2\Big(1-\tfrac{1}{2^{n+1}}\Big)\ \longrightarrow\ 2.\]`,"✓ So zeigt man: erfüllt")}
      ${exBox(String.raw`<p>\(\sum(-1)^{k}\): \(s_n=1,0,1,0,\dots\) hat die zwei Häufungswerte \(1\) und \(0\) \(\Rightarrow\) \((s_n)\) divergiert \(\Rightarrow\) Reihe divergent.</p><p>Schneller Standardweg: <b>notwendiges Kriterium</b> — hier \(a_k=(-1)^{k}\not\to0\), fertig.</p>`,"✗ So zeigt man: verletzt")}
    </div>
    <div class="subcard">
      <div class="subhead">Absolute Konvergenz</div>
      <div class="subrule">Stärker als Konvergenz: erlaubt Umordnen und Produktbildung.</div>
      \[\sum a_k\ \text{konvergiert absolut}\ :\Longleftrightarrow\ \sum_{k}|a_k|<\infty\qquad(\Rightarrow\ \textstyle\sum a_k\ \text{konvergiert})\]
      ${exBox(String.raw`<p>Auch wenn man <b>alle Vorzeichen wegwirft</b>, bleibt die Summe endlich. Das ist die „robuste" Konvergenz: jede Umordnung liefert denselben Wert. Nur konvergent, aber nicht absolut („bedingt") heißt: die Vorzeichen-Auslöschung ist essenziell — Umordnen kann dann <i>jeden</i> Wert erzeugen (Riemann!).</p>`,"In Worten")}
      ${exBox(String.raw`<p>\(\displaystyle\sum\frac{(-1)^{k}}{k^{2}}\): Beträge bilden und ein Kriterium anwenden:</p>\[\sum\Big|\frac{(-1)^{k}}{k^{2}}\Big|=\sum\frac{1}{k^{2}}\ \text{konvergiert }(p=2>1)\ \Rightarrow\ \text{absolut konvergent.}\]`,"✓ So zeigt man: erfüllt")}
      ${exBox(String.raw`<p>\(\displaystyle\sum\frac{(-1)^{k+1}}{k}\): die Reihe selbst konvergiert (Leibniz, \(=\ln2\)) — aber die Betragsreihe ist die <b>harmonische</b>:</p>\[\sum\Big|\frac{(-1)^{k+1}}{k}\Big|=\sum\frac{1}{k}=\infty\]<p>\(\Rightarrow\) konvergent, aber <b>nicht absolut</b> (nur bedingt). Verletzt-Nachweis = Divergenz der Betragsreihe zeigen.</p>`,"✗ So zeigt man: verletzt")}
    </div>
    <div class="subcard">
      <div class="subhead">Punktweise Konvergenz \(f_n\to f\)</div>
      <div class="subrule">Funktionenfolge \(f_n:D\to\mathbb R\); jeder Punkt für sich.</div>
      \[f_n\to f\ \text{punktweise auf }D\ :\Longleftrightarrow\ \forall x\in D:\ \lim_{n\to\infty}f_n(x)=f(x)\]
      <div class="subrule">Das \(N=N(\varepsilon,x)\) darf von \(x\) abhängen.</div>
      ${exBox(String.raw`<p>\(x\) <b>festhalten</b>, dann ist \(f_n(x)\) eine gewöhnliche Zahlenfolge — die muss konvergieren, für jedes \(x\) einzeln. Wie schnell, darf von Punkt zu Punkt völlig verschieden sein.</p>`,"In Worten")}
      ${exBox(String.raw`<p>\(f_n(x)=\frac{x}{n}\) auf \(\mathbb R\): festes \(x\) einsetzen und den Zahlen-Limes bilden:</p>\[\lim_{n\to\infty}\frac{x}{n}=0\quad\text{für jedes feste }x\ \Rightarrow\ f_n\to f\equiv0\ \text{punktweise.}\]`,"✓ So zeigt man: erfüllt")}
      ${exBox(String.raw`<p>\(f_n(x)=(-1)^{n}x\) auf \(\mathbb R\): für \(x\neq0\) springt \(f_n(x)\) zwischen \(x\) und \(-x\) — die Zahlenfolge hat zwei Häufungswerte, also keinen Limes:</p>\[\Rightarrow\ (f_n)\ \text{konvergiert nicht einmal punktweise.}\]<p>Verletzt-Nachweis = <b>einen</b> Punkt \(x\) angeben, an dem \(f_n(x)\) divergiert.</p>`,"✗ So zeigt man: verletzt")}
    </div>
    <div class="subcard">
      <div class="subhead">Gleichmäßige Konvergenz \(f_n\rightrightarrows f\)</div>
      <div class="subrule">Ein \(N(\varepsilon)\) für <b>alle</b> \(x\) gleichzeitig — der ganze Graph im \(\varepsilon\)-Schlauch.</div>
      \[f_n\rightrightarrows f\ \text{auf }D\ :\Longleftrightarrow\ M_n=\sup_{x\in D}\,|f_n(x)-f(x)|\ \xrightarrow[\ n\to\infty\ ]{}\ 0\]
      ${exBox(String.raw`<p>Nicht jeder Punkt für sich, sondern der <b>schlimmste</b> Punkt zählt: \(M_n\) ist der größte Fehler auf ganz \(D\). Erst wenn selbst der gegen 0 geht, ist die Konvergenz gleichmäßig. Rezept: Grenzfunktion bestimmen → Fehlerfunktion \(|f_n-f|\) → Supremum (ggf. per Ableitung) → \(\to0\)?</p>`,"In Worten")}
      ${exBox(String.raw`<p>\(f_n(x)=\frac{x}{n}\) auf \([0,1]\) (punktweise Grenzfunktion \(f\equiv0\)):</p>\[M_n=\sup_{x\in[0,1]}\Big|\frac{x}{n}\Big|=\frac{1}{n}\ \longrightarrow\ 0\ \Rightarrow\ \text{gleichmäßig.}\]<p><b>Achtung Bereich:</b> dieselbe Folge auf ganz \(\mathbb R\) hat \(M_n=\infty\) — dort <i>nicht</i> gleichmäßig!</p>`,"✓ So zeigt man: erfüllt")}
      ${exBox(String.raw`<p>\(f_n(x)=x^{n}\) auf \([0,1]\): Grenzfunktion \(f(x)=0\) für \(x<1\), \(f(1)=1\). Fehler-Supremum:</p>\[M_n=\sup_{0\le x<1}x^{n}=1\ \not\to\ 0\ \Rightarrow\ \text{nur punktweise, nicht gleichmäßig.}\]<p>(Symptom: alle \(f_n\) stetig, Grenzfunktion unstetig — das kann bei gleichmäßiger Konvergenz nie passieren.)</p>`,"✗ So zeigt man: verletzt")}
    </div>
    <div class="subcard">
      <div class="subhead">Cauchy-Folge &amp; Cauchy-Kriterium</div>
      <div class="subrule">Konvergenz nachweisen, <b>ohne den Grenzwert zu kennen</b>. In \(\mathbb R,\ \mathbb C,\ \mathbb R^{d}\) (vollständig): Cauchy \(\Leftrightarrow\) konvergent.</div>
      \[(a_n)\ \text{Cauchy}\ :\Longleftrightarrow\ \forall\varepsilon>0\ \exists N\ \forall m,n\ge N:\ |a_n-a_m|<\varepsilon\]
      <div class="subrule">Für Reihen: \(\Big|\sum_{k=n+1}^{m}a_k\Big|<\varepsilon\) für alle \(m>n\ge N\).</div>
      ${exBox(String.raw`<p>Die Folgenglieder rücken untereinander beliebig eng zusammen — nicht nur benachbarte, sondern <b>alle ab Index \(N\)</b>. In vollständigen Räumen ist das dasselbe wie Konvergenz; der Vorteil: man braucht keinen Kandidaten für den Limes.</p>`,"In Worten")}
      ${exBox(String.raw`<p>\(a_n=\frac1n\): für \(m,n\ge N\) beide Glieder abschätzen:</p>\[\Big|\frac1n-\frac1m\Big|\le\frac1n+\frac1m\le\frac{2}{N}<\varepsilon\quad\text{für }N>\tfrac{2}{\varepsilon}\ \Rightarrow\ \text{Cauchy}\ \Rightarrow\ \text{konvergent.}\]`,"✓ So zeigt man: erfüllt")}
      ${exBox(String.raw`<p>Harmonische Reihe: der <b>Block-Trick</b> — vergleiche \(s_{2n}\) mit \(s_n\):</p>\[s_{2n}-s_n=\sum_{k=n+1}^{2n}\frac1k\ \ge\ n\cdot\frac{1}{2n}=\frac12\quad\text{für jedes }n\]<p>Der Abstand wird <b>nie</b> kleiner als \(\tfrac12\) \(\Rightarrow\) keine Cauchy-Folge \(\Rightarrow\) \(\sum\frac1k\) divergiert. Verletzt-Nachweis = ein festes \(\varepsilon_0\) (hier \(\tfrac12\)) finden, das immer wieder gerissen wird.</p>`,"✗ So zeigt man: verletzt")}
    </div>
    <div class="subcard">
      <div class="subhead">Hauptsatz der Differential- &amp; Integralrechnung</div>
      <div class="subrule">Voraussetzung: \(f\) <b>stetig</b> auf \([a,b]\).</div>
      \[F(x)=\int_a^{x}f(t)\,dt\ \Rightarrow\ F'=f\qquad\text{und}\qquad \int_a^{b}f=\Phi(b)-\Phi(a)\ \text{für jede Stammfunktion }\Phi\]
      ${exBox(String.raw`<p>Integrieren und Ableiten sind Umkehroperationen: die „Flächenfunktion" \(F\) wächst an der Stelle \(x\) genau mit der Rate \(f(x)\). Praktische Folge: bestimmte Integrale berechnet man über <b>irgendeine</b> Stammfunktion — Randwerte einsetzen, fertig.</p>`,"In Worten")}
      ${exBox(String.raw`<p>\(\displaystyle\int_0^{1}x^{2}\,dx\): Voraussetzung prüfen (\(x^{2}\) stetig ✓), Stammfunktion \(\Phi=\frac{x^{3}}{3}\) angeben (Probe: \(\Phi'=x^{2}\) ✓), Randwerte:</p>\[\int_0^{1}x^{2}\,dx=\frac{1}{3}-0=\frac13.\]`,"✓ So zeigt man: erfüllt")}
      ${exBox(String.raw`<p><b>Voraussetzung verletzt</b> — \(f=\operatorname{sgn}\) auf \([-1,1]\) (Sprung bei \(0\)):</p>\[F(x)=\int_{-1}^{x}\operatorname{sgn}(t)\,dt=|x|-1\]<p>\(F\) ist stetig, aber bei \(0\) <b>nicht differenzierbar</b> (Knick!) — dort gilt \(F'=f\) nicht. \(F'=f\) gilt nur an <b>Stetigkeitsstellen</b> von \(f\); die Stetigkeit im Satz ist also wesentlich.</p>`,"✗ Wenn die Voraussetzung fehlt")}
    </div>
  </div>`; }

/* =========================================================================
   6) Mindmap-Renderer (generisch, klappbarer Horizontal-Baum)
   tree = {id,title,kcls,kind:'root'|'ch'|'leaf', children:[...], collapsed?, route?}
   onLeaf(node) -> Navigation; Knoten mit children & kind 'ch' klappen auf/zu.
   ========================================================================= */
function Mindmap(svg, tree, opts){
  opts = Object.assign({nodeW:236, nodeH:50, hGap:64, vGap:14}, opts||{});
  const NS="http://www.w3.org/2000/svg";
  let tx=0, ty=0, scale=1;
  const vp = document.createElementNS(NS,"g"); svg.appendChild(vp);

  function layout(){
    let leaf=0, maxD=0; const pos=new Map();
    (function assign(n,d){
      maxD=Math.max(maxD,d);
      const kids = (n.collapsed? [] : (n.children||[]));
      if(!kids.length){ const y=leaf*(opts.nodeH+opts.vGap)+opts.nodeH/2; leaf++; pos.set(n,{x:d*(opts.nodeW+opts.hGap),y}); return y; }
      let f=null,l=0; kids.forEach(k=>{ const ky=assign(k,d+1); if(f===null)f=ky; l=ky; });
      const y=(f+l)/2; pos.set(n,{x:d*(opts.nodeW+opts.hGap),y}); return y;
    })(tree,0);
    return {pos, w:(maxD)*(opts.nodeW+opts.hGap)+opts.nodeW, h:Math.max(leaf,1)*(opts.nodeH+opts.vGap)};
  }

  let dims;
  function render(){
    vp.textContent="";
    const {pos,w,h}=layout(); dims={w,h};
    // Links
    pos.forEach((p,n)=>{
      if(n.collapsed) return;
      (n.children||[]).forEach(c=>{
        const cp=pos.get(c); if(!cp) return;
        const x1=p.x+opts.nodeW, y1=p.y, x2=cp.x, y2=cp.y, mx=(x1+x2)/2;
        const path=document.createElementNS(NS,"path");
        path.setAttribute("d",`M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`);
        path.setAttribute("class","link "+(n.cls||""));
        vp.appendChild(path);
      });
    });
    // Nodes
    pos.forEach((p,n)=>{
      const fo=document.createElementNS(NS,"foreignObject");
      fo.setAttribute("x",p.x); fo.setAttribute("y",p.y-opts.nodeH/2);
      fo.setAttribute("width",opts.nodeW); fo.setAttribute("height",opts.nodeH);
      const div=document.createElement("div");
      let cls="node "+(n.kind==='root'?'root':'')+" "+(n.kind==='ch'?'ch '+(n.cls||''):'');
      div.className=cls.trim();
      const expander = (n.kind==='ch' && n.children&&n.children.length)? `<span class="tw">${n.collapsed?'▸':'▾'}</span>`:'';
      const badge = n.badge? `<span class="badge">${esc(n.badge)}</span>`:'';
      const dn = (n.kind==='leaf' && n.done)? `<span class="done">✓</span>`:'';
      div.innerHTML = `${badge}<span class="lbl">${esc(n.title)}</span>${dn}${expander}`;
      div.title = n.title;
      div.onclick=(ev)=>{ ev.stopPropagation();
        if(n.kind==='ch' && n.children && n.children.length){ n.collapsed=!n.collapsed; render(); }
        else if(n.route){ go(n.route); }
      };
      fo.appendChild(div); vp.appendChild(fo);
    });
    apply();
  }
  function apply(){ vp.setAttribute("transform",`translate(${tx},${ty}) scale(${scale})`); }
  function fit(){
    const r=svg.getBoundingClientRect(); const pad=28;
    const s=Math.min((r.width-2*pad)/dims.w,(r.height-2*pad)/dims.h, 1.15);
    scale=isFinite(s)&&s>0? s:1;
    tx=(r.width-dims.w*scale)/2; ty=(r.height-dims.h*scale)/2; apply();
  }
  // Pan / Zoom
  let drag=null;
  svg.addEventListener("pointerdown",e=>{ if(e.target.closest(".node"))return; drag={x:e.clientX,y:e.clientY,tx,ty}; svg.classList.add("grabbing"); svg.setPointerCapture(e.pointerId); });
  svg.addEventListener("pointermove",e=>{ if(!drag)return; tx=drag.tx+(e.clientX-drag.x); ty=drag.ty+(e.clientY-drag.y); apply(); });
  svg.addEventListener("pointerup",e=>{ drag=null; svg.classList.remove("grabbing"); });
  svg.addEventListener("pointercancel",()=>{ drag=null; svg.classList.remove("grabbing"); });
  svg.addEventListener("wheel",e=>{ e.preventDefault(); const r=svg.getBoundingClientRect();
    const mx=e.clientX-r.left, my=e.clientY-r.top; const f=e.deltaY<0?1.12:1/1.12;
    const ns=Math.max(.25,Math.min(2.2,scale*f)); const k=ns/scale;
    tx=mx-(mx-tx)*k; ty=my-(my-ty)*k; scale=ns; apply();
  },{passive:false});

  render(); requestAnimationFrame(fit);
  return {fit, zoom:f=>{ const r=svg.getBoundingClientRect(); const mx=r.width/2,my=r.height/2;
    const ns=Math.max(.25,Math.min(2.2,scale*f)); const k=ns/scale; tx=mx-(mx-tx)*k; ty=my-(my-ty)*k; scale=ns; apply(); }};
}

let currentMap=null;

function renderHome(){
  currentMap=null;
  const cols = CH.map(ch=>{
    const rows = ch.sections.map(se=>{
      const d = sectionDone(se);
      const chips = (se.kw||[]).map(k=>`<span class="kw">${esc(k)}</span>`).join("");
      return `<a class="secrow" href="#/${se.id}">
        <span class="snum" style="background:var(--${ch.key})">${se.id}</span>
        <span class="srbody">
          <span class="srtitle">${esc(se.title)}${d?'<span class="done">✓ durch</span>':''}</span>
          <span class="kws">${chips}</span>
        </span>
        <span class="srgo">→</span>
      </a>`;
    }).join("");
    return `<section class="chcol">
      <h2 class="chhead ${ch.key}"><span>Kap. ${ch.id} — ${esc(ch.title)}</span><span class="cc">${ch.sections.length} Abschnitte</span></h2>
      <div class="seclist">${rows}</div>
    </section>`;
  }).join("");
  app.innerHTML = `
    <div class="titlebar"><h1>Übersicht Analysis 2 [S26]</h1></div>
    <p class="lead">Spring über die <b>Schnellzugriffe</b>, die <b>Typ-Mindmap</b> oder die <b>Kapitel-Liste</b> direkt zum Thema. In jedem Abschnitt wartet dann eine Mindmap mit den Unterthemen.</p>

    <h2 class="grp">⚡ Spickzettel</h2>
    <div class="reftiles">
      <a class="reftile i16" href="#/ref/funktionswerte"><span class="ti">π</span><span>Wichtige Funktionswerte<small>sin/cos/tan · arcsin/arctan · ln</small></span></a>
      <a class="reftile i2" href="#/ref/additions"><span class="ti">△</span><span>Additionstheoreme<small>Doppel- &amp; Halbwinkel usw.</small></span></a>
      <a class="reftile i15" href="#/ref/brueche"><span class="ti">⁄</span><span>Brüche &amp; Partialbruchzerlegung<small>Zuhalten · Grenzwert-Trick · Identitäten</small></span></a>
      <a class="reftile i17" href="#/ref/beweise"><span class="ti">≤</span><span>Tricks für Beweise<small>Dreiecks-UG · Cauchy-Schwarz · ε/2</small></span></a>
      <a class="reftile i18" href="#/ref/saetze"><span class="ti">§</span><span>Wichtige Sätze &amp; Definitionen<small>Definition · in Worten · ✓/✗ zeigen</small></span></a>
      <a class="reftile i1" href="#/ref/integrale"><span class="ti">∫</span><span>Standardintegrale<small>Grundintegrale + Beispiele</small></span></a>
      <a class="reftile i5" href="#/ref/substitutionen"><span class="ti">↦</span><span>Substitutionen &amp; Tricks<small>Subst. · +1−1 · quad. Ergänzung · part. Int.</small></span></a>
      <a class="reftile i9" href="#/ref/konv_integrale"><span class="ti">∫</span><span>Konvergenz — Integrale<small>uneigentlich · p-Test · v.p.</small></span></a>
      <a class="reftile i6" href="#/ref/reihen"><span class="ti">Σ</span><span>Standardreihen &amp; Summen<small>geometrisch · Gauß · Teleskop · Fourier</small></span></a>
      <a class="reftile i7" href="#/ref/grenzwerte"><span class="ti">lim</span><span>Grenzwerte &amp; Landau-Symbole<small>Standard-Limits · o und O</small></span></a>
      <a class="reftile i8" href="#/ref/konv_summen"><span class="ti">∑</span><span>Konvergenz — Reihen<small>Quotient · Wurzel · Leibniz · Integral</small></span></a>
      <a class="reftile i10" href="#/ref/potenzreihen"><span class="ti">xⁿ</span><span>Potenzreihen<small>Konvergenzradius · Rand</small></span></a>
      <a class="reftile i11" href="#/ref/entwickeln"><span class="ti">Tₙ</span><span>Funktionen entwickeln<small>Taylor · Restglied · Interpolation</small></span></a>
      <a class="reftile i12" href="#/ref/vertauschen"><span class="ti">⇄</span><span>Grenzwerte vertauschen<small>punktweise vs. gleichmäßig</small></span></a>
      <a class="reftile i13" href="#/ref/kurven"><span class="ti">κ</span><span>Kurven · Länge · Krümmung<small>kartesisch &amp; polar · Rektifizierbarkeit</small></span></a>
      <a class="reftile i14" href="#/ref/diffrechnung"><span class="ti">∇</span><span>Differentialrechnung<small>partiell · Jacobi/Hesse · ∇ · Fréchet</small></span></a>
    </div>

    <h2 class="grp">📦 Übungen &amp; Prüfungen</h2>
    <div class="reftiles">
      <a class="reftile i3" href="#/ref/uebungen"><span class="ti">📝</span><span>Übungsblätter<small>Blatt 01–15 · mit Lösungen</small></span></a>
      <a class="reftile i19" href="#/ref/vortrag"><span class="ti">🗣</span><span>Vortragsübungen<small>Blatt 1–4 · mit Lösungen</small></span></a>
      <a class="reftile i20" href="#/ref/pruefungen"><span class="ti">🎓</span><span>Prüfungen<small>Scheinklausur · Klausur · Lösungen</small></span></a>
    </div>

    <h2 class="grp">🗂️ Schnellzugriff nach Typ</h2>
    <p class="sub">Kategorie anklicken zum Aufklappen, Eintrag anklicken zum Hinspringen — Definitionen · Sätze · Kriterien · Regeln · Verfahren · Anwendungen.</p>
    <div class="mapbox sm">
      <div class="maphint">🖱️ ziehen &amp; zoomen · Kategorie klicken = auf/zu</div>
      <svg class="map" id="svgcat"></svg>
      <div class="maptools"><button class="btn" id="cfit">Einpassen</button></div>
    </div>

    <h2 class="grp">📚 Nach Kapitel</h2>
    <div class="cols">${cols}</div>

    <div class="note" style="margin-top:16px">
      <b>Stand:</b> Struktur/Gerüst — Navigation, Mindmaps und Spickzettel stehen; die ausführlichen Erklärungen der Themen folgen.
      Kap. 3–4 folgen dem Skript, Kap. 5–6 sind aus den Vorlesungs-Tafelbildern (Analysis 2) rekonstruiert.
    </div>`;

  const catTree = { id:"types", title:"Nach Typ", kind:"root",
    children: Object.keys(CAT).map(name=>({
      id:"cat:"+name, title:name, kind:"ch", cls:"cat", badge:String(CAT[name].length), collapsed:true,
      children: CAT[name].map(it=>({ id:it[0], title:it[1], kind:"leaf", cls:"cat", route:it[0] }))
    })) };
  const cm = Mindmap(document.getElementById("svgcat"), catTree, {nodeW:230});
  currentMap = cm;
  document.getElementById("cfit").onclick=()=>cm.fit();
}

function renderRef(key){
  currentMap=null;
  const r=REF[key]; if(!r){ renderHome(); return; }
  app.innerHTML = `
    <nav class="crumbs"><a href="#/">Start</a> <span class="sep">›</span> <span>Schnellzugriff</span> <span class="sep">›</span> <span>${esc(r.title)}</span></nav>
    <div class="titlebar"><span class="num" style="background:${r.color}">${r.icon}</span><h1>${esc(r.title)}</h1></div>
    ${r.note?`<p class="lead">${r.note}</p>`:''}
    ${r.html}`;
}

function renderSection(se){
  currentMap=null;
  const ch=chapterOf(se);
  // Abschnitt ohne Unterthemen -> direkt als Themen-Karte behandeln
  if(se.topics.length===0){ return renderTopic(se); }

  app.innerHTML = `
    ${crumbHtml(se)}
    <div class="titlebar">
      <span class="num" style="background:var(--${ch.key})">${se.id}</span>
      <h1>${esc(se.title)}</h1>
    </div>
    <div class="srcline">
      <span>${se.topics.length} Unterthemen</span>
    </div>
    <div style="display:flex;align-items:center;gap:10px;margin:6px 0 14px">
      <span style="color:var(--muted);font-size:13px">Übersicht als</span>
      <div class="viewtoggle" id="vt">
        <button data-v="map" class="on">Mindmap</button>
        <button data-v="list">Liste</button>
      </div>
    </div>
    <div id="secview"></div>`;

  const host=document.getElementById("secview");
  function showMap(){
    host.innerHTML = `<div class="mapbox sm"><svg class="map" id="svgsec"></svg>
      <div class="maptools"><button class="btn" id="sfit">Einpassen</button></div></div>`;
    const tree={ id:se.id, title:se.id+"  "+se.title, kind:"root",
      children: se.topics.map(tp=>({id:tp.id,title:tp.id+"  "+tp.title,kind:"leaf",cls:ch.key,route:tp.id,done:isDone(tp.id)})) };
    const m=Mindmap(document.getElementById("svgsec"), tree, {nodeW:250});
    document.getElementById("sfit").onclick=()=>m.fit();
  }
  function showList(){
    host.innerHTML = `<div class="grid">`+ se.topics.map(tp=>`
      <a class="card" href="#/${tp.id}">
        <span class="cn">${tp.id}</span>
        <span class="ct">${esc(tp.title)}</span>
        <span class="cf"><span class="pill ${isDone(tp.id)?'done':'todo'}">${isDone(tp.id)?'✓ verstanden':'offen'}</span></span>
      </a>`).join("") + `</div>`;
  }
  document.querySelectorAll("#vt button").forEach(b=> b.onclick=()=>{
    document.querySelectorAll("#vt button").forEach(x=>x.classList.remove("on")); b.classList.add("on");
    b.dataset.v==="map"?showMap():showList();
  });
  showMap();
}

function renderTopic(tp){
  currentMap=null;
  const ch=chapterOf(tp);
  const idx=flat.indexOf(tp);
  const prev=idx>0?flat[idx-1]:null, next=idx<flat.length-1?flat[idx+1]:null;
  const ph = '<div class="placeholder">Inhalt folgt — wird in der nächsten Runde ergänzt.</div>';
  // Falls später tp.body gesetzt ist, wird es hier verwendet; sonst Platzhalter.
  const b = tp.body || {};
  function sec(cls,icon,title,html){ return `<section class="tsec ${cls||''}"><h3>${icon} ${title}</h3><div class="body">${html||ph}</div></section>`; }

  app.innerHTML = `
    ${crumbHtml(tp)}
    <div class="titlebar">
      <span class="num" style="background:var(--${ch.key})">${tp.id}</span>
      <h1>${esc(tp.title)}</h1>
    </div>
    <div class="srcline">
      <label class="chk ${isDone(tp.id)?'on':''}" id="chk">
        <input type="checkbox" ${isDone(tp.id)?'checked':''}> verstanden
      </label>
    </div>
    <div class="topic">
      ${sec("", "💡", "Kernidee", b.kernidee)}
      ${sec("", "📐", "Definition / Satz", b.satz)}
      ${sec("linkh", "🔗", "Zusammenhang (roter Faden)", b.zusammenhang)}
      ${sec("", "✏️", "Beispiel", b.beispiel)}
      ${sec("warnh", "⚠️", "Klausur-Falle", b.falle)}
    </div>
    <div class="topnav">
      <span>${prev?`<a class="btn" href="#/${prev.id}">← ${esc(prev.id)}</a>`:''}</span>
      <span>${next?`<a class="btn" href="#/${next.id}">${esc(next.id)} →</a>`:''}</span>
    </div>`;

  const chk=document.getElementById("chk");
  chk.querySelector("input").onchange=(e)=>{ setDone(tp.id, e.target.checked); chk.classList.toggle("on", e.target.checked); };
}

/* =========================================================================
   8) Router
   ========================================================================= */
function typeset(){ if(window.renderMathInElement){ try{ renderMathInElement(app,{delimiters:[{left:"\\[",right:"\\]",display:true},{left:"\\(",right:"\\)",display:false}],throwOnError:false,errorColor:"#dc2626"}); }catch(e){} } }
function route(){
  const h=location.hash.replace(/^#\/?/,"");
  if(!h){ renderHome(); }
  else if(h.indexOf("ref/")===0){ renderRef(h.slice(4)); }
  else { const node=byId.get(h);
    if(!node || node.kind==="chapter"){ renderHome(); }
    else if(node.kind==="section"){ renderSection(node); }
    else { renderTopic(node); }
  }
  window.scrollTo(0,0);
  typeset();
}
window.addEventListener("hashchange", route);
window.addEventListener("resize", ()=>{ if(currentMap) currentMap.fit(); });

/* =========================================================================
   9) Suche
   ========================================================================= */
const searchEl=document.getElementById("search"), resEl=document.getElementById("results");
const searchIndex=[];
byId.forEach(n=>{ if(n.kind==="section"||n.kind==="topic") searchIndex.push(n); });
Object.keys(REF).forEach(k=> searchIndex.push({id:"ref/"+k, title:REF[k].title, kind:"ref"}));
let activeRes=-1, curRes=[];
function runSearch(q){
  q=q.trim().toLowerCase();
  if(!q){ resEl.classList.remove("show"); return; }
  curRes = searchIndex.filter(n=> (n.id+" "+n.title).toLowerCase().includes(q)).slice(0,12);
  activeRes=-1;
  resEl.innerHTML = curRes.length? curRes.map((n,i)=>`
     <a href="#/${n.id}" data-i="${i}"><span class="tag">${n.kind==="section"?"Abschnitt":n.kind==="ref"?"Referenz":"Thema"} ${n.kind==="ref"?"":n.id}</span><br>${esc(n.title)}</a>
   `).join("") : `<a><span class="tag">Kein Treffer</span></a>`;
  resEl.classList.add("show");
}
searchEl.addEventListener("input",()=>runSearch(searchEl.value));
searchEl.addEventListener("keydown",e=>{
  if(!resEl.classList.contains("show")||!curRes.length) return;
  if(e.key==="ArrowDown"){ e.preventDefault(); activeRes=Math.min(curRes.length-1,activeRes+1); }
  else if(e.key==="ArrowUp"){ e.preventDefault(); activeRes=Math.max(0,activeRes-1); }
  else if(e.key==="Enter"){ if(activeRes>=0){ e.preventDefault(); go(curRes[activeRes].id); searchEl.value=""; resEl.classList.remove("show"); searchEl.blur(); } return; }
  else return;
  resEl.querySelectorAll("a").forEach((a,i)=>a.classList.toggle("active",i===activeRes));
});
resEl.addEventListener("click",e=>{ const a=e.target.closest("a"); if(a&&a.dataset.i!==undefined){ searchEl.value=""; resEl.classList.remove("show"); } });
document.addEventListener("click",e=>{ if(!e.target.closest(".search")) resEl.classList.remove("show"); });

/* ---- Start ---- */
updateProgress();
route();
</script>
</body>
