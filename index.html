<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Analysis · Differential- &amp; Integralrechnung (Kap. 3–4)</title>
<!--
  Interaktive Lern-Übersicht zu Kap. 3 (Differentialrechnung) und Kap. 4 (Integralrechnung)
  aus dem Skript "Analysis 1" von T. Weidl (Uni Stuttgart).

  STAND: Gerüst / Struktur (Phase 1). Inhalte der Themen-Karten sind Platzhalter.
  AUFBAU:  Inhalt = Daten (siehe Konstante CH), Layout = Code.
           Ein Thema mit Inhalt füllen = im passenden Knoten das Feld `body` setzen.
  Siehe WORKFLOW.md im selben Ordner.
-->
<style>
:root{
  --bg:#f4f6fb; --panel:#ffffff; --ink:#1b2430; --muted:#64748b; --line:#e2e8f0;
  --accent:#4f46e5;
  --ch3:#2563eb; --ch3-soft:#dbeafe;
  --ch4:#0d9488; --ch4-soft:#ccfbf1;
  --root:#334155;
  --ok:#16a34a; --warn:#d97706;
  --shadow:0 1px 2px rgba(15,23,42,.06),0 8px 24px rgba(15,23,42,.08);
  --radius:14px;
}
[data-theme="dark"]{
  --bg:#0f141b; --panel:#161d27; --ink:#e6edf6; --muted:#93a1b3; --line:#26303d;
  --accent:#818cf8;
  --ch3:#60a5fa; --ch3-soft:#1e293b;
  --ch4:#2dd4bf; --ch4-soft:#11302d;
  --root:#cbd5e1;
  --shadow:0 1px 2px rgba(0,0,0,.3),0 8px 28px rgba(0,0,0,.45);
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{
  background:var(--bg); color:var(--ink); font:15px/1.55 system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  display:flex; flex-direction:column; min-height:100%;
}
a{color:var(--accent)}
button{font:inherit; cursor:pointer}
.btn{
  background:var(--panel); color:var(--ink); border:1px solid var(--line);
  border-radius:10px; padding:6px 12px; box-shadow:var(--shadow);
}
.btn:hover{border-color:var(--accent)}
.btn.primary{background:var(--accent); color:#fff; border-color:transparent}

/* ---------- Header ---------- */
header{
  position:sticky; top:0; z-index:30; background:var(--panel);
  border-bottom:1px solid var(--line); box-shadow:var(--shadow);
}
.hwrap{max-width:1200px; margin:0 auto; padding:10px 18px; display:flex; align-items:center; gap:14px; flex-wrap:wrap}
.brand{display:flex; align-items:center; gap:10px; font-weight:700; letter-spacing:.2px}
.brand .logo{
  width:30px;height:30px;border-radius:9px;display:grid;place-items:center;color:#fff;font-weight:800;
  background:linear-gradient(135deg,var(--ch3),var(--ch4));
}
.brand small{display:block;font-weight:500;color:var(--muted);font-size:11.5px}
.spacer{flex:1}
.search{position:relative}
.search input{
  width:240px; max-width:46vw; padding:8px 12px 8px 32px; border-radius:10px; border:1px solid var(--line);
  background:var(--bg); color:var(--ink);
}
.search .ic{position:absolute; left:10px; top:50%; transform:translateY(-50%); color:var(--muted)}
.results{
  position:absolute; top:108%; left:0; right:0; background:var(--panel); border:1px solid var(--line);
  border-radius:12px; box-shadow:var(--shadow); max-height:320px; overflow:auto; display:none; z-index:40;
}
.results.show{display:block}
.results a{display:block; padding:9px 12px; color:var(--ink); text-decoration:none; border-bottom:1px solid var(--line)}
.results a:last-child{border-bottom:0}
.results a:hover,.results a.active{background:var(--bg)}
.results .tag{font-size:11px;color:var(--muted)}
.progwrap{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--muted)}
.progbar{width:120px;height:8px;border-radius:99px;background:var(--line);overflow:hidden}
.progbar > i{display:block;height:100%;background:linear-gradient(90deg,var(--ch3),var(--ch4));width:0}

/* ---------- Main / layout ---------- */
main{flex:1; width:100%; max-width:1200px; margin:0 auto; padding:18px}
.crumbs{display:flex; gap:6px; flex-wrap:wrap; align-items:center; color:var(--muted); font-size:13px; margin-bottom:14px}
.crumbs a{text-decoration:none}
.crumbs a:hover{text-decoration:underline}
.crumbs .sep{opacity:.5}

.titlebar{display:flex; align-items:flex-start; gap:14px; flex-wrap:wrap; margin-bottom:10px}
.titlebar h1{font-size:23px; margin:0}
.titlebar .num{
  font-variant-numeric:tabular-nums; font-weight:800; color:#fff; padding:3px 9px; border-radius:9px; font-size:14px;
}
.lead{color:var(--muted); margin:2px 0 16px}

.viewtoggle{display:inline-flex; border:1px solid var(--line); border-radius:10px; overflow:hidden; box-shadow:var(--shadow)}
.viewtoggle button{background:var(--panel); border:0; padding:6px 12px; color:var(--muted)}
.viewtoggle button.on{background:var(--accent); color:#fff}

/* ---------- Mindmap ---------- */
.mapbox{position:relative; border:1px solid var(--line); border-radius:var(--radius); background:
  radial-gradient(circle at 1px 1px, var(--line) 1px, transparent 0) 0 0/22px 22px, var(--panel);
  box-shadow:var(--shadow); overflow:hidden}
.mapbox.lg{height:72vh; min-height:460px}
.mapbox.sm{height:48vh; min-height:300px}
svg.map{width:100%; height:100%; display:block; cursor:grab; touch-action:none}
svg.map.grabbing{cursor:grabbing}
.maptools{position:absolute; right:12px; bottom:12px; display:flex; gap:6px; z-index:5}
.maptools .btn{padding:6px 10px}
.maphint{position:absolute; left:12px; top:12px; font-size:12px; color:var(--muted); background:var(--panel);
  border:1px solid var(--line); border-radius:8px; padding:4px 9px; z-index:5; opacity:.92}

/* node = foreignObject content */
.node{
  height:100%; border-radius:12px; padding:7px 11px; display:flex; align-items:center; gap:7px;
  border:1px solid var(--line); background:var(--panel); box-shadow:var(--shadow); cursor:pointer;
  font-size:13px; line-height:1.25; user-select:none; overflow:hidden;
}
.node:hover{border-color:var(--accent); transform:translateY(-1px)}
.node .lbl{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical; overflow:hidden}
.node .badge{font-weight:800; font-size:11px; padding:1px 6px; border-radius:6px; color:#fff; background:var(--accent); white-space:nowrap}
.node .tw{margin-left:auto; color:var(--muted); font-size:11px; white-space:nowrap}
.node.root{background:var(--root); color:#fff; border-color:transparent; font-weight:700}
.node.ch{font-weight:700}
.node.ch3{background:var(--ch3-soft)} .node.ch3 .badge{background:var(--ch3)}
.node.ch4{background:var(--ch4-soft)} .node.ch4 .badge{background:var(--ch4)}
.node .done{color:var(--ok)}
.link{fill:none; stroke:var(--line); stroke-width:2}
.link.ch3{stroke:var(--ch3)} .link.ch4{stroke:var(--ch4)}

/* ---------- Card grid (alternative Übersicht) ---------- */
.grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:12px}
.card{
  background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:14px;
  box-shadow:var(--shadow); text-decoration:none; color:var(--ink); display:flex; flex-direction:column; gap:6px;
  transition:transform .08s, border-color .08s;
}
.card:hover{transform:translateY(-2px); border-color:var(--accent)}
.card .ct{font-weight:600}
.card .cn{font-size:12px; color:var(--muted); font-variant-numeric:tabular-nums}
.card .cf{margin-top:auto; display:flex; align-items:center; gap:8px; font-size:12px; color:var(--muted)}
.pill{font-size:11px; padding:2px 8px; border-radius:99px; border:1px solid var(--line)}
.pill.todo{color:var(--warn)} .pill.done{color:var(--ok); border-color:var(--ok)}

/* ---------- Topic card (Ebene 2) ---------- */
.topic{display:grid; grid-template-columns:1fr; gap:14px; max-width:880px}
.tsec{background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden}
.tsec > h3{margin:0; padding:11px 16px; font-size:14px; border-bottom:1px solid var(--line); display:flex; gap:8px; align-items:center}
.tsec .body{padding:14px 16px}
.tsec.warnh > h3{color:var(--warn)}
.tsec.linkh > h3{color:var(--ch3)}
.placeholder{
  border:1px dashed var(--line); border-radius:10px; padding:14px; color:var(--muted);
  background:repeating-linear-gradient(45deg,transparent,transparent 10px,rgba(127,127,127,.04) 10px,rgba(127,127,127,.04) 20px);
}
.topnav{display:flex; justify-content:space-between; gap:10px; margin-top:6px}
.srcline{display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin:2px 0 4px; font-size:13px; color:var(--muted)}
.chk{display:inline-flex; align-items:center; gap:8px; cursor:pointer; user-select:none;
  border:1px solid var(--line); border-radius:10px; padding:7px 12px; background:var(--panel); box-shadow:var(--shadow)}
.chk input{width:16px;height:16px}
.chk.on{border-color:var(--ok); color:var(--ok)}

.note{background:var(--ch3-soft); border:1px solid var(--line); border-radius:var(--radius); padding:12px 14px; font-size:13.5px; color:var(--ink)}

/* ---------- Start: Themen-Liste ---------- */
.cols{display:grid; grid-template-columns:1fr 1fr; gap:16px; align-items:start}
@media (max-width:860px){ .cols{grid-template-columns:1fr} }
.chcol{background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden}
.chhead{margin:0; padding:12px 16px; font-size:15px; color:#fff; display:flex; align-items:center; gap:10px}
.chhead.ch3{background:linear-gradient(135deg,var(--ch3),#1e40af)}
.chhead.ch4{background:linear-gradient(135deg,var(--ch4),#0f766e)}
.chhead .cc{margin-left:auto; font-weight:500; font-size:12px; opacity:.92; white-space:nowrap}
.seclist{display:flex; flex-direction:column}
.secrow{display:flex; gap:12px; align-items:flex-start; padding:11px 14px; border-top:1px solid var(--line); text-decoration:none; color:var(--ink)}
.secrow:hover{background:var(--bg)}
.secrow .snum{flex:none; font-variant-numeric:tabular-nums; font-weight:800; color:#fff; border-radius:8px; padding:3px 8px; font-size:12.5px; min-width:44px; text-align:center}
.srbody{flex:1; min-width:0; display:flex; flex-direction:column}
.srtitle{font-weight:600; line-height:1.3}
.srtitle .done{color:#fff; background:var(--ok); border-radius:99px; font-size:11px; padding:1px 7px; margin-left:7px; vertical-align:middle}
.kws{display:flex; flex-wrap:wrap; gap:5px; margin-top:6px}
.kw{font-size:11px; padding:2px 8px; border-radius:99px; background:var(--bg); border:1px solid var(--line); color:var(--muted); white-space:nowrap}
.srgo{flex:none; align-self:center; color:var(--muted); font-size:18px}
.secrow:hover .srgo{color:var(--accent)}

/* ---------- Schnellzugriff-Kacheln & Gruppen-Header ---------- */
.grp{font-size:15px; margin:22px 0 4px; display:flex; align-items:center; gap:8px}
.sub{color:var(--muted); font-size:13px; margin:0 0 10px}
.reftiles{display:grid; grid-template-columns:repeat(auto-fit,minmax(232px,1fr)); gap:12px; margin:6px 0}
.reftile{display:flex; align-items:center; gap:14px; padding:14px 16px; border-radius:var(--radius); text-decoration:none; color:#fff; box-shadow:var(--shadow); font-weight:600; transition:transform .08s}
.reftile:hover{transform:translateY(-2px)}
.reftile .ti{font-size:26px; line-height:1}
.reftile small{display:block; font-weight:500; opacity:.92; font-size:12px; margin-top:2px}
.reftile.i1{background:linear-gradient(135deg,var(--ch4),#0f766e)}
.reftile.i2{background:linear-gradient(135deg,#7c3aed,#4f46e5)}
.reftile.i3{background:linear-gradient(135deg,#f59e0b,#d97706)}
.reftile.i4{background:linear-gradient(135deg,#fb7185,#e11d48)}
.matgrid{display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:12px}
.matcard{background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:12px 14px; box-shadow:var(--shadow); display:flex; flex-direction:column; gap:7px}
.matcard .mct{font-weight:600}
.matcard .mcl{display:flex; flex-wrap:wrap; gap:12px; font-size:14px}
.matcard .mcl a{text-decoration:none}
.matcard .mcph{font-size:12px; color:var(--muted); border-top:1px dashed var(--line); padding-top:7px}
.reftile.i5{background:linear-gradient(135deg,#22d3ee,#0891b2)}
.reftile.i6{background:linear-gradient(135deg,#a78bfa,#7c3aed)}
.reftile.i7{background:linear-gradient(135deg,#f472b6,#db2777)}
.reftile.i8{background:linear-gradient(135deg,#34d399,#059669)}
.reftile.i9{background:linear-gradient(135deg,#fbbf24,#ea580c)}
.reftile.i10{background:linear-gradient(135deg,#e879f9,#c026d3)}
.reftile.i11{background:linear-gradient(135deg,#2dd4bf,#0d9488)}
.reftile.i12{background:linear-gradient(135deg,#38bdf8,#0369a1)}
.reftile.i13{background:linear-gradient(135deg,#c084fc,#9333ea)}
.reftile.i14{background:linear-gradient(135deg,#818cf8,#4338ca)}
.example{margin:8px 0;border:1px solid var(--line);border-radius:10px;background:var(--bg);overflow:hidden}
.example>summary{cursor:pointer;padding:8px 12px;font-size:13px;font-weight:600;color:var(--accent);list-style:none;user-select:none}
.example>summary::-webkit-details-marker{display:none}
.example>summary::before{content:"\25B8  "}
.example[open]>summary::before{content:"\25BE  "}
.example[open]>summary{border-bottom:1px solid var(--line)}
.exbody{padding:10px 14px;overflow-x:auto}
.exbody p{margin:6px 0;color:var(--muted)}
.subgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:760px){.subgrid{grid-template-columns:1fr}}
.subcard{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 14px;box-shadow:var(--shadow)}
.subhead{font-size:16px;margin-bottom:4px}
.subrule{color:var(--muted);font-size:14px;margin-bottom:6px}
.node.ch.cat{background:var(--panel); border-color:var(--accent)}
.link.cat{stroke:var(--accent); opacity:.5}

/* ---------- Referenz-Seiten (Spickzettel) ---------- */
.twocol{display:grid; grid-template-columns:1fr 1fr; gap:18px; align-items:start}
@media(max-width:760px){ .twocol{grid-template-columns:1fr} }
.refblock{margin:0 0 16px}
.refblock h3{font-size:14px; margin:0 0 8px; color:var(--accent)}
.fml{font-family:"Cambria Math","Latin Modern Math","STIX Two Math",Georgia,serif; font-size:16px}
.reftable{width:100%; border-collapse:collapse; background:var(--panel); border:1px solid var(--line); border-radius:10px; overflow:hidden}
.reftable td{padding:8px 13px; border-bottom:1px solid var(--line); vertical-align:middle}
.reftable tr:last-child td{border-bottom:0}
.reftable td.lhs{white-space:nowrap}
.reftable td.cond{color:var(--muted); font-size:12px; text-align:right; white-space:nowrap; font-family:system-ui,sans-serif}
.frac{display:inline-flex; flex-direction:column; text-align:center; vertical-align:middle; margin:0 .18em}
.frac>span{padding:0 .4em; display:block}
.frac>span:first-child{border-bottom:1.5px solid currentColor}
footer{max-width:1200px;margin:0 auto;padding:14px 18px;color:var(--muted);font-size:12px}
.kbd{font:12px/1 ui-monospace,Consolas,monospace; border:1px solid var(--line); border-bottom-width:2px; border-radius:6px; padding:2px 6px; background:var(--panel)}
@media (max-width:600px){ .search input{width:160px} .progwrap{display:none} }
</style>

<script>
"use strict";

/* =========================================================================
   1) DATEN  —  hier wächst der Inhalt.
   Jeder Knoten kann später ein Feld `body:{...}` bekommen (siehe renderTopic).
   topics:  [id, Titel, Quelldatei]
   ========================================================================= */
const SRCDIR = "assets/skript_html_files/";
const CH = [
 { id:"3", title:"Differentialrechnung von Funktionen einer Variablen", key:"ch3",
   sections:[
    {id:"3.1",  t:"Zur Definition der Ableitung", src:"skriptse28.html", topics:[
       {id:"3.1.1", title:"Die Ableitung einer Funktion", src:"skriptsu111.html", body:{
 kernidee: String.raw`Die Ableitung misst die <b>momentane Änderungsrate</b> — die Steigung der Tangente. Man zoomt in den Graphen hinein, bis er gerade aussieht; diese Steigung ist \(f'(x_0)\).`,
 satz: String.raw`\[f'(x_0)=\lim_{h\to0}\frac{f(x_0+h)-f(x_0)}{h}\]Existiert dieser Grenzwert (endlich), heißt \(f\) in \(x_0\) <b>differenzierbar</b>. Es gilt: differenzierbar \(\Rightarrow\) stetig (aber nicht umgekehrt).`,
 zusammenhang: String.raw`Fundament für alles Weitere: Ableitungsregeln, Monotonie (\(f'>0\)), Extrema (\(f'=0\)), Krümmung (\(f''\)), Taylor. Der Differenzenquotient ist die diskrete Version, die Ableitung sein Grenzwert.`,
 beispiel: String.raw`Für \(f(x)=x^2\):\[\frac{(x+h)^2-x^2}{h}=\frac{2xh+h^2}{h}=2x+h\ \longrightarrow\ 2x\quad(h\to0).\]Also \(f'(x)=2x\).`,
 falle: String.raw`<b>\(|x|\) ist in \(0\) nicht differenzierbar</b> (Knick: links Steigung \(-1\), rechts \(+1\)). Differenzierbarkeit ist echt stärker als Stetigkeit.`
}},
       ["3.1.2","Ableitungen in reellen und komplexen Variablen","skriptsu112.html"],
       ["3.1.2b","Diskussion: reelle vs. komplexe Ableitung","skriptli2.html"],
       {id:"3.1.3", title:"Geometrische Interpretation der Ableitung", src:"skriptsu113.html", body:{
 kernidee: String.raw`\(f'(x_0)\) ist die <b>Steigung der Tangente</b> in \((x_0,f(x_0))\). Positiv → Graph steigt, negativ → fällt, null → waagrechte Tangente.`,
 satz: String.raw`Tangente an \(f\) in \(x_0\):\[t(x)=f(x_0)+f'(x_0)\,(x-x_0).\]Sie ist die <b>beste lineare Näherung</b> von \(f\) nahe \(x_0\) (Fehler von der Ordnung \(o(x-x_0)\)).`,
 zusammenhang: String.raw`Brücke zu den Landau-Symbolen (3.2) und zum Differential (3.9). Die zweite Ableitung \(f''\) beschreibt die Krümmung (Konvexität, 3.11).`,
 beispiel: String.raw`\(f(x)=\sqrt{x}\) in \(x_0=1\): \(f'(x)=\frac{1}{2\sqrt{x}}\), also \(f'(1)=\tfrac12\). Tangente \(t(x)=1+\tfrac12(x-1)\) liefert die Schätzung \(\sqrt{1{,}1}\approx 1{,}05\).`,
 falle: String.raw`Tangente \(\neq\) Sekante: die Tangente berührt lokal in <i>einem</i> Punkt, die Sekante schneidet <i>zwei</i>. Für \(h\to0\) geht die Sekantensteigung in die Tangentensteigung über.`
}}]},
    {id:"3.2",  t:"Die Landau-Symbole o und O", src:"skriptse29.html", topics:[
       ["3.2.1","Definition der Landau-Symbole","skriptsu114.html"],
       ["3.2.2","Eigenschaften der Landau-Symbole","skriptsu115.html"],
       ["3.2.3","Beispiele für o und O","skriptsu116.html"],
       ["3.2.4","Anwendungen der Landau-Symbolik","skriptsu117.html"]]},
    {id:"3.3",  t:"Das Rechnen mit Ableitungen", src:"skriptse30.html", topics:[
       {id:"3.3.1", title:"Linearität, Produkt- und Kettenregel", src:"skriptsu118.html", body:{
 kernidee: String.raw`Drei Bausteine, mit denen man fast alles ableitet: <b>linear</b> durchziehen, Produkte über die <b>Produktregel</b>, Verkettungen über die <b>Kettenregel</b>.`,
 satz: String.raw`\[(af+bg)'=af'+bg'\]\[(fg)'=f'g+fg'\]\[(f\circ g)'(x)=f'(g(x))\cdot g'(x)\]`,
 zusammenhang: String.raw`Die Kettenregel ist der Motor der Substitution beim Integrieren (4.6) und der impliziten Ableitung (3.3.3). Aus der Produktregel folgt die Leibniz-Formel für höhere Ableitungen (3.7).`,
 beispiel: String.raw`Kette: \(\big(\sin(x^2)\big)'=\cos(x^2)\cdot 2x\). Produkt: \(\big(x^2 e^x\big)'=2xe^x+x^2e^x=(x^2+2x)e^x\).`,
 falle: String.raw`<b>Innere Ableitung nicht vergessen!</b> \((\sin(2x))'=2\cos(2x)\), nicht \(\cos(2x)\). Das ist der häufigste Flüchtigkeitsfehler überhaupt.`
}},
       {id:"3.3.2", title:"Die Quotientenregel", src:"skriptsu119.html", body:{
 kernidee: String.raw`Ableitung eines Bruchs \(\frac{f}{g}\). Merkspruch: „<b>NAZ minus ZAN, über N-Quadrat</b>" (Nenner·Abl. Zähler minus Zähler·Abl. Nenner, geteilt durch Nenner-Quadrat).`,
 satz: String.raw`\[\left(\frac{f}{g}\right)'=\frac{f'g-fg'}{g^{2}}\qquad(g\neq0)\]`,
 zusammenhang: String.raw`Folgt aus Produkt- und Kettenregel via \(\frac{f}{g}=f\cdot g^{-1}\). Liefert z. B. \((\tan x)'=\frac{1}{\cos^{2}x}\).`,
 beispiel: String.raw`\[\left(\frac{x}{x^{2}+1}\right)'=\frac{1\cdot(x^{2}+1)-x\cdot 2x}{(x^{2}+1)^{2}}=\frac{1-x^{2}}{(x^{2}+1)^{2}}.\]`,
 falle: String.raw`<b>Reihenfolge im Zähler</b> (\(f'g-fg'\), nicht umgekehrt) — das Vorzeichen ist die typische Falle. Und im Nenner steht \(g^{2}\), nicht \(g\).`
}},
       ["3.3.3","Ableitung impliziter Funktionen","skriptsu120.html"]]},

    {id:"3.5",  t:"Sätze von Fermat & Rolle; Formeln von Cauchy & Lagrange", src:"skriptse32.html", topics:[
       {id:"3.5.1", title:"Der Satz von Fermat", src:"skriptsu125.html", body:{
 kernidee: String.raw`An einem <b>inneren Extremum</b> einer differenzierbaren Funktion ist die Tangente waagrecht: \(f'=0\). Das ist die notwendige Bedingung fürs Suchen von Hoch-/Tiefpunkten.`,
 satz: String.raw`Hat \(f\) in einem <i>inneren</i> Punkt \(x_0\) ein lokales Extremum und ist dort differenzierbar, so gilt\[f'(x_0)=0.\]\(x_0\) heißt dann <b>kritischer</b> (stationärer) Punkt.`,
 zusammenhang: String.raw`Startpunkt der ganzen Kette: <b>Fermat \(\Rightarrow\) Rolle \(\Rightarrow\) Mittelwertsatz</b>. Liefert die „Kandidaten" für Extrema (3.10.3).`,
 beispiel: String.raw`\(f(x)=x^{2}\) hat sein Minimum in \(0\), und tatsächlich \(f'(0)=0\). ✓`,
 falle: String.raw`Nur <b>notwendig, nicht hinreichend</b>: \(f(x)=x^{3}\) hat \(f'(0)=0\), aber kein Extremum (Sattelpunkt). Und nur für <b>innere</b> Punkte — am Rand von \([a,b]\) kann ein Extremum ohne \(f'=0\) liegen.`
}},
       {id:"3.5.2", title:"Der Satz von Rolle", src:"skriptsu126.html", body:{
 kernidee: String.raw`Wenn eine glatte Kurve bei \(a\) und \(b\) auf <b>gleicher Höhe</b> beginnt und endet, muss sie dazwischen mindestens einmal eine <b>waagrechte Tangente</b> haben.`,
 satz: String.raw`\(f\) stetig auf \([a,b]\), differenzierbar auf \((a,b)\), \(f(a)=f(b)\). Dann gibt es ein \(\xi\in(a,b)\) mit\[f'(\xi)=0.\]`,
 zusammenhang: String.raw`Spezialfall des Mittelwertsatzes (3.5.4) für \(f(a)=f(b)\); bewiesen über Fermat (Extremum im Inneren). Zentrales Werkzeug für Nullstellen-Argumente.`,
 beispiel: String.raw`\(f(x)=x^{2}-x\) auf \([0,1]\): \(f(0)=f(1)=0\). \(f'(x)=2x-1=0\) bei \(\xi=\tfrac12\). ✓`,
 falle: String.raw`<b>Alle drei Voraussetzungen nötig.</b> \(f(x)=|x|\) auf \([-1,1]\) erfüllt \(f(-1)=f(1)\), aber nie \(f'=0\) — weil in \(0\) nicht differenzierbar.`
}},
       {id:"3.5.3", title:"Die Formel von Cauchy (verallg. MWS)", src:"skriptsu127.html", body:{
 kernidee: String.raw`Der Mittelwertsatz für <b>zwei Funktionen gleichzeitig</b> — er vergleicht ihre Änderungsraten. Die Grundlage für l'Hospital.`,
 satz: String.raw`\(f,g\) stetig auf \([a,b]\), differenzierbar auf \((a,b)\), \(g'\neq0\). Dann gibt es \(\xi\in(a,b)\) mit\[\frac{f(b)-f(a)}{g(b)-g(a)}=\frac{f'(\xi)}{g'(\xi)}.\]`,
 zusammenhang: String.raw`Mit \(g(x)=x\) wird daraus der gewöhnliche MWS (3.5.4). Direkter Beweismotor der <b>Regel von l'Hospital</b> (3.12).`,
 beispiel: String.raw`Der Quotient der beiden Sekantensteigungen (von \(f\) und \(g\)) wird an einer gemeinsamen Stelle \(\xi\) vom Quotient der Tangentensteigungen getroffen.`,
 falle: String.raw`Es ist <b>nicht</b> „MWS für \(f\) geteilt durch MWS für \(g\)" — das gäbe zwei verschiedene Stellen. Cauchy garantiert <b>ein gemeinsames</b> \(\xi\).`
}},
       {id:"3.5.4", title:"Die Formel von Lagrange (MWS)", src:"skriptsu128.html", body:{
 kernidee: String.raw`Zwischen \(a\) und \(b\) gibt es eine Stelle, an der die <b>Tangente parallel zur Sekante</b> ist — die momentane Änderungsrate trifft irgendwo die durchschnittliche.`,
 satz: String.raw`\(f\) stetig auf \([a,b]\), differenzierbar auf \((a,b)\). Dann gibt es \(\xi\in(a,b)\) mit\[f'(\xi)=\frac{f(b)-f(a)}{b-a}.\]`,
 zusammenhang: String.raw`<b>Das Arbeitspferd</b> der Differentialrechnung: liefert Monotonie (\(f'>0\Rightarrow\) streng wachsend, 3.10.2), Konstanz (\(f'\equiv0\Rightarrow f\) konstant), Schranken und das Taylor-Restglied.`,
 beispiel: String.raw`\(f(x)=x^{2}\) auf \([0,2]\): Sekantensteigung \(\frac{4-0}{2-0}=2\). Aus \(f'(\xi)=2\xi=2\) folgt \(\xi=1\). ✓`,
 falle: String.raw`Der Satz sichert die <b>Existenz</b> von \(\xi\), gibt aber <b>keine Formel</b> dafür — man weiß nur, <i>dass</i> es existiert. Voraussetzungen genau einhalten (stetig auf \([a,b]\), differenzierbar auf \((a,b)\)).`
}}]},

    {id:"3.10", t:"Monotonie und Extremwerte von Funktionen", src:"skriptse37.html", topics:[
       ["3.10.1","Konstante Funktionen","skriptsu139.html"],
       {id:"3.10.2", title:"Monotone Funktionen", src:"skriptsu140.html", body:{
 kernidee: String.raw`<b>Vorzeichen von \(f'\) = Wachstumsrichtung.</b> \(f'>0\) heißt steigend, \(f'<0\) fallend. Das ist das Monotonie-Kriterium.`,
 satz: String.raw`Auf einem Intervall gilt\[f'\ge0\iff f\ \text{monoton wachsend},\qquad f'>0\Rightarrow f\ \text{streng wachsend}\](analog für fallend). Beweis über den Mittelwertsatz.`,
 zusammenhang: String.raw`Direkte Folge des Mittelwertsatzes (3.5.4). Grundlage der Extremwert-Bestimmung (3.10.3, Vorzeichenwechsel von \(f'\)) und der Kurvendiskussion (3.13).`,
 beispiel: String.raw`\(f(x)=x^{3}\): \(f'(x)=3x^{2}\ge0\) überall \(\Rightarrow\) streng wachsend, obwohl \(f'(0)=0\).`,
 falle: String.raw`\(f'>0\) ist <b>hinreichend, nicht notwendig</b> für streng wachsend (siehe \(x^{3}\)). „Streng wachsend" verträgt einzelne Nullstellen von \(f'\).`
}},
       {id:"3.10.3", title:"Extremwerte einer Funktion", src:"skriptsu141.html", body:{
 kernidee: String.raw`Extrema findet man in zwei Schritten: <b>Kandidaten</b> über \(f'=0\) (Fermat), dann <b>entscheiden</b> über den Vorzeichenwechsel von \(f'\) oder das Vorzeichen von \(f''\).`,
 satz: String.raw`Notwendig: \(f'(x_0)=0\). Hinreichend:\[f'(x_0)=0,\ f''(x_0)>0\ \Rightarrow\ \text{lok. Minimum},\]\[f'(x_0)=0,\ f''(x_0)<0\ \Rightarrow\ \text{lok. Maximum}.\]`,
 zusammenhang: String.raw`Kombiniert Fermat (3.5.1), Monotonie (3.10.2) und Krümmung (3.11). Bei \(f''(x_0)=0\) entscheidet der Vorzeichenwechsel von \(f'\) (oder die nächste nicht-verschwindende Ableitung).`,
 beispiel: String.raw`\(f(x)=x^{3}-3x\): \(f'(x)=3x^{2}-3=0\Rightarrow x=\pm1\). Mit \(f''(x)=6x\): \(f''(1)=6>0\) (Min), \(f''(-1)=-6<0\) (Max).`,
 falle: String.raw`\(f''(x_0)=0\) bedeutet <b>nicht</b> automatisch „kein Extremum": \(f(x)=x^{4}\) hat \(f'(0)=f''(0)=0\) und trotzdem ein Minimum. Dann Vorzeichenwechsel von \(f'\) prüfen.`
}}]},
    {id:"3.11", t:"Konvexe und konkave Funktionen", src:"skriptse38.html", topics:[
       ["3.11.1","Definition und äquivalente Beschreibungen","skriptsu142.html"],
       ["3.11.2","Differenzierbare konvexe/konkave Funktionen","skriptsu143.html"],
       {id:"3.11.3", title:"Wendepunkte", src:"skriptsu144.html", body:{
 kernidee: String.raw`Ein <b>Wendepunkt</b> ist, wo die Krümmung ihr Vorzeichen wechselt — von Links- auf Rechtskurve (konvex \(\leftrightarrow\) konkav).`,
 satz: String.raw`Notwendig: \(f''(x_0)=0\). Hinreichend: \(f''(x_0)=0\) und \(f''\) wechselt dort das Vorzeichen (z. B. wenn \(f^{(3)}(x_0)\neq0\)).`,
 zusammenhang: String.raw`\(f''\) verhält sich zur Konvexität (3.11) wie \(f'\) zur Monotonie (3.10). Ein Wendepunkt ist ein Extremum von \(f'\) — die steilste/flachste Stelle.`,
 beispiel: String.raw`\(f(x)=x^{3}\): \(f''(x)=6x=0\) bei \(x=0\); \(f''\) wechselt von \(-\) nach \(+\) \(\Rightarrow\) Wendepunkt in \(0\).`,
 falle: String.raw`\(f''(x_0)=0\) allein reicht nicht: \(f(x)=x^{4}\) hat \(f''(0)=0\), aber <b>keinen</b> Wendepunkt (Krümmung wechselt nicht). Der Vorzeichenwechsel ist entscheidend.`
}}]},
    {id:"3.12", t:"Unbestimmtheiten 0/0 und ∞/∞ (l’Hospital)", src:"skriptse39.html", topics:[
       {id:"3.12.1", title:"Unbestimmtheiten vom Typ 0/0", src:"skriptsu145.html", body:{
 kernidee: String.raw`Bei \(\frac{0}{0}\) darf man <b>Zähler und Nenner getrennt ableiten</b> und den Grenzwert erneut versuchen — er bleibt gleich (falls der neue existiert). Das ist die Regel von l'Hospital.`,
 satz: String.raw`Ist \(\lim\frac{f}{g}\) vom Typ \(\frac{0}{0}\) und existiert \(\lim\frac{f'}{g'}\), so\[\lim\frac{f(x)}{g(x)}=\lim\frac{f'(x)}{g'(x)}.\]`,
 zusammenhang: String.raw`Bewiesen über den verallgemeinerten Mittelwertsatz von <b>Cauchy</b> (3.5.3). Erklärt viele Standardgrenzwerte (siehe Spickzettel „Grenzwerte").`,
 beispiel: String.raw`\[\lim_{x\to0}\frac{\sin x}{x}=\lim_{x\to0}\frac{\cos x}{1}=1\quad(\text{Typ }0/0).\]`,
 falle: String.raw`<b>Nur bei \(\frac{0}{0}\) oder \(\frac{\infty}{\infty}\) anwenden</b> — vorher den Typ prüfen! Und es ist \(\frac{f'}{g'}\), <b>nicht</b> die Quotientenregel \(\left(\frac{f}{g}\right)'\).`
}},
       ["3.12.2","Unbestimmtheiten vom Typ ∞/∞","skriptsu146.html"]]},

const byId = new Map();

CH.forEach(ch=>{
  byId.set(ch.id, ch);
  ch.kind="chapter"; ch.parent=null;
  ch.sections.forEach(se=>{

      <p class="sub" style="margin-top:8px">Merke: <b>exp \(\gg\) Potenz \(\gg\) Logarithmus</b>.</p>
      <h3 style="margin-top:8px">Beispiele</h3>
      ${exBox(String.raw`<p>Über die \(\cos\)-Reihe:</p>\[\frac{1-\cos x}{x^{2}}=\frac{\frac{x^{2}}{2}-\frac{x^{4}}{24}+\cdots}{x^{2}}=\frac{1}{2}-\frac{x^{2}}{24}+\cdots\to\frac{1}{2}\quad(x\to0)\]`)}
      ${exBox(String.raw`<p>Über die \(e^{x}\)-Reihe:</p>\[\frac{e^{x}-1}{x}=\frac{x+\frac{x^{2}}{2}+\cdots}{x}=1+\frac{x}{2}+\cdots\to 1\quad(x\to0)\]`)}
    </div>
  </div>`; }

/* Referenz-Seiten (eigene Ergänzungen, Route #/ref/<key>) */
function konvSummenHtml(){ return String.raw`
  <p class="sub">Für eine Reihe \(\sum_{k} a_k\). Test-Reihenfolge: erst \(a_k\to0\)? dann Quotient/Wurzel, sonst Vergleich.</p>
  <div class="twocol">
    <div class="refblock">
      <h3>Kriterien</h3>
      <table class="reftable">
        <tr><td><b>Notwendig:</b> \(a_k\to0\)</td><td class="cond">sonst divergent</td></tr>
        <tr><td><b>Absolut:</b> \(\sum|a_k|\) konv. \(\Rightarrow\sum a_k\) konv.</td></tr>
        <tr><td><b>Majorante:</b> \(|a_k|\le b_k,\ \sum b_k\) konv. \(\Rightarrow\) konv.</td></tr>
        <tr><td><b>Minorante:</b> \(0\le c_k\le a_k,\ \sum c_k\) div. \(\Rightarrow\) div.</td></tr>
        <tr><td><b>Quotient:</b> \(L=\lim\left|\frac{a_{k+1}}{a_k}\right|\)</td><td class="cond">\(L<1\) konv, \(L>1\) div</td></tr>
        <tr><td><b>Wurzel:</b> \(L=\limsup_{k}\sqrt[k]{|a_k|}\)</td><td class="cond">\(L<1\) konv, \(L>1\) div</td></tr>
      </table>
      <p class="sub" style="margin-top:8px">Bei \(L=1\): keine Aussage. Das Wurzel- ist „stärker" als das Quotientenkriterium.</p>
    </div>
    <div class="refblock">
      <h3>Spezielle Kriterien</h3>
      <table class="reftable">
        <tr><td><b>Leibniz</b> (alternierend): \(a_k=(-1)^{k}b_k\), \(b_k\ge0\) monoton \(\downarrow 0\) \(\Rightarrow\) konv.</td><td class="cond">\(|R_n|\le b_{n+1}\)</td></tr>
        <tr><td><b>Integralkriterium:</b> \(f\ge0\) fallend, \(a_k=f(k)\): \(\sum f(k)\) und \(\int_1^{\infty}\!f\) gleiches Verhalten.</td></tr>
        <tr><td><b>p-Reihe:</b> \(\sum \frac{1}{k^{p}}\) konv. \(\Leftrightarrow p>1\)</td></tr>
        <tr><td><b>Geometrisch:</b> \(\sum q^{k}\) konv. \(\Leftrightarrow |q|<1\)</td></tr>
      </table>
      <h3 style="margin-top:16px">Beispiele</h3>
      ${exBox(String.raw`<p>Quotient für \(\sum \frac{k}{2^{k}}\):</p>\[\frac{a_{k+1}}{a_k}=\frac{k+1}{2k}\to\frac{1}{2}<1\ \Rightarrow\ \text{konvergent.}\]`)}
      ${exBox(String.raw`<p>Wurzel für \(\sum\big(\tfrac{k}{k+1}\big)^{k^{2}}\):</p>\[\sqrt[k]{a_k}=\Big(\frac{k}{k+1}\Big)^{k}=\Big(1+\tfrac{1}{k}\Big)^{-k}\to\frac{1}{e}<1\ \Rightarrow\ \text{konvergent.}\]`)}
      ${exBox(String.raw`<p>Leibniz für \(\sum\frac{(-1)^{k+1}}{k}\):</p><p>\(b_k=\tfrac1k\downarrow0\Rightarrow\) konvergent (bedingt, \(=\ln 2\)); \(\sum\tfrac1k\) selbst divergiert (harmonisch).</p>`)}
    </div>
  </div>
  <div class="refblock">
    <h3>Summierbarkeit divergenter Reihen</h3>
    <p class="sub">Divergente Reihen bekommen über gemittelte/geglättete Grenzwerte einen sinnvollen „Wert". Beide Verfahren sind <b>regulär</b>: eine schon konvergente Reihe behält ihren Wert.</p>
    <table class="reftable">
      <tr><td><b>Cesàro (C,1)</b> — über die <b>Partialsummen</b>: bilde \(s_n=a_0+\cdots+a_n\), dann ihr Mittel \(\displaystyle\sigma_n=\frac{s_0+s_1+\cdots+s_n}{n+1}\). Cesàro-Summe \(=\lim_{n\to\infty}\sigma_n\).</td></tr>
      <tr><td><b>Abel / Poisson-Abel</b> — über die <b>Potenzreihe</b>: bilde \(f(x)=\sum_k a_k x^{k}\) (\(|x|<1\)), dann lasse \(x\to1^{-}\). Abel-Summe \(=\lim_{x\to1^{-}}f(x)\).</td></tr>
      <tr><td><b>Hierarchie:</b> konvergent \(\Rightarrow\) Cesàro \(\Rightarrow\) Abel (jeweils derselbe Wert). Also: <b>aus Cesàro folgt Abel</b> (Satz von Frobenius) — Abel ist das stärkste Verfahren. Rückrichtung nur mit Tauber-Bedingung (z. B. \(a_k\to0\)).</td></tr>
    </table>
    <h3 style="margin-top:12px">Beispiel: Grandi-Reihe \(1-1+1-1+\cdots\)</h3>
    ${exBox(String.raw`<p>Partialsummen springen: \(s_0=1,\ s_1=0,\ s_2=1,\ s_3=0,\dots\) — <b>divergent</b>.</p><p><b>Cesàro</b> (Mittel der \(s_n\)):</p>\[\sigma_0=1,\ \sigma_1=\tfrac12,\ \sigma_2=\tfrac23,\ \sigma_3=\tfrac12,\ \sigma_4=\tfrac35,\ \dots\ \longrightarrow\ \tfrac12.\]<p><b>Abel</b> (Potenzreihe, dann \(x\to1^{-}\)):</p>\[\sum_{k=0}^{\infty}(-1)^{k}x^{k}=\frac{1}{1+x}\ \longrightarrow\ \frac{1}{2}\quad(x\to1^{-}).\]<p>Beide liefern denselben Wert \(\tfrac12\) — passt zur Hierarchie.</p>`)}
    ${exBox(String.raw`<p>\(1-2+3-4+\cdots=\sum_k(-1)^{k}(k+1)\): Cesàro schafft es <i>nicht</i> (die Mittel \(\sigma_n\) konvergieren nicht), aber <b>Abel</b> schon:</p>\[\sum_{k=0}^{\infty}(-1)^{k}(k+1)x^{k}=\frac{1}{(1+x)^{2}}\ \longrightarrow\ \frac{1}{4}\quad(x\to1^{-}).\]<p>Schön sichtbar: Abel summiert „mehr" als Cesàro.</p>`)}
  </div>`; }

function konvIntegraleHtml(){ return String.raw`
  <p class="sub">Uneigentliche Integrale: unbeschränktes Intervall \(\int_a^{\infty}\) oder Singularität am Rand.</p>
  <div class="twocol">
    <div class="refblock">
      <h3>Definition & p-Test</h3>
      <table class="reftable">
        <tr><td>\(\displaystyle\int_a^{\infty}\!f=\lim_{R\to\infty}\int_a^{R}\!f\)</td></tr>
        <tr><td>Singularität bei \(b\): \(\displaystyle\int_a^{b}\!f=\lim_{\varepsilon\to0^{+}}\int_a^{b-\varepsilon}\!f\)</td></tr>
        <tr><td>\(\displaystyle\int_1^{\infty}\frac{dx}{x^{p}}\) konv. \(\Leftrightarrow p>1\)</td></tr>
        <tr><td>\(\displaystyle\int_0^{1}\frac{dx}{x^{p}}\) konv. \(\Leftrightarrow p<1\)</td></tr>
      </table>
      <h3 style="margin-top:16px">Kriterien</h3>
      <table class="reftable">
        <tr><td><b>Majorante:</b> \(0\le f\le g,\ \int g\) konv. \(\Rightarrow\int f\) konv.</td></tr>
        <tr><td><b>Grenzwertvergleich:</b> \(f,g>0,\ \frac{f}{g}\to c\in(0,\infty)\Rightarrow\) gleiches Verhalten.</td></tr>
        <tr><td><b>Absolut:</b> \(\int|f|\) konv. \(\Rightarrow\int f\) konv.</td></tr>
      </table>
    </div>
    <div class="refblock">
      <h3>Cauchy-Hauptwert (v.p.)</h3>
      <p class="sub">Symmetrischer Grenzwert — kann existieren, obwohl das Integral divergiert.</p>
      <table class="reftable">
        <tr><td>\(\displaystyle \mathrm{v.p.}\!\int_{-\infty}^{\infty}\!f=\lim_{R\to\infty}\int_{-R}^{R}\!f\)</td></tr>
        <tr><td>Pol bei \(c\in(a,b)\): \(\displaystyle \mathrm{v.p.}\!\int_a^{b}\!f=\lim_{\varepsilon\to0^{+}}\Big(\int_a^{c-\varepsilon}\!+\int_{c+\varepsilon}^{b}\Big)f\)</td></tr>
      </table>
      <h3 style="margin-top:16px">Beispiele</h3>
      ${exBox(String.raw`<p>\(p\)-Test:</p>\[\int_1^{\infty}\frac{dx}{x^{2}}=1\ (\text{konv.}),\qquad \int_1^{\infty}\frac{dx}{x}=\infty\ (\text{div.})\]\[\int_0^{1}\frac{dx}{\sqrt{x}}=2\ (\text{konv., }p=\tfrac12<1)\]`)}
      ${exBox(String.raw`<p>Hauptwert von \(\int_{-1}^{1}\frac{dx}{x}\) (Pol bei \(0\)):</p>\[\mathrm{v.p.}\!\int_{-1}^{1}\frac{dx}{x}=\lim_{\varepsilon\to0^{+}}\Big(\underbrace{\int_{-1}^{-\varepsilon}}_{\ln\varepsilon}+\underbrace{\int_{\varepsilon}^{1}}_{-\ln\varepsilon}\Big)\frac{dx}{x}=0\]<p>Das gewöhnliche Integral divergiert — nur der Hauptwert ist \(0\).</p>`)}
    </div>
  </div>`; }

function potenzreihenHtml(){ return String.raw`
  <p class="sub">Potenzreihe \(\displaystyle\sum_{k=0}^{\infty} a_k (x-x_0)^{k}\) um den Entwicklungspunkt \(x_0\).</p>
  <div class="twocol">
    <div class="refblock">
      <h3>Konvergenzradius \(R\)</h3>
      <table class="reftable">
        <tr><td><b>Cauchy-Hadamard:</b> \(\displaystyle \frac{1}{R}=\limsup_{k}\sqrt[k]{|a_k|}\)</td></tr>
        <tr><td><b>Quotienten-Form:</b> \(\displaystyle R=\lim_{k}\left|\frac{a_k}{a_{k+1}}\right|\) (falls existent)</td></tr>
        <tr><td>\(|x-x_0|<R\): absolut konvergent</td><td class="cond">innen</td></tr>
        <tr><td>\(|x-x_0|>R\): divergent</td><td class="cond">außen</td></tr>
        <tr><td>\(|x-x_0|=R\): Randverhalten <b>einzeln</b> prüfen</td></tr>
      </table>
      <p class="sub" style="margin-top:8px">Konvention: \(\tfrac{1}{0}=\infty,\ \tfrac{1}{\infty}=0\).</p>
    </div>
    <div class="refblock">
      <h3>Eigenschaften & Beispiele</h3>
      <table class="reftable">
        <tr><td>Innerhalb \((x_0-R,\,x_0+R)\) darf man <b>gliedweise differenzieren/integrieren</b> (gleicher Radius \(R\)); die Summe ist dort beliebig oft differenzierbar.</td></tr>
      </table>
      <h3 style="margin-top:12px">Beispiele</h3>
      ${exBox(String.raw`<p>\(\sum \frac{x^{k}}{k!}\) (Quotienten-Form):</p>\[R=\lim_k\left|\frac{a_k}{a_{k+1}}\right|=\lim_k (k+1)=\infty\quad(\,=e^{x}\,).\]`)}
      ${exBox(String.raw`<p>\(\sum \frac{x^{k}}{k}\): \(R=1\), aber der Rand ist verschieden:</p>\[x=-1:\ \sum\frac{(-1)^{k}}{k}\ \text{konv. (Leibniz)};\qquad x=1:\ \sum\frac{1}{k}\ \text{div. (harmonisch)}.\]`)}
      ${exBox(String.raw`<p>Extremfälle:</p>\[\sum k!\,x^{k}:\ R=0\ (\text{nur }x=0);\qquad \sum \frac{x^{k}}{k^{2}}:\ R=1,\ \text{Rand konvergiert }(p=2).\]`)}
    </div>
  </div>`; }

function entwickelnHtml(){ return String.raw`
  <p class="sub">Eine glatte Funktion lokal durch Polynome/Potenzreihen ersetzen — samt Fehler (Restglied).</p>
  <div class="twocol">
    <div class="refblock">
      <h3>Taylor-Polynom & -Reihe</h3>
      <table class="reftable">
        <tr><td>\(\displaystyle T_n(x)=\sum_{k=0}^{n}\frac{f^{(k)}(x_0)}{k!}(x-x_0)^{k}\)</td></tr>
        <tr><td>Taylorreihe: \(n\to\infty\); um \(x_0=0\) heißt sie Maclaurin-Reihe.</td></tr>
      </table>
      <h3 style="margin-top:14px">Restglied \(R_n=f-T_n\)</h3>
      <table class="reftable">
        <tr><td><b>Lagrange:</b> \(\displaystyle R_n(x)=\frac{f^{(n+1)}(\xi)}{(n+1)!}(x-x_0)^{n+1}\)</td><td class="cond">\(\xi\) zw. \(x_0,x\)</td></tr>
        <tr><td><b>Integral:</b> \(\displaystyle R_n(x)=\frac{1}{n!}\int_{x_0}^{x}f^{(n+1)}(t)\,(x-t)^{n}\,dt\)</td></tr>
      </table>
      ${exBox(String.raw`<p>\(\sin x\) um \(0\): \(T_3(x)=x-\frac{x^{3}}{6}\).</p><p>Da bei \(\sin\) der \(x^{4}\)-Term fehlt (\(T_3=T_4\)), gilt sogar</p>\[|R_3(x)|\le\frac{|x|^{5}}{120}\quad(\text{denn }|f^{(5)}|=|\cos|\le1).\]`)}
    </div>
    <div class="refblock">
      <h3>Klassische Reihen (um \(0\))</h3>
      <table class="reftable">
        <tr><td>\(\displaystyle e^{x}=\sum\frac{x^{k}}{k!}\)</td><td class="cond">\(\forall x\)</td></tr>
        <tr><td>\(\displaystyle\frac{1}{1-x}=\sum x^{k}\)</td><td class="cond">\(|x|<1\)</td></tr>
        <tr><td>\(\displaystyle\ln(1+x)=\sum\frac{(-1)^{k+1}}{k}x^{k}\)</td><td class="cond">\(-1<x\le1\)</td></tr>
        <tr><td>\(\displaystyle\arctan x=\sum\frac{(-1)^{k}}{2k+1}x^{2k+1}\)</td><td class="cond">\(|x|\le1\)</td></tr>
        <tr><td>\(\displaystyle(1+x)^{\alpha}=\sum\binom{\alpha}{k}x^{k}\)</td><td class="cond">\(|x|<1\)</td></tr>
      </table>
      <h3 style="margin-top:14px">Trick: als Potenzreihe schreiben</h3>
      <p class="sub">Aus der geometrischen Reihe per <b>Substitution</b> und gliedweisem <b>Ableiten/Integrieren</b>.</p>
      ${exBox(String.raw`<p>\(\frac{1}{1+x^{2}}\) via \(x\to-x^{2}\) in \(\frac{1}{1-x}\):</p>\[\frac{1}{1+x^{2}}=\sum_{k=0}^{\infty}(-1)^{k}x^{2k}.\]<p>Gliedweise integrieren \(\Rightarrow \arctan x=\sum\frac{(-1)^{k}}{2k+1}x^{2k+1}\).</p>`)}
      ${exBox(String.raw`<p>Ableiten von \(\frac{1}{1-x}=\sum x^{k}\):</p>\[\frac{1}{(1-x)^{2}}=\sum_{k=0}^{\infty}(k+1)x^{k}.\]`)}
    </div>
  </div>
  <div class="refblock">
    <h3>Lagrange-Interpolation</h3>
    <p class="sub">Eindeutiges Polynom vom Grad \(\le n\) durch \(n+1\) Punkte \((x_i,y_i)\).</p>
    <table class="reftable">
      <tr><td>\(\displaystyle p(x)=\sum_{i=0}^{n} y_i\,L_i(x),\qquad L_i(x)=\prod_{j\neq i}\frac{x-x_j}{x_i-x_j}\)</td></tr>
      <tr><td>\(L_i(x_i)=1,\quad L_i(x_j)=0\ (j\neq i)\)</td><td class="cond">Basis-Eigenschaft</td></tr>
    </table>
    ${exBox(String.raw`<p>Polynom durch \((0,1),(1,3),(2,7)\):</p>\[p(x)=1\cdot\frac{(x-1)(x-2)}{2}+3\cdot\frac{x(x-2)}{-1}+7\cdot\frac{x(x-1)}{2}=x^{2}+x+1.\]<p>Check: \(p(0)=1,\ p(1)=3,\ p(2)=7\). ✓</p>`)}
  </div>`; }

function vertauschenHtml(){ return String.raw`
  <p class="sub">Wann darf man \(\lim\) mit \(\lim\), \(\int\) oder \(\frac{d}{dx}\) vertauschen? Kurz: bei <b>gleichmäßiger</b> Konvergenz. Die Idee: nicht nur jeder Punkt für sich, sondern der <b>ganze Graph</b> muss sich der Grenzfunktion nähern.</p>
  <div class="refblock">
    <h3>So prüft man gleichmäßige Konvergenz</h3>
    <table class="reftable">
      <tr><td>1. <b>Grenzfunktion</b> punktweise bestimmen: \(f(x)=\lim_{n\to\infty}f_n(x)\) (für jedes \(x\) einzeln).</td></tr>
      <tr><td>2. <b>Fehlerfunktion</b> bilden: \(e_n(x)=f_n(x)-f(x)\).</td></tr>
      <tr><td>3. <b>Supremum</b> über \(x\) nehmen: \(M_n=\sup_{x\in D}|e_n(x)|\) (Maximum oft über \(e_n'(x)=0\) suchen).</td></tr>
      <tr><td>4. Ist \(M_n\to0\)? &nbsp;<b>Ja</b> \(\Rightarrow\) gleichmäßig. &nbsp;<b>Nein</b> \(\Rightarrow\) nur punktweise.</td></tr>
    </table>
    <p class="sub" style="margin-top:6px">Bild: gleichmäßig heißt, ab einem \(N\) liegt der ganze Graph von \(f_n\) im \(\varepsilon\)-Schlauch um \(f\) — <b>ein</b> \(N(\varepsilon)\) für alle \(x\). Punktweise darf \(N=N(\varepsilon,x)\) von \(x\) abhängen.</p>
  </div>
  <div class="twocol">
    <div class="refblock">
      <h3>Punktweise vs. gleichmäßig</h3>
      <table class="reftable">
        <tr><td><b>Punktweise:</b> \(\forall x:\ f_n(x)\to f(x)\). Das \(N=N(\varepsilon,x)\) darf von \(x\) abhängen.</td></tr>
        <tr><td><b>Gleichmäßig:</b> \(\displaystyle\sup_{x\in D}|f_n(x)-f(x)|\to0\). Ein \(N(\varepsilon)\) für <b>alle</b> \(x\).</td></tr>
        <tr><td>gleichmäßig \(\Rightarrow\) punktweise (nicht umgekehrt).</td></tr>
        <tr><td><b>Weierstraß-M-Test</b> (Reihen): \(|f_k|\le M_k,\ \sum M_k<\infty \Rightarrow \sum f_k\) gleichm. konv.</td></tr>
      </table>
    </div>
    <div class="refblock">
      <h3>Was gleichmäßige Konvergenz erlaubt</h3>
      <table class="reftable">
        <tr><td><b>\(\lim\)–\(\lim\) (Stetigkeit):</b> \(\displaystyle\lim_{x\to x_0}\lim_{n}f_n=\lim_{n}\lim_{x\to x_0}f_n\)</td><td class="cond">\(f_n\) stetig + <b>gleichm.</b></td></tr>
        <tr><td><b>\(\lim\)–\(\int\):</b> \(\displaystyle\lim_{n}\int_a^b f_n=\int_a^b\lim_{n}f_n\)</td><td class="cond"><b>gleichm.</b> auf \([a,b]\)</td></tr>
        <tr><td><b>\(\lim\)–\(\tfrac{d}{dx}\):</b> \(\big(\lim f_n\big)'=\lim f_n'\)</td><td class="cond"><b>\(f_n'\) gleichm.</b> + \(f_n(x_0)\) konv.</td></tr>
      </table>
    </div>
  </div>
  <div class="refblock">
    <h3>Gegenbeispiele (nur punktweise!)</h3>
    ${exBox(String.raw`<p>\(f_n(x)=x^{n}\) auf \([0,1]\). <b>1. Grenzfunktion:</b></p>\[f(x)=\lim_{n}x^{n}=\begin{cases}0,&0\le x<1\\1,&x=1\end{cases}\]<p><b>2.–3. Fehler-Supremum:</b> \(\displaystyle\sup_{0\le x<1}|x^{n}-0|=1\) (Wert wird für \(x\to1\) erreicht).</p><p><b>4.</b> \(M_n=1\not\to0\) \(\Rightarrow\) <b>nur punktweise</b>. Deshalb darf der Grenzwert unstetig sein, obwohl alle \(f_n\) stetig sind.</p>`)}
    ${exBox(String.raw`<p>Integral nicht vertauschbar: \(f_n=n\) auf \((0,\tfrac1n)\), sonst \(0\).</p>\[\int_0^1 f_n\,dx=1\ \text{für alle }n,\quad\text{aber}\quad f_n(x)\to0\ \text{punktweise}\]\[\Rightarrow\ \lim_n\int_0^1 f_n\,dx=1\neq0=\int_0^1\lim_n f_n\,dx.\]`)}
  </div>`; }

function kurvenHtml(){ return String.raw`
  <p class="sub">Bogenlänge \(L\) und Krümmung \(\kappa\) je nach Darstellung. \(\kappa\) misst, wie schnell sich die Richtung dreht; \(\rho=1/\kappa\) ist der Krümmungsradius.</p>
  <div class="twocol">
    <div class="refblock">
      <h3>Bogenlänge \(L\)</h3>
      <table class="reftable">
        <tr><td>Graph \(y=f(x),\ x\in[a,b]\): \(\displaystyle L=\int_a^b\sqrt{1+f'(x)^{2}}\,dx\)</td></tr>
        <tr><td>Parametrisch \((x(t),y(t))\): \(\displaystyle L=\int_a^b\sqrt{\dot x^{2}+\dot y^{2}}\,dt\)</td></tr>
        <tr><td>Polar \(r=r(\varphi),\ \varphi\in[\alpha,\beta]\): \(\displaystyle L=\int_\alpha^\beta\sqrt{r^{2}+r'^{2}}\,d\varphi\)</td></tr>
      </table>
    </div>
    <div class="refblock">
      <h3>Krümmung \(\kappa\)</h3>
      <table class="reftable">
        <tr><td>Graph \(y=f(x)\): \(\displaystyle \kappa=\frac{|f''|}{\big(1+f'^{2}\big)^{3/2}}\)</td></tr>
        <tr><td>Parametrisch: \(\displaystyle \kappa=\frac{|\dot x\ddot y-\dot y\ddot x|}{\big(\dot x^{2}+\dot y^{2}\big)^{3/2}}\)</td></tr>
        <tr><td>Polar \(r(\varphi)\): \(\displaystyle \kappa=\frac{\big|r^{2}+2r'^{2}-r\,r''\big|}{\big(r^{2}+r'^{2}\big)^{3/2}}\)</td></tr>
      </table>
      <p class="sub" style="margin-top:8px">Krümmungsradius \(\rho=\dfrac{1}{\kappa}\).</p>
    </div>
  </div>
  <div class="refblock">
    <h3>Vektorielle Schreibweise</h3>
    <p class="sub">Für eine Kurve \(\mathbf r(t)\) (Ortsvektor); \(\times\) ist das Kreuzprodukt.</p>
    <table class="reftable">
      <tr><td>Krümmung: \(\displaystyle \kappa(t)=\frac{\|\mathbf r'(t)\times\mathbf r''(t)\|}{\|\mathbf r'(t)\|^{3}}\)</td><td class="cond">in \(\mathbb R^{2},\mathbb R^{3}\)</td></tr>
      <tr><td>Einheits-Tangente: \(\displaystyle \mathbf T(t)=\frac{\mathbf r'(t)}{\|\mathbf r'(t)\|}\)</td></tr>
      <tr><td>Hauptnormale \(\displaystyle \mathbf N=\frac{\mathbf T'}{\|\mathbf T'\|}\); außerdem \(\displaystyle \kappa=\frac{\|\mathbf T'(t)\|}{\|\mathbf r'(t)\|}=\Big\|\frac{d\mathbf T}{ds}\Big\|\)</td></tr>
    </table>
    <p class="sub" style="margin-top:6px">In \(\mathbb R^{2}\) ist \(\mathbf r'\times\mathbf r''=\dot x\ddot y-\dot y\ddot x\) (Skalar) — daraus wird direkt die Parameter-Formel oben.</p>
  </div>
  <div class="refblock">
    <h3>Beispiele</h3>
    ${exBox(String.raw`<p>Kreis \(r=R\) (polar), \(r'=0\):</p>\[L=\int_0^{2\pi}\sqrt{R^{2}}\,d\varphi=2\pi R,\qquad \kappa=\frac{|R^{2}+0-0|}{(R^{2})^{3/2}}=\frac{1}{R}.\]<p>Also \(\rho=R\) — genau der Kreisradius. ✓</p>`)}
    ${exBox(String.raw`<p>Parabel \(y=x^{2}\): \(f'=2x,\ f''=2\).</p>\[\kappa(x)=\frac{2}{(1+4x^{2})^{3/2}};\qquad \kappa(0)=2,\ \rho(0)=\tfrac12.\]<p>Im Scheitel am stärksten gekrümmt, außen zunehmend flacher.</p>`)}
  </div>`; }

function diffHtml(){ return String.raw`
  <p class="sub">Differentialrechnung mehrerer Variablen: Ableitungen, Matrizen, der \(\nabla\)-Operator. Bei den anspruchsvolleren Dingen (ab der Leibniz-Regel) je ein Beispiel.</p>
  <div class="twocol">
    <div class="refblock">
      <h3>Partielle Ableitung & Gradient</h3>
      <table class="reftable">
        <tr><td><b>Partiell:</b> \(\displaystyle \frac{\partial f}{\partial x_i}=\lim_{h\to0}\frac{f(\dots,x_i+h,\dots)-f}{h}\) — alle anderen Variablen fest halten.</td></tr>
        <tr><td><b>Gradient:</b> \(\displaystyle \nabla f=\Big(\frac{\partial f}{\partial x_1},\dots,\frac{\partial f}{\partial x_n}\Big)^{\!\top}\)</td><td class="cond">steilster Anstieg, \(\perp\) Niveaumengen</td></tr>
        <tr><td><b>Richtungsableitung:</b> \(\displaystyle \partial_{\mathbf v}f=\nabla f\cdot\mathbf v\) mit \(\|\mathbf v\|=1\)</td></tr>
        <tr><td><b>Totales Differential:</b> \(\displaystyle df=\sum_i\frac{\partial f}{\partial x_i}\,dx_i=\nabla f\cdot d\mathbf x\)</td></tr>
        <tr><td><b>Satz von Schwarz:</b> \(f\in C^2\Rightarrow \dfrac{\partial^2 f}{\partial x_i\partial x_j}=\dfrac{\partial^2 f}{\partial x_j\partial x_i}\)</td></tr>
      </table>
      ${exBox(String.raw`<p>\(f(x,y)=x^2+y^2\): \(\nabla f=(2x,2y)=2(x,y)\).</p><p>Zeigt radial nach außen (steilster Anstieg) und steht \(\perp\) auf den Kreisen \(x^2+y^2=c\) (Niveaulinien).</p>`)}
    </div>
    <div class="refblock">
      <h3>Jacobi- & Hesse-Matrix</h3>
      <table class="reftable">
        <tr><td><b>Jacobi</b> \(f:\mathbb R^{n}\to\mathbb R^{m}\): \(\displaystyle (Df)_{ij}=\frac{\partial f_i}{\partial x_j}\) (\(m\times n\)). Für \(m=1\): Zeile \(=\nabla f^{\top}\).</td></tr>
        <tr><td><b>Hesse</b> \(f:\mathbb R^{n}\to\mathbb R\): \(\displaystyle (Hf)_{ij}=\frac{\partial^2 f}{\partial x_i\partial x_j}\) (\(n\times n\), symmetrisch).</td></tr>
        <tr><td><b>Extrema</b> in \(\nabla f=0\): \(Hf\) pos. definit \(\Rightarrow\) Min, neg. definit \(\Rightarrow\) Max, indefinit \(\Rightarrow\) Sattel.</td></tr>
      </table>
      ${exBox(String.raw`<p><b>Jacobi</b> der Polarkoordinaten \(g(r,\varphi)=(r\cos\varphi,\ r\sin\varphi)\):</p>\[Dg=\begin{pmatrix}\cos\varphi & -r\sin\varphi\\ \sin\varphi & r\cos\varphi\end{pmatrix},\qquad \det Dg=r.\]<p>Genau das \(r\) in \(dx\,dy=r\,dr\,d\varphi\).</p>`)}
      ${exBox(String.raw`<p><b>Hesse</b> & Extremum für \(f(x,y)=x^2+xy+y^2\): \(\nabla f=(2x+y,\ x+2y)=0\Rightarrow(0,0)\).</p>\[Hf=\begin{pmatrix}2&1\\1&2\end{pmatrix},\quad \det=3>0,\ \operatorname{Spur}=4>0\ \Rightarrow\ \text{pos. definit}\]<p>\(\Rightarrow\) lokales <b>Minimum</b> in \((0,0)\).</p>`)}
    </div>
  </div>
  <div class="refblock">
    <h3>Der Nabla-Operator \(\nabla\)</h3>
    <p class="sub">\(\displaystyle \nabla=\Big(\frac{\partial}{\partial x_1},\dots,\frac{\partial}{\partial x_n}\Big)\) — ein <b>formaler</b> Vektor-Operator, der auf das wirkt, was rechts von ihm steht.</p>
    <div class="twocol">
      <div class="refblock">
        <table class="reftable">
          <tr><td><b>Gradient</b> (Skalar\(\to\)Vektor): \(\nabla f=\operatorname{grad}f\)</td></tr>
          <tr><td><b>Divergenz</b> (Vektor\(\to\)Skalar): \(\displaystyle \nabla\cdot\mathbf F=\operatorname{div}\mathbf F=\sum_i\frac{\partial F_i}{\partial x_i}\)</td></tr>
          <tr><td><b>Rotation</b> (Vektor\(\to\)Vektor, \(\mathbb R^3\)): \(\nabla\times\mathbf F=\operatorname{rot}\mathbf F\)</td></tr>
          <tr><td><b>Laplace:</b> \(\displaystyle \Delta f=\nabla\cdot\nabla f=\sum_i\frac{\partial^2 f}{\partial x_i^2}\)</td></tr>
        </table>
      </div>
      <div class="refblock">
        <p class="sub" style="margin-top:0"><b>Worauf achten:</b></p>
        <table class="reftable">
          <tr><td>\(\nabla\) ist <i>kein</i> echter Vektor — die Reihenfolge zählt: \(\nabla f\neq f\nabla\) (Letzteres bleibt ein Operator).</td></tr>
          <tr><td>Die Ergebnisse sind verschiedene Objekte: \(\operatorname{grad},\operatorname{rot}\) liefern Vektoren, \(\operatorname{div}\) einen Skalar.</td></tr>
          <tr><td>Nützliche Identitäten: \(\nabla\times(\nabla f)=\mathbf 0\) und \(\nabla\cdot(\nabla\times\mathbf F)=0\).</td></tr>
        </table>
      </div>
    </div>
    ${exBox(String.raw`<p>\(\mathbf F(x,y,z)=(-y,\ x,\ 0)\):</p>\[\operatorname{div}\mathbf F=\frac{\partial(-y)}{\partial x}+\frac{\partial x}{\partial y}+0=0,\qquad \operatorname{rot}\mathbf F=\nabla\times\mathbf F=(0,\,0,\,2).\]<p>Divergenzfrei, aber es „rotiert" — ein Wirbel um die \(z\)-Achse.</p>`)}
  </div>
  <div class="refblock">
    <h3>Fréchet-Ableitung</h3>
    <p class="sub">Verallgemeinert die Ableitung auf normierte Räume \(f:X\to Y\) — die Ableitung ist eine <b>lineare Abbildung</b>.</p>
    <table class="reftable">
      <tr><td>\(f\) ist in \(x\) <b>Fréchet-differenzierbar</b>, wenn es eine stetige lineare Abbildung \(A=f'(x)\) gibt mit \(\displaystyle \frac{\|f(x+h)-f(x)-Ah\|}{\|h\|}\xrightarrow[h\to0]{}0\).</td></tr>
      <tr><td>Im \(\mathbb R^n\): \(A=\) Jacobi-Matrix \(Df(x)\).</td></tr>
      <tr><td><b>Gâteaux</b> (alle Richtungsableitungen existieren) ist schwächer als Fréchet.</td></tr>
    </table>
    ${exBox(String.raw`<p>\(f(x)=\|x\|^2=x^{\top}x\) auf \(\mathbb R^n\):</p>\[f(x+h)-f(x)=2x^{\top}h+\|h\|^2.\]<p>Der lineare Teil ist \(Ah=2x^{\top}h\), der Rest \(\|h\|^2=o(\|h\|)\). Also \(f'(x)=2x^{\top}\), d. h. \(\nabla f=2x\).</p>`)}
  </div>
  <div class="refblock">
    <h3>Leibniz-Regel (Ableiten unter dem Integral)</h3>
    <table class="reftable">
      <tr><td>Feste Grenzen: \(\displaystyle \frac{d}{dt}\int_a^b f(x,t)\,dx=\int_a^b \frac{\partial f}{\partial t}(x,t)\,dx\)</td><td class="cond">\(f,\ \partial_t f\) stetig</td></tr>
      <tr><td>Variable Grenzen: \(\displaystyle \frac{d}{dt}\int_{a(t)}^{b(t)} f(x,t)\,dx=f(b,t)\,b'(t)-f(a,t)\,a'(t)+\int_{a(t)}^{b(t)}\frac{\partial f}{\partial t}\,dx\)</td></tr>
    </table>
    ${exBox(String.raw`<p>\(\displaystyle F(t)=\int_0^{t}(x^2+t)\,dx\) (variable obere Grenze):</p>\[F'(t)=\underbrace{(t^2+t)}_{f(t,t)\cdot 1}+\int_0^{t}\underbrace{1}_{\partial_t(x^2+t)}\,dx=t^2+t+t=t^2+2t.\]<p>Check direkt: \(F(t)=\tfrac{t^3}{3}+t^2\Rightarrow F'(t)=t^2+2t\). ✓</p>`)}
  </div>`; }

/* =========================================================================
   6) Mindmap-Renderer (generisch, klappbarer Horizontal-Baum)
   tree = {id,title,kcls,kind:'root'|'ch'|'leaf', children:[...], collapsed?, route?}
   onLeaf(node) -> Navigation; Knoten mit children & kind 'ch' klappen auf/zu.
   ========================================================================= */
function Mindmap(svg, tree, opts){
  opts = Object.assign({nodeW:236, nodeH:50, hGap:64, vGap:14}, opts||{});
  const NS="http://www.w3.org/2000/svg";
  let tx=0, ty=0, scale=1;
  const vp = document.createElementNS(NS,"g"); svg.appendChild(vp);

  function layout(){
    let leaf=0, maxD=0; const pos=new Map();
    (function assign(n,d){
      maxD=Math.max(maxD,d);
      const kids = (n.collapsed? [] : (n.children||[]));
      if(!kids.length){ const y=leaf*(opts.nodeH+opts.vGap)+opts.nodeH/2; leaf++; pos.set(n,{x:d*(opts.nodeW+opts.hGap),y}); return y; }
      let f=null,l=0; kids.forEach(k=>{ const ky=assign(k,d+1); if(f===null)f=ky; l=ky; });
      const y=(f+l)/2; pos.set(n,{x:d*(opts.nodeW+opts.hGap),y}); return y;
    })(tree,0);
    return {pos, w:(maxD)*(opts.nodeW+opts.hGap)+opts.nodeW, h:Math.max(leaf,1)*(opts.nodeH+opts.vGap)};
  }

  let dims;
  function render(){
    vp.textContent="";
    const {pos,w,h}=layout(); dims={w,h};
    // Links
    pos.forEach((p,n)=>{
      if(n.collapsed) return;
      (n.children||[]).forEach(c=>{
        const cp=pos.get(c); if(!cp) return;
        const x1=p.x+opts.nodeW, y1=p.y, x2=cp.x, y2=cp.y, mx=(x1+x2)/2;
        const path=document.createElementNS(NS,"path");
        path.setAttribute("d",`M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`);
        path.setAttribute("class","link "+(n.cls||""));
        vp.appendChild(path);
      });
    });
    // Nodes
    pos.forEach((p,n)=>{
      const fo=document.createElementNS(NS,"foreignObject");
      fo.setAttribute("x",p.x); fo.setAttribute("y",p.y-opts.nodeH/2);
      fo.setAttribute("width",opts.nodeW); fo.setAttribute("height",opts.nodeH);
      const div=document.createElement("div");
      let cls="node "+(n.kind==='root'?'root':'')+" "+(n.kind==='ch'?'ch '+(n.cls||''):'');
      div.className=cls.trim();
      const expander = (n.kind==='ch' && n.children&&n.children.length)? `<span class="tw">${n.collapsed?'▸':'▾'}</span>`:'';
      const badge = n.badge? `<span class="badge">${esc(n.badge)}</span>`:'';
      const dn = (n.kind==='leaf' && n.done)? `<span class="done">✓</span>`:'';
      div.innerHTML = `${badge}<span class="lbl">${esc(n.title)}</span>${dn}${expander}`;
      div.title = n.title;
      div.onclick=(ev)=>{ ev.stopPropagation();
        if(n.kind==='ch' && n.children && n.children.length){ n.collapsed=!n.collapsed; render(); }
        else if(n.route){ go(n.route); }
      };
      fo.appendChild(div); vp.appendChild(fo);
    });
    apply();
  }
  function apply(){ vp.setAttribute("transform",`translate(${tx},${ty}) scale(${scale})`); }
  function fit(){
    const r=svg.getBoundingClientRect(); const pad=28;
    const s=Math.min((r.width-2*pad)/dims.w,(r.height-2*pad)/dims.h, 1.15);
    scale=isFinite(s)&&s>0? s:1;
    tx=(r.width-dims.w*scale)/2; ty=(r.height-dims.h*scale)/2; apply();
  }
  // Pan / Zoom
  let drag=null;
  svg.addEventListener("pointerdown",e=>{ if(e.target.closest(".node"))return; drag={x:e.clientX,y:e.clientY,tx,ty}; svg.classList.add("grabbing"); svg.setPointerCapture(e.pointerId); });
  svg.addEventListener("pointermove",e=>{ if(!drag)return; tx=drag.tx+(e.clientX-drag.x); ty=drag.ty+(e.clientY-drag.y); apply(); });
  svg.addEventListener("pointerup",e=>{ drag=null; svg.classList.remove("grabbing"); });
  svg.addEventListener("pointercancel",()=>{ drag=null; svg.classList.remove("grabbing"); });
  svg.addEventListener("wheel",e=>{ e.preventDefault(); const r=svg.getBoundingClientRect();
    const mx=e.clientX-r.left, my=e.clientY-r.top; const f=e.deltaY<0?1.12:1/1.12;
    const ns=Math.max(.25,Math.min(2.2,scale*f)); const k=ns/scale;
    tx=mx-(mx-tx)*k; ty=my-(my-ty)*k; scale=ns; apply();
  },{passive:false});

  render(); requestAnimationFrame(fit);
  return {fit, zoom:f=>{ const r=svg.getBoundingClientRect(); const mx=r.width/2,my=r.height/2;
    const ns=Math.max(.25,Math.min(2.2,scale*f)); const k=ns/scale; tx=mx-(mx-tx)*k; ty=my-(my-ty)*k; scale=ns; apply(); }};
}

      <a class="card" href="#/${tp.id}">
        <span class="cn">${tp.id}</span>
        <span class="ct">${esc(tp.title)}</span>
        <span class="cf"><span class="pill ${isDone(tp.id)?'done':'todo'}">${isDone(tp.id)?'✓ verstanden':'offen'}</span></span>
      </a>`).join("") + `</div>`;
  }
  document.querySelectorAll("#vt button").forEach(b=> b.onclick=()=>{
    document.querySelectorAll("#vt button").forEach(x=>x.classList.remove("on")); b.classList.add("on");
    b.dataset.v==="map"?showMap():showList();
  });
  showMap();
}

function renderTopic(tp){
  currentMap=null;
  const ch=chapterOf(tp);
  const idx=flat.indexOf(tp);
  const prev=idx>0?flat[idx-1]:null, next=idx<flat.length-1?flat[idx+1]:null;
  const ph = '<div class="placeholder">Inhalt folgt — wird in der nächsten Runde ergänzt.</div>';
  // Falls später tp.body gesetzt ist, wird es hier verwendet; sonst Platzhalter.
  const b = tp.body || {};
  function sec(cls,icon,title,html){ return `<section class="tsec ${cls||''}"><h3>${icon} ${title}</h3><div class="body">${html||ph}</div></section>`; }

  app.innerHTML = `
    ${crumbHtml(tp)}
    <div class="titlebar">
      <span class="num" style="background:var(--${ch.key})">${tp.id}</span>
      <h1>${esc(tp.title)}</h1>
    </div>
    <div class="srcline">
      <label class="chk ${isDone(tp.id)?'on':''}" id="chk">
        <input type="checkbox" ${isDone(tp.id)?'checked':''}> verstanden
      </label>
    </div>
    <div class="topic">
      ${sec("", "💡", "Kernidee", b.kernidee)}
      ${sec("", "📐", "Definition / Satz", b.satz)}
      ${sec("linkh", "🔗", "Zusammenhang (roter Faden)", b.zusammenhang)}
      ${sec("", "✏️", "Beispiel", b.beispiel)}
      ${sec("warnh", "⚠️", "Klausur-Falle", b.falle)}
    </div>
    <div class="topnav">
      <span>${prev?`<a class="btn" href="#/${prev.id}">← ${esc(prev.id)}</a>`:''}</span>
      <span>${next?`<a class="btn" href="#/${next.id}">${esc(next.id)} →</a>`:''}</span>
    </div>`;

  const chk=document.getElementById("chk");
  chk.querySelector("input").onchange=(e)=>{ setDone(tp.id, e.target.checked); chk.classList.toggle("on", e.target.checked); };
}

/* =========================================================================
   8) Router
   ========================================================================= */
function typeset(){ if(window.renderMathInElement){ try{ renderMathInElement(app,{delimiters:[{left:"\\[",right:"\\]",display:true},{left:"\\(",right:"\\)",display:false}],throwOnError:false,errorColor:"#dc2626"}); }catch(e){} } }
function route(){
  const h=location.hash.replace(/^#\/?/,"");
  if(!h){ renderHome(); }
  else if(h.indexOf("ref/")===0){ renderRef(h.slice(4)); }
  else { const node=byId.get(h);
    if(!node || node.kind==="chapter"){ renderHome(); }
    else if(node.kind==="section"){ renderSection(node); }
    else { renderTopic(node); }
  }
  window.scrollTo(0,0);
  typeset();
}
window.addEventListener("hashchange", route);
window.addEventListener("resize", ()=>{ if(currentMap) currentMap.fit(); });

/* =========================================================================
   9) Suche
   ========================================================================= */
const searchEl=document.getElementById("search"), resEl=document.getElementById("results");
const searchIndex=[];
byId.forEach(n=>{ if(n.kind==="section"||n.kind==="topic") searchIndex.push(n); });
Object.keys(REF).forEach(k=> searchIndex.push({id:"ref/"+k, title:REF[k].title, kind:"ref"}));
let activeRes=-1, curRes=[];
function runSearch(q){
  q=q.trim().toLowerCase();
  if(!q){ resEl.classList.remove("show"); return; }
  curRes = searchIndex.filter(n=> (n.id+" "+n.title).toLowerCase().includes(q)).slice(0,12);
  activeRes=-1;
  resEl.innerHTML = curRes.length? curRes.map((n,i)=>`
     <a href="#/${n.id}" data-i="${i}"><span class="tag">${n.kind==="section"?"Abschnitt":n.kind==="ref"?"Referenz":"Thema"} ${n.kind==="ref"?"":n.id}</span><br>${esc(n.title)}</a>
   `).join("") : `<a><span class="tag">Kein Treffer</span></a>`;
  resEl.classList.add("show");
}
searchEl.addEventListener("input",()=>runSearch(searchEl.value));
searchEl.addEventListener("keydown",e=>{
  if(!resEl.classList.contains("show")||!curRes.length) return;
  if(e.key==="ArrowDown"){ e.preventDefault(); activeRes=Math.min(curRes.length-1,activeRes+1); }
  else if(e.key==="ArrowUp"){ e.preventDefault(); activeRes=Math.max(0,activeRes-1); }
  else if(e.key==="Enter"){ if(activeRes>=0){ e.preventDefault(); go(curRes[activeRes].id); searchEl.value=""; resEl.classList.remove("show"); searchEl.blur(); } return; }
  else return;
  resEl.querySelectorAll("a").forEach((a,i)=>a.classList.toggle("active",i===activeRes));
});
resEl.addEventListener("click",e=>{ const a=e.target.closest("a"); if(a&&a.dataset.i!==undefined){ searchEl.value=""; resEl.classList.remove("show"); } });
document.addEventListener("click",e=>{ if(!e.target.closest(".search")) resEl.classList.remove("show"); });

/* ---- Start ---- */
updateProgress();
route();
</script>
</body>
</html>
