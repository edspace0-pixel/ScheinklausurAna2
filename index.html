        worte: String.raw`<p>Erster Pflichtschritt vor jeder Partialbruchzerlegung: solange \(\deg P\ge\deg Q\), wird abdividiert. \(S\) integriert man trivial, nur der echt gebrochene Rest \(R/Q\) braucht PBZ.</p>`,
        beispiel: String.raw`<p>\(\dfrac{x^3}{x^2+1}\): \(x^3=x\,(x^2+1)-x\), also</p>\[\frac{x^3}{x^2+1}=x-\frac{x}{x^2+1}\ \Rightarrow\ \int\frac{x^3}{x^2+1}\,dx=\frac{x^2}{2}-\frac12\ln(x^2+1)+C.\]`,
        plus: String.raw`<p><b>Klausur-Falle:</b> PBZ direkt auf einen unecht gebrochenen Bruch anzusetzen führt in die Irre — immer zuerst Grad senken. Techniken im Spickzettel <a href="#/ref/brueche">Brüche &amp; PBZ</a>.</p>`}},
       {id:"4.4.2", title:"Schriftliches Dividieren von Polynomen", body:{
        def: String.raw`Der <b>Divisionsalgorithmus</b>: höchsten Term von \(P\) durch höchsten Term von \(Q\) teilen → nächster Term von \(S\); \(S\)-Term \(\times Q\) von \(P\) abziehen; mit dem Rest wiederholen, bis \(\deg(\text{Rest})<\deg Q\).`,
        worte: String.raw`<p>Genau wie schriftliche Division bei Zahlen, nur mit \(x\)-Potenzen. Fehlende Grade als \(0\cdot x^k\) mitschreiben, sonst verrutschen die Spalten.</p>`,
        beispiel: String.raw`<p>\((x^3-2x+1):(x-1)\):</p>\[x^3-2x+1=(x-1)(x^2+x-1)+0,\]<p>Rechenweg: \(x^3:x=x^2\), Rest \(x^2-2x\); \(x^2:x=x\), Rest \(-x+1\); \(-x:x=-1\), Rest \(0\). Also \(S=x^2+x-1\).</p>`,
        plus: String.raw`<p>Bei Division durch \((x-a)\) ist der Rest gerade \(P(a)\) (<b>Horner/Restsatz</b>) — schneller Nullstellen-Check: \(P(a)=0\Leftrightarrow(x-a)\mid P\).</p>`}},
       {id:"4.4.3", title:"Zerlegung des Restterms (Partialbruchzerlegung)", body:{
        def: String.raw`Faktorisiere \(Q\) (über \(\mathbb R\)) in Linearfaktoren \((x-a)^{m}\) und irreduzible Quadrate \((x^2+px+q)^{n}\). Dann hat der echt gebrochene Bruch die <b>eindeutige</b> Zerlegung\[\frac{R}{Q}=\sum_{a}\sum_{j=1}^{m}\frac{A_{a,j}}{(x-a)^{j}}+\sum\sum_{k=1}^{n}\frac{B_{k}x+C_{k}}{(x^2+px+q)^{k}}.\]`,
        worte: String.raw`<p>Jeder Faktor von \(Q\) bekommt seine eigenen Brüche — bei Vielfachheit \(m\) alle Potenzen \(1,\dots,m\). Reelle irreduzible Quadrate tragen einen linearen Zähler \(Bx+C\).</p>`,
        beispiel: String.raw`\[\frac{1}{x^2-1}=\frac{1}{(x-1)(x+1)}=\frac{1/2}{x-1}-\frac{1/2}{x+1}\ \Rightarrow\ \int=\frac12\ln\Big|\frac{x-1}{x+1}\Big|+C.\]`,
        plus: String.raw`<p>Jeder Grundbaustein ist integrierbar: \(\frac{1}{x-a}\to\ln\), \(\frac{1}{(x-a)^{j}}\to\) Potenz, \(\frac{Bx+C}{x^2+px+q}\to\ln+\arctan\) (quadratische Ergänzung). Vollständige Ansätze im Spickzettel <a href="#/ref/brueche">Brüche &amp; PBZ</a>.</p>`}},
       {id:"4.4.4", title:"Berechnung der Koeffizienten", body:{
        def: String.raw`Die \(A_{a,j}, B_k, C_k\) bestimmt man durch: <b>(1) Koeffizientenvergleich</b> (auf Hauptnenner bringen, Potenzen von \(x\) gleichsetzen); <b>(2) Einsetzen</b> geeigneter \(x\)-Werte (v. a. der Nullstellen); <b>(3) Zuhalte-Methode</b> für einfache Linearfaktoren: \(A_{a,1}=\dfrac{R(a)}{Q'(a)}=\lim_{x\to a}(x-a)\dfrac{R(x)}{Q(x)}\).`,
        worte: String.raw`<p>Für einfache Pole ist Zuhalten am schnellsten. Höhere Potenzen und quadratische Faktoren löst man per Koeffizientenvergleich oder cleverem Einsetzen.</p>`,
        beispiel: String.raw`<p>\(\dfrac{5x+1}{(x-1)(x+2)}=\dfrac{A}{x-1}+\dfrac{B}{x+2}\). Zuhalten:</p>\[A=\frac{5\cdot1+1}{1+2}=2,\qquad B=\frac{5(-2)+1}{-2-1}=3.\]`,
        plus: String.raw`<p>Kontrolle: Zähler wieder zusammensetzen und mit dem Original vergleichen. Mehr Tricks (Grenzwert-Trick, Ableiten für Mehrfachpole) im Spickzettel <a href="#/ref/brueche">Brüche &amp; PBZ</a>.</p>`}},
       {id:"4.4.5", title:"Die Formel von Ostrogradskij", body:{
        def: String.raw`Bei <b>mehrfachen</b> Nullstellen trennt Ostrogradskij den rationalen Teil algebraisch ab. Mit \(Q_1=\gcd(Q,Q')\) und \(Q_2=Q/Q_1\) gilt\[\int\frac{P}{Q}\,dx=\frac{P_1}{Q_1}+\int\frac{P_2}{Q_2}\,dx,\]wobei \(P_1,P_2\) Polynome mit \(\deg P_i<\deg Q_i\) sind; das <b>Restintegral hat nur noch einfache Nullstellen</b> (⇒ reiner \(\ln/\arctan\)-Teil).`,
        worte: String.raw`<p>Spart die mühsame PBZ mit hohen Potenzen: der „algebraische" (gebrochen-rationale) Anteil \(P_1/Q_1\) wird direkt hingeschrieben, das verbleibende Integral ist harmlos. \(P_1,P_2\) findet man durch Ableiten der Ansatzgleichung und Koeffizientenvergleich.</p>`,
        beispiel: String.raw`<p>\(\displaystyle\int\frac{dx}{(x^2+1)^2}\): Ansatz \(\dfrac{ax+b}{x^2+1}+\int\dfrac{cx+d}{x^2+1}\,dx\) liefert</p>\[\int\frac{dx}{(x^2+1)^2}=\frac{x}{2(x^2+1)}+\frac12\arctan x+C.\]`,
        plus: String.raw`<p>\(Q_1=\gcd(Q,Q')\) sammelt genau die <b>mehrfachen</b> Faktoren (Vielfachheit um 1 reduziert), \(Q_2\) hat nur noch einfache. Alternative zur klassischen PBZ, besonders bei \((\dots)^{n}\)-Nennern.</p>`}}]},
    {id:"4.5",  t:"Die Mittelwertsätze der Integralrechnung", src:"skriptse47.html", topics:[
       {id:"4.5.1", title:"Erster Mittelwertsatz", body:{
        def: String.raw`Sei \(f\in C[a,b]\) und \(g\in R[a,b]\) mit \(g\ge0\) (Gewicht, ohne Vorzeichenwechsel). Dann existiert \(\xi\in[a,b]\) mit\[\int_a^b f(x)\,g(x)\,dx=f(\xi)\int_a^b g(x)\,dx.\]Spezialfall \(g\equiv1\): \(\displaystyle\int_a^b f=f(\xi)\,(b-a)\) — der <b>Integralmittelwert</b> \(\frac{1}{b-a}\int_a^b f\) wird angenommen.`,
        worte: String.raw`<p>Ein stetiges \(f\) nimmt seinen (gewichteten) Durchschnitt irgendwo als echten Funktionswert an — Zwischenwertsatz fürs Integral. Das \(g\ge0\) darf das Vorzeichen nicht wechseln, sonst funktioniert die Mittelung nicht.</p>`,
        beispiel: String.raw`<p>\(\int_0^{\pi}\sin x\,dx=2=f(\xi)\cdot\pi\) verlangt \(\sin\xi=\frac{2}{\pi}\), also \(\xi=\arcsin\frac{2}{\pi}\approx0{,}69\in[0,\pi]\) ✓.</p>`,
        plus: String.raw`<p><b>Klausur-Falle:</b> \(f\) muss <b>stetig</b> sein (für den Zwischenwert) und \(g\) darf das Vorzeichen nicht wechseln. Ohne \(g\ge0\) kann \(f(\xi)\) außerhalb des Wertebereichs landen.</p>`}},
       {id:"4.5.2", title:"Zweiter Mittelwertsatz", body:{
        def: String.raw`Sei \(f\) auf \([a,b]\) <b>monoton</b> und \(g\in R[a,b]\). Dann gibt es \(\xi\in[a,b]\) mit\[\int_a^b f(x)g(x)\,dx=f(a)\int_a^{\xi} g(x)\,dx+f(b)\int_{\xi}^{b} g(x)\,dx.\]Ist \(f\ge0\) und monoton fallend, folgt die <b>Bonnet</b>-Form \(\int_a^b fg=f(a)\int_a^{\xi}g\).`,
        worte: String.raw`<p>Hier trägt die <b>Monotonie</b> von \(f\) (statt Stetigkeit) die Aussage: das Gewicht liegt an den Rändern \(f(a),f(b)\), der Umschaltpunkt \(\xi\) verteilt \(\int g\) dazwischen. Wichtiges Werkzeug für Oszillations-Abschätzungen (z. B. \(\int\frac{\sin x}{x}\)).</p>`,
        beispiel: String.raw`<p>Abschätzung: für \(0<a<b\) ist \(x\mapsto\frac1x\) monoton fallend, also</p>\[\Big|\int_a^b\frac{\sin x}{x}\,dx\Big|=\Big|\frac1a\int_a^{\xi}\sin x\,dx\Big|\le\frac{2}{a},\]<p>da \(|\int_a^{\xi}\sin x\,dx|\le2\). So zeigt man Konvergenz von \(\int_1^{\infty}\frac{\sin x}{x}dx\).</p>`,
        plus: String.raw`<p>Der 2. MWS ist der Schlüssel zum <b>Dirichlet-Kriterium</b> (monotone Nullfolge \(\times\) beschränkte Partialsummen) — vgl. Spickzettel <a href="#/ref/konv_integrale">Konvergenz — Integrale</a>.</p>`}}]},
    {id:"4.6",  t:"Partielle Integration und Substitution", src:"skriptse48.html", topics:[
       {id:"4.6.1", title:"Partielle Integration", body:{
        def: String.raw`Für \(u,v\in C^{1}[a,b]\) gilt\[\int_a^b u'(x)\,v(x)\,dx=\big[u(x)v(x)\big]_a^b-\int_a^b u(x)\,v'(x)\,dx.\]Direkte Folge der Produktregel \((uv)'=u'v+uv'\), integriert über \([a,b]\).`,
        worte: String.raw`<p>Ableitung „von einem Faktor auf den anderen umwälzen". Man wählt \(v\) so, dass \(v'\) einfacher wird (Polynom \(\to\) verschwindet) und \(u'\) sich leicht integrieren lässt. Merkregel LIATE fürs Ableiten.</p>`,
        beispiel: String.raw`<p>\(v=x\) (ableiten), \(u'=e^{x}\) (integrieren):</p>\[\int_0^1 x\,e^{x}\,dx=\big[x e^{x}\big]_0^1-\int_0^1 e^{x}\,dx=e-(e-1)=1.\]`,
        plus: String.raw`<p><b>Faktor-1-Trick</b> (\(\int\ln x=\int1\cdot\ln x\)) und der <b>„Phönix"</b> (\(\int e^{x}\sin x\), zweimal partiell und nach dem Integral auflösen) im Spickzettel <a href="#/ref/substitutionen">Substitutionen &amp; Tricks</a>.</p>`}},
       {id:"4.6.2", title:"Substitution der Integrationsvariablen", body:{
        def: String.raw`Sei \(\varphi\in C^{1}[\alpha,\beta]\) und \(f\) stetig auf \(\varphi([\alpha,\beta])\). Dann\[\int_{\alpha}^{\beta} f\big(\varphi(t)\big)\,\varphi'(t)\,dt=\int_{\varphi(\alpha)}^{\varphi(\beta)} f(u)\,du.\]Umkehrung der Kettenregel; mit \(u=\varphi(t)\), \(du=\varphi'(t)\,dt\) und <b>mitsubstituierten Grenzen</b>.`,
        worte: String.raw`<p>„Innere Funktion samt ihrer Ableitung" ersetzen. Bei bestimmten Integralen die Grenzen gleich mit umrechnen — dann entfällt die Rücksubstitution.</p>`,
        beispiel: String.raw`<p>\(u=x^2+1\), \(du=2x\,dx\); Grenzen \(0\to1\), \(1\to2\):</p>\[\int_0^1\frac{x}{x^2+1}\,dx=\frac12\int_1^{2}\frac{du}{u}=\frac12\ln2.\]`,
        plus: String.raw`<p><b>Klausur-Falle:</b> bei bestimmten Integralen <b>immer</b> die Grenzen mitsubstituieren (oder am Ende zurücksubstituieren) — häufigster Vorzeichen-/Wert-Fehler. \(\varphi\) sollte auf \([\alpha,\beta]\) \(C^{1}\) sein. Standard-Substitutionen: <a href="#/ref/substitutionen">Spickzettel</a>.</p>`}}]},
    {id:"4.7",  t:"Das Restglied in der Taylor-Formel", src:"skriptse49.html", topics:[
       {id:"4.7.1", title:"Restglied – Formulierung und Beweis", body:{
        def: String.raw`Sei \(f\in C^{n+1}[a,b]\), \(x_0\in[a,b]\). Dann gilt die <b>Taylor-Formel</b>\[f(x)=\sum_{k=0}^{n}\frac{f^{(k)}(x_0)}{k!}(x-x_0)^{k}+R_n(x)\]mit dem <b>Restglied in Integralform</b>\[R_n(x)=\frac{1}{n!}\int_{x_0}^{x} f^{(n+1)}(t)\,(x-t)^{n}\,dt.\]`,
        worte: String.raw`<p>Das Taylor-Polynom nähert \(f\) nahe \(x_0\); \(R_n\) ist der <b>exakte</b> Fehler. Die Integralform ist am stärksten (kein unbekanntes \(\xi\)) und Ausgangspunkt für alle anderen Restgliedformen.</p>`,
        beispiel: String.raw`<p><b>Beweisidee</b> (Induktion / wiederholte partielle Integration): Start \(f(x)-f(x_0)=\int_{x_0}^{x}f'(t)\,dt\). Partielles Integrieren mit \(v=f'(t)\), \(u'=1\) und geschicktem Stammfunktions-Ansatz \(u=-(x-t)\) erzeugt den nächsten Taylor-Term plus das Integral mit \((x-t)^1\); Iteration liefert \((x-t)^n/n!\).</p>`,
        plus: String.raw`<p>Klassische Reihen &amp; Restglied-Übersicht im Spickzettel <a href="#/ref/entwickeln">Funktionen entwickeln</a>. Voraussetzung \(f\in C^{n+1}\): eine Ableitung mehr als der höchste Polynomgrad.</p>`}},
       {id:"4.7.2", title:"Modifikationen der Restgliedformel", body:{
        def: String.raw`Aus der Integralform folgen mit den Mittelwertsätzen (4.5) für ein \(\xi\) zwischen \(x_0\) und \(x\): <b>Lagrange-Form</b>\[R_n(x)=\frac{f^{(n+1)}(\xi)}{(n+1)!}(x-x_0)^{n+1},\]<b>Cauchy-Form</b> \(\displaystyle R_n(x)=\frac{f^{(n+1)}(\xi)}{n!}(x-\xi)^{n}(x-x_0)\).`,
        worte: String.raw`<p>Die <b>Lagrange-Form</b> ist die Arbeitsform für Fehlerabschätzungen: \(|R_n|\le\frac{M_{n+1}}{(n+1)!}|x-x_0|^{n+1}\) mit \(M_{n+1}=\sup|f^{(n+1)}|\). Sie verallgemeinert den Mittelwertsatz (\(n=0\): \(f(x)-f(x_0)=f'(\xi)(x-x_0)\)).</p>`,
        beispiel: String.raw`<p><b>\(e^{x}\) ist seine Taylor-Reihe:</b> Lagrange-Restglied bei \(x_0=0\):</p>\[|R_n(x)|=\frac{e^{\xi}}{(n+1)!}|x|^{n+1}\le\frac{e^{|x|}\,|x|^{n+1}}{(n+1)!}\ \xrightarrow[n\to\infty]{}\ 0\quad\forall x,\]<p>da \(\frac{|x|^{n+1}}{(n+1)!}\to0\). Also \(e^{x}=\sum_{k\ge0}\frac{x^k}{k!}\) auf ganz \(\mathbb R\).</p>`,
        plus: String.raw`<p><b>Klausur-Falle:</b> das \(\xi\) ist <b>nicht</b> explizit bekannt — man schätzt \(f^{(n+1)}\) auf dem ganzen Intervall nach oben ab. \(\xi\) hängt von \(x\) und \(n\) ab.</p>`}},
       {id:"4.7.3", title:"Eine Anwendung: Integrale abschätzen", body:{
        def: String.raw`Hat \(f\) keine elementare Stammfunktion, integriert man das <b>Taylor-Polynom</b> und beschränkt den Fehler durch \(\big|\int R_n\big|\le\int|R_n|\):\[\int_{x_0}^{x} f\,dt=\int_{x_0}^{x}\Big(\sum_{k=0}^{n}\frac{f^{(k)}(x_0)}{k!}(t-x_0)^{k}\Big)dt+\int_{x_0}^{x}R_n(t)\,dt.\]`,
        worte: String.raw`<p>Termweises Integrieren des Polynoms ist trivial; das Restglied liefert eine <b>garantierte Fehlerschranke</b> für den Näherungswert. So werden „unlösbare" Integrale beliebig genau berechenbar.</p>`,
        beispiel: String.raw`<p>\(\displaystyle\int_0^{1}e^{-t^2}\,dt\) mit \(e^{-t^2}=\sum_{k\ge0}\frac{(-1)^k t^{2k}}{k!}\):</p>\[\int_0^1 e^{-t^2}dt=\sum_{k=0}^{\infty}\frac{(-1)^k}{k!\,(2k+1)}=1-\frac13+\frac{1}{10}-\frac{1}{42}+\cdots\approx0{,}7468.\]<p>Alternierend ⇒ Fehler \(\le\) erster weggelassener Term (z. B. nach \(-\frac1{42}\): Fehler \(<\frac{1}{216}\)).</p>`,
        plus: String.raw`<p>Dieselbe Idee führt auf die <b>numerischen Quadraturformeln</b> (4.8): dort interpoliert man \(f\) statt zu entwickeln, mit analoger Restglied-Fehlerschranke.</p>`}}]},
    {id:"4.8",  t:"Numerische Integration (Interpolation)", src:"skriptse50.html", topics:[
       {id:"4.8.1", title:"Lagrangesche Interpolationsformel", body:{
        def: String.raw`Zu \(n+1\) Stützstellen \(x_0,\dots,x_n\) (paarweise verschieden) gibt es <b>genau ein</b> Polynom \(p\) vom Grad \(\le n\) mit \(p(x_j)=f(x_j)\):\[p(x)=\sum_{j=0}^{n} f(x_j)\,L_j(x),\qquad L_j(x)=\prod_{k\neq j}\frac{x-x_k}{x_j-x_k}.\]<b>Interpolationsfehler:</b> \(\displaystyle f(x)-p(x)=\frac{f^{(n+1)}(\xi)}{(n+1)!}\prod_{j=0}^{n}(x-x_j)\).`,
        worte: String.raw`<p>Die Lagrange-Basispolynome erfüllen \(L_j(x_k)=\delta_{jk}\) — jedes „schaltet" genau an seiner Stützstelle ein. So baut man das eindeutige Interpolationspolynom als gewichtete Summe der Funktionswerte.</p>`,
        beispiel: String.raw`<p>Durch \((0,1),(1,3),(2,7)\): \(p(x)=1\cdot\frac{(x-1)(x-2)}{2}+3\cdot\frac{x(x-2)}{-1}+7\cdot\frac{x(x-1)}{2}=x^2+x+1\).</p>`,
        plus: String.raw`<p>Grundlage aller Newton-Cotes-Formeln (4.8.2–4.8.4): \(\int_a^b f\approx\int_a^b p\). Mehr im Spickzettel <a href="#/ref/entwickeln">Funktionen entwickeln</a>.</p>`}},
       {id:"4.8.2", title:"Rechteckformel (P₀)", body:{
        def: String.raw`Interpolation durch eine <b>Konstante</b> (Grad 0) am Mittelpunkt \(m=\frac{a+b}{2}\) — die <b>Mittelpunktregel</b>:\[\int_a^b f(x)\,dx\approx (b-a)\,f\!\Big(\frac{a+b}{2}\Big),\qquad \text{Fehler}=\frac{(b-a)^3}{24}f''(\xi).\]`,
        worte: String.raw`<p>Ein einziges Rechteck mit der Höhe in der Intervallmitte. Erstaunlich gut: exakt für lineare \(f\) (der Fehler hängt an \(f''\)), besser als die naive Randauswertung.</p>`,
        beispiel: String.raw`<p>\(\int_0^1 x^2\,dx\approx1\cdot f(\tfrac12)=\tfrac14\) (exakt \(\tfrac13\)); Fehler \(=\frac{1}{24}\cdot2=\frac{1}{12}\), passt: \(\tfrac13-\tfrac14=\tfrac1{12}\).</p>`,
        plus: String.raw`<p>Genauigkeit steigern per <b>zusammengesetzter</b> Regel: \([a,b]\) in \(N\) Teile, Fehler \(=O(N^{-2})\). „Grad 0", aber Genauigkeitsordnung wie die Trapezregel.</p>`}},
       {id:"4.8.3", title:"Trapezformel (P₁)", body:{
        def: String.raw`Interpolation durch die <b>Sehne</b> (Grad 1) durch \((a,f(a)),(b,f(b))\):\[\int_a^b f(x)\,dx\approx\frac{b-a}{2}\big(f(a)+f(b)\big),\qquad \text{Fehler}=-\frac{(b-a)^3}{12}f''(\xi).\]`,
        worte: String.raw`<p>Fläche des Trapezes unter der Verbindungsgeraden. Exakt für lineare \(f\); der Fehler hängt an der Krümmung \(f''\) — bei konvexem \(f\) überschätzt die Trapezregel.</p>`,
        beispiel: String.raw`<p>\(\int_0^1 x^2\,dx\approx\frac12(0+1)=\frac12\) (exakt \(\tfrac13\)); Fehler \(=-\frac{1}{12}\cdot2=-\frac16\), passt: \(\tfrac13-\tfrac12=-\tfrac16\).</p>`,
        plus: String.raw`<p>Trapez- <b>überschätzt</b>, Mittelpunkt- <b>unterschätzt</b> (bei \(f''>0\)) um etwa \(2:1\). Ihre gewichtete Kombination \(\frac13\)Mittelpunkt-frei… eigentlich \(\frac{2\cdot\text{Mitte}+\text{Trapez}}{3}\) ergibt Simpson (4.8.4).</p>`}},
       {id:"4.8.4", title:"Simpson-Regel (P₂)", body:{
        def: String.raw`Interpolation durch eine <b>Parabel</b> (Grad 2) über \(a,\ m=\frac{a+b}{2},\ b\):\[\int_a^b f\,dx\approx\frac{b-a}{6}\Big(f(a)+4f\big(\tfrac{a+b}{2}\big)+f(b)\Big),\quad \text{Fehler}=-\frac{(b-a)^5}{2880}f^{(4)}(\xi).\]`,
        worte: String.raw`<p>Die „\(1\,4\,1\)-Regel". Durch die Parabel exakt für Polynome bis Grad 2 — <b>und geschenkt Grad 3</b> (Symmetrie). Der Fehler hängt erst an \(f^{(4)}\), daher deutlich genauer als Trapez/Mittelpunkt.</p>`,
        beispiel: String.raw`<p>\(\int_0^1 x^2\,dx\approx\frac16\big(0+4\cdot\tfrac14+1\big)=\frac16\cdot2=\frac13\) — <b>exakt</b> (Simpson integriert Grad \(\le3\) fehlerfrei).</p>`,
        plus: String.raw`<p>Simpson \(=\frac{2\,(\text{Mittelpunkt})+1\,(\text{Trapez})}{3}\). Zusammengesetzt (gerade Teilanzahl) Fehler \(=O(N^{-4})\) — der Klausur-Klassiker unter den Quadraturformeln.</p>`}}]},
    {id:"4.9",  t:"Anwendungen I: Länge und Krümmung einer Kurve", src:"skriptse51.html", topics:[
       {id:"4.9.1", title:"Der Begriff der Jordan-Kurve", body:{
        def: String.raw`Eine <b>Jordan-Kurve</b> (Jordan-Bogen) ist eine <b>stetige, injektive</b> Abbildung \(\gamma:[a,b]\to\mathbb R^{n}\) (keine Selbstschnitte). <b>Geschlossen</b>, falls \(\gamma(a)=\gamma(b)\) und \(\gamma\) auf \([a,b[\) injektiv ist. Der Bogen heißt <b>rektifizierbar</b>, wenn \(\sup_\delta\sum_k|\gamma(t_{k+1})-\gamma(t_k)|<\infty\) (Supremum über alle Zerlegungen).`,
        worte: String.raw`<p>„Kurve" = das <b>Bild</b> einer durchlaufenen, überschneidungsfreien Bahn; die Parametrisierung ist nur das „Tempo". Rektifizierbar = mit einbeschriebenen Polygonzügen approximierbare, endliche Länge.</p>`,
        erfuellt: String.raw`<p>\(\gamma(t)=(\cos t,\sin t)\), \(t\in[0,2\pi[\): stetig, injektiv auf \([0,2\pi[\), \(\gamma(0)=\gamma(2\pi)\) ⇒ geschlossene Jordan-Kurve (Einheitskreis), rektifizierbar (\(C^1\)).</p>`,
        verletzt: String.raw`<p><b>Nicht Jordan:</b> die „Acht" \(\gamma(t)=(\sin 2t,\sin t)\) schneidet sich im Ursprung (nicht injektiv). <b>Nicht rektifizierbar:</b> \(f(t)=t(\cos\tfrac1t,\sin\tfrac1t)\), \(f(0)=0\) — Polygonzüge über \(t_k=\frac{1}{k\pi}\) liefern die harmonische Reihe \(\to\infty\).</p>`,
        plus: String.raw`<p>Rektifizierbarkeit zeigen/widerlegen (\(C^1\)/Lipschitz vs. Polygonzug-Folge) im Spickzettel <a href="#/ref/kurven">Kurven · Länge · Krümmung</a>.</p>`}},
       {id:"4.9.2", title:"Bogenlänge einer Jordan-Kurve", body:{
        def: String.raw`Die <b>Bogenlänge</b> ist \(\displaystyle L(\gamma)=\sup_\delta\sum_k|\gamma(t_{k+1})-\gamma(t_k)|\). Für \(\gamma\in C^{1}\) gilt\[L(\gamma)=\int_a^b|\gamma'(t)|\,dt=\int_a^b\sqrt{\textstyle\sum_i \gamma_i'(t)^2}\,dt.\]`,
        worte: String.raw`<p>Länge = Grenzwert einbeschriebener Polygonzüge. Für glatte Kurven wird die Sehnensumme zum Integral über die <b>Geschwindigkeit</b> \(|\gamma'(t)|\) — „Weg = Tempo integriert".</p>`,
        beispiel: String.raw`<p>Kreis \(\gamma(t)=(r\cos t,r\sin t)\), \(t\in[0,2\pi]\): \(|\gamma'(t)|=r\), also</p>\[L=\int_0^{2\pi} r\,dt=2\pi r.\]<p>Graph \(y=f(x)\): \(L=\int_a^b\sqrt{1+f'(x)^2}\,dx\).</p>`,
        plus: String.raw`<p><b>Klausur-Falle:</b> die Länge ist <b>parametrisierungs­unabhängig</b> (Substitution ändert sie nicht), das Integral \(\int|\gamma'|\) aber nur bei injektivem Durchlauf gleich der geometrischen Länge — doppelt durchlaufene Bögen zählen doppelt.</p>`}},
       {id:"4.9.3", title:"Parametrisierung durch die Bogenlänge", body:{
        def: String.raw`Die <b>Bogenlängenfunktion</b> \(\displaystyle s(t)=\int_a^t|\gamma'(\tau)|\,d\tau\) ist streng wachsend (falls \(\gamma'\neq0\), <b>reguläre</b> Kurve) und umkehrbar. Reparametrisiert man \(\tilde\gamma(s)=\gamma(t(s))\), so gilt \(|\tilde\gamma'(s)|\equiv1\) — <b>Parametrisierung nach der Bogenlänge</b> (Einheitsgeschwindigkeit).`,
        worte: String.raw`<p>Man wählt als „Zeit" die bereits zurückgelegte Strecke \(s\). Dann läuft man mit konstantem Tempo 1 — das entkoppelt die Geometrie (Krümmung!) vom willkürlichen Durchlauf-Tempo.</p>`,
        beispiel: String.raw`<p>Kreis: \(s(t)=\int_0^t r\,d\tau=rt\), also \(t=s/r\) und \(\tilde\gamma(s)=(r\cos\frac sr,r\sin\frac sr)\) mit \(|\tilde\gamma'(s)|=1\) ✓.</p>`,
        plus: String.raw`<p>Voraussetzung <b>Regularität</b> \(\gamma'(t)\neq0\): an „Stillständen" (\(\gamma'=0\), z. B. Spitzen) ist \(s(t)\) nicht streng wachsend und die Bogenlängen-Param. bricht.</p>`}},
       {id:"4.9.4", title:"Tangential- und Krümmungsvektor", body:{
        def: String.raw`<b>Einheits-Tangentenvektor</b> \(\displaystyle T=\frac{\gamma'}{|\gamma'|}\). In Bogenlängen-Param. ist \(T(s)=\tilde\gamma'(s)\), und der <b>Krümmungsvektor</b> ist\[\vec\kappa(s)=T'(s)=\tilde\gamma''(s),\qquad \kappa(s)=|\tilde\gamma''(s)|\ (\text{Krümmung}).\]Wegen \(|T|\equiv1\) steht \(\vec\kappa\perp T\) (zeigt zur Hauptnormalen \(N\)).`,
        worte: String.raw`<p>\(T\) gibt die Richtung, \(\vec\kappa=T'\) misst, wie schnell sich die Richtung dreht — die „Verbiegung" pro Weglänge. Senkrecht zur Bahn, weil ein Einheitsvektor sich nur drehen, nicht strecken kann.</p>`,
        beispiel: String.raw`<p>Kreis (Bogenlänge): \(\tilde\gamma(s)=r(\cos\frac sr,\sin\frac sr)\), \(\tilde\gamma''(s)=-\frac1r(\cos\frac sr,\sin\frac sr)\), also \(\kappa=\frac1r\) — konstant, Krümmungsradius \(=r\).</p>`,
        plus: String.raw`<p>\(\vec\kappa=T'/|\gamma'|\) auch ohne Bogenlängen-Param.; \(N=\vec\kappa/\kappa\) Hauptnormale. Der <b>Krümmungsradius</b> ist \(\rho=1/\kappa\).</p>`}},
       {id:"4.9.5", title:"Berechnung des Krümmungsvektors", body:{
        def: String.raw`Für eine beliebige reguläre \(C^{2}\)-Parametrisierung (Kettenregel, \(s'=|\gamma'|\)):\[\vec\kappa=\frac{d T}{ds}=\frac{1}{|\gamma'|}\,\frac{d}{dt}\!\left(\frac{\gamma'}{|\gamma'|}\right)=\frac{\gamma''\,|\gamma'|^2-\gamma'\,(\gamma'\!\cdot\gamma'')}{|\gamma'|^{4}}.\]Betrag (in \(\mathbb R^3\)): \(\displaystyle\kappa=\frac{|\gamma'\times\gamma''|}{|\gamma'|^{3}}\).`,
        worte: String.raw`<p>Man muss <b>nicht</b> erst auf Bogenlänge umparametrisieren: die Formel korrigiert das Tempo direkt. Der \(\gamma'(\gamma'\!\cdot\gamma'')\)-Term zieht den Tangentialanteil ab, sodass nur die Richtungsänderung \(\perp T\) bleibt.</p>`,
        beispiel: String.raw`<p>Parabel \(\gamma(t)=(t,t^2)\): \(\gamma'=(1,2t)\), \(\gamma''=(0,2)\), \(\gamma'\times\gamma''=2\), \(|\gamma'|=\sqrt{1+4t^2}\):</p>\[\kappa(t)=\frac{2}{(1+4t^2)^{3/2}}\quad(\text{am Scheitel }t=0:\ \kappa=2).\]`,
        plus: String.raw`<p>Alle Varianten (kartesisch, parametrisch, polar, vektoriell \(\kappa=\frac{\|\mathbf r'\times\mathbf r''\|}{\|\mathbf r'\|^3}\)) mit Beispielen im Spickzettel <a href="#/ref/kurven">Kurven · Länge · Krümmung</a>.</p>`}},
       {id:"4.9.6", title:"Krümmung einer Kurve in ℝ³ und ℝ²", body:{
        def: String.raw`<b>Ebene Kurve</b> \(\gamma=(x,y)\) (mit Vorzeichen der Drehrichtung):\[\kappa=\frac{x'y''-y'x''}{\big(x'^2+y'^2\big)^{3/2}},\qquad\text{Graph }y=f(x):\ \kappa=\frac{f''}{\big(1+f'^2\big)^{3/2}}.\]<b>Raumkurve</b> \(\gamma\in\mathbb R^{3}\): \(\displaystyle\kappa=\frac{|\gamma'\times\gamma''|}{|\gamma'|^{3}}\ge0\), zusätzlich <b>Torsion</b> \(\tau=\frac{(\gamma'\times\gamma'')\cdot\gamma'''}{|\gamma'\times\gamma''|^{2}}\).`,
        worte: String.raw`<p>In der Ebene trägt \(\kappa\) ein <b>Vorzeichen</b> (Links-/Rechtskurve); im Raum ist \(\kappa\ge0\), und die <b>Torsion</b> \(\tau\) misst das Herausdrehen aus der Schmiegebene (Frenet).</p>`,
        beispiel: String.raw`<p>Schraubenlinie \(\gamma(t)=(a\cos t,a\sin t,bt)\): \(|\gamma'|=\sqrt{a^2+b^2}\),</p>\[\kappa=\frac{a}{a^2+b^2},\qquad \tau=\frac{b}{a^2+b^2}\quad(\text{beide konstant}).\]`,
        plus: String.raw`<p><b>Klausur-Falle:</b> beim Graphen \(y=f(x)\) ist \(\kappa\) am Extrempunkt \(=|f''|\) (da \(f'=0\)). Wendepunkt \(\Leftrightarrow\) \(\kappa=0\) (Vorzeichenwechsel).</p>`}}]},
    {id:"4.10", t:"Anwendungen II: Fläche, Volumen, Schwerpunkt", src:"skriptse52.html", topics:[
       {id:"4.10.1", title:"Flächeninhalt ebener Figuren", body:{
        def: String.raw`Fläche unter \(f\ge0\): \(\displaystyle A=\int_a^b f(x)\,dx\); zwischen zwei Kurven \(f\ge g\): \(A=\int_a^b\big(f-g\big)\,dx\). In <b>Polarkoordinaten</b> (Sektor): \(\displaystyle A=\frac12\int_{\alpha}^{\beta} r(\varphi)^2\,d\varphi\). <b>Leibniz-Sektorformel:</b> \(\displaystyle A=\frac12\oint\big(x\,dy-y\,dx\big)\).`,
        worte: String.raw`<p>Flächen = Integrale von „Höhen". Bei Bereichen zwischen Kurven immer „oben minus unten"; bei Rundungen ist die Polar-/Sektorformel oft einfacher als kartesisch.</p>`,
        beispiel: String.raw`<p>Ellipse \(\frac{x^2}{a^2}+\frac{y^2}{b^2}=1\) über die Sektorformel (Param. \(x=a\cos t,y=b\sin t\)):</p>\[A=\frac12\int_0^{2\pi}\!\big(x\,\dot y-y\,\dot x\big)\,dt=\frac12\int_0^{2\pi} ab\,dt=\pi ab.\]`,
        plus: String.raw`<p>Weitere Bogen-/Sektor- und Polarformeln mit Beispielen: Spickzettel <a href="#/ref/kurven">Kurven · Länge · Krümmung</a>.</p>`}},
       {id:"4.10.2", title:"Volumen rotationssymmetrischer Körper", body:{
        def: String.raw`Rotation des Graphen \(f\ge0\) um die <b>\(x\)-Achse</b> (Scheiben):\[V=\pi\int_a^b f(x)^2\,dx.\]Rotation um die <b>\(y\)-Achse</b> (Zylinderschalen): \(\displaystyle V=2\pi\int_a^b x\,f(x)\,dx\).`,
        worte: String.raw`<p>Scheibenmethode: jede dünne Scheibe ist ein Kreis mit Radius \(f(x)\), Fläche \(\pi f(x)^2\). Schalenmethode: dünne Zylinderrohre mit Umfang \(2\pi x\) und Höhe \(f(x)\).</p>`,
        beispiel: String.raw`<p>Kugel (Radius \(r\)) als Rotation von \(f(x)=\sqrt{r^2-x^2}\) um die \(x\)-Achse:</p>\[V=\pi\int_{-r}^{r}(r^2-x^2)\,dx=\pi\Big[r^2x-\frac{x^3}{3}\Big]_{-r}^{r}=\frac{4}{3}\pi r^3.\]`,
        plus: String.raw`<p><b>Klausur-Falle:</b> \(f\) <b>quadrieren</b> nicht vergessen (Scheibenfläche \(\sim f^2\)). Rotiert man einen Bereich zwischen \(f\ge g\), so \(V=\pi\int(f^2-g^2)\,dx\) (nicht \((f-g)^2\)!).</p>`}},
       {id:"4.10.3", title:"Oberflächeninhalt rotationssymmetrischer Körper", body:{
        def: String.raw`Mantelfläche der Rotation von \(f\ge0\) um die \(x\)-Achse:\[M=2\pi\int_a^b f(x)\,\sqrt{1+f'(x)^2}\,dx=2\pi\int f\,ds.\]`,
        worte: String.raw`<p>Ein Bogenstück \(ds=\sqrt{1+f'^2}\,dx\) überstreicht bei Rotation einen Kreis vom Umfang \(2\pi f(x)\) — Produkt integrieren. Der Wurzelfaktor ist derselbe wie bei der Bogenlänge (4.9.2), <b>nicht</b> weglassen.</p>`,
        beispiel: String.raw`<p>Kugeloberfläche, \(f(x)=\sqrt{r^2-x^2}\): \(1+f'^2=\frac{r^2}{r^2-x^2}\), also \(f\sqrt{1+f'^2}=r\):</p>\[M=2\pi\int_{-r}^{r} r\,dx=4\pi r^2.\]`,
        plus: String.raw`<p>Unterschied zum Volumen: hier steht \(f\cdot\sqrt{1+f'^2}\) (Länge \(\times\) Umfang), beim Volumen \(f^2\) (Fläche). Verwechseln kostet in der Klausur.</p>`}},
       {id:"4.10.4", title:"Schwerpunkt einer Kurve", body:{
        def: String.raw`Schwerpunkt (Massenmittelpunkt bei homogener Dichte) eines Bogens, gewichtet mit der Bogenlänge \(ds=|\gamma'|\,dt\):\[\bar x=\frac1L\int x\,ds,\qquad \bar y=\frac1L\int y\,ds,\qquad L=\int ds.\]`,
        worte: String.raw`<p>„Durchschnittsort" entlang der Kurve — jeder Punkt wird mit seinem Bogenlängen-Anteil gewichtet (nicht mit \(dx\)!). Bei Symmetrie liegt der Schwerpunkt auf der Symmetrieachse.</p>`,
        beispiel: String.raw`<p>Halbkreisbogen \(x^2+y^2=r^2\), \(y\ge0\), \(L=\pi r\): mit \(x=r\cos t,y=r\sin t\), \(ds=r\,dt\):</p>\[\bar y=\frac{1}{\pi r}\int_0^{\pi} r\sin t\cdot r\,dt=\frac{r}{\pi}\big[-\cos t\big]_0^{\pi}=\frac{2r}{\pi}.\]`,
        plus: String.raw`<p><b>1. Guldin-Regel (Pappus):</b> Mantelfläche bei Rotation \(=2\pi\,\bar y\cdot L\) — Schwerpunktweg \(\times\) Bogenlänge. Probe oben: \(2\pi\cdot\frac{2r}{\pi}\cdot\pi r=4\pi r^2\) ✓ (Kugel).</p>`}},
       {id:"4.10.5", title:"Schwerpunkt einer Fläche", body:{
        def: String.raw`Für die Fläche unter \(f\ge0\) über \([a,b]\) (Inhalt \(A=\int_a^b f\,dx\)):\[\bar x=\frac1A\int_a^b x\,f(x)\,dx,\qquad \bar y=\frac1A\int_a^b\frac{f(x)^2}{2}\,dx.\]`,
        worte: String.raw`<p>Der Flächenschwerpunkt mittelt über alle Flächenelemente. \(\bar y\) bekommt den Faktor \(\frac12 f^2\), weil jeder vertikale Streifen \([0,f(x)]\) seinen eigenen Mittelpunkt bei \(\frac{f(x)}{2}\) hat.</p>`,
        beispiel: String.raw`<p>Halbkreisfläche \(y=\sqrt{r^2-x^2}\), \(A=\frac{\pi r^2}{2}\):</p>\[\bar y=\frac{1}{A}\int_{-r}^{r}\frac{r^2-x^2}{2}\,dx=\frac{2}{\pi r^2}\cdot\frac{2r^3}{3}=\frac{4r}{3\pi}.\]`,
        plus: String.raw`<p><b>2. Guldin-Regel (Pappus):</b> Rotationsvolumen \(=2\pi\,\bar y\cdot A\). Probe: \(2\pi\cdot\frac{4r}{3\pi}\cdot\frac{\pi r^2}{2}=\frac{4}{3}\pi r^3\) ✓ (Kugel).</p>`}}]},
    {id:"4.11", t:"Analytischer Beweis des Fundamentalsatzes der Algebra", src:"skriptse53.html", topics:[
       {id:"4.11.1", title:"Beweis des Fundamentalsatzes der Algebra", body:{
        def: String.raw`<b>Fundamentalsatz der Algebra.</b> Jedes nicht-konstante Polynom \(p(z)=\sum_{k=0}^{n}a_k z^{k}\) (\(a_n\neq0,\ n\ge1\)) über \(\mathbb C\) besitzt mindestens eine Nullstelle in \(\mathbb C\). <b>Beweisidee:</b> \(|p|\) nimmt (Lemma 4.11.1) an einem \(z_*\) ein globales Minimum an; wäre \(p(z_*)\neq0\), so ließe sich \(|p|\) verkleinern (Lemma 4.11.2) — Widerspruch. Also \(p(z_*)=0\).`,
        worte: String.raw`<p>Ein <b>rein analytischer</b> Beweis (Minimum + „man kommt immer tiefer"), ganz ohne Algebra. Per Induktion folgt: \(p\) zerfällt über \(\mathbb C\) vollständig in \(n\) Linearfaktoren \(a_n\prod(z-z_j)\).</p>`,
        beispiel: String.raw`<p>Das Zusammenspiel: <b>Lemma 4.11.1</b> liefert die <i>Existenz</i> eines Minimalpunkts \(z_*\) (weil \(|p|\to\infty\) außen), <b>Lemma 4.11.2</b> erzwingt dort \(p(z_*)=0\) (sonst kein Minimum). Beide zusammen ⇒ Nullstelle.</p>`,
        plus: String.raw`<p>Über \(\mathbb R\) gilt das <b>nicht</b> (\(x^2+1\) hat keine reelle Nullstelle) — die Vollständigkeit <b>und</b> die algebraische Abgeschlossenheit von \(\mathbb C\) sind wesentlich.</p>`}},
       {id:"4.11.2", title:"Beweis von Lemma 4.11.1 (Existenz des Minimums)", body:{
        def: String.raw`<b>Lemma 4.11.1.</b> Für nicht-konstantes \(p\) gilt \(|p(z)|\to+\infty\) bei \(|z|\to\infty\); daher nimmt \(|p|\) auf \(\mathbb C\) ein <b>globales Minimum</b> an.`,
        worte: String.raw`<p>„Weit draußen ist \(|p|\) riesig, also liegt das Minimum in einer beschränkten Scheibe — und dort greift Weierstraß." Koerzivität + Kompaktheit.</p>`,
        beispiel: String.raw`<p><b>Beweis.</b> Ausklammern des höchsten Terms:</p>\[|p(z)|=|a_n||z|^{n}\Big|1+\tfrac{a_{n-1}}{a_n z}+\cdots+\tfrac{a_0}{a_n z^{n}}\Big|\ge|a_n||z|^{n}\big(1-\varepsilon\big)\to\infty.\]<p>Wähle \(R\) mit \(|p(z)|>|p(0)|\) für \(|z|>R\). Auf der <b>kompakten</b> Scheibe \(\{|z|\le R\}\) nimmt die stetige Funktion \(|p|\) ihr Minimum an (Weierstraß) — es ist global.</p>`,
        plus: String.raw`<p>Genau hier geht \(n\ge1\) ein: für konstantes \(p\) wäre \(|p|\) nicht koerziv. Das Minimum kann noch \(>0\) sein — dass es \(0\) ist, klärt erst Lemma 4.11.2.</p>`}},
       {id:"4.11.3", title:"Beweis von Lemma 4.11.2 (d'Alembert)", body:{
        def: String.raw`<b>Lemma 4.11.2 (d'Alembert).</b> Ist \(p(z_0)\neq0\), so gibt es beliebig nahe bei \(z_0\) Punkte mit \(|p(z)|<|p(z_0)|\) — \(z_0\) ist <b>kein</b> lokales Minimum von \(|p|\).`,
        worte: String.raw`<p>Solange \(p\) nicht null ist, kann man \(|p|\) durch einen kleinen Schritt in die <b>richtige Richtung</b> stets weiter senken. Der erste nichtlineare Term diktiert diese Richtung.</p>`,
        beispiel: String.raw`<p><b>Beweis.</b> Entwickle um \(z_0\) (mit \(h\) klein, \(c_m\) erster nicht­verschwindender Koeffizient, \(m\ge1\)):</p>\[p(z_0+h)=p(z_0)+c_m h^{m}+O(h^{m+1}).\]<p>Wähle die Richtung von \(h\) per \(m\)-ter Wurzel so, dass \(c_m h^{m}\) dem Wert \(p(z_0)\) <b>entgegen</b>zeigt. Für kleine \(|h|\):</p>\[|p(z_0+h)|\le|p(z_0)|-|c_m||h|^{m}+O(|h|^{m+1})<|p(z_0)|.\]`,
        plus: String.raw`<p>Der Schritt „\(m\)-te Wurzel ziehen, um die Gegenrichtung zu treffen" braucht wesentlich \(\mathbb C\) (in \(\mathbb R\) gibt es nicht jede Wurzel). Daher scheitert das Argument reell — passend, denn dort ist der Satz falsch.</p>`}}]}
   ]},
 { id:"5", title:"Reihen und uneigentliche Integrale", key:"ch5",
   sections:[
    {id:"5.1",  t:"Uneigentliche Integrale", topics:[
       {id:"5.1.1", title:"Integrale über unbeschränkte Intervalle", body:{
        def: String.raw`Sei \(f:[A,+\infty[\,\to\mathbb K^{p}\) auf <b>jedem kompakten</b> Intervall \([A,R]\) Riemann-integrierbar. Dann heißt\[\int_A^{+\infty}\!f(x)\,dx\ :=\ \lim_{R\to+\infty}\underbrace{\int_A^{R}\!f(x)\,dx}_{=:F(R)}\]<b>konvergent</b>, wenn dieser Grenzwert in \(\mathbb K^{p}\) existiert — sonst <b>divergent</b>.`,
        worte: String.raw`<p>Zwei Zutaten: bis zu jeder endlichen Schranke \(R\) muss \(f\) ganz normal integrierbar sein (sonst ist \(F(R)\) gar nicht definiert), und die „Fläche bis \(R\)" muss sich für \(R\to+\infty\) auf einen festen Wert <b>einpendeln</b>. Divergenz heißt: \(F(R)\to\pm\infty\) <i>oder</i> \(F(R)\) oszilliert ohne Limes.</p>`,
        erfuellt: String.raw`<p>\(\displaystyle\int_1^{+\infty}\frac{dx}{x^{2}}\): \(x^{-2}\) ist stetig auf jedem \([1,R]\) ✓, und</p>\[F(R)=\Big[-\frac1x\Big]_1^{R}=1-\frac1R\ \xrightarrow[R\to+\infty]{}\ 1\]<p>⇒ konvergent mit Wert \(1\).</p>`,
        verletzt: String.raw`<p>\(\displaystyle\int_1^{+\infty}\frac{dx}{x}\): \(F(R)=\ln R\to+\infty\) — divergent (Explosion).</p><p>\(\displaystyle\int_0^{+\infty}\cos x\,dx\): \(F(R)=\sin R\) oszilliert ohne Limes — divergent, obwohl beschränkt!</p>`,
        plus: String.raw`<p><b>p-Test:</b> \(\int_1^{+\infty}x^{-p}dx\) konvergiert \(\Leftrightarrow p>1\). Und Vorsicht (Tafel-Frage): aus \(f(x)\to0\) folgt <b>nicht</b> Konvergenz — Gegenbeispiel \(\tfrac1x\). Kriterien & Beispiele: Spickzettel <a href="#/ref/konv_integrale">Konvergenz — Integrale</a>.</p>`}},
       {id:"5.1.2", title:"Integrale mit Randsingularität", body:{
        def: String.raw`Sei \(f:\left]a,b\right]\to\mathbb K^{p}\) bei \(a\) unbeschränkt, aber auf jedem \([a+\varepsilon,\,b]\) Riemann-integrierbar. Dann\[\int_a^{b}\!f(x)\,dx\ :=\ \lim_{\varepsilon\to0^{+}}\int_{a+\varepsilon}^{b}\!f(x)\,dx\](analog Singularität bei \(b\): \(\lim_{\varepsilon\to0^{+}}\int_a^{b-\varepsilon}\)).`,
        worte: String.raw`<p>Die „Problemstelle" (Pol am Rand) wird um \(\varepsilon\) ausgespart, das normale Integral berechnet, dann \(\varepsilon\to0\) geschickt. Konvergenz heißt: die Fläche bleibt trotz unbeschränktem Integranden endlich — der Peak ist „dünn genug".</p>`,
        erfuellt: String.raw`<p>\(\displaystyle\int_0^{1}\frac{dx}{\sqrt{x}}\):</p>\[\int_{\varepsilon}^{1}\frac{dx}{\sqrt x}=\big[2\sqrt{x}\big]_{\varepsilon}^{1}=2-2\sqrt{\varepsilon}\ \xrightarrow[\varepsilon\to0^{+}]{}\ 2\]<p>⇒ konvergent mit Wert \(2\) (\(p=\tfrac12<1\)).</p>`,
        verletzt: String.raw`<p>\(\displaystyle\int_0^{1}\frac{dx}{x}\):</p>\[\int_{\varepsilon}^{1}\frac{dx}{x}=-\ln\varepsilon\ \xrightarrow[\varepsilon\to0^{+}]{}\ +\infty\]<p>⇒ divergent — die Fläche unter der Hyperbel ist auch am Pol unendlich.</p>`,
        plus: String.raw`<p><b>p-Test bei \(0\):</b> \(\int_0^{1}x^{-p}dx\) konvergiert \(\Leftrightarrow p<1\) — genau <b>umgekehrt</b> zu \(+\infty\)! Merkhilfe: \(\infty\) mag große \(p\) (schneller Abfall), \(0\) mag kleine \(p\) (flacher Pol). Grenzfall \(p=1\) divergiert an beiden Enden.</p>`}},
       {id:"5.1.3", title:"U.e. Integrale bzgl. eines inneren Punktes", body:{
        def: String.raw`Sei \(a<c<b\) und \(f\) auf \([a,c-\varepsilon_1]\) und \([c+\varepsilon_2,b]\) Riemann-integrierbar (für alle \(\varepsilon_1,\varepsilon_2>0\)). Das u.e. Integral konvergiert, falls <b>beide</b> u.e. Integrale unabhängig voneinander konvergieren:\[\int_a^{b}\!f\ :=\ \lim_{\varepsilon_1\to0^{+}}\int_a^{c-\varepsilon_1}\!f\ +\ \lim_{\varepsilon_2\to0^{+}}\int_{c+\varepsilon_2}^{b}\!f\]`,
        worte: String.raw`<p>Pol mitten im Intervall → bei \(c\) <b>aufspalten</b> und beide Seiten getrennt behandeln. Wichtig: \(\varepsilon_1\) und \(\varepsilon_2\) laufen <b>unabhängig</b> gegen 0 — jedes Teilintegral muss für sich konvergieren. (Lässt man sie gekoppelt laufen, landet man beim Hauptwert → 5.1.4.)</p>`,
        erfuellt: String.raw`<p>\(\displaystyle\int_{-1}^{1}\frac{dx}{\sqrt{|x|}}\) (Pol bei \(0\), Tafel-Beispiel):</p>\[\int_{-1}^{0}\frac{dx}{\sqrt{-x}}=2,\qquad \int_{0}^{1}\frac{dx}{\sqrt{x}}=2\]<p>Beide Seiten konvergieren einzeln ⇒ Integral konvergent mit Wert \(2+2=4\).</p>`,
        verletzt: String.raw`<p>\(\displaystyle\int_{-1}^{1}\frac{dx}{x}\) (Pol bei \(0\)):</p>\[\int_{\varepsilon_2}^{1}\frac{dx}{x}=-\ln\varepsilon_2\to+\infty,\qquad \int_{-1}^{-\varepsilon_1}\frac{dx}{x}=\ln\varepsilon_1\to-\infty\]<p>Beide Teilintegrale divergieren einzeln ⇒ <b>nicht</b> konvergent (obwohl der Hauptwert \(0\) existiert!).</p>`,
        plus: String.raw`<p>Standard-Klausurfehler: den Pol im Inneren übersehen und einfach die Stammfunktion an den Rändern auswerten — das liefert Unsinn (z. B. „\(\int_{-1}^{1}\frac{dx}{x^{2}}=-2\)", obwohl der Integrand positiv ist!). Immer erst alle Singularitäten suchen und aufspalten.</p>`}},
       {id:"5.1.4", title:"Der Cauchy-Hauptwert (v.p.)", body:{
        def: String.raw`Pol bei \(c\in\left]a,b\right[\): das Integral <b>konvergiert im Sinne des Hauptwertes</b>, wenn der folgende (gekoppelte, symmetrische) Grenzwert existiert:\[\mathrm{v.p.}\!\int_a^{b}\!f\ :=\ \lim_{\varepsilon\to0^{+}}\Big(\int_a^{c-\varepsilon}\!f+\int_{c+\varepsilon}^{b}\!f\Big)\]Analog bzgl. Unendlich: \(\displaystyle\mathrm{v.p.}\!\int_{-\infty}^{+\infty}\!f:=\lim_{R\to+\infty}\int_{-R}^{R}\!f\).`,
        worte: String.raw`<p>Statt zwei unabhängiger Grenzwerte nur <b>einer</b>: links und rechts vom Pol wird mit derselben Breite \(\varepsilon\) ausgeschnitten (bzw. beide Enden mit demselben \(R\) abgeschnitten). Dadurch können sich \(\pm\infty\)-Beiträge symmetrisch <b>wegheben</b> — der Hauptwert kann existieren, obwohl das Integral divergiert.</p>`,
        erfuellt: String.raw`<p>\(\displaystyle\mathrm{v.p.}\!\int_{-1}^{1}\frac{dx}{x}\): beide Teile mit \(\ln|x|\) ausrechnen:</p>\[\int_{-1}^{-\varepsilon}\frac{dx}{x}=\ln\varepsilon,\qquad\int_{\varepsilon}^{1}\frac{dx}{x}=-\ln\varepsilon\ \Rightarrow\ \text{Summe}=0\ \forall\varepsilon\]\[\Rightarrow\ \mathrm{v.p.}\!\int_{-1}^{1}\frac{dx}{x}=0.\]`,
        verletzt: String.raw`<p>\(\displaystyle\mathrm{v.p.}\!\int_{-1}^{1}\frac{dx}{x^{2}}\) existiert <b>nicht</b>:</p>\[\int_{-1}^{-\varepsilon}\frac{dx}{x^{2}}+\int_{\varepsilon}^{1}\frac{dx}{x^{2}}=2\Big(\frac{1}{\varepsilon}-1\Big)\ \xrightarrow[\varepsilon\to0^{+}]{}\ +\infty\]<p>Beide Seiten sind \(+\infty\) — nichts hebt sich weg (keine Vorzeichen-Symmetrie).</p>`,
        plus: String.raw`<p>Hierarchie: konvergent \(\Rightarrow\) v.p. existiert (mit demselben Wert) — die Umkehrung ist falsch (\(\int\frac{dx}{x}\)). Bei unsymmetrischen Grenzen bleibt ein echter Wert übrig: \(\mathrm{v.p.}\!\int_{-1}^{2}\frac{dx}{x}=\ln2\) (Rechnung im Spickzettel <a href="#/ref/konv_integrale">Konvergenz — Integrale</a>).</p>`}},
       {id:"5.1.5", title:"Cauchy-Kriterium; Linearität", body:{
        def: String.raw`<b>Satz (Cauchy-Kriterium):</b> \(F(R)=\int_A^{R}f\) konvergiert für \(R\to+\infty\) genau dann, wenn\[\forall\varepsilon>0\ \exists R_\varepsilon\ge A\ \forall R'',R'\ge R_\varepsilon:\quad \Big\|\int_{R'}^{R''}\!f(x)\,dx\Big\|=\|F(R'')-F(R')\|<\varepsilon.\]<b>Linearität:</b> konvergieren \(\int_A^{+\infty}f\) und \(\int_A^{+\infty}g\), so auch \(\int_A^{+\infty}(\alpha f+\beta g)=\alpha\!\int_A^{+\infty}\!f+\beta\!\int_A^{+\infty}\!g\).`,
        worte: String.raw`<p>Konvergenz, <b>ohne den Wert zu kennen</b>: die Flächenzuwächse weit draußen (zwischen zwei großen Schranken \(R',R''\)) müssen beliebig klein werden. Funktioniert, weil \(\mathbb K^{p}\) vollständig ist. Die Linearität erlaubt es, Integrale wie Vektoren zu addieren und zu skalieren.</p>`,
        erfuellt: String.raw`<p>\(\displaystyle\int_0^{+\infty}e^{-x}dx\): für \(R''\ge R'\)</p>\[\Big|\int_{R'}^{R''}e^{-x}dx\Big|=e^{-R'}-e^{-R''}\le e^{-R'}<\varepsilon\ \text{ für }R'>\ln\tfrac1\varepsilon\]<p>⇒ Cauchy-Bedingung erfüllt ⇒ konvergent.</p>`,
        verletzt: String.raw`<p>\(\displaystyle\int_1^{+\infty}\frac{dx}{x}\): der Block-Trick —</p>\[\int_{R}^{2R}\frac{dx}{x}=\ln 2\quad\text{für jedes }R\]<p>Der Zuwachs wird <b>nie</b> kleiner als \(\ln2\) ⇒ Cauchy verletzt ⇒ divergent (ganz ohne Stammfunktions-Grenzwert).</p>`,
        plus: String.raw`<p>Der Block-Trick \(\int_R^{2R}\) ist das Integral-Gegenstück zu \(S_{2n}-S_n\) bei Reihen. Und nochmal: \(f(x)\to0\) ist <b>notwendig nicht mal nötig und sicher nicht hinreichend</b> — es gibt konvergente u.e. Integrale mit \(f\not\to0\) (schmale hohe Zacken) und divergente mit \(f\to0\) (\(\tfrac1x\)).</p>`}}]},
    {id:"5.2",  t:"Reihen: Grundbegriffe", topics:[
       {id:"5.2.1", title:"Reihen, Partialsummen, Reihenwert", body:{
        def: String.raw`Sei \((a_k)_{k\ge1}\subset\mathbb K^{p}\). Die <b>Partialsummen</b> sind \(S_n=\sum_{k=1}^{n}a_k\). Die Reihe konvergiert mit Wert \(S\), falls\[\sum_{k=1}^{+\infty}a_k\ =\ S\ :\Longleftrightarrow\ \lim_{n\to\infty}S_n=S.\]`,
        worte: String.raw`<p>Eine Reihe ist nichts Eigenes — sie <b>ist</b> die Folge ihrer Zwischensummen \(S_1,S_2,S_3,\dots\) Jede Aussage über Reihen (Konvergenz, Kriterien, Grenzwertsätze) ist eine Aussage über diese Folge. Wer das verinnerlicht, kann alle Folgen-Werkzeuge (Cauchy, Monotonie, Teilfolgen) direkt auf Reihen anwenden.</p>`,
        erfuellt: String.raw`<p>Geometrische Reihe \(q=\tfrac12\): Partialsummen explizit,</p>\[S_n=\sum_{k=1}^{n}\Big(\tfrac12\Big)^{k}=1-\tfrac{1}{2^{n}}\ \longrightarrow\ 1\]<p>⇒ konvergent mit Wert \(1\).</p>`,
        verletzt: String.raw`<p>\(\displaystyle\sum_{k=1}^{+\infty}(-1)^{k+1}\): \(S_n=1,0,1,0,\dots\) hat zwei Häufungswerte ⇒ \((S_n)\) divergiert ⇒ Reihe divergent (das ist die Grandi-Reihe — sie bekommt erst per Cesàro/Abel einen „Wert", siehe 5.6.3/5.6.4).</p>`,
        plus: String.raw`<p>Endlich viele Glieder ändern/weglassen ändert nichts an der <b>Konvergenz</b>, wohl aber am <b>Wert</b>. Notation der Vorlesung: \(a_k\in\mathbb K^{p}\) — alles gilt komponentenweise auch für Vektoren/komplexe Zahlen.</p>`}},
       {id:"5.2.2", title:"Reihen im Sinne des Hauptwertes", body:{
        def: String.raw`Für eine <b>zweiseitige</b> Folge \((a_k)_{k\in\mathbb Z}\subset\mathbb K^{p}\) definiert man\[\mathrm{v.p.}\!\!\sum_{k=-\infty}^{+\infty}a_k\ :=\ \lim_{n\to\infty}\ \sum_{k=-n}^{n}a_k\](symmetrisch abgeschnitten — das Reihen-Gegenstück zum Hauptwert-Integral).`,
        worte: String.raw`<p>Beide „Enden" der Summe werden mit derselben Schranke \(n\) gekappt. Positive und negative Ausreißer können sich dadurch symmetrisch wegheben — genau wie beim v.p.-Integral kann der Hauptwert existieren, obwohl die beiden einseitigen Reihen einzeln divergieren.</p>`,
        erfuellt: String.raw`<p>\(a_k=k\) für \(k\in\mathbb Z\):</p>\[\sum_{k=-n}^{n}k=0\quad\forall n\qquad\Rightarrow\qquad \mathrm{v.p.}\!\!\sum_{k=-\infty}^{+\infty}k=0.\]`,
        verletzt: String.raw`<p>Gewöhnliche (unabhängige) Konvergenz derselben Reihe scheitert: \(\sum_{k\ge1}k=+\infty\) und \(\sum_{k\le-1}k=-\infty\) — beide Seiten müssen einzeln konvergieren, tun sie nicht.</p>`,
        plus: String.raw`<p>Wichtigste Anwendung: <b>Fourierreihen</b> \(\sum_{k\in\mathbb Z}\gamma_k e^{\mathrm ikx}\) werden genau in diesem symmetrischen Sinn summiert. Konvergiert \(\sum\|a_k\|\) (absolut), stimmen Hauptwert und gewöhnlicher Wert überein.</p>`}},
       {id:"5.2.3", title:"Das Cauchy-Kriterium für Reihen", body:{
        def: String.raw`<b>Satz:</b> \(\displaystyle\sum_{k=1}^{+\infty}a_k\) konvergiert genau dann, wenn\[\forall\varepsilon>0\ \exists N_\varepsilon\ \forall m>n\ge N_\varepsilon:\quad \Big\|\sum_{k=n+1}^{m}a_k\Big\|=\|S_m-S_n\|<\varepsilon.\]`,
        worte: String.raw`<p>Jeder <b>Restblock</b> weit hinten muss beliebig klein werden — egal wie lang er ist. Vorteil: man braucht keinen Kandidaten für den Grenzwert. Das funktioniert, weil \(\mathbb K^{p}\) vollständig ist (Cauchy ⇔ konvergent).</p>`,
        erfuellt: String.raw`<p>Geometrisch, \(|q|<1\): Restblock abschätzen,</p>\[\Big|\sum_{k=n+1}^{m}q^{k}\Big|\le\sum_{k=n+1}^{m}|q|^{k}\le\frac{|q|^{n+1}}{1-|q|}\ \xrightarrow[n\to\infty]{}\ 0\]<p>⇒ Cauchy erfüllt ⇒ konvergent.</p>`,
        verletzt: String.raw`<p>Harmonische Reihe — der <b>Block-Trick</b> (Tafel):</p>\[S_{2n}-S_n=\sum_{k=n+1}^{2n}\frac1k\ \ge\ n\cdot\frac{1}{2n}=\frac12\quad\forall n\]<p>Ein fester Block wird nie klein ⇒ Cauchy verletzt ⇒ \(\sum\frac1k\) divergiert.</p>`,
        plus: String.raw`<p>Mit \(m=n+1\) folgt sofort das notwendige Kriterium \(a_k\to0\) (5.2.4). Die Blockbildung \(1+(\tfrac12+\tfrac13)+(\tfrac14+\cdots+\tfrac17)+\cdots\ge1+\tfrac12+\tfrac12+\cdots\) ist dieselbe Idee in Verkleidung.</p>`}},
       {id:"5.2.4", title:"Notwendiges Kriterium: aₖ → 0", body:{
        def: String.raw`<b>Satz:</b>\[\sum_{k=1}^{+\infty}a_k\ \text{konvergiert}\quad\Longrightarrow\quad a_k\xrightarrow[k\to\infty]{}0.\]Kontraposition (so benutzt man es): \(a_k\not\to0\ \Rightarrow\ \sum a_k\) divergiert. <b>Die Umkehrung gilt nicht!</b>`,
        worte: String.raw`<p>Wenn sich die Zwischensummen einpendeln, müssen die einzelnen Schritte \(a_k=S_k-S_{k-1}\) gegen null gehen. Das ist ein reiner <b>Ausschluss-Test</b>: er kann Divergenz beweisen, aber niemals Konvergenz — dafür braucht es echte Kriterien (5.3/5.4).</p>`,
        erfuellt: String.raw`<p>Test schlägt an: \(\displaystyle\sum_{k=1}^{+\infty}\frac{k}{k+1}\): wegen \(a_k=\frac{k}{k+1}\to1\neq0\) sofort <b>divergent</b> — eine Zeile, fertig.</p>`,
        verletzt: String.raw`<p>Test sagt nichts (Umkehrung falsch): harmonische Reihe \(\sum\frac1k\): zwar \(a_k=\frac1k\to0\), aber die Reihe <b>divergiert</b> trotzdem (Block-Trick, 5.2.3). \(a_k\to0\) ist notwendig, nie hinreichend.</p>`,
        plus: String.raw`<p>In der Klausur <b>immer der erste Check</b> — kostet 5 Sekunden. Er folgt aus dem Cauchy-Kriterium mit \(m=n+1\): \(\|a_{n+1}\|=\|S_{n+1}-S_n\|<\varepsilon\).</p>`}}]},
    {id:"5.3",  t:"Reihen mit nichtnegativen Summanden", topics:[
       {id:"5.3.1", title:"Monotonie der Partialsummen", body:{
        def: String.raw`<b>Satz:</b> Sei \(a_k\ge0\) für alle \(k\). Dann ist \((S_n)\) monoton wachsend, und es gibt genau zwei Möglichkeiten:\[\text{entweder }S_n\to+\infty\quad\text{oder}\quad\sum_{k=1}^{+\infty}a_k=\lim_n S_n=\sup_{n}S_n\in\mathbb R.\]Insbesondere: konvergent \(\Longleftrightarrow\) \((S_n)\) beschränkt.`,
        worte: String.raw`<p>Bei nichtnegativen Gliedern kann die Summenfolge nur <b>bergauf</b> laufen — oszillieren ist unmöglich. Also entscheidet allein die Frage: bleibt sie unter einer Deckel-Schranke (dann konvergiert sie gegen ihr Supremum) oder wächst sie über alles hinaus? Deshalb genügt bei \(a_k\ge0\) immer eine <b>Schranke</b> für Konvergenz.</p>`,
        erfuellt: String.raw`<p>\(\displaystyle\sum\frac{1}{k^{2}}\): beschränkt via Teleskop,</p>\[S_n\le 1+\sum_{k=2}^{n}\frac{1}{k(k-1)}=1+\Big(1-\frac1n\Big)<2\]<p>⇒ beschränkt & monoton ⇒ konvergent (Wert: \(\frac{\pi^{2}}{6}\), Basel).</p>`,
        verletzt: String.raw`<p>Harmonische Reihe: unbeschränkt, denn mit den Blöcken \(S_{2^{m}}\ge1+\frac m2\to+\infty\) ⇒ \(S_n\to+\infty\), divergent.</p>`,
        plus: String.raw`<p>Das ist das Fundament <b>aller</b> Vergleichskriterien: Majorante liefert die Schranke, fertig. Achtung: bei Vorzeichenwechseln gilt nichts davon — dann kann \((S_n)\) oszillieren (Grandi).</p>`}},
       {id:"5.3.2", title:"Das Vergleichskriterium (Majorante/Minorante)", body:{
        def: String.raw`<b>Satz (Tafel):</b> Sei \(0\le b_k\le a_k\) für \(k\ge k_0\). Dann:\[(1)\ \sum_{k=1}^{+\infty}a_k\ \text{konv.}\ \Rightarrow\ \sum_{k=1}^{+\infty}b_k\ \text{konv.}\qquad (2)\ \sum_{k=1}^{+\infty}b_k\ \text{div.}\ \Rightarrow\ \sum_{k=1}^{+\infty}a_k\ \text{div.}\]`,
        worte: String.raw`<p>Die kleinere Reihe erbt Konvergenz von der größeren (<b>Majorante</b> = Deckel), die größere erbt Divergenz von der kleineren (<b>Minorante</b> = Rampe). Beweis über 5.3.1: die Partialsummen der kleineren sind durch die der größeren beschränkt. Ab \(k_0\) reicht — endlich viele Glieder sind egal.</p>`,
        erfuellt: String.raw`<p>Majorante: \(\displaystyle\sum\frac{1}{2^{k}+k}\): wegen \(\frac{1}{2^{k}+k}\le\frac{1}{2^{k}}\) und \(\sum\frac{1}{2^{k}}=1\) konvergent.</p>`,
        verletzt: String.raw`<p>Minorante: \(\displaystyle\sum\frac{1}{\sqrt k}\): wegen \(\frac{1}{\sqrt k}\ge\frac1k\) und \(\sum\frac1k=+\infty\) divergent.</p>`,
        plus: String.raw`<p>Standard-Vergleichspartner: p-Reihe \(\sum k^{-p}\) (konv. \(\Leftrightarrow p>1\)) und geometrische Reihe. Bequeme Variante: <b>Grenzwertvergleich</b> \(a_k/b_k\to c\in\left]0,+\infty\right[\) ⇒ gleiches Verhalten. Tricks & typische Majoranten: Spickzettel <a href="#/ref/konv_summen">Konvergenz — Reihen</a>.</p>`}},
       {id:"5.3.3", title:"Der Umordnungssatz", body:{
        def: String.raw`<b>Satz:</b> Sei \(a_k\ge0\) (oder \(\sum a_k\) absolut konvergent) und \(\Phi:\mathbb N\to\mathbb N\) bijektiv. Dann\[\sum_{k=1}^{+\infty}a_{\Phi(k)}\ =\ \sum_{k=1}^{+\infty}a_k\](gleicher Wert; bei \(a_k\ge0\) einschließlich des Falls \(+\infty\)).`,
        worte: String.raw`<p>Man darf die Glieder <b>beliebig umsortieren</b>, ohne den Wert zu ändern — wie bei endlichen Summen. Grund bei \(a_k\ge0\): jede Partialsumme der umgeordneten Reihe wird von einer Partialsumme der Original-Reihe dominiert und umgekehrt ⇒ gleiches Supremum.</p>`,
        beispiel: String.raw`<p>\(\sum\frac{1}{k^{2}}=\frac{\pi^{2}}{6}\): ob man erst alle geraden, dann alle ungeraden \(k\) aufsummiert oder wild mischt — Supremum und damit Wert bleiben \(\frac{\pi^{2}}{6}\). Formal: jede endliche Teilsumme der Umordnung ist \(\le\sup_n S_n\), und umgekehrt.</p>`,
        plus: String.raw`<p>Die Voraussetzung ist <b>essenziell</b>: für bedingt konvergente Reihen ist Umordnen brandgefährlich — der Riemannsche Umordnungssatz (5.3.4) zeigt, dass man dann <i>jeden</i> Wert erzeugen kann.</p>`}},
       {id:"5.3.4", title:"Der Umordnungssatz von Riemann", body:{
        def: String.raw`<b>Satz:</b> Sei \((a_k)\subset\mathbb R\), \(\sum a_k\) konvergent, aber <b>nicht absolut</b>. Dann gibt es zu <b>jedem</b> \(S\in\mathbb R\cup\{\pm\infty\}\) eine Bijektion \(\Phi\) mit \(\sum_{k}a_{\Phi(k)}=S\). Kern (Tafel): mit \(a_k^{+}=\max\{a_k,0\}\), \(a_k^{-}=\min\{a_k,0\}\) divergieren \(\sum a_k^{+}=+\infty\) und \(\sum a_k^{-}=-\infty\), während \(a_k\to0\).`,
        worte: String.raw`<p>Bedingte Konvergenz lebt von der Auslöschung: der Plus-Vorrat und der Minus-Vorrat sind beide unendlich. Also kann man „greedy" umsortieren: erst positive Glieder bis über das Ziel \(S\), dann negative bis darunter, usw. — weil \(a_k\to0\), werden die Überschwinger beliebig klein und die Umordnung konvergiert gegen \(S\).</p>`,
        beispiel: String.raw`<p>Alternierende harmonische Reihe \(=\ln2\). Umordnung „1 positives, 2 negative":</p>\[\Big(1-\frac12\Big)-\frac14+\Big(\frac13-\frac16\Big)-\frac18+\cdots=\frac12-\frac14+\frac16-\frac18+\cdots=\frac12\ln 2\]<p>Gleiche Glieder, <b>halber</b> Wert — nur durch Umsortieren!</p>`,
        plus: String.raw`<p>Moral fürs Rechnen: Reihenfolge tauschen, Klammern setzen, Doppelsummen vertauschen — alles nur bei <b>absoluter</b> Konvergenz (oder \(a_k\ge0\)) erlaubt. In \(\mathbb K^p\) gilt: absolut konvergent ⇔ jede Umordnung konvergiert (gegen denselben Wert).</p>`}},
       {id:"5.3.5", title:"Summen über abzählbare Mengen; Doppelreihen", body:{
        def: String.raw`Sei \(A\) abzählbar unendlich und \(a_\alpha\ge0\) für \(\alpha\in A\). Man setzt (Tafel):\[\sum_{\alpha\in A}a_\alpha\ :=\ \sup_{M\subset A\ \text{endlich}}\ \sum_{\alpha\in M}a_\alpha\ =\ \sum_{k=1}^{+\infty}a_{\Phi(k)}\ \text{für jede Bijektion }\Phi:\mathbb N\to A.\]<b>Satz über Doppelreihen</b> (\(a_{k,\ell}\ge0\)):\[\sum_{(k,\ell)\in\mathbb N^{2}}a_{k,\ell}=\sum_{k=1}^{+\infty}\Big(\sum_{\ell=1}^{+\infty}a_{k,\ell}\Big)=\sum_{\ell=1}^{+\infty}\Big(\sum_{k=1}^{+\infty}a_{k,\ell}\Big).\]`,
        worte: String.raw`<p>Bei nichtnegativen Summanden braucht die Indexmenge keine Reihenfolge: der Wert ist einfach das Supremum aller endlichen Teilsummen — unabhängig davon, wie man abzählt. Für Doppelfolgen heißt das: <b>zeilenweise, spaltenweise oder diagonal</b> summieren gibt dasselbe.</p>`,
        beispiel: String.raw`<p>\(\displaystyle\sum_{(k,\ell)\in\mathbb N^{2}}\frac{1}{2^{k}\,3^{\ell}}\) (Zeilen zuerst):</p>\[\sum_{k=1}^{+\infty}\frac{1}{2^{k}}\sum_{\ell=1}^{+\infty}\frac{1}{3^{\ell}}=1\cdot\frac{1/3}{1-1/3}=1\cdot\frac12=\frac12.\]<p>Spalten zuerst liefert (natürlich) dasselbe.</p>`,
        plus: String.raw`<p>Mit Vorzeichen gilt der Doppelreihensatz nur bei <b>absoluter</b> Konvergenz (\(\sum_{(k,\ell)}\|a_{k,\ell}\|<\infty\)) — sonst kann Zeilen-/Spaltentausch verschiedene Werte liefern. Tafel-Zusatz: \(A\cup B,\ A\times B,\ A^{m}\) abzählbarer Mengen sind wieder abzählbar.</p>`}},
       {id:"5.3.6", title:"Produkte von Reihen (Cauchy-Produkt)", body:{
        def: String.raw`<b>Satz:</b> Sind \(a_k,b_\ell\ge0\) (oder beide Reihen absolut konvergent), so gilt\[\Big(\sum_{k=0}^{+\infty}a_k\Big)\Big(\sum_{\ell=0}^{+\infty}b_\ell\Big)=\sum_{(k,\ell)}a_k b_\ell=\sum_{n=0}^{+\infty}c_n,\qquad c_n=\sum_{k=0}^{n}a_k\,b_{n-k}\]— die Anordnung nach Diagonalen \(k+\ell=n\) heißt <b>Cauchy-Produkt</b>.`,
        worte: String.raw`<p>Zwei Reihen ausmultiplizieren wie Polynome: jedes \(a_k\) trifft jedes \(b_\ell\). Damit man die entstehende Doppelsumme beliebig anordnen darf (z. B. nach Diagonalen), braucht man den Doppelreihensatz — also Nichtnegativität oder absolute Konvergenz.</p>`,
        beispiel: String.raw`<p>Der Klassiker \(e^{x}e^{y}=e^{x+y}\): mit \(a_k=\frac{x^{k}}{k!},\ b_\ell=\frac{y^{\ell}}{\ell!}\):</p>\[c_n=\sum_{k=0}^{n}\frac{x^{k}}{k!}\,\frac{y^{n-k}}{(n-k)!}=\frac{1}{n!}\sum_{k=0}^{n}\binom{n}{k}x^{k}y^{n-k}=\frac{(x+y)^{n}}{n!}\]<p>(binomische Formel) ⇒ \(\sum c_n=e^{x+y}\). ✓</p>`,
        plus: String.raw`<p>Bei nur bedingter Konvergenz kann das Cauchy-Produkt divergieren — Standard-Gegenbeispiel \(a_k=b_k=\frac{(-1)^{k}}{\sqrt{k+1}}\): beide konvergieren (Leibniz), aber \(|c_n|\ge1\not\to0\).</p>`}}]},
    {id:"5.4",  t:"Konvergenzkriterien", topics:[
       {id:"5.4.1", title:"Quotientenkriterium (d'Alembert)", body:{
        def: String.raw`<b>Satz:</b> Sei \(a_k>0\) für \(k\ge k_0\).\[(1)\ \frac{a_{k+1}}{a_k}\le q<1\ \ \forall k\ge k_0\ \Rightarrow\ \sum a_k\ \text{konvergiert}\qquad(2)\ \frac{a_{k+1}}{a_k}\ge1\ \ \forall k\ge k_0\ \Rightarrow\ \sum a_k\ \text{divergiert}\](bei (2): \(a_k\ge a_{k_0}>0\), also \(a_k\not\to0\)).`,
        worte: String.raw`<p>Man vergleicht die Reihe mit einer geometrischen: fällt jedes Glied mindestens um den <b>festen</b> Faktor \(q<1\), ist \(a_k\le a_{k_0}q^{k-k_0}\) — geometrische Majorante, fertig. Einsetzen, wenn sich \(a_{k+1}/a_k\) schön kürzt: Fakultäten \(k!\), Potenzen \(q^{k}\), Produkte.</p>`,
        erfuellt: String.raw`<p>\(\displaystyle\sum\frac{1+k}{2^{k}}\) (Tafel-Beispiel):</p>\[\frac{a_{k+1}}{a_k}=\frac{2+k}{2(1+k)}\ \longrightarrow\ \frac12<1\]<p>ab großem \(k\) also \(\le q<1\) ⇒ konvergent.</p>`,
        verletzt: String.raw`<p>\(\displaystyle\sum\frac{k!}{2^{k}}\) (Tafel-Beispiel):</p>\[\frac{a_{k+1}}{a_k}=\frac{(k+1)!}{2^{k+1}}\cdot\frac{2^{k}}{k!}=\frac{k+1}{2}\ \ge\ 1\quad(k\ge1)\]<p>⇒ divergent (die Glieder wachsen sogar).</p>`,
        plus: String.raw`<p><b>Klassische Falle:</b> \(\frac{a_{k+1}}{a_k}<1\) allein reicht <b>nicht</b> — es braucht ein festes \(q<1\). Gegenbeispiel: harmonische Reihe, \(\frac{a_{k+1}}{a_k}=\frac{k}{k+1}<1\), aber divergent. Praktische Limes-Fassung: 5.4.3.</p>`}},
       {id:"5.4.2", title:"Wurzelkriterium (Cauchy)", body:{
        def: String.raw`<b>Satz:</b> Sei \(a_k\ge0\).\[(1)\ \sqrt[k]{a_k}\le q<1\ \ \forall k\ge k_0\ \Rightarrow\ \sum a_k\ \text{konvergiert}\qquad(2)\ \sqrt[k]{a_k}\ge1\ \text{für unendlich viele }k\ \Rightarrow\ \sum a_k\ \text{divergiert}\](bei (1): \(a_k\le q^{k}\) — geometrische Majorante; bei (2): \(a_k\ge1\) unendlich oft, also \(a_k\not\to0\)).`,
        worte: String.raw`<p>Direkter Vergleich mit \(q^{k}\): die \(k\)-te Wurzel misst die „mittlere Abfallrate pro Schritt". Einsetzen, wenn \(a_k\) selbst eine \(k\)-te Potenz \((\dots)^{k}\) ist — die Wurzel räumt den Exponenten ab.</p>`,
        erfuellt: String.raw`<p>\(\displaystyle\sum\Big(\frac{k}{k+1}\Big)^{k^{2}}\):</p>\[\sqrt[k]{a_k}=\Big(\frac{k}{k+1}\Big)^{k}=\Big(1+\frac1k\Big)^{-k}\ \longrightarrow\ \frac1e<1\ \Rightarrow\ \text{konvergent.}\]`,
        verletzt: String.raw`<p>\(\displaystyle\sum\Big(\frac{2k}{k+1}\Big)^{k}\):</p>\[\sqrt[k]{a_k}=\frac{2k}{k+1}\ \longrightarrow\ 2>1\]<p>⇒ ab großem \(k\) ist \(a_k\ge1\) ⇒ divergent.</p>`,
        plus: String.raw`<p>Das Wurzelkriterium ist <b>stärker</b> als das Quotientenkriterium (wo der Quotient entscheidet, entscheidet auch die Wurzel — nicht umgekehrt). Nützliche Wurzel-Werte: \(\sqrt[k]{k}\to1\), \(\big(1+\tfrac1k\big)^{k}\to e\). Bei Potenzreihen wird daraus Cauchy-Hadamard (6.10.1).</p>`}},
       {id:"5.4.3", title:"Kriterien in Limesform (limsup/liminf)", body:{
        def: String.raw`<b>Satz (Tafel):</b> Sei \(a_k>0\) (bzw. \(\ge0\) für die Wurzel).\[\limsup_{k\to\infty}\frac{a_{k+1}}{a_k}<1\ \Rightarrow\ \text{konv.},\qquad \liminf_{k\to\infty}\frac{a_{k+1}}{a_k}>1\ \Rightarrow\ \text{div.}\]\[\limsup_{k\to\infty}\sqrt[k]{a_k}<1\ \Rightarrow\ \text{konv.},\qquad \limsup_{k\to\infty}\sqrt[k]{a_k}>1\ \Rightarrow\ \text{div.}\]Existiert \(\lim x_k\), so ist \(\lim=\liminf=\limsup\) — dann einfach den Limes einsetzen.`,
        worte: String.raw`<p>Die bequeme Alltagsform: Quotient bzw. Wurzel ausrechnen, Grenzwert \(L\) bilden — \(L<1\) konvergent, \(L>1\) divergent, <b>\(L=1\) keine Aussage</b>. limsup/liminf braucht man nur, wenn der Limes nicht existiert (oszillierende Quotienten).</p>`,
        erfuellt: String.raw`<p>\(\displaystyle\sum\frac{k}{2^{k}}\):</p>\[\frac{a_{k+1}}{a_k}=\frac{k+1}{2k}\ \longrightarrow\ L=\frac12<1\ \Rightarrow\ \text{konvergent.}\]`,
        verletzt: String.raw`<p>Der Fall \(L=1\) entscheidet <b>nichts</b>: \(\sum\frac1k\) (divergent) und \(\sum\frac{1}{k^{2}}\) (konvergent) haben beide</p>\[\frac{a_{k+1}}{a_k}\to1\quad\text{und}\quad\sqrt[k]{a_k}\to1.\]<p>Dann helfen nur Vergleich/Integralkriterium.</p>`,
        plus: String.raw`<p>Grund für die Asymmetrie beim Quotienten (\(\liminf\) für Divergenz): der Quotient darf zwischendurch klein werden — divergiert erst sicher, wenn er <i>schließlich immer</i> \(\ge1\) ist. Der Wurzel-limsup existiert dagegen immer.</p>`}},
       {id:"5.4.4", title:"Integralkriterium von MacLaurin & Cauchy", body:{
        def: String.raw`<b>Satz (Tafel V15):</b> Sei \(f:[1,+\infty[\,\to\mathbb R\), \(f\ge0\), monoton fallend, und \(a_k=f(k)\). Dann konvergieren\[\sum_{k=1}^{+\infty}a_k\quad\text{und}\quad\int_1^{+\infty}\!f(x)\,dx\quad\textbf{gleichzeitig},\]mit der Einschließung \(\displaystyle\sum_{k=2}^{+\infty}a_k\ \le\ \int_1^{+\infty}\!f(x)\,dx\ \le\ \sum_{k=1}^{+\infty}a_k\).`,
        worte: String.raw`<p>Die Reihe ist eine Treppenfläche, das Integral die glatte Fläche darunter/darüber: weil \(f\) fällt, passt die Treppe von oben <i>und</i> von unten (um eins verschoben) an die Kurve. Einsetzen, wenn \(f\) leicht zu integrieren ist — dann übersetzt man das Reihen-Problem in ein Integral-Problem.</p>`,
        erfuellt: String.raw`<p>p-Reihe, \(p>1\): \(f(x)=x^{-p}\) ist \(\ge0\), fallend,</p>\[\int_1^{+\infty}\frac{dx}{x^{p}}=\frac{1}{p-1}<\infty\ \Rightarrow\ \sum\frac{1}{k^{p}}\ \text{konvergent.}\]`,
        verletzt: String.raw`<p>\(\displaystyle\sum_{k=2}^{+\infty}\frac{1}{k\ln k}\): \(f(x)=\frac{1}{x\ln x}\) fallend,</p>\[\int_2^{+\infty}\frac{dx}{x\ln x}=\ln\ln x\Big|_2^{+\infty}=+\infty\ \Rightarrow\ \text{divergent}\]<p>— obwohl die Glieder schneller fallen als \(\frac1k\)!</p>`,
        plus: String.raw`<p>Die Einschließung liefert gratis Abschätzungen, z. B. \(\ln(n+1)\le S_n\le 1+\ln n\) für die harmonische Reihe (logarithmisches Wachstum). Monotonie von \(f\) nicht vergessen — ohne sie ist der Satz falsch.</p>`}}]},
    {id:"5.5",  t:"Absolute Konvergenz", topics:[
       {id:"5.5.1", title:"Absolute Konvergenz von Reihen", body:{
        def: String.raw`\(\displaystyle\sum_{k=1}^{+\infty}a_k\) (mit \(a_k\in\mathbb K^{p}\)) heißt <b>absolut konvergent</b> \(:\Longleftrightarrow\ \sum_{k=1}^{+\infty}\|a_k\|<+\infty\).\[\textbf{Satz: absolut konvergent}\ \Rightarrow\ \textbf{konvergent},\quad\text{und}\quad\Big\|\sum_{k}a_k\Big\|\le\sum_{k}\|a_k\|.\]`,
        worte: String.raw`<p>Auch nach Wegwerfen aller Vorzeichen (bzw. Übergang zu Beträgen/Normen) bleibt die Summe endlich. Beweis-Idee (Tafel): Cauchy-Kriterium + Dreiecksungleichung — \(\big\|\sum_{n+1}^{m}a_k\big\|\le\sum_{n+1}^{m}\|a_k\|<\varepsilon\). Das ist die „robuste" Konvergenz: Umordnen, Klammern, Produkte — alles erlaubt.</p>`,
        erfuellt: String.raw`<p>\(\displaystyle\sum\frac{(-1)^{k}}{k^{2}}\): Betragsreihe \(\sum\frac{1}{k^{2}}\) konvergiert (\(p=2>1\)) ⇒ absolut konvergent (und damit erst recht konvergent).</p>`,
        verletzt: String.raw`<p>Alternierende harmonische \(\displaystyle\sum\frac{(-1)^{k+1}}{k}\): konvergiert (Leibniz, \(=\ln2\)), aber</p>\[\sum\Big|\frac{(-1)^{k+1}}{k}\Big|=\sum\frac1k=+\infty\]<p>⇒ nur <b>bedingt</b> konvergent — Umordnen verboten (Riemann, 5.3.4)!</p>`,
        plus: String.raw`<p>Test-Strategie: erst \(\sum\|a_k\|\) mit den Kriterien aus 5.3/5.4 prüfen (dort sind die Glieder \(\ge0\)); scheitert das, alternierende Struktur suchen (Leibniz/Dirichlet, 5.6.2).</p>`}},
       {id:"5.5.2", title:"Absolute Konvergenz u.e. Integrale", body:{
        def: String.raw`Sei \(f:[A,+\infty[\,\to\mathbb K^{p}\) auf jedem endlichen Teilintervall Riemann-integrierbar (dann auch \(\|f\|\), Tafel V16).\[\int_A^{+\infty}\!f\ \text{konvergiert \textbf{absolut}}\ :\Longleftrightarrow\ \int_A^{+\infty}\!\|f(x)\|\,dx\ \text{konvergiert.}\]<b>Satz:</b> absolut konvergent \(\Rightarrow\) konvergent, mit \(\big\|\int_A^{+\infty} f\big\|\le\int_A^{+\infty}\|f\|\).`,
        worte: String.raw`<p>Wörtlich dieselbe Idee wie bei Reihen, nur mit \(\int\) statt \(\sum\): Cauchy-Kriterium plus \(\big\|\int_{R'}^{R''}f\big\|\le\int_{R'}^{R''}\|f\|\). Einsetzen bei Integranden mit Vorzeichenwechseln: erst \(\int\|f\|\) mit Majoranten testen.</p>`,
        erfuellt: String.raw`<p>\(\displaystyle\int_1^{+\infty}\frac{\sin x}{x^{2}}\,dx\): wegen \(\big|\frac{\sin x}{x^{2}}\big|\le\frac{1}{x^{2}}\) und \(\int_1^{+\infty}x^{-2}=1\) absolut konvergent.</p>`,
        verletzt: String.raw`<p>Dirichlet-Integral \(\displaystyle\int_1^{+\infty}\frac{\sin x}{x}\,dx\): <b>konvergiert</b> (partielle Integration: \(\int\frac{\sin x}{x}=\big[-\frac{\cos x}{x}\big]-\int\frac{\cos x}{x^{2}}\), beides kontrolliert) — aber <b>nicht absolut</b>: auf jedem Intervall \([k\pi,(k+1)\pi]\) ist \(\int|\sin x|\,dx=2\), also</p>\[\int_\pi^{n\pi}\frac{|\sin x|}{x}dx\ \ge\ \sum_{k=1}^{n-1}\frac{2}{(k+1)\pi}\ \to\ +\infty.\]`,
        plus: String.raw`<p>Perfekte Analogie zur bedingten Reihen-Konvergenz: \(\int\frac{\sin x}{x}\) ist das Integral-Gegenstück zur alternierenden harmonischen Reihe. Solche „oszillierend geretteten" Integrale behandelt man mit partieller Integration (das Integral-Pendant zur Abelschen Summation 5.6.1).</p>`}}]},
    {id:"5.6",  t:"Weitere Konvergenzkriterien; Summierbarkeit", topics:[
       {id:"5.6.1", title:"Abelsche (partielle) Summation", body:{
        def: String.raw`Seien \(\alpha_k,\beta_k\in\mathbb K\) und \(B_m=\sum_{k=1}^{m}\beta_k\). Dann gilt (Tafel V16):\[\sum_{k=1}^{n}\alpha_k\beta_k\ =\ \sum_{k=1}^{n-1}B_k\big(\alpha_k-\alpha_{k+1}\big)\ +\ \alpha_n B_n.\]`,
        worte: String.raw`<p>Die <b>diskrete partielle Integration</b>: \(\beta\) wird „aufgeleitet" (zu den Partialsummen \(B\)), \(\alpha\) wird „abgeleitet" (zu den Differenzen \(\alpha_k-\alpha_{k+1}\)). Nützlich, wenn \(B_k\) beschränkt bleibt und die \(\alpha\)-Differenzen klein sind — dann wird aus einer wackligen Summe eine absolut kontrollierbare.</p>`,
        beispiel: String.raw`<p>Herleitung in einer Zeile (Tafel): \(\beta_k=B_k-B_{k-1}\) einsetzen und umschichten:</p>\[\sum_{k=1}^{n}\alpha_k(B_k-B_{k-1})=\sum_{k=1}^{n}\alpha_kB_k-\sum_{k=1}^{n-1}\alpha_{k+1}B_k=\sum_{k=1}^{n-1}B_k(\alpha_k-\alpha_{k+1})+\alpha_nB_n.\]<p>Typischer Einsatz: \(\alpha_k=\frac1k\) monoton \(\downarrow0\), \(\beta_k\) mit beschränkten \(B_k\) — dann konvergiert \(\sum B_k(\alpha_k-\alpha_{k+1})\) absolut (Teleskop-Majorante) und \(\alpha_nB_n\to0\).</p>`,
        plus: String.raw`<p>Der Motor hinter <b>Dirichlet, Abel und Leibniz</b> (5.6.2) — und das exakte Gegenstück zur partiellen Integration \(\int u'v=uv-\int uv'\).</p>`}},
       {id:"5.6.2", title:"Kriterien von Dirichlet, Abel und Leibniz", body:{
        def: String.raw`<b>Dirichlet:</b> \((\alpha_k)\subset\mathbb R\) monoton mit \(\alpha_k\to0\), Partialsummen \(B_n=\sum_{k=1}^n\beta_k\) beschränkt \(\Rightarrow\ \sum\alpha_k\beta_k\) konvergiert.<br>
<b>Abel:</b> \((\alpha_k)\) monoton und beschränkt, \(\sum\beta_k\) konvergent \(\Rightarrow\ \sum\alpha_k\beta_k\) konvergiert.<br>
<b>Leibniz</b> (Spezialfall von Dirichlet, \(\beta_k=(-1)^{k+1}\), \(B_n\in\{0,1\}\)): \(\alpha_k\downarrow0\ \Rightarrow\ \sum(-1)^{k+1}\alpha_k\) konvergiert, mit Fehlerabschätzung \(|R_n|\le\alpha_{n+1}\).`,
        worte: String.raw`<p>Alle drei retten Reihen, deren Konvergenz von <b>Auslöschung</b> lebt: ein monotoner, kleiner werdender Faktor \(\alpha\) mal ein oszillierender Faktor \(\beta\), dessen Summen nicht weglaufen. Beweis jeweils per Abelscher Summation (5.6.1).</p>`,
        erfuellt: String.raw`<p>\(\displaystyle\sum_{k=1}^{+\infty}\frac{\sin(kx)}{k}\) (festes \(x\neq2\pi m\)): \(\alpha_k=\frac1k\downarrow0\) und</p>\[|B_n|=\Big|\sum_{k=1}^{n}\sin(kx)\Big|\le\frac{1}{|\sin(x/2)|}\ \text{(beschränkt)}\]<p>⇒ konvergent nach Dirichlet (obwohl nicht absolut!).</p>`,
        verletzt: String.raw`<p>Die <b>Monotonie ist wesentlich</b>: nimm \(\alpha_k=\frac1k\) (\(k\) ungerade), \(\alpha_k=\frac{1}{k^{2}}\) (\(k\) gerade) — es gilt \(\alpha_k\to0\), aber nicht monoton. Dann divergiert</p>\[\sum(-1)^{k+1}\alpha_k=\underbrace{\textstyle\sum_{k\ \text{ungerade}}\frac1k}_{=+\infty}-\underbrace{\textstyle\sum_{k\ \text{gerade}}\frac{1}{k^{2}}}_{<\infty}.\]`,
        plus: String.raw`<p>Die Leibniz-Abschätzung \(|R_n|\le\alpha_{n+1}\) ist Gold fürs Numerische: Abbrechen nach \(n\) Gliedern kostet höchstens das erste weggelassene Glied. Anwendung: \(\ln 2\), \(\frac{\pi}{4}\) mit kontrollierbarer Genauigkeit.</p>`}},
       {id:"5.6.3", title:"Cesàro-Summation (arithmetische Mittel)", body:{
        def: String.raw`Die Reihe \(\sum_{k=1}^{+\infty}a_k\) konvergiert <b>nach Cesàro</b>, falls mit \(S_n=\sum_{k=1}^{n}a_k\) der Grenzwert\[S_c\ =\ \lim_{n\to\infty}\ \frac{S_1+S_2+\cdots+S_n}{n}\]existiert (Tafel V17). Eigenschaften: <b>linear</b> und <b>regulär</b> (konvergente Reihen behalten ihren Wert).`,
        worte: String.raw`<p>Statt der Partialsummen selbst betrachtet man ihre <b>Durchschnitte</b>: Ausreißer und Oszillationen werden weggemittelt. Springt \(S_n\) beschränkt hin und her, kann der Durchschnitt trotzdem konvergieren — die Reihe bekommt einen sinnvollen verallgemeinerten Wert.</p>`,
        erfuellt: String.raw`<p>Grandi-Reihe \(1-1+1-1+\cdots\): \(S_n=1,0,1,0,\dots\), aufsummiert \(S_1+\cdots+S_n\approx\frac n2\), genauer</p>\[\sigma_{2m}=\frac{m}{2m}=\frac12\ \text{(exakt)},\qquad \sigma_{2m-1}=\frac{m}{2m-1}\to\frac12\]<p>⇒ Cesàro-summierbar mit \(S_c=\frac12\) (volle Rechnung: Spickzettel <a href="#/ref/konv_summen">Konvergenz — Reihen</a>).</p>`,
        verletzt: String.raw`<p>\(1-2+3-4+\cdots\): hier wachsen die \(S_n=1,-1,2,-2,\dots\) selbst; die Mittel haben die Häufungswerte \(\frac12\) und \(0\) ⇒ <b>nicht</b> Cesàro-summierbar. (Abel schafft es trotzdem → 5.6.4.)</p>`,
        plus: String.raw`<p>Großer Auftritt später bei Fourierreihen: die Cesàro-Mittel der Fourier-Partialsummen (Fejér) konvergieren viel gutmütiger als die Partialsummen selbst. „Regulär" heißt: das Verfahren widerspricht nie dem gewöhnlichen Grenzwert.</p>`}},
       {id:"5.6.4", title:"Poisson-Abel-Summation; Satz von Frobenius", body:{
        def: String.raw`Die Reihe \(\sum_{k=1}^{+\infty}a_k\) konvergiert <b>nach Poisson-Abel</b>, falls \(f(x)=\sum_{k=1}^{+\infty}a_kx^{k}\) für \(|x|<1\) konvergiert und der Randlimes\[S_{PA}\ =\ \lim_{x\to1^{-}}\ \sum_{k=1}^{+\infty}a_k\,x^{k}\]existiert. <b>Satz (Frobenius, Tafel V17):</b> Konvergiert \(\sum a_k\) nach Cesàro gegen \(S_c\), so auch nach Poisson-Abel, mit \(S_{PA}=S_c\).`,
        worte: String.raw`<p>Die Glieder werden mit \(x^{k}\) „gedämpft" (dann konvergiert meist alles brav), und erst am Ende dreht man die Dämpfung weg (\(x\to1^{-}\)). Frobenius ordnet die Verfahren: <b>konvergent \(\Rightarrow\) Cesàro \(\Rightarrow\) Poisson-Abel</b>, jeweils mit demselben Wert — Abel ist das stärkste, die Rückrichtungen brauchen Tauber-Bedingungen.</p>`,
        erfuellt: String.raw`<p>Grandi-Reihe: \(f(x)=\sum_{k\ge1}(-1)^{k+1}x^{k}=\frac{x}{1+x}\) (geometrische Reihe mit \(q=-x\)),</p>\[\lim_{x\to1^{-}}\frac{x}{1+x}=\frac12\ \Rightarrow\ S_{PA}=\frac12=S_c.\ \checkmark\]<p>Und \(1-2+3-\cdots\): \(\sum(-1)^{k+1}k\,x^{k}=\frac{x}{(1+x)^{2}}\to\frac14\) — Abel-summierbar, obwohl Cesàro versagt.</p>`,
        verletzt: String.raw`<p>\(1+1+1+\cdots\) (\(a_k=1\)): \(f(x)=\sum x^{k}=\frac{x}{1-x}\ \to\ +\infty\) für \(x\to1^{-}\) ⇒ auch nach Poisson-Abel <b>nicht</b> summierbar. Echte Explosion kann kein Mittelungsverfahren retten.</p>`,
        plus: String.raw`<p>Hintergrund des Namens: dieselbe Dämpfung \(x=r\to1^-\) steckt im Poisson-Kern der Fourier-Theorie. Der zugrundeliegende <b>Abelsche Grenzwertsatz</b> sagt: konvergiert \(\sum a_k=S\), so gilt \(\lim_{x\to1^-}\sum a_kx^k=S\) — Potenzreihen sind am Rand „stetig von innen".</p>`}}]}
   ]},
 { id:"6", title:"Funktionenfolgen, gleichmäßige Konvergenz, Potenzreihen", key:"ch6",
   sections:[
    {id:"6.1",  t:"Punktweise und gleichmäßige Konvergenz", topics:[
       {id:"6.1.1", title:"Definitionen; Supremums-Kriterium", body:{
        def: String.raw`Seien \(f_n,f:D\to\mathbb K^{d}\).\[\textbf{punktweise:}\quad f_n\to f\ :\Longleftrightarrow\ \forall x\in D:\ \lim_{n\to\infty}f_n(x)=f(x)\]\[\textbf{gleichmäßig:}\quad f_n\rightrightarrows f\ :\Longleftrightarrow\ M_n:=\sup_{x\in D}\,\|f_n(x)-f(x)\|\ \xrightarrow[n\to\infty]{}\ 0\]Gleichmäßig \(\Rightarrow\) punktweise; die Umkehrung ist falsch.`,
        worte: String.raw`<p>Punktweise: jede Stelle konvergiert für sich — das Tempo darf von \(x\) abhängen (\(N=N(\varepsilon,x)\)). Gleichmäßig: der <b>schlimmste</b> Punkt zählt — ab einem \(N(\varepsilon)\) liegt der ganze Graph im \(\varepsilon\)-Schlauch um \(f\). Prüfrezept: Grenzfunktion punktweise bestimmen → Fehlerfunktion \(\|f_n-f\|\) → Supremum über \(D\) (oft per Ableitung) → geht es gegen 0?</p>`,
        erfuellt: String.raw`<p>\(f_n(x)=\frac{x}{n}\) auf \([0,1]\): Grenzfunktion \(f\equiv0\),</p>\[M_n=\sup_{x\in[0,1]}\Big|\frac xn\Big|=\frac1n\ \longrightarrow\ 0\ \Rightarrow\ f_n\rightrightarrows 0.\]`,
        verletzt: String.raw`<p>\(f_n(x)=x^{n}\) auf \([0,1]\): punktweise \(f(x)=0\) (\(x<1\)), \(f(1)=1\), aber</p>\[M_n=\sup_{0\le x<1}x^{n}=1\ \not\to\ 0\]<p>⇒ nur punktweise. Und Vorsicht Bereich: \(\frac xn\) auf ganz \(\mathbb R\) hat \(M_n=+\infty\) — dort nicht gleichmäßig!</p>`,
        plus: String.raw`<p>Gleichmäßige Konvergenz ist genau die Konvergenz in der Supremumsnorm \(\|\cdot\|_C\) (6.2.1) — und die Eintrittskarte für alle Vertauschungssätze (6.3–6.9). Mehr Rezepte: Spickzettel <a href="#/ref/vertauschen">Grenzwerte vertauschen</a>.</p>`}},
       {id:"6.1.2", title:"Klassische Gegenbeispiele", body:{
        def: String.raw`Drei Standard-Folgen, die punktweise, aber <b>nicht</b> gleichmäßig konvergieren — und je eine Vertauschung zerstören:\[\textbf{(a) } x^{n}\text{ auf }[0,1]\qquad \textbf{(b) } f_n\to\operatorname{sgn}\ \text{(Tafel V18)}\qquad \textbf{(c) Spike: } f_n=n\ \text{auf}\ \left]0,\tfrac1n\right[\]`,
        worte: String.raw`<p>(a) zerstört <b>Stetigkeit</b> der Grenzfunktion, (b) genauso (Knick wird zum Sprung), (c) zerstört das <b>Integral</b>: die Fläche „entwischt" in einen immer höheren, schmaleren Turm. Diese drei decken fast jede Klausurfrage „gilt … auch ohne Gleichmäßigkeit?" ab — Antwort: nein, siehe (a)/(b)/(c).</p>`,
        beispiel: String.raw`<p><b>(b) Tafel-Beispiel:</b> \(f_n(x)=-1\) für \(x\le-\tfrac1n\), \(=nx\) für \(|x|\le\tfrac1n\), \(=1\) für \(x\ge\tfrac1n\): jedes \(f_n\) ist stetig (Rampe), aber punktweise</p>\[f_n(x)\ \longrightarrow\ \operatorname{sgn}(x)\quad\text{(unstetig bei }0\text{)}\]<p><b>(c) Spike:</b> \(f_n(x)=n\) auf \(\left]0,\tfrac1n\right[\), sonst \(0\): punktweise \(f_n\to0\), aber</p>\[\int_0^{1}f_n\,dx=1\ \not\to\ 0=\int_0^{1}0\,dx.\]`,
        plus: String.raw`<p>Merke die Zuordnung: unstetige Grenzfunktion ⇒ Konvergenz war nicht gleichmäßig (Kontraposition von 6.3.2). Die Umkehrung gilt nicht: auch mit stetiger Grenzfunktion kann die Konvergenz ungleichmäßig sein (Spike: Grenzfunktion \(0\) ist stetig!).</p>`}}]},
    {id:"6.2",  t:"Der Raum C(X,Y)", topics:[
       {id:"6.2.1", title:"Die Supremumsnorm ‖·‖C", body:{
        def: String.raw`\(C(X,Y)\) = Menge der stetigen, beschränkten Funktionen \(f:X\to Y\) (\(X\subset M\) metrischer Raum, \(Y\) normierter Raum über \(\mathbb K\)). Mit\[\|f\|_C\ :=\ \sup_{x\in X}\,\|f(x)\|_Y\]ist \((C(X,Y),\|\cdot\|_C)\) ein normierter Vektorraum (Tafel V18): \(\|f\|_C\ge0\); \(\|f\|_C=0\Leftrightarrow f\equiv0\); \(\|\alpha f\|_C=|\alpha|\|f\|_C\); \(\|f+g\|_C\le\|f\|_C+\|g\|_C\).`,
        worte: String.raw`<p>Der „Abstand" zweier Funktionen ist ihr <b>größter</b> Wertunterschied. Damit wird aus „Funktionenfolge konvergiert gleichmäßig" einfach „Punktfolge konvergiert im Raum \(C(X,Y)\)": \(f_n\rightrightarrows f\iff\|f_n-f\|_C\to0\). Analysis auf Funktionenräumen = gewöhnliche Konvergenz, nur die Punkte sind Funktionen.</p>`,
        beispiel: String.raw`<p>\(f(x)=x(1-x)\) auf \(X=[0,1]\): Maximum per Ableitung, \(f'(x)=1-2x=0\Rightarrow x=\tfrac12\):</p>\[\|f\|_C=\sup_{x\in[0,1]}|x(1-x)|=f\big(\tfrac12\big)=\tfrac14.\]<p>Und der Abstand von \(f_n(x)=x^{n}\) zu \(0\) in \(C([0,1])\): \(\|x^{n}-0\|_C=1\) für alle \(n\) — deshalb keine Konvergenz in \(\|\cdot\|_C\).</p>`,
        plus: String.raw`<p>Die Dreiecksungleichung folgt punktweise + Supremum. Auf kompaktem \(X\) ist jede stetige Funktion automatisch beschränkt (Weierstraß) — dann ist \(C(X,Y)\) einfach „alle stetigen Funktionen".</p>`}},
       {id:"6.2.2", title:"Vollständigkeit von C(X,Y)", body:{
        def: String.raw`<b>Satz (Tafel V18):</b> Ist \(Y\) vollständig (Banachraum), so ist \(\big(C(X,Y),\|\cdot\|_C\big)\) <b>vollständig</b>: jede Cauchy-Folge \((f_n)\subset C(X,Y)\) konvergiert in \(\|\cdot\|_C\) gegen ein \(\varphi\in C(X,Y)\).`,
        worte: String.raw`<p>Beweis in drei Schritten (Tafel): (1) für jedes feste \(x\) ist \((f_n(x))\) Cauchy in \(Y\) → punktweiser Limes \(\varphi(x)\) existiert (da \(Y\) vollständig). (2) Die Cauchy-Bedingung überträgt sich aufs Supremum → \(f_n\rightrightarrows\varphi\). (3) Gleichmäßiger Limes stetiger Funktionen ist stetig (6.3.2) → \(\varphi\in C(X,Y)\). Kurz: <b>gleichmäßige Grenzprozesse führen nicht aus dem Raum heraus.</b></p>`,
        beispiel: String.raw`<p>\(f_n(x)=\sum_{k=1}^{n}\frac{\sin(kx)}{k^{2}}\) ist Cauchy in \(C(\mathbb R,\mathbb R)\):</p>\[\|f_m-f_n\|_C\le\sum_{k=n+1}^{m}\frac{1}{k^{2}}\ \xrightarrow[n\to\infty]{}\ 0\]<p>⇒ die Grenzfunktion existiert und ist automatisch <b>stetig</b> — ohne sie je explizit zu kennen!</p>`,
        plus: String.raw`<p>Genau dafür baut man die Theorie: Existenz von Grenzobjekten (Lösungen von Gleichungen, Fourier-Summen, …) in einem vollständigen Funktionenraum. \(C(X,\mathbb K^{d})\) mit \(\|\cdot\|_C\) ist der Prototyp eines <b>Banachraums</b>.</p>`}}]},
    {id:"6.3",  t:"Vertauschen von limₙ und limₓ", topics:[
       {id:"6.3.1", title:"Satz & Beweis (Folgendefinition)", body:{
        def: String.raw`<b>Satz (Tafel V18/V19):</b> \(X\subset M_1\), \(M_2\) vollständig, \(f_n:X\to M_2\), \(\xi\in\mathrm{acc}(X)\) (Häufungspunkt). Gilt\[(1)\ \forall n:\ \lim_{x\to\xi}f_n(x)=b_n\ \text{existiert}\qquad(2)\ f_n\rightrightarrows f\ \text{auf }X,\]so existieren beide Seiten und es gilt\[\lim_{n\to\infty}\Big(\lim_{x\to\xi}f_n(x)\Big)\ =\ \lim_{x\to\xi}\Big(\lim_{n\to\infty}f_n(x)\Big).\]`,
        worte: String.raw`<p>Zwei Grenzprozesse hintereinander — die Reihenfolge darf man <b>nicht</b> blind tauschen. Die gleichmäßige Konvergenz ist der Klebstoff: sie sorgt dafür, dass die \(b_n\) eine Cauchy-Folge bilden und der \(\varepsilon/3\)-Beweis durchgeht (\(\|f(x)-b\|\le\|f-f_n\|_C+\|f_n(x)-b_n\|+\|b_n-b\|\)).</p>`,
        erfuellt: String.raw`<p>\(f_n(x)=\frac{x}{n}+x^{2}\) auf \([0,1]\), \(\xi=1\): \(f_n\rightrightarrows x^{2}\) (Fehler \(\frac1n\)), \(b_n=\lim_{x\to1}f_n=\frac1n+1\to1\), und</p>\[\lim_{x\to1}\lim_n f_n(x)=\lim_{x\to1}x^{2}=1=\lim_n b_n.\ \checkmark\]`,
        verletzt: String.raw`<p>Ohne Gleichmäßigkeit (Tafel-Beispiel, \(f_n(x)=x^{n}\) auf \(\left[0,1\right[\), \(\xi=1\)):</p>\[\lim_{n}\Big(\lim_{x\to1^{-}}x^{n}\Big)=\lim_n 1=1,\qquad \lim_{x\to1^{-}}\Big(\lim_{n}x^{n}\Big)=\lim_{x\to1^{-}}0=0\]<p>— die iterierten Limites sind <b>verschieden</b> (Antwort der Tafel: „NEIN").</p>`,
        plus: String.raw`<p>\(\mathrm{acc}(X)\) = Häufungspunkte von \(X\) (Vorlesungsnotation) — \(\xi\) muss von \(X\) aus erreichbar sein, sonst ist \(\lim_{x\to\xi}\) sinnlos. Alle weiteren Vertauschungssätze (6.4–6.9) sind Varianten dieses Musters.</p>`}},
       {id:"6.3.2", title:"Stetigkeit der Grenzfunktion", body:{
        def: String.raw`<b>Korollar:</b> Sind alle \(f_n:X\to M_2\) <b>stetig</b> und gilt \(f_n\rightrightarrows f\) auf \(X\), so ist auch \(f\) <b>stetig</b>. (In Kurzform: \(C(X,Y)\) ist abgeschlossen unter gleichmäßigen Limites.)`,
        worte: String.raw`<p>Anwendung von 6.3.1 in jedem Punkt \(\xi\): Stetigkeit von \(f_n\) heißt \(\lim_{x\to\xi}f_n(x)=f_n(\xi)\); Gleichmäßigkeit erlaubt den Tausch, also \(\lim_{x\to\xi}f(x)=f(\xi)\). Praktisch als <b>Kontraposition</b>: ist die Grenzfunktion unstetig, war die Konvergenz garantiert nicht gleichmäßig.</p>`,
        erfuellt: String.raw`<p>\(f(x)=\sum_{k=1}^{+\infty}\frac{\sin(kx)}{k^{2}}\): alle Partialsummen stetig, Konvergenz gleichmäßig (M-Test mit \(C_k=\frac{1}{k^{2}}\), 6.4.2) ⇒ \(f\) ist stetig auf ganz \(\mathbb R\) — ohne \(f\) zu kennen.</p>`,
        verletzt: String.raw`<p>\(f_n(x)=x^{n}\) auf \([0,1]\): alle \(f_n\) stetig, Grenzfunktion</p>\[f(x)=\begin{cases}0,&0\le x<1\\ 1,&x=1\end{cases}\]<p><b>unstetig</b> ⇒ (Kontraposition) die Konvergenz war nicht gleichmäßig.</p>`,
        plus: String.raw`<p>Nur eine Richtung! Aus „Grenzfunktion stetig" folgt <b>nicht</b> Gleichmäßigkeit (Spike-Beispiel: Grenzfunktion \(0\) stetig, Konvergenz trotzdem nicht glm.).</p>`}}]},
    {id:"6.4",  t:"Vertauschen von Σ und lim", topics:[
       {id:"6.4.1", title:"Gleichmäßige Konvergenz von Funktionenreihen", body:{
