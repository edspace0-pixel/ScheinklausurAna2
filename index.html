      <h3>Vergleichs-Kriterien</h3>
      <table class="reftable">
        <tr><td><b>Majorante</b> (für Konvergenz): \(0\le f\le g,\ \int g\) konv. \(\Rightarrow\int f\) konv.<span class="when">Einsetzen, wenn sich \(f\) gegen \(x^{-p}\) oder \(e^{-x}\) abschätzen lässt.</span>
          ${exBox(String.raw`<p>\(\displaystyle\int_1^{+\infty}e^{-x^{2}}dx\) konvergiert: für \(x\ge1\) ist \(x^{2}\ge x\), also</p>\[e^{-x^{2}}\le e^{-x},\qquad \int_1^{+\infty}e^{-x}\,dx=e^{-1}<\infty.\]`,"Beispiel: ∫ e^(−x²)")}</td></tr>
        <tr><td><b>Minorante</b> (für Divergenz): \(f\ge g\ge0,\ \int g\) div. \(\Rightarrow\int f\) div.<span class="when">Einsetzen für Divergenz-Nachweise — meist mit \(\tfrac{c}{x}\) als Minorante.</span>
          ${exBox(String.raw`<p>\(\displaystyle\int_1^{+\infty}\frac{dx}{\sqrt{x^{2}+1}}\) divergiert: für \(x\ge1\) ist \(x^{2}+1\le 2x^{2}\), also</p>\[\frac{1}{\sqrt{x^{2}+1}}\ \ge\ \frac{1}{\sqrt{2}\,x},\qquad \int_1^{+\infty}\frac{dx}{\sqrt{2}\,x}=\infty.\]`,"Beispiel: ∫ dx/√(x²+1)")}</td></tr>
        <tr><td><b>Grenzwertvergleich:</b> \(f,g>0,\ \frac{f}{g}\to c\in\left]0,+\infty\right[\Rightarrow\) gleiches Verhalten.<span class="when">Einsetzen, wenn nur das führende Verhalten am kritischen Rand zählt (Polynome, Wurzeln) — erspart das Basteln expliziter Schranken.</span>
          ${exBox(String.raw`<p>\(\displaystyle\int_1^{+\infty}\frac{dx}{\sqrt{x^{3}+1}}\): führendes Verhalten \(x^{-3/2}\). Vergleich mit \(g=x^{-3/2}\):</p>\[\frac{f}{g}=\frac{x^{3/2}}{\sqrt{x^{3}+1}}=\frac{1}{\sqrt{1+x^{-3}}}\ \longrightarrow\ 1\in\left]0,+\infty\right[\]<p>\(\Rightarrow\) verhält sich wie \(\int x^{-3/2}\) → <b>konvergent</b> (\(p=\tfrac32>1\)).</p>`,"Beispiel: ∫ dx/√(x³+1)")}</td></tr>
        <tr><td><b>Absolut:</b> \(\int|f|\) konv. \(\Rightarrow\int f\) konv.<span class="when">Einsetzen bei Vorzeichenwechseln — z. B. \(\int_1^{+\infty}\frac{\sin x}{x^{2}}dx\): \(\big|\frac{\sin x}{x^{2}}\big|\le\frac{1}{x^{2}}\).</span></td></tr>
      </table>
      <h3 style="margin-top:16px">Beide Ränder kritisch</h3>
      ${exBox(String.raw`<p>\(\displaystyle\int_0^{+\infty}\frac{dx}{\sqrt{x}\,(1+x)}\) — kritisch bei \(0\) <b>und</b> \(\infty\). Aufspalten bei \(1\):</p><p>Bei \(0\): \(\dfrac{1}{\sqrt{x}(1+x)}\sim\dfrac{1}{\sqrt{x}}\) → konv. (\(p=\tfrac12<1\)).</p><p>Bei \(\infty\): \(\sim\dfrac{1}{x^{3/2}}\) → konv. (\(p=\tfrac32>1\)).</p><p>Beide Teile konvergieren → Integral konvergent (Substitution \(t=\sqrt{x}\) liefert sogar den Wert \(\pi\)).</p>`,"Beispiel: ∫₀^∞ dx/(√x·(1+x))")}
    </div>
  </div>
  <div class="refblock">
    <h3>Cauchy-Hauptwert (v.p.)</h3>
    <p class="sub">Symmetrischer Grenzwert — kann existieren, obwohl das Integral (mit unabhängigen Grenzwerten) divergiert. Einsetzen, wenn ein Pol <b>im Inneren</b> liegt oder \(\pm\infty\) symmetrisch behandelt werden soll.</p>
    <table class="reftable">
      <tr><td>\(\displaystyle \mathrm{v.p.}\!\int_{-\infty}^{+\infty}\!f=\lim_{R\to+\infty}\int_{-R}^{R}\!f\)<span class="when">Eine gemeinsame Schranke \(R\) statt zwei unabhängiger — deshalb „schwächer" als echte Konvergenz: konvergent \(\Rightarrow\) v.p. existiert (gleicher Wert), aber nicht umgekehrt.</span></td></tr>
      <tr><td>Pol bei \(c\in\left]a,b\right[\): \(\displaystyle \mathrm{v.p.}\!\int_a^{b}\!f=\lim_{\varepsilon\to0^{+}}\Big(\int_a^{c-\varepsilon}\!+\int_{c+\varepsilon}^{b}\Big)f\)<span class="when">Symmetrisches Ausschneiden des Pols — dieselbe \(\varepsilon\)-Breite links und rechts.</span>
        ${exBox(String.raw`<p><b>Schritt für Schritt</b> für \(\mathrm{v.p.}\!\int_{-1}^{1}\frac{dx}{x}\) (Pol bei \(0\)) — beide Teilintegrale mit der Stammfunktion \(\ln|x|\) ausrechnen:</p>\[\int_{-1}^{-\varepsilon}\frac{dx}{x}=\ln|x|\Big|_{-1}^{-\varepsilon}=\ln\varepsilon-\ln1=\ln\varepsilon\]\[\int_{\varepsilon}^{1}\frac{dx}{x}=\ln|x|\Big|_{\varepsilon}^{1}=\ln1-\ln\varepsilon=-\ln\varepsilon\]<p>Summe: \(\ln\varepsilon-\ln\varepsilon=0\) für <b>jedes</b> \(\varepsilon>0\), also</p>\[\mathrm{v.p.}\!\int_{-1}^{1}\frac{dx}{x}=\lim_{\varepsilon\to0^{+}}0=0.\]<p>Das gewöhnliche Integral divergiert (jedes Teilintegral einzeln \(=\mp\infty\)) — nur im Hauptwert heben sich die \(\ln\varepsilon\)-Terme exakt weg.</p>`,"Rechenbeispiel: v.p. ∫₋₁¹ dx/x = 0")}
        ${exBox(String.raw`<p><b>Unsymmetrische Grenzen</b> liefern einen echten Wert: \(\mathrm{v.p.}\!\int_{-1}^{2}\frac{dx}{x}\):</p>\[\int_{-1}^{-\varepsilon}\frac{dx}{x}=\ln\varepsilon,\qquad \int_{\varepsilon}^{2}\frac{dx}{x}=\ln2-\ln\varepsilon\]\[\Rightarrow\ \mathrm{v.p.}\!\int_{-1}^{2}\frac{dx}{x}=\lim_{\varepsilon\to0^{+}}\big(\ln\varepsilon+\ln2-\ln\varepsilon\big)=\ln 2.\]<p>Die \(\ln\varepsilon\)-Terme heben sich weg; übrig bleibt \(\ln2\) — der Hauptwert „sieht" nur den unsymmetrischen Überhang \([1,2]\).</p>`,"Rechenbeispiel: v.p. ∫₋₁² dx/x = ln 2")}</td></tr>
      <tr><td>Analog: \(\displaystyle\mathrm{v.p.}\!\int_{-\infty}^{+\infty}x\,dx=0\), obwohl \(\int_{-\infty}^{+\infty}x\,dx\) divergiert (\(\infty-\infty\)).</td></tr>
    </table>
  </div>`; }

function potenzreihenHtml(){ return String.raw`
  <p class="sub">Potenzreihe \(\displaystyle\sum_{k=0}^{\infty} a_k (x-x_0)^{k}\) um den Entwicklungspunkt \(x_0\) — Beispiele stehen direkt beim jeweiligen Feld.</p>
  <div class="twocol">
    <div class="refblock">
      <h3>Konvergenzradius \(R\)</h3>
      <table class="reftable">
        <tr><td><b>Cauchy-Hadamard:</b> \(\displaystyle \frac{1}{R}=\limsup_{k}\sqrt[k]{|a_k|}\)<span class="when">Funktioniert <b>immer</b> (limsup existiert stets) — einsetzen bei \(k\)-ten Potenzen und Lücken-Reihen.</span>
          ${exBox(String.raw`<p>Extremfälle:</p>\[\sum k!\,x^{k}:\ \sqrt[k]{k!}\sim\frac{k}{e}\to\infty\ \Rightarrow\ R=0\ (\text{nur }x=0)\]\[\sum \frac{x^{k}}{k^{2}}:\ \sqrt[k]{k^{-2}}\to1\ \Rightarrow\ R=1,\ \text{und der Rand }|x|=1\text{ konvergiert überall }(p=2).\]`,"Beispiel: Extremfälle R = 0 und Randkonvergenz")}</td></tr>
        <tr><td><b>Quotienten-Form:</b> \(\displaystyle R=\lim_{k}\left|\frac{a_k}{a_{k+1}}\right|\) (falls existent)<span class="when">Einsetzen bei Fakultäten und einfachen Brüchen — nur wenn (fast) alle \(a_k\neq0\), sonst Wurzel-Form nehmen.</span>
          ${exBox(String.raw`<p>\(\displaystyle\sum \frac{x^{k}}{k!}\):</p>\[R=\lim_k\left|\frac{a_k}{a_{k+1}}\right|=\lim_k\frac{(k+1)!}{k!}=\lim_k (k+1)=\infty\]<p>— konvergiert in ganz \(\mathbb R\) (bzw. \(\mathbb C\)): das ist \(e^{x}\).</p>`,"Beispiel: e-Reihe, R = ∞")}</td></tr>
        <tr><td><b>Innen/außen/Rand:</b> \(|x-x_0|<R\): absolut konvergent · \(|x-x_0|>R\): divergent · \(|x-x_0|=R\): <b>jeden Randpunkt einzeln</b> prüfen.
          ${exBox(String.raw`<p>\(\displaystyle\sum\frac{x^{k}}{k}\): \(R=1\), aber der Rand ist verschieden:</p>\[x=-1:\ \sum\frac{(-1)^{k}}{k}\ \text{konv. (Leibniz)};\qquad x=1:\ \sum\frac{1}{k}\ \text{div. (harmonisch)}.\]`,"Beispiel: Randverhalten ist Einzelfallprüfung")}</td></tr>
      </table>
      <p class="sub" style="margin-top:8px">Konvention: \(\tfrac{1}{0}=\infty,\ \tfrac{1}{\infty}=0\).</p>
    </div>
    <div class="refblock">
      <h3>Rechnen mit Potenzreihen (im Innern)</h3>
      <table class="reftable">
        <tr><td><b>Gliedweise ableiten &amp; integrieren</b> — innerhalb \(\left]x_0-R,\,x_0+R\right[\) erlaubt, mit <b>gleichem</b> Radius \(R\); die Summe ist dort beliebig oft differenzierbar und \(a_k=\frac{S^{(k)}(x_0)}{k!}\).
          ${exBox(String.raw`<p>Geometrische Reihe ableiten (\(|x|<1\)):</p>\[\frac{d}{dx}\,\frac{1}{1-x}=\frac{d}{dx}\sum_{k=0}^{\infty}x^{k}\ \Rightarrow\ \frac{1}{(1-x)^{2}}=\sum_{k=1}^{\infty}k\,x^{k-1}=\sum_{k=0}^{\infty}(k+1)\,x^{k}\]`,"Beispiel: 1/(1−x)² durch Ableiten")}</td></tr>
        <tr><td><b>Cauchy-Produkt:</b> für \(|x-x_0|<\min(R_a,R_b)\) gilt\[\Big(\sum_{k=0}^{\infty}a_k(x-x_0)^{k}\Big)\Big(\sum_{\ell=0}^{\infty}b_\ell(x-x_0)^{\ell}\Big)=\sum_{n=0}^{\infty}c_n\,(x-x_0)^{n},\qquad c_n=\sum_{k=0}^{n}a_k\,b_{n-k}\]<span class="when">Einsetzen, wenn man das Produkt zweier bekannter Reihen wieder als Potenzreihe braucht. Zulässig, weil beide im Innern <b>absolut</b> konvergieren (5.3.6); der Radius der Produktreihe ist \(\ge\min(R_a,R_b)\).</span>
          ${exBox(String.raw`<p>\(\dfrac{1}{(1-x)^{2}}\) als Quadrat der geometrischen Reihe (\(a_k=b_k=1\)):</p>\[c_n=\sum_{k=0}^{n}1\cdot1=n+1\qquad\Rightarrow\qquad \frac{1}{(1-x)^{2}}=\sum_{n=0}^{\infty}(n+1)\,x^{n},\quad|x|<1\]<p>— dasselbe Ergebnis wie oben per Ableiten: zwei Wege, eine Reihe. ✓</p>`,"Rechenbeispiel: (Σxᵏ)² = 1/(1−x)²")}
          ${exBox(String.raw`<p>\(e^{x}\cdot e^{x}=e^{2x}\) über Koeffizienten (\(a_k=b_k=\frac{1}{k!}\)):</p>\[c_n=\sum_{k=0}^{n}\frac{1}{k!\,(n-k)!}=\frac{1}{n!}\sum_{k=0}^{n}\binom{n}{k}=\frac{2^{n}}{n!}\]<p>(binomischer Lehrsatz) ⇒ \(\sum c_n x^{n}=\sum\frac{(2x)^{n}}{n!}=e^{2x}\). ✓ — das Cauchy-Produkt reproduziert genau die Funktionalgleichung.</p>`,"Rechenbeispiel: eˣ·eˣ = e²ˣ")}</td></tr>
      </table>
    </div>
  </div>
  <div class="refblock">
    <h3>Tricks beim Konvergenzradius</h3>
    <table class="reftable">
      <tr><td><b>Lücken-Reihen</b> (nur \(x^{2k}\) o. ä.): Quotienten-Formel versagt (\(a_k=0\) dazwischen) → Wurzelkriterium direkt auf die Reihe anwenden.
        ${exBox(String.raw`<p>\(\displaystyle\sum\frac{x^{2k}}{4^{k}}\) — Wurzelkriterium direkt (auf die Glieder als Zahlenreihe):</p>\[\sqrt[k]{\frac{|x|^{2k}}{4^{k}}}=\frac{x^{2}}{4}<1\ \Longleftrightarrow\ |x|<2\ \Rightarrow\ R=2.\]`,"Beispiel: Wurzelkriterium direkt")}</td></tr>
      <tr><td><b>Nützliche \(k\)-te Wurzeln:</b> \(\sqrt[k]{c^{k}b_k}=c\,\sqrt[k]{b_k}\); und \(\sqrt[k]{k}\to1,\quad \sqrt[k]{k^{a}}\to1,\quad \sqrt[k]{k!}\sim\dfrac{k}{e},\quad \big(1+\tfrac1k\big)^{k}\to e\).
        ${exBox(String.raw`<p>\(\displaystyle\sum\Big(1+\frac1k\Big)^{k^{2}}x^{k}\) (Wurzelkriterium):</p>\[\sqrt[k]{|a_k|}=\Big(1+\frac1k\Big)^{k}\ \longrightarrow\ e\quad\Rightarrow\quad R=\frac{1}{e}.\]`,"Beispiel: (1+1/k)^(k²) → R = 1/e")}</td></tr>
      <tr><td><b>Substitution:</b> \(\sum a_k x^{2k}=\sum a_k u^{k}\) mit \(u=x^{2}\) → \(R_x=\sqrt{R_u}\).
        ${exBox(String.raw`<p>Nochmal \(\displaystyle\sum\frac{x^{2k}}{4^{k}}\), jetzt per Substitution \(u=x^{2}\):</p>\[\sum\Big(\frac{u}{4}\Big)^{k}\ \text{geometrisch, konvergent für }|u|<4\ \Longleftrightarrow\ |x|<2\ \Rightarrow\ R=2\]<p>— gleicher Schluss wie mit dem Wurzelkriterium, oft der schnellere Weg.</p>`,"Beispiel: u = x² — derselbe Radius")}</td></tr>
    </table>
  </div>`; }

function entwickelnHtml(){ return String.raw`
  <p class="sub">Eine glatte Funktion lokal durch Polynome/Potenzreihen ersetzen — samt Fehler (Restglied).</p>
  <div class="twocol">
    <div class="refblock">
      <h3>Taylor-Polynom & -Reihe</h3>
      <table class="reftable">
        <tr><td>\(\displaystyle T_n(x)=\sum_{k=0}^{n}\frac{f^{(k)}(x_0)}{k!}(x-x_0)^{k}\)</td></tr>
        <tr><td>Taylorreihe: \(n\to\infty\); um \(x_0=0\) heißt sie Maclaurin-Reihe.</td></tr>
      </table>
      <h3 style="margin-top:14px">Restglied \(R_n=f-T_n\)</h3>
      <table class="reftable">
        <tr><td><b>Lagrange:</b> \(\displaystyle R_n(x)=\frac{f^{(n+1)}(\xi)}{(n+1)!}(x-x_0)^{n+1}\)</td><td class="cond">\(\xi\) zw. \(x_0,x\)</td></tr>
        <tr><td><b>Integral:</b> \(\displaystyle R_n(x)=\frac{1}{n!}\int_{x_0}^{x}f^{(n+1)}(t)\,(x-t)^{n}\,dt\)</td></tr>
      </table>
      ${exBox(String.raw`<p>\(\sin x\) um \(0\): \(T_3(x)=x-\frac{x^{3}}{6}\).</p><p>Da bei \(\sin\) der \(x^{4}\)-Term fehlt (\(T_3=T_4\)), gilt sogar</p>\[|R_3(x)|\le\frac{|x|^{5}}{120}\quad(\text{denn }|f^{(5)}|=|\cos|\le1).\]`)}
    </div>
    <div class="refblock">
      <h3>Klassische Reihen (um \(0\))</h3>
      <table class="reftable">
        <tr><td>\(\displaystyle e^{x}=\sum\frac{x^{k}}{k!}\)</td><td class="cond">\(\forall x\)</td></tr>
        <tr><td>\(\displaystyle\frac{1}{1-x}=\sum x^{k}\)</td><td class="cond">\(|x|<1\)</td></tr>
        <tr><td>\(\displaystyle\ln(1+x)=\sum\frac{(-1)^{k+1}}{k}x^{k}\)</td><td class="cond">\(-1<x\le1\)</td></tr>
        <tr><td>\(\displaystyle\arctan x=\sum\frac{(-1)^{k}}{2k+1}x^{2k+1}\)</td><td class="cond">\(|x|\le1\)</td></tr>
        <tr><td>\(\displaystyle(1+x)^{\alpha}=\sum\binom{\alpha}{k}x^{k}\)</td><td class="cond">\(|x|<1\)</td></tr>
      </table>
      <h3 style="margin-top:14px">Trick: als Potenzreihe schreiben</h3>
      <p class="sub">Aus der geometrischen Reihe per <b>Substitution</b> und gliedweisem <b>Ableiten/Integrieren</b>.</p>
      ${exBox(String.raw`<p>\(\frac{1}{1+x^{2}}\) via \(x\to-x^{2}\) in \(\frac{1}{1-x}\):</p>\[\frac{1}{1+x^{2}}=\sum_{k=0}^{\infty}(-1)^{k}x^{2k}.\]<p>Gliedweise integrieren \(\Rightarrow \arctan x=\sum\frac{(-1)^{k}}{2k+1}x^{2k+1}\).</p>`)}
      ${exBox(String.raw`<p>Ableiten von \(\frac{1}{1-x}=\sum x^{k}\):</p>\[\frac{1}{(1-x)^{2}}=\sum_{k=0}^{\infty}(k+1)x^{k}.\]`)}
    </div>
  </div>
  <div class="refblock">
    <h3>Lagrange-Interpolation</h3>
    <p class="sub">Eindeutiges Polynom vom Grad \(\le n\) durch \(n+1\) Punkte \((x_i,y_i)\).</p>
    <table class="reftable">
      <tr><td>\(\displaystyle p(x)=\sum_{i=0}^{n} y_i\,L_i(x),\qquad L_i(x)=\prod_{j\neq i}\frac{x-x_j}{x_i-x_j}\)</td></tr>
      <tr><td>\(L_i(x_i)=1,\quad L_i(x_j)=0\ (j\neq i)\)</td><td class="cond">Basis-Eigenschaft</td></tr>
    </table>
    ${exBox(String.raw`<p>Polynom durch \((0,1),(1,3),(2,7)\):</p>\[p(x)=1\cdot\frac{(x-1)(x-2)}{2}+3\cdot\frac{x(x-2)}{-1}+7\cdot\frac{x(x-1)}{2}=x^{2}+x+1.\]<p>Check: \(p(0)=1,\ p(1)=3,\ p(2)=7\). ✓</p>`)}
  </div>`; }

function vertauschenHtml(){ return String.raw`
  <p class="sub">Wann darf man \(\lim\) mit \(\lim\), \(\int\) oder \(\frac{d}{dx}\) vertauschen? Kurz: bei <b>gleichmäßiger</b> Konvergenz. Die Idee: nicht nur jeder Punkt für sich, sondern der <b>ganze Graph</b> muss sich der Grenzfunktion nähern.</p>
  <div class="refblock">
    <h3>So prüft man gleichmäßige Konvergenz</h3>
    <table class="reftable">
      <tr><td>1. <b>Grenzfunktion</b> punktweise bestimmen: \(f(x)=\lim_{n\to\infty}f_n(x)\) (für jedes \(x\) einzeln).</td></tr>
      <tr><td>2. <b>Fehlerfunktion</b> bilden: \(e_n(x)=f_n(x)-f(x)\).</td></tr>
      <tr><td>3. <b>Supremum</b> über \(x\) nehmen: \(M_n=\sup_{x\in D}|e_n(x)|\) (Maximum oft über \(e_n'(x)=0\) suchen).</td></tr>
      <tr><td>4. Ist \(M_n\to0\)? &nbsp;<b>Ja</b> \(\Rightarrow\) gleichmäßig. &nbsp;<b>Nein</b> \(\Rightarrow\) nur punktweise.</td></tr>
    </table>
    <p class="sub" style="margin-top:6px">Bild: gleichmäßig heißt, ab einem \(N\) liegt der ganze Graph von \(f_n\) im \(\varepsilon\)-Schlauch um \(f\) — <b>ein</b> \(N(\varepsilon)\) für alle \(x\). Punktweise darf \(N=N(\varepsilon,x)\) von \(x\) abhängen.</p>
  </div>
  <div class="twocol">
    <div class="refblock">
      <h3>Punktweise vs. gleichmäßig</h3>
      <table class="reftable">
        <tr><td><b>Punktweise:</b> \(\forall x:\ f_n(x)\to f(x)\). Das \(N=N(\varepsilon,x)\) darf von \(x\) abhängen.</td></tr>
        <tr><td><b>Gleichmäßig:</b> \(\displaystyle\sup_{x\in D}|f_n(x)-f(x)|\to0\). Ein \(N(\varepsilon)\) für <b>alle</b> \(x\).</td></tr>
        <tr><td>gleichmäßig \(\Rightarrow\) punktweise (nicht umgekehrt).</td></tr>
        <tr><td><b>Majorantenkriterium von Weierstraß</b> (M-Test, Reihen): \(\|a_k(x)\|\le C_k\) für alle \(x\), \(\sum C_k<\infty\ \Rightarrow\ \sum a_k\) konvergiert gleichmäßig.</td></tr>
      </table>
    </div>
    <div class="refblock">
      <h3>Was gleichmäßige Konvergenz erlaubt</h3>
      <table class="reftable">
        <tr><td><b>\(\lim\)–\(\lim\) (Stetigkeit):</b> \(\displaystyle\lim_{x\to x_0}\lim_{n}f_n=\lim_{n}\lim_{x\to x_0}f_n\)</td><td class="cond">\(f_n\) stetig + <b>gleichm.</b></td></tr>
        <tr><td><b>\(\lim\)–\(\int\):</b> \(\displaystyle\lim_{n}\int_a^b f_n=\int_a^b\lim_{n}f_n\)</td><td class="cond"><b>gleichm.</b> auf \([a,b]\)</td></tr>
        <tr><td><b>\(\lim\)–\(\tfrac{d}{dx}\):</b> \(\big(\lim f_n\big)'=\lim f_n'\)</td><td class="cond"><b>\(f_n'\) gleichm.</b> + \(f_n(x_0)\) konv.</td></tr>
      </table>
    </div>
  </div>
  <div class="refblock">
    <h3>Gegenbeispiele (nur punktweise!)</h3>
    ${exBox(String.raw`<p>\(f_n(x)=x^{n}\) auf \([0,1]\). <b>1. Grenzfunktion:</b></p>\[f(x)=\lim_{n}x^{n}=\begin{cases}0,&0\le x<1\\1,&x=1\end{cases}\]<p><b>2.–3. Fehler-Supremum:</b> \(\displaystyle\sup_{0\le x<1}|x^{n}-0|=1\) (Wert wird für \(x\to1\) erreicht).</p><p><b>4.</b> \(M_n=1\not\to0\) \(\Rightarrow\) <b>nur punktweise</b>. Deshalb darf der Grenzwert unstetig sein, obwohl alle \(f_n\) stetig sind.</p>`)}
    ${exBox(String.raw`<p>Integral nicht vertauschbar: \(f_n=n\) auf \(\left]0,\tfrac1n\right[\), sonst \(0\).</p>\[\int_0^1 f_n\,dx=1\ \text{für alle }n,\quad\text{aber}\quad f_n(x)\to0\ \text{punktweise}\]\[\Rightarrow\ \lim_n\int_0^1 f_n\,dx=1\neq0=\int_0^1\lim_n f_n\,dx.\]`)}
  </div>`; }

function kurvenHtml(){ return String.raw`
  <p class="sub">Bogenlänge \(L\) und Krümmung \(\kappa\) je nach Darstellung. \(\kappa\) misst, wie schnell sich die Richtung dreht; \(\rho=1/\kappa\) ist der Krümmungsradius.</p>
  <div class="twocol">
    <div class="refblock">
      <h3>Bogenlänge \(L\)</h3>
      <table class="reftable">
        <tr><td>Graph \(y=f(x),\ x\in[a,b]\): \(\displaystyle L=\int_a^b\sqrt{1+f'(x)^{2}}\,dx\)
          ${exBox(String.raw`<p>\(f(x)=\tfrac{2}{3}x^{3/2}\) auf \([0,3]\): \(f'(x)=\sqrt{x}\), also \(\sqrt{1+f'^{2}}=\sqrt{1+x}\):</p>\[L=\int_{0}^{3}\sqrt{1+x}\,dx=\Big[\tfrac{2}{3}(1+x)^{3/2}\Big]_{0}^{3}=\tfrac{2}{3}(8-1)=\tfrac{14}{3}.\]`,"Beispiel: f(x) = ⅔·x^(3/2)")}</td></tr>
        <tr><td>Parametrisch \((x(t),y(t))\): \(\displaystyle L=\int_a^b\sqrt{\dot x^{2}+\dot y^{2}}\,dt\)
          ${exBox(String.raw`<p>Kreis \((R\cos t,\ R\sin t)\), \(t\in[0,2\pi]\): \(\dot x=-R\sin t,\ \dot y=R\cos t\):</p>\[L=\int_{0}^{2\pi}\sqrt{R^{2}\sin^{2}t+R^{2}\cos^{2}t}\,dt=\int_{0}^{2\pi}R\,dt=2\pi R.\ \checkmark\]`,"Beispiel: Kreis")}</td></tr>
        <tr><td>Polar \(r=r(\varphi),\ \varphi\in[\alpha,\beta]\): \(\displaystyle L=\int_\alpha^\beta\sqrt{r^{2}+r'^{2}}\,d\varphi\)
          ${exBox(String.raw`<p>Logarithmische Spirale \(r=e^{\varphi}\), \(\varphi\in[0,2\pi]\): \(r'=e^{\varphi}\):</p>\[L=\int_{0}^{2\pi}\sqrt{e^{2\varphi}+e^{2\varphi}}\,d\varphi=\sqrt{2}\int_{0}^{2\pi}e^{\varphi}\,d\varphi=\sqrt{2}\,\big(e^{2\pi}-1\big).\]`,"Beispiel: Spirale r = e^φ")}</td></tr>
      </table>
    </div>
    <div class="refblock">
      <h3>Krümmung \(\kappa\)</h3>
      <table class="reftable">
        <tr><td>Graph \(y=f(x)\): \(\displaystyle \kappa=\frac{|f''|}{\big(1+f'^{2}\big)^{3/2}}\)
          ${exBox(String.raw`<p>Parabel \(y=x^{2}\): \(f'=2x,\ f''=2\):</p>\[\kappa(x)=\frac{2}{(1+4x^{2})^{3/2}},\qquad \kappa(0)=2,\ \rho(0)=\tfrac12.\]<p>Im Scheitel am stärksten gekrümmt, außen flacher.</p>`,"Beispiel: Parabel y = x²")}</td></tr>
        <tr><td>Parametrisch: \(\displaystyle \kappa=\frac{|\dot x\ddot y-\dot y\ddot x|}{\big(\dot x^{2}+\dot y^{2}\big)^{3/2}}\)
          ${exBox(String.raw`<p>Ellipse \((a\cos t,\ b\sin t)\): \(\dot x=-a\sin t,\ \dot y=b\cos t,\ \ddot x=-a\cos t,\ \ddot y=-b\sin t\):</p>\[\dot x\ddot y-\dot y\ddot x=ab\sin^{2}t+ab\cos^{2}t=ab\ \Rightarrow\ \kappa(t)=\frac{ab}{(a^{2}\sin^{2}t+b^{2}\cos^{2}t)^{3/2}}\]<p>Am Scheitel \(t=0\): \(\kappa=\dfrac{ab}{b^{3}}=\dfrac{a}{b^{2}}\).</p>`,"Beispiel: Ellipse")}</td></tr>
        <tr><td>Polar \(r(\varphi)\): \(\displaystyle \kappa=\frac{\big|r^{2}+2r'^{2}-r\,r''\big|}{\big(r^{2}+r'^{2}\big)^{3/2}}\)
          ${exBox(String.raw`<p>Kreis \(r=R\): \(r'=r''=0\):</p>\[\kappa=\frac{|R^{2}+0-0|}{(R^{2})^{3/2}}=\frac{1}{R},\qquad \rho=R.\]<p>Genau der Kreisradius — gutes Kontrollbeispiel. ✓</p>`,"Beispiel: Kreis r = R")}</td></tr>
      </table>
      <p class="sub" style="margin-top:8px">Krümmungsradius \(\rho=\dfrac{1}{\kappa}\).</p>
    </div>
  </div>
  <div class="refblock">
    <h3>Vektorielle Schreibweise</h3>
    <p class="sub">Für eine Kurve \(\mathbf r(t)\) (Ortsvektor); \(\times\) ist das Kreuzprodukt.</p>
    <table class="reftable">
      <tr><td>Krümmung: \(\displaystyle \kappa(t)=\frac{\|\mathbf r'(t)\times\mathbf r''(t)\|}{\|\mathbf r'(t)\|^{3}}\)</td><td class="cond">in \(\mathbb R^{2},\mathbb R^{3}\)</td></tr>
      <tr><td>Einheits-Tangente: \(\displaystyle \mathbf T(t)=\frac{\mathbf r'(t)}{\|\mathbf r'(t)\|}\)</td></tr>
      <tr><td>Hauptnormale \(\displaystyle \mathbf N=\frac{\mathbf T'}{\|\mathbf T'\|}\); außerdem \(\displaystyle \kappa=\frac{\|\mathbf T'(t)\|}{\|\mathbf r'(t)\|}=\Big\|\frac{d\mathbf T}{ds}\Big\|\)</td></tr>
    </table>
    <p class="sub" style="margin-top:6px">In \(\mathbb R^{2}\) ist \(\mathbf r'\times\mathbf r''=\dot x\ddot y-\dot y\ddot x\) (Skalar) — daraus wird direkt die Parameter-Formel oben.</p>
  </div>
  <div class="refblock">
    <h3>Rektifizierbarkeit — zeigen &amp; widerlegen</h3>
    <p class="sub">Eine Kurve heißt <b>rektifizierbar</b>, wenn die Längen aller einbeschriebenen Polygonzüge beschränkt sind; das Supremum ist dann die Länge \(L\).</p>
    <table class="reftable">
      <tr><td><b>Rektifizierbar zeigen:</b> Parametrisierung \(\varphi\in C^{1}([a,b])\) (oder stückweise \(C^{1}\), oder Lipschitz) \(\Rightarrow\) rektifizierbar mit \(\displaystyle L=\int_a^b\|\varphi'(t)\|\,dt<\infty\).</td></tr>
      <tr><td><b>Nicht rektifizierbar — Weg 1 (Polygonzug, per Definition):</b> Folge von Stützstellen wählen, deren Polygonlängen \(\to\infty\) — typisch dort, wo die Kurve unendlich oft „hin- und herpendelt".</td></tr>
      <tr><td><b>Nicht rektifizierbar — Weg 2 (Integral ausschöpfen):</b> Länge ist monoton in der Teilkurve. Ist \(\varphi\) auf \([\varepsilon,b]\) \(C^{1}\), gilt \(L\ge\int_{\varepsilon}^{b}\|\varphi'\|\,dt\). Divergiert das für \(\varepsilon\to a^{+}\) → \(L=\infty\).</td></tr>
    </table>
    ${exBox(String.raw`<p><b>Aufgabe:</b> \(f(t)=\big(t\cos\tfrac1t,\ t\sin\tfrac1t\big)\) für \(0<t\le\tfrac1\pi\), \(f(0)=(0,0)\). Zeige: die Kurve ist <b>nicht rektifizierbar</b>.</p>
<p><b>Weg 2 (Integral):</b> Für \(t>0\) (mit \(u=\tfrac1t\)):</p>\[x'=\cos u+\tfrac1t\sin u,\qquad y'=\sin u-\tfrac1t\cos u\]\[\|f'(t)\|^{2}=1+\frac{1}{t^{2}}\qquad(\text{die Mischterme heben sich weg!})\]<p>\(f\) ist auf \([\varepsilon,\tfrac1\pi]\) glatt, also für jedes \(\varepsilon>0\):</p>\[L\ \ge\ \int_{\varepsilon}^{1/\pi}\sqrt{1+\tfrac{1}{t^{2}}}\,dt\ \ge\ \int_{\varepsilon}^{1/\pi}\frac{dt}{t}\ =\ \ln\frac{1}{\pi}-\ln\varepsilon\ \xrightarrow[\ \varepsilon\to0^{+}\ ]{}\ \infty\]<p>Das Längenintegral divergiert bei \(0\) → \(L=\infty\). ✓ (Wichtig: \(f\) ist in \(0\) nicht diff'bar — deshalb über \([\varepsilon,\tfrac1\pi]\) argumentieren und \(\varepsilon\to0\) schicken, nicht direkt \(\int_0\) hinschreiben.)</p>
<p><b>Weg 1 (Polygonzug):</b> Bei \(t_k=\tfrac{1}{k\pi}\) ist \(\sin(k\pi)=0,\ \cos(k\pi)=(-1)^{k}\), also \(f(t_k)=\big(\tfrac{(-1)^{k}}{k\pi},\,0\big)\) — die Punkte springen abwechselnd links/rechts vom Ursprung:</p>\[\|f(t_k)-f(t_{k+1})\|=\frac{1}{\pi}\Big(\frac{1}{k}+\frac{1}{k+1}\Big)\ \ge\ \frac{1}{\pi k}\]<p>Der Polygonzug durch \(t_1,\dots,t_n\) hat Länge \(\ge\frac{1}{\pi}\sum_{k=1}^{n-1}\frac1k\to\infty\) (harmonische Reihe) → unbeschränkt → nicht rektifizierbar. ✓</p>`,"Klausur-Beispiel: Spirale t·(cos 1/t, sin 1/t) — beide Wege")}
  </div>`; }

function diffHtml(){ return String.raw`
  <p class="sub">Differentialrechnung mehrerer Variablen — jedes Feld mit ausklappbarem Rechenbeispiel; wo etwas gelten oder scheitern kann, gibt es ✓ und ✗.</p>
  <div class="twocol">
    <div class="refblock">
      <h3>Partielle Ableitung &amp; Gradient</h3>
      <table class="reftable">
        <tr><td><b>Partiell:</b> \(\displaystyle \frac{\partial f}{\partial x_i}=\lim_{h\to0}\frac{f(\dots,x_i+h,\dots)-f}{h}\) — alle anderen Variablen fest halten.
          ${exBox(String.raw`<p>\(f(x,y)=x^{2}y+\sin(xy)\):</p><p>\(\dfrac{\partial f}{\partial x}\): \(y\) wie eine Konstante behandeln —</p>\[\frac{\partial f}{\partial x}=2xy+y\cos(xy)\]<p>\(\dfrac{\partial f}{\partial y}\): \(x\) festhalten —</p>\[\frac{\partial f}{\partial y}=x^{2}+x\cos(xy)\]<p>(Kettenregel: innere Ableitung von \(xy\) ist einmal \(y\), einmal \(x\).)</p>`,"Beispiel: beide partiellen Ableitungen")}</td></tr>
        <tr><td><b>Gradient:</b> \(\displaystyle \nabla f=\Big(\frac{\partial f}{\partial x_1},\dots,\frac{\partial f}{\partial x_n}\Big)^{\!\top}\) — Richtung des steilsten Anstiegs, \(\perp\) auf Niveaumengen.
          ${exBox(String.raw`<p>\(f(x,y)=x^{2}+y^{2}\):</p>\[\nabla f=(2x,\,2y)=2\,(x,y)\]<p>zeigt radial nach außen (steilster Anstieg), steht senkrecht auf den Niveaukreisen \(x^{2}+y^{2}=c\), und \(\|\nabla f\|=2\sqrt{x^{2}+y^{2}}\) ist die Steigungsrate in dieser Richtung.</p>`,"Beispiel: ∇(x²+y²)")}</td></tr>
        <tr><td><b>Richtungsableitung:</b> \(\displaystyle \partial_{\mathbf v}f=\nabla f\cdot\mathbf v\) mit \(\|\mathbf v\|=1\); maximal in Richtung \(\nabla f\) mit Wert \(\|\nabla f\|\).
          ${exBox(String.raw`<p>\(f(x,y)=x^{2}+y^{2}\) im Punkt \(P=(1,2)\), Richtung \(\mathbf v=\frac{1}{\sqrt2}(1,1)\):</p>\[\nabla f(P)=(2,4),\qquad \partial_{\mathbf v}f(P)=(2,4)\cdot\tfrac{1}{\sqrt2}(1,1)=\frac{2+4}{\sqrt2}=3\sqrt2\approx4{,}24\]<p>Zum Vergleich: das Maximum über alle Richtungen ist \(\|\nabla f(P)\|=\sqrt{20}\approx4{,}47\) — Richtung \(\mathbf v\) liegt also fast optimal.</p>`,"Beispiel: Richtungsableitung ausrechnen")}</td></tr>
        <tr><td><b>Totales Differential:</b> \(\displaystyle df=\sum_i\frac{\partial f}{\partial x_i}\,dx_i=\nabla f\cdot d\mathbf x\) — lineare Näherung der Änderung.
          ${exBox(String.raw`<p>Fehlerfortpflanzung beim Zylindervolumen \(V=\pi r^{2}h\), \(r=2\), \(h=5\), Messfehler \(dr=dh=0{,}1\):</p>\[dV=\frac{\partial V}{\partial r}dr+\frac{\partial V}{\partial h}dh=2\pi rh\,dr+\pi r^{2}\,dh\]\[=2\pi\cdot2\cdot5\cdot0{,}1+\pi\cdot4\cdot0{,}1=2\pi+0{,}4\pi=2{,}4\pi\approx7{,}5\]<p>— der \(r\)-Fehler wiegt hier fünfmal schwerer als der \(h\)-Fehler (Faktor \(2\pi rh\) vs. \(\pi r^2\)).</p>`,"Beispiel: Fehlerfortpflanzung")}</td></tr>
        <tr><td><b>Satz von Schwarz:</b> \(f\in C^{2}\ \Rightarrow\ \dfrac{\partial^2 f}{\partial x_i\partial x_j}=\dfrac{\partial^2 f}{\partial x_j\partial x_i}\) — gemischte Ableitungen vertauschen.
          ${exBox(String.raw`<p>\(f(x,y)=x^{2}y^{3}\) ist \(C^{2}\) (Polynom):</p>\[f_x=2xy^{3}\ \Rightarrow\ f_{xy}=6xy^{2},\qquad f_y=3x^{2}y^{2}\ \Rightarrow\ f_{yx}=6xy^{2}\]<p>— gleich, wie versprochen. ✓</p>`,"✓ Beispiel — f ∈ C², Schwarz gilt")}
          ${exBox(String.raw`<p>Ohne \(C^{2}\) kann Schwarz scheitern — der Klassiker:</p>\[f(x,y)=\frac{xy\,(x^{2}-y^{2})}{x^{2}+y^{2}},\qquad f(0,0)=0\]<p>Auf den Achsen gilt \(f_x(0,y)=\lim_{h\to0}\frac{f(h,y)}{h}=y\cdot\frac{-y^{2}}{y^{2}}=-y\) und analog \(f_y(x,0)=x\). Damit:</p>\[\frac{\partial}{\partial y}f_x(0,0)=-1\ \neq\ +1=\frac{\partial}{\partial x}f_y(0,0)\]<p>Die gemischten Ableitungen sind <b>verschieden</b> — weil \(f_{xy}\) in \((0,0)\) nicht stetig ist (\(f\notin C^{2}\)). Die Voraussetzung ist also wesentlich.</p>`,"✗ Gegenbeispiel — ohne C² vertauscht nichts")}</td></tr>
      </table>
    </div>
    <div class="refblock">
      <h3>Leibniz-Regel (Ableiten unter dem Integral)</h3>
      <table class="reftable">
        <tr><td><b>Feste Grenzen:</b> \(\displaystyle \frac{d}{dt}\int_a^b f(x,t)\,dx=\int_a^b \frac{\partial f}{\partial t}(x,t)\,dx\)<span class="when">Voraussetzung: \(f\) und \(\partial_t f\) stetig. Einsetzen, wenn das Integral selbst unhandlich ist, \(\partial_t f\) aber einfach.</span>
          ${exBox(String.raw`<p>\(\displaystyle I(t)=\int_0^{1}\sin(ty)\,dy\). <b>Leibniz:</b></p>\[I'(t)=\int_0^{1}\frac{\partial}{\partial t}\sin(ty)\,dy=\int_0^{1}y\cos(ty)\,dy\]<p><b>Gegencheck</b> — erst integrieren, dann ableiten: \(I(t)=\frac{1-\cos t}{t}\) (für \(t\neq0\)), also</p>\[I'(t)=\frac{t\sin t-(1-\cos t)}{t^{2}}\]<p>Und tatsächlich liefert partielle Integration von \(\int_0^1 y\cos(ty)dy\):</p>\[\Big[\frac{y\sin(ty)}{t}\Big]_0^{1}-\int_0^{1}\frac{\sin(ty)}{t}dy=\frac{\sin t}{t}-\frac{1-\cos t}{t^{2}}\]<p>— derselbe Ausdruck. Beide Wege stimmen überein. ✓</p>`,"Rechenbeispiel: feste Grenzen (mit Gegencheck)")}</td></tr>
        <tr><td><b>Variable Grenzen:</b> \(\displaystyle \frac{d}{dt}\int_{a(t)}^{b(t)} f(x,t)\,dx=f(b(t),t)\,b'(t)-f(a(t),t)\,a'(t)+\int_{a(t)}^{b(t)}\frac{\partial f}{\partial t}\,dx\)<span class="when">Drei Beiträge: obere Grenze wandert, untere Grenze wandert, Integrand ändert sich.</span>
          ${exBox(String.raw`<p>\(\displaystyle F(t)=\int_0^{t}(x^{2}+t)\,dx\) — obere Grenze <b>und</b> Integrand hängen von \(t\) ab:</p>\[F'(t)=\underbrace{(t^{2}+t)\cdot 1}_{f(b(t),t)\,b'(t)}\ -\ \underbrace{0}_{a'=0}\ +\ \int_0^{t}\underbrace{1}_{\partial_t(x^{2}+t)}\,dx=t^{2}+t+t=t^{2}+2t\]<p><b>Check</b> direkt: \(F(t)=\frac{t^{3}}{3}+t^{2}\Rightarrow F'(t)=t^{2}+2t\). ✓</p>`,"Rechenbeispiel: variable Grenzen (mit Check)")}</td></tr>
      </table>
      <p class="sub" style="margin-top:8px">Hintergrund: Stetigkeit von Parameterintegralen und der Tausch \(\lim\)–\(\int\) — siehe Thema <a href="#/6.7">6.7 Parameterintegrale</a>.</p>
    </div>
  </div>
  <div class="twocol">
    <div class="refblock">
      <h3>Jacobi- &amp; Hesse-Matrix</h3>
      <table class="reftable">
        <tr><td><b>Jacobi</b> \(f:\mathbb R^{n}\to\mathbb R^{m}\): \(\displaystyle (Df)_{ij}=\frac{\partial f_i}{\partial x_j}\) (\(m\times n\)); für \(m=1\) ist die Zeile \(=\nabla f^{\top}\).
          ${exBox(String.raw`<p>Polarkoordinaten \(g(r,\varphi)=(r\cos\varphi,\ r\sin\varphi)\):</p>\[Dg=\begin{pmatrix}\cos\varphi & -r\sin\varphi\\ \sin\varphi & r\cos\varphi\end{pmatrix},\qquad \det Dg=r\cos^{2}\varphi+r\sin^{2}\varphi=r\]<p>— genau das \(r\) aus \(dx\,dy=r\,dr\,d\varphi\) bei der Substitution in Doppelintegralen.</p>`,"Rechenbeispiel: Jacobi der Polarkoordinaten")}</td></tr>
        <tr><td><b>Hesse</b> \(f:\mathbb R^{n}\to\mathbb R\): \(\displaystyle (Hf)_{ij}=\frac{\partial^2 f}{\partial x_i\partial x_j}\) (\(n\times n\), symmetrisch falls \(f\in C^{2}\), Schwarz).
          ${exBox(String.raw`<p>\(f(x,y)=x^{2}+xy+y^{2}\): alle zweiten Ableitungen sammeln —</p>\[f_{xx}=2,\quad f_{xy}=f_{yx}=1,\quad f_{yy}=2\qquad\Rightarrow\qquad Hf=\begin{pmatrix}2&1\\1&2\end{pmatrix}\]<p>(konstant, weil \(f\) quadratisch ist).</p>`,"Rechenbeispiel: Hesse-Matrix aufstellen")}</td></tr>
        <tr><td><b>Extrema-Kriterium</b> in kritischen Punkten (\(\nabla f=0\)): \(Hf\) positiv definit \(\Rightarrow\) Minimum, negativ definit \(\Rightarrow\) Maximum, indefinit \(\Rightarrow\) Sattel. (2D-Schnelltest: \(\det Hf>0\) und \(f_{xx}>0\) → Min; \(\det>0,\ f_{xx}<0\) → Max; \(\det<0\) → Sattel.)
          ${exBox(String.raw`<p>\(f(x,y)=x^{2}+xy+y^{2}\): \(\nabla f=(2x+y,\ x+2y)=0\Rightarrow(0,0)\).</p>\[Hf=\begin{pmatrix}2&1\\1&2\end{pmatrix}:\quad \det=3>0,\ f_{xx}=2>0\ \Rightarrow\ \text{positiv definit}\]<p>⇒ lokales (sogar globales) <b>Minimum</b> in \((0,0)\).</p>`,"✓ Beispiel — Minimum nachweisen")}
          ${exBox(String.raw`<p>\(f(x,y)=x^{2}-y^{2}\): \(\nabla f=(2x,-2y)=0\Rightarrow(0,0)\).</p>\[Hf=\begin{pmatrix}2&0\\0&-2\end{pmatrix}:\quad \det=-4<0\ \Rightarrow\ \text{indefinit}\]<p>⇒ <b>Sattelpunkt</b>: entlang der \(x\)-Achse Minimum, entlang der \(y\)-Achse Maximum — kein Extremum.</p>`,"✗ Beispiel — Sattel statt Extremum")}</td></tr>
      </table>
    </div>
    <div class="refblock">
      <h3>Der Nabla-Operator \(\nabla\)</h3>
      <p class="sub">\(\displaystyle \nabla=\Big(\frac{\partial}{\partial x_1},\dots,\frac{\partial}{\partial x_n}\Big)\) — ein <b>formaler</b> Vektor-Operator; er wirkt auf das, was rechts von ihm steht.</p>
      <table class="reftable">
        <tr><td><b>Gradient</b> (Skalar → Vektor): \(\nabla f=\operatorname{grad}f\)
          ${exBox(String.raw`\[\nabla(xyz)=\big(yz,\ xz,\ xy\big)\]<p>— je Komponente die anderen Variablen festhalten.</p>`,"Beispiel: grad")}</td></tr>
        <tr><td><b>Divergenz</b> (Vektor → Skalar): \(\displaystyle \nabla\cdot\mathbf F=\operatorname{div}\mathbf F=\sum_i\frac{\partial F_i}{\partial x_i}\) — Quellstärke.
          ${exBox(String.raw`<p>\(\mathbf F(x,y,z)=(-y,\ x,\ 0)\) (Wirbelfeld um die \(z\)-Achse):</p>\[\operatorname{div}\mathbf F=\frac{\partial(-y)}{\partial x}+\frac{\partial x}{\partial y}+\frac{\partial 0}{\partial z}=0+0+0=0\]<p>— quellenfrei: es wird nirgends „Flüssigkeit erzeugt", sie rotiert nur.</p>`,"Rechenbeispiel: div")}</td></tr>
        <tr><td><b>Rotation</b> (Vektor → Vektor, \(\mathbb R^{3}\)): \(\nabla\times\mathbf F=\operatorname{rot}\mathbf F\) — lokale Drehstärke.
          ${exBox(String.raw`<p>Gleiches \(\mathbf F=(-y,\ x,\ 0)\), komponentenweise:</p>\[\nabla\times\mathbf F=\Big(\underbrace{\partial_y 0-\partial_z x}_{0},\ \underbrace{\partial_z(-y)-\partial_x 0}_{0},\ \underbrace{\partial_x x-\partial_y(-y)}_{1+1}\Big)=(0,0,2)\]<p>— konstante Rotation um die \(z\)-Achse (doppelte Winkelgeschwindigkeit).</p>`,"Rechenbeispiel: rot")}</td></tr>
        <tr><td><b>Laplace:</b> \(\displaystyle \Delta f=\nabla\cdot\nabla f=\sum_i\frac{\partial^2 f}{\partial x_i^2}\)
          ${exBox(String.raw`\[\Delta(x^{2}+y^{2})=2+2=4,\qquad \Delta(x^{2}-y^{2})=2-2=0\]<p>\(x^{2}-y^{2}\) ist <b>harmonisch</b> (\(\Delta f=0\)) — die Sattelform krümmt sich in beide Richtungen exakt gegengleich.</p>`,"Rechenbeispiel: Δ")}</td></tr>
        <tr><td><b>Worauf achten:</b> \(\nabla\) ist <i>kein</i> echter Vektor — Reihenfolge zählt (\(\nabla f\neq f\nabla\)); grad/rot liefern Vektoren, div einen Skalar; nützliche Identitäten: \(\nabla\times(\nabla f)=\mathbf 0\) und \(\nabla\cdot(\nabla\times\mathbf F)=0\).
          ${exBox(String.raw`<p>Check von \(\nabla\times(\nabla f)=\mathbf 0\) an \(f=xyz\): \(\nabla f=(yz,xz,xy)\),</p>\[\big(\nabla\times\nabla f\big)_3=\partial_x(xz)_{\!y\text{-Komp.}}\dots=\partial_x(xz)-\partial_y(yz)=z-z=0\]<p>(alle drei Komponenten verschwinden analog — Gradientenfelder sind wirbelfrei, weil Schwarz die gemischten Ableitungen vertauscht).</p>`,"Beispiel: Gradientenfelder sind wirbelfrei")}</td></tr>
      </table>
    </div>
  </div>
  <div class="refblock">
    <h3>Fréchet-Ableitung</h3>
    <table class="reftable">
      <tr><td>\(f:X\to Y\) (normierte Räume) heißt in \(x\) <b>Fréchet-differenzierbar</b>, wenn es eine stetige lineare Abbildung \(A=f'(x)\) gibt mit\[\frac{\|f(x+h)-f(x)-Ah\|}{\|h\|}\ \xrightarrow[h\to0]{}\ 0.\]Im \(\mathbb R^{n}\): \(A=\) Jacobi-Matrix \(Df(x)\). <b>Gâteaux</b> (nur Richtungsableitungen) ist echt schwächer.</td></tr>
    </table>
    ${exBox(String.raw`<p>\(f(x)=\|x\|^{2}=x^{\top}x\) auf \(\mathbb R^{n}\): ausmultiplizieren,</p>\[f(x+h)-f(x)=x^{\top}x+2x^{\top}h+h^{\top}h-x^{\top}x=\underbrace{2x^{\top}h}_{\text{linear in }h}+\underbrace{\|h\|^{2}}_{=o(\|h\|)}\]<p>Der lineare Teil ist \(Ah=2x^{\top}h\), der Rest erfüllt \(\frac{\|h\|^{2}}{\|h\|}=\|h\|\to0\). Also <b>Fréchet-differenzierbar</b> mit \(f'(x)=2x^{\top}\), d. h. \(\nabla f=2x\). ✓</p>`,"✓ Beispiel — Fréchet-differenzierbar: ‖x‖²")}
    ${exBox(String.raw`<p>\(f(x)=\|x\|\) ist in \(x=0\) <b>nicht</b> Fréchet-differenzierbar. Angenommen, es gäbe ein lineares \(A\) mit</p>\[\frac{\big|\,\|h\|-Ah\,\big|}{\|h\|}\to0\qquad\Longleftrightarrow\qquad \frac{Ah}{\|h\|}\to1.\]<p>Ersetze \(h\) durch \(-h\): wegen Linearität \(A(-h)=-Ah\) und \(\|-h\|=\|h\|\) folgt</p>\[\frac{-Ah}{\|h\|}\to1\quad\text{und gleichzeitig}\quad\frac{Ah}{\|h\|}\to1\ \Rightarrow\ 1=-1\ \text{— Widerspruch.}\]<p>Anschaulich: der Kegel \(\|x\|\) hat in der Spitze keine Tangentialebene. (In \(\mathbb R^1\) ist das genau die Nicht-Differenzierbarkeit von \(|x|\) in \(0\).)</p>`,"✗ Gegenbeispiel — ‖x‖ in 0 (Kegelspitze)")}
  </div>`; }

function bruecheHtml(){ return String.raw`
  <p class="sub"><b>Fahrplan:</b> ① Zählergrad \(\ge\) Nennergrad? → erst <b>Polynomdivision</b>. &nbsp;② Nenner <b>faktorisieren</b>. &nbsp;③ <b>Ansatz</b> nach Schema. &nbsp;④ <b>Koeffizienten</b> bestimmen. &nbsp;⑤ Summanden einzeln integrieren.</p>
  <div class="refblock">
    <h3>Ansatz-Schemata (Nenner-Faktor → Ansatz)</h3>
    <table class="reftable">
      <tr><td>\((x-a)\)</td><td>\(\dfrac{A}{x-a}\)</td></tr>
      <tr><td>\((x-a)^{k}\)</td><td>\(\dfrac{A_1}{x-a}+\dfrac{A_2}{(x-a)^{2}}+\cdots+\dfrac{A_k}{(x-a)^{k}}\)</td></tr>
      <tr><td>\(x^{2}+px+q\) irreduzibel</td><td>\(\dfrac{Bx+C}{x^{2}+px+q}\)</td></tr>
      <tr><td>\((x^{2}+px+q)^{k}\)</td><td>\(\displaystyle\sum_{j=1}^{k}\frac{B_j x+C_j}{(x^{2}+px+q)^{j}}\)</td></tr>
    </table>
  </div>
  <div class="refblock">
    <h3>Methoden zur Koeffizienten-Bestimmung — je mit Mini-Beispiel</h3>
    <div class="subgrid">
      <div class="subcard">
        <div class="subhead">① Zuhalten („Handauflegen")</div>
        <div class="subrule">Faktor \((x-a)\) zuhalten, \(x=a\) in den Rest einsetzen. <b>Nur</b> bei einfachen Nullstellen — bei \((x-a)^{k}\) nur für die höchste Potenz \(A_k\), bei quadratischen Faktoren gar nicht.</div>
        ${exBox(String.raw`<p>\(\dfrac{5x+1}{(x-1)(x+2)}=\dfrac{A}{x-1}+\dfrac{B}{x+2}\)</p><p>\((x-1)\) zuhalten, \(x=1\): \(A=\dfrac{5\cdot1+1}{1+2}=2\). \((x+2)\) zuhalten, \(x=-2\): \(B=\dfrac{-10+1}{-2-1}=3\).</p>\[\Rightarrow\ \frac{5x+1}{(x-1)(x+2)}=\frac{2}{x-1}+\frac{3}{x+2}\]<p>Probe: \(2(x+2)+3(x-1)=5x+1\). ✓</p>`,"Mini-Beispiel")}
      </div>
      <div class="subcard">
        <div class="subhead">② Grenzwert-Trick</div>
        <div class="subrule">Beide Seiten mit \(x\) multiplizieren, \(x\to\infty\) → eine Zusatzgleichung. Immer möglich — ideal, um fehlende Koeffizienten nachzuziehen.</div>
        ${exBox(String.raw`<p>\(\dfrac{1}{x(x^{2}+1)}=\dfrac{A}{x}+\dfrac{Bx+C}{x^{2}+1}\) — \(A=1\) per Zuhalten (\(x=0\)). Dann:</p>\[\underbrace{\frac{x}{x(x^{2}+1)}}_{\to\,0}=\underbrace{A+\frac{(Bx+C)x}{x^{2}+1}}_{\to\,A+B}\quad\Rightarrow\quad B=-1.\]<p>Rest (\(x=1\)): \(\tfrac12=1+\tfrac{-1+C}{2}\Rightarrow C=0\). Ergebnis: \(\dfrac{1}{x}-\dfrac{x}{x^{2}+1}\).</p>`,"Mini-Beispiel")}
      </div>
      <div class="subcard">
        <div class="subhead">③ Koeffizientenvergleich</div>
        <div class="subrule">Auf den Hauptnenner bringen, Potenzen von \(x\) vergleichen. Funktioniert <b>immer</b> — auch bei quadratischen Faktoren — ist aber am aufwendigsten.</div>
        ${exBox(String.raw`<p>\(\dfrac{3x+5}{(x+1)(x+2)}=\dfrac{A}{x+1}+\dfrac{B}{x+2}\). Hauptnenner:</p>\[3x+5=A(x+2)+B(x+1)=(A+B)\,x+(2A+B)\]<p>Vergleich von \(x^{1}\) und \(x^{0}\):</p>\[A+B=3,\qquad 2A+B=5\ \Rightarrow\ A=2,\ B=1.\]`,"Mini-Beispiel")}
      </div>
      <div class="subcard">
        <div class="subhead">④ Werte einsetzen</div>
        <div class="subrule">Bequeme \(x\)-Werte in die Hauptnenner-Gleichung einsetzen → kleines lineares Gleichungssystem. Immer möglich.</div>
        ${exBox(String.raw`<p>\(\dfrac{2x}{(x-1)(x+1)}=\dfrac{A}{x-1}+\dfrac{B}{x+1}\), Hauptnenner-Gleichung \(2x=A(x+1)+B(x-1)\).</p>\[x=0:\ 0=A-B,\qquad x=2:\ 4=3A+B\ \Rightarrow\ A=B=1.\]<p>Ergebnis: \(\dfrac{1}{x-1}+\dfrac{1}{x+1}\).</p>`,"Mini-Beispiel")}
      </div>
    </div>
  </div>
  <div class="refblock">
    <h3>Komplette Rechnungen</h3>
    ${exBox(String.raw`<p>\(\dfrac{1}{x^{2}-1}=\dfrac{1}{(x-1)(x+1)}=\dfrac{A}{x-1}+\dfrac{B}{x+1}\)</p><p><b>Zuhalten:</b> \((x-1)\) zuhalten, \(x=1\): \(A=\dfrac{1}{1+1}=\dfrac12\). \((x+1)\) zuhalten, \(x=-1\): \(B=-\dfrac12\).</p>\[\Rightarrow\ \int\frac{dx}{x^{2}-1}=\frac12\ln\left|\frac{x-1}{x+1}\right|+C\]`,"Beispiel 1 — nur einfache Nullstellen (reines Zuhalten)")}
    ${exBox(String.raw`<p>\(\dfrac{x+1}{x(x-1)^{2}}=\dfrac{A}{x}+\dfrac{B}{x-1}+\dfrac{C}{(x-1)^{2}}\)</p><p><b>Zuhalten</b> \(x\) (bei \(x=0\)): \(A=\dfrac{0+1}{(0-1)^{2}}=1\).</p><p><b>Zuhalten</b> \((x-1)^{2}\) (bei \(x=1\)): \(C=\dfrac{1+1}{1}=2\). <i>(B so nicht bestimmbar!)</i></p><p><b>Grenzwert-Trick:</b> mit \(x\) multiplizieren, \(x\to\infty\): links \(\to0\), rechts \(\to A+B\) \(\Rightarrow B=-1\).</p><p><b>Probe</b> bei \(x=2\): links \(\frac{3}{2}\); rechts \(\frac12-1+2=\frac32\). ✓</p>`,"Beispiel 2 — mehrfache Nullstelle (Methoden-Mix)")}
  </div>
  <div class="refblock">
    <h3>Bruch-Tricks &amp; praktische Identitäten</h3>
    <table class="reftable">
      <tr><td>\(\dfrac{t}{t+2}=1-\dfrac{2}{t+2}\)</td><td class="cond">\(+1{-}1\)-Trick (Zähler ↦ Nenner + Rest)</td></tr>
      <tr><td>\(\dfrac{1}{ab}=\dfrac{1}{b-a}\Big(\dfrac{1}{a}-\dfrac{1}{b}\Big)\) \((a\neq b)\)</td><td class="cond">Teleskop-Basis</td></tr>
      <tr><td>\(\dfrac{1}{x(x+1)}=\dfrac{1}{x}-\dfrac{1}{x+1}\)</td><td class="cond">Spezialfall</td></tr>
      <tr><td>\(\dfrac{1}{\sqrt{a}+\sqrt{b}}=\dfrac{\sqrt{a}-\sqrt{b}}{a-b}\)</td><td class="cond">3. binomische</td></tr>
      <tr><td>\(\dfrac{a/b}{c/d}=\dfrac{ad}{bc}\)</td><td class="cond">Doppelbruch</td></tr>
    </table>
    ${exBox(String.raw`<p><b>Teleskopsumme</b> mit der Identität \(\frac{1}{k(k+1)}=\frac1k-\frac{1}{k+1}\):</p>\[\sum_{k=1}^{n}\frac{1}{k(k+1)}=\Big(1-\frac12\Big)+\Big(\frac12-\frac13\Big)+\cdots+\Big(\frac1n-\frac{1}{n+1}\Big)=1-\frac{1}{n+1}\ \longrightarrow\ 1\]`)}
  </div>`; }

function beweiseHtml(){ return String.raw`
  <p class="sub">Die Abschätzungen und Tricks, die in fast jedem Analysis-Beweis auftauchen — je mit typischem Einsatz zum Aufklappen.</p>
  <div class="subgrid">
    <div class="subcard">
      <div class="subhead">Dreiecksungleichung</div>
      <div class="subrule">\(|a+b|\le|a|+|b|\) — auch für Summen \(\big|\sum a_k\big|\le\sum|a_k|\), Integrale \(\big|\int f\big|\le\int|f|\), Normen \(\|x+y\|\le\|x\|+\|y\|\)</div>
      ${exBox(String.raw`<p>Summenregel für Grenzwerte (\(a_n\to a,\ b_n\to b\)):</p>\[|(a_n+b_n)-(a+b)|\le|a_n-a|+|b_n-b|<\tfrac{\varepsilon}{2}+\tfrac{\varepsilon}{2}=\varepsilon\]`,"Typischer Einsatz")}
    </div>
    <div class="subcard">
      <div class="subhead">Umgekehrte Dreiecksungleichung</div>
      <div class="subrule">\(\big|\,|a|-|b|\,\big|\le|a-b|\) — Beträge vergleichen, Nenner nach unten abschätzen.</div>
      ${exBox(String.raw`<p>\(a_n\to a\ \Rightarrow\ |a_n|\to|a|\):</p>\[\big|\,|a_n|-|a|\,\big|\le|a_n-a|\to0.\]<p>Oder Nenner absichern: \(|x-3|\le1\Rightarrow|x|\ge2\Rightarrow\dfrac{1}{|x|}\le\dfrac12\).</p>`,"Typischer Einsatz")}
    </div>
    <div class="subcard">
      <div class="subhead">Cauchy-Schwarz-Ungleichung</div>
      <div class="subrule">\(|\langle x,y\rangle|\le\|x\|\,\|y\|\); Summen: \(\big(\sum a_kb_k\big)^{2}\le\sum a_k^{2}\cdot\sum b_k^{2}\); Integrale: \(\big(\int fg\big)^{2}\le\int f^{2}\cdot\int g^{2}\)</div>
      ${exBox(String.raw`<p>Mit \(b_k=1\):</p>\[\Big(\sum_{k=1}^{n}a_k\Big)^{2}\le n\,\sum_{k=1}^{n}a_k^{2}\]<p>— Summe gegen quadratische Summe tauschen; Startpunkt vieler Abschätzungen.</p>`,"Typischer Einsatz")}
    </div>
    <div class="subcard">
      <div class="subhead">Bernoulli-Ungleichung</div>
      <div class="subrule">\((1+x)^{n}\ge 1+nx\) für \(x\ge-1\)</div>
      ${exBox(String.raw`<p>\(q^{n}\to\infty\) für \(q>1\): schreibe \(q=1+h\), \(h>0\):</p>\[q^{n}=(1+h)^{n}\ge 1+nh\ \longrightarrow\ \infty.\]`,"Typischer Einsatz")}
    </div>
    <div class="subcard">
      <div class="subhead">AM–GM &amp; Co.</div>
      <div class="subrule">\(\sqrt{ab}\le\dfrac{a+b}{2}\) (\(a,b\ge0\)); \(ab\le\dfrac{a^{2}+b^{2}}{2}\); \(x+\dfrac1x\ge2\) für \(x>0\)</div>
      ${exBox(String.raw`<p>Produkt gegen Quadrate tauschen:</p>\[\sum|a_k b_k|\le\frac12\sum a_k^{2}+\frac12\sum b_k^{2}\]<p>— aus einem unhandlichen Produkt werden zwei handliche Summen.</p>`,"Typischer Einsatz")}
    </div>
    <div class="subcard">
      <div class="subhead">Nullergänzung (±-Trick)</div>
      <div class="subrule">Zwischenterm einschieben und Dreiecksungleichung: \(fg-\tilde f\tilde g=(f-\tilde f)g+\tilde f(g-\tilde g)\)</div>
      ${exBox(String.raw`<p>Produktregel für Grenzwerte:</p>\[|a_nb_n-ab|=|(a_n-a)b_n+a(b_n-b)|\le|a_n-a|\,|b_n|+|a|\,|b_n-b|\]<p>\(|b_n|\) ist beschränkt (konvergent) → beide Summanden \(\to0\).</p>`,"Typischer Einsatz")}
    </div>
    <div class="subcard">
      <div class="subhead">ε/2-Trick</div>
      <div class="subrule">Zwei Fehlerquellen? Jede unter \(\varepsilon/2\) drücken, dann \(N=\max(N_1,N_2)\). (Drei Quellen: \(\varepsilon/3\), …)</div>
      ${exBox(String.raw`<p>Konvergent \(\Rightarrow\) Cauchy: für \(m,n\ge N_{\varepsilon/2}\):</p>\[|a_n-a_m|\le|a_n-a|+|a-a_m|<\tfrac{\varepsilon}{2}+\tfrac{\varepsilon}{2}=\varepsilon.\]`,"Typischer Einsatz")}
    </div>
    <div class="subcard">
      <div class="subhead">Sandwich-Lemma (Einschließung)</div>
      <div class="subrule">\(a_n\le c_n\le b_n\) und \(a_n,b_n\to L\ \Rightarrow\ c_n\to L\)</div>
      ${exBox(String.raw`\[-\frac1n\ \le\ \frac{\sin n}{n}\ \le\ \frac1n\qquad\Rightarrow\qquad \frac{\sin n}{n}\to0.\]`,"Typischer Einsatz")}
    </div>
    <div class="subcard">
      <div class="subhead">Standard-Abschätzungen</div>
      <div class="subrule">\(|\sin x|\le|x|\); \(|\sin x|,|\cos x|\le1\); \(e^{x}\ge1+x\); \(\ln x\le x-1\)</div>
      ${exBox(String.raw`<p>\(\displaystyle\sum\sin\frac{1}{k^{2}}\) konvergiert absolut:</p>\[\Big|\sin\frac{1}{k^{2}}\Big|\le\frac{1}{k^{2}}\qquad\text{(Majorante, }p=2>1\text{).}\]`,"Typischer Einsatz")}
    </div>
  </div>`; }

function saetzeHtml(){ return String.raw`
  <p class="sub">Die zentralen Definitionen und Sätze — je Feld: die <b>mathematische Definition</b>, darunter zum Aufklappen: <b>in Worten</b>, <b>✓ wie man „erfüllt" zeigt</b> und <b>✗ wie man „verletzt" zeigt</b>.</p>
  <div class="subgrid">
    <div class="subcard">
      <div class="subhead">Stetigkeit (ε-δ &amp; Folgenkriterium)</div>
      <div class="subrule">\(f:D\to\mathbb R\), \(x_0\in D\). Beide Fassungen sind äquivalent.</div>
      \[f\ \text{stetig in }x_0\ :\Longleftrightarrow\ \forall\varepsilon>0\ \exists\delta>0\ \forall x\in D:\ |x-x_0|<\delta\ \Rightarrow\ |f(x)-f(x_0)|<\varepsilon\]
      \[\textbf{Folgenkriterium:}\quad x_n\to x_0\ \Longrightarrow\ f(x_n)\to f(x_0)\quad\text{für jede Folge }(x_n)\subset D\]
      ${exBox(String.raw`<p>Zu jeder <b>Ziel-Toleranz</b> \(\varepsilon\) um \(f(x_0)\) gibt es eine <b>Start-Toleranz</b> \(\delta\) um \(x_0\): alle \(x\) im \(\delta\)-Fenster landen mit ihren Werten im \(\varepsilon\)-Fenster — kleine Eingabe-Wackler erzeugen kleine Ausgabe-Wackler, kein Sprung. Praxis: <b>Nachweisen</b> per ε-δ (δ konstruieren) oder per „Baukasten" (Summen, Produkte, Quotienten, Verkettungen stetiger Funktionen sind stetig); <b>Widerlegen</b> fast immer per Folgenkriterium — eine einzige böse Folge reicht.</p>`,"In Worten")}
      ${exBox(String.raw`<p>\(f(x)=x^{2}\) ist stetig in jedem \(x_0\) — \(\delta\) explizit konstruieren:</p>\[|x^{2}-x_0^{2}|=|x-x_0|\cdot|x+x_0|\]<p>Beschränke zuerst \(|x-x_0|<1\): dann \(|x+x_0|\le|x-x_0|+2|x_0|\le 2|x_0|+1\). Wähle also</p>\[\delta=\min\Big(1,\ \frac{\varepsilon}{2|x_0|+1}\Big)\ \Rightarrow\ |x^{2}-x_0^{2}|\le\delta\,\big(2|x_0|+1\big)\le\varepsilon.\ \checkmark\]<p>(Schneller im Alltag: \(x^{2}=x\cdot x\) ist ein Produkt stetiger Funktionen.)</p>`,"✓ So zeigt man: erfüllt")}
      ${exBox(String.raw`<p>\(f=\operatorname{sgn}\) ist in \(0\) unstetig — <b>Folgenkriterium</b> mit zwei Folgen:</p>\[x_n=\tfrac1n\to0:\ f(x_n)=1\to1,\qquad y_n=-\tfrac1n\to0:\ f(y_n)=-1\to-1\]<p>Zwei Folgen gegen \(x_0=0\), aber die Funktionswerte haben <b>verschiedene Limites</b> (und keiner ist \(f(0)=0\)) \(\Rightarrow\) nicht stetig in \(0\). Merke: schon <b>eine</b> Folge mit \(f(x_n)\not\to f(x_0)\) genügt.</p>`,"✗ So zeigt man: verletzt")}
    </div>
    <div class="subcard">
      <div class="subhead">Riemann-Integrierbarkeit \(f\in R[a,b]\)</div>
      <div class="subrule">\(f:[a,b]\to\mathbb R\) beschränkt; \(X\) Zerlegung mit <b>Rang</b> (Feinheit) \(\lambda(X)=\max_k\Delta x_k\), \(\Xi\) Stützstellen.</div>
      \[f\in R[a,b]\ :\Longleftrightarrow\ \exists\,I\in\mathbb{R}:\ \sigma(f,X,\Xi)=\sum_{k=1}^{n}f(\xi_k)\,\Delta x_k\ \xrightarrow[\ \lambda(X)\to0\ ]{}\ I\]
      <div class="subrule">für <b>jede</b> Zerlegungsfolge und <b>beliebige</b> Stützstellen; dann \(I=\int_a^b f\). Praktische Kriterien: stetig \(\Rightarrow\) intb.; monoton \(\Rightarrow\) intb.; Lebesgue: beschränkt + stetig bis auf Nullmenge \(\Leftrightarrow\) intb.</div>
      ${exBox(String.raw`<p>Zerhacke \([a,b]\) beliebig fein und lies die Funktionshöhe an beliebigen Zwischenstellen ab — bilde Rechtecksummen. \(f\) ist integrierbar, wenn <b>alle</b> diese Summen (egal wie zerlegt, egal wo abgelesen) gegen <b>denselben</b> Wert \(I\) streben. Beschränktheit ist Pflicht; im Alltag prüft man nicht die Definition, sondern: stetig? monoton? höchstens „harmlose" Sprungstellen?</p>`,"In Worten")}
      ${exBox(String.raw`<p>\(f(x)=x^{2}\) auf \([0,1]\): \(f\) ist <b>stetig</b> auf dem kompakten Intervall \(\Rightarrow f\in R[0,1]\) (Satz „stetig ⇒ integrierbar"; Hintergrund: stetig auf Kompaktum \(\Rightarrow\) gleichmäßig stetig \(\Rightarrow\) Ober- und Untersummen rücken zusammen).</p><p>So läuft der Nachweis fast immer: <b>auf ein Kriterium zurückziehen</b>, nicht die Definition prüfen.</p>`,"✓ So zeigt man: erfüllt")}
      ${exBox(String.raw`<p><b>Dirichlet-Funktion</b> \(f=\mathbf 1_{\mathbb Q}\) auf \([0,1]\) (1 auf rationalen, 0 auf irrationalen Zahlen): jedes noch so kleine Teilintervall enthält beide Sorten Punkte. Wählt man <b>rationale</b> Stützstellen, ist \(\sigma=1\); wählt man <b>irrationale</b>, ist \(\sigma=0\):</p>\[\lim \sigma\ \text{hängt von der Stützstellenwahl ab}\ \Rightarrow\ f\notin R[0,1].\]<p>Verletzt-Nachweis = <b>zwei Ablesearten mit verschiedenen Limites</b> angeben.</p>`,"✗ So zeigt man: verletzt")}
    </div>
    <div class="subcard">
      <div class="subhead">Konvergenz uneigentlicher Integrale</div>
      <div class="subrule">Voraussetzung: \(f\) ist auf <b>jedem kompakten</b> Intervall \([A,R]\) Riemann-integrierbar (sonst ist \(F(R)\) gar nicht definiert).</div>
      \[\int_A^{+\infty}\!f(x)\,dx\ \text{konvergiert}\ :\Longleftrightarrow\ \lim_{R\to+\infty}\ \underbrace{\int_A^{R}\!f(x)\,dx}_{=:F(R)}\ \text{existiert in }\mathbb R\]
      <div class="subrule">Analog bei Randsingularität: \(\lim_{\varepsilon\to0^{+}}\int_a^{b-\varepsilon}f\).</div>
      ${exBox(String.raw`<p>Zwei Zutaten: <b>(1)</b> bis zu jeder endlichen Schranke \(R\) muss \(f\) ganz normal integrierbar sein — deshalb „auf jedem kompakten Intervall R-integrierbar". <b>(2)</b> Die Werte \(F(R)\) müssen sich für \(R\to+\infty\) auf eine feste Zahl <b>einpendeln</b>. Divergenz heißt: \(F(R)\to\pm\infty\) <i>oder</i> \(F(R)\) oszilliert ohne Limes.</p>`,"In Worten")}
      ${exBox(String.raw`<p>\(\displaystyle\int_1^{+\infty}\frac{dx}{x^{2}}\): \(x^{-2}\) ist stetig auf jedem \([1,R]\) ✓. Dann \(F(R)\) explizit ausrechnen und den Limes bilden:</p>\[F(R)=\int_1^{R}\frac{dx}{x^{2}}=1-\frac{1}{R}\ \xrightarrow[R\to+\infty]{}\ 1\]<p>Limes existiert \(\Rightarrow\) konvergent mit Wert \(1\).</p>`,"✓ So zeigt man: erfüllt")}
      ${exBox(String.raw`<p>\(\displaystyle\int_0^{+\infty}\cos x\,dx\): hier ist \(F(R)=\sin R\) — <b>beschränkt, aber ohne Grenzwert</b> (oszilliert ewig zwischen \(-1\) und \(1\)): divergent, obwohl nichts „explodiert"!</p><p>Und \(\displaystyle\int_1^{+\infty}\frac{dx}{x}\): \(F(R)=\ln R\to+\infty\) — divergent durch Explosion. Verletzt-Nachweis = \(F(R)\) ausrechnen und zeigen: \(\to\infty\) oder zwei Folgen \(R_n\) mit verschiedenen Limites (z. B. \(\sin\) bei \(2\pi n\) vs. \(2\pi n+\tfrac\pi2\)).</p>`,"✗ So zeigt man: verletzt")}
    </div>
    <div class="subcard">
      <div class="subhead">Konvergenz einer Reihe</div>
      <div class="subrule">Eine Reihe ist per Definition die Folge ihrer Partialsummen.</div>
      \[\sum_{k=0}^{\infty}a_k=S\ :\Longleftrightarrow\ s_n=\sum_{k=0}^{n}a_k\ \xrightarrow[\ n\to\infty\ ]{}\ S\]
      ${exBox(String.raw`<p>Hinter jeder Reihe steckt eine gewöhnliche <b>Folge</b>: die Zwischensummen \(s_0,s_1,s_2,\dots\) Konvergiert diese Folge, „ist" die Reihe ihr Grenzwert. Alle Reihen-Kriterien sind letztlich Aussagen über diese Folge.</p>`,"In Worten")}
      ${exBox(String.raw`<p>Geometrische Reihe \(q=\tfrac12\): Partialsummen <b>explizit</b> hinschreiben und Limes ablesen:</p>\[s_n=\sum_{k=0}^{n}\Big(\tfrac12\Big)^{k}=\frac{1-(\tfrac12)^{n+1}}{1-\tfrac12}=2\Big(1-\tfrac{1}{2^{n+1}}\Big)\ \longrightarrow\ 2.\]`,"✓ So zeigt man: erfüllt")}
      ${exBox(String.raw`<p>\(\sum(-1)^{k}\): \(s_n=1,0,1,0,\dots\) hat die zwei Häufungswerte \(1\) und \(0\) \(\Rightarrow\) \((s_n)\) divergiert \(\Rightarrow\) Reihe divergent.</p><p>Schneller Standardweg: <b>notwendiges Kriterium</b> — hier \(a_k=(-1)^{k}\not\to0\), fertig.</p>`,"✗ So zeigt man: verletzt")}
    </div>
    <div class="subcard">
      <div class="subhead">Absolute Konvergenz</div>
      <div class="subrule">Stärker als Konvergenz: erlaubt Umordnen und Produktbildung.</div>
      \[\sum a_k\ \text{konvergiert absolut}\ :\Longleftrightarrow\ \sum_{k}|a_k|<\infty\qquad(\Rightarrow\ \textstyle\sum a_k\ \text{konvergiert})\]
      ${exBox(String.raw`<p>Auch wenn man <b>alle Vorzeichen wegwirft</b>, bleibt die Summe endlich. Das ist die „robuste" Konvergenz: jede Umordnung liefert denselben Wert. Nur konvergent, aber nicht absolut („bedingt") heißt: die Vorzeichen-Auslöschung ist essenziell — Umordnen kann dann <i>jeden</i> Wert erzeugen (Riemann!).</p>`,"In Worten")}
      ${exBox(String.raw`<p>\(\displaystyle\sum\frac{(-1)^{k}}{k^{2}}\): Beträge bilden und ein Kriterium anwenden:</p>\[\sum\Big|\frac{(-1)^{k}}{k^{2}}\Big|=\sum\frac{1}{k^{2}}\ \text{konvergiert }(p=2>1)\ \Rightarrow\ \text{absolut konvergent.}\]`,"✓ So zeigt man: erfüllt")}
      ${exBox(String.raw`<p>\(\displaystyle\sum\frac{(-1)^{k+1}}{k}\): die Reihe selbst konvergiert (Leibniz, \(=\ln2\)) — aber die Betragsreihe ist die <b>harmonische</b>:</p>\[\sum\Big|\frac{(-1)^{k+1}}{k}\Big|=\sum\frac{1}{k}=\infty\]<p>\(\Rightarrow\) konvergent, aber <b>nicht absolut</b> (nur bedingt). Verletzt-Nachweis = Divergenz der Betragsreihe zeigen.</p>`,"✗ So zeigt man: verletzt")}
    </div>
    <div class="subcard">
      <div class="subhead">Punktweise Konvergenz \(f_n\to f\)</div>
      <div class="subrule">Funktionenfolge \(f_n:D\to\mathbb R\); jeder Punkt für sich.</div>
      \[f_n\to f\ \text{punktweise auf }D\ :\Longleftrightarrow\ \forall x\in D:\ \lim_{n\to\infty}f_n(x)=f(x)\]
      <div class="subrule">Das \(N=N(\varepsilon,x)\) darf von \(x\) abhängen.</div>
      ${exBox(String.raw`<p>\(x\) <b>festhalten</b>, dann ist \(f_n(x)\) eine gewöhnliche Zahlenfolge — die muss konvergieren, für jedes \(x\) einzeln. Wie schnell, darf von Punkt zu Punkt völlig verschieden sein.</p>`,"In Worten")}
      ${exBox(String.raw`<p>\(f_n(x)=\frac{x}{n}\) auf \(\mathbb R\): festes \(x\) einsetzen und den Zahlen-Limes bilden:</p>\[\lim_{n\to\infty}\frac{x}{n}=0\quad\text{für jedes feste }x\ \Rightarrow\ f_n\to f\equiv0\ \text{punktweise.}\]`,"✓ So zeigt man: erfüllt")}
      ${exBox(String.raw`<p>\(f_n(x)=(-1)^{n}x\) auf \(\mathbb R\): für \(x\neq0\) springt \(f_n(x)\) zwischen \(x\) und \(-x\) — die Zahlenfolge hat zwei Häufungswerte, also keinen Limes:</p>\[\Rightarrow\ (f_n)\ \text{konvergiert nicht einmal punktweise.}\]<p>Verletzt-Nachweis = <b>einen</b> Punkt \(x\) angeben, an dem \(f_n(x)\) divergiert.</p>`,"✗ So zeigt man: verletzt")}
    </div>
    <div class="subcard">
      <div class="subhead">Gleichmäßige Konvergenz \(f_n\rightrightarrows f\)</div>
      <div class="subrule">Ein \(N(\varepsilon)\) für <b>alle</b> \(x\) gleichzeitig — der ganze Graph im \(\varepsilon\)-Schlauch.</div>
      \[f_n\rightrightarrows f\ \text{auf }D\ :\Longleftrightarrow\ M_n=\sup_{x\in D}\,|f_n(x)-f(x)|\ \xrightarrow[\ n\to\infty\ ]{}\ 0\]
      ${exBox(String.raw`<p>Nicht jeder Punkt für sich, sondern der <b>schlimmste</b> Punkt zählt: \(M_n\) ist der größte Fehler auf ganz \(D\). Erst wenn selbst der gegen 0 geht, ist die Konvergenz gleichmäßig. Rezept: Grenzfunktion bestimmen → Fehlerfunktion \(|f_n-f|\) → Supremum (ggf. per Ableitung) → \(\to0\)?</p>`,"In Worten")}
      ${exBox(String.raw`<p>\(f_n(x)=\frac{x}{n}\) auf \([0,1]\) (punktweise Grenzfunktion \(f\equiv0\)):</p>\[M_n=\sup_{x\in[0,1]}\Big|\frac{x}{n}\Big|=\frac{1}{n}\ \longrightarrow\ 0\ \Rightarrow\ \text{gleichmäßig.}\]<p><b>Achtung Bereich:</b> dieselbe Folge auf ganz \(\mathbb R\) hat \(M_n=\infty\) — dort <i>nicht</i> gleichmäßig!</p>`,"✓ So zeigt man: erfüllt")}
      ${exBox(String.raw`<p>\(f_n(x)=x^{n}\) auf \([0,1]\): Grenzfunktion \(f(x)=0\) für \(x<1\), \(f(1)=1\). Fehler-Supremum:</p>\[M_n=\sup_{0\le x<1}x^{n}=1\ \not\to\ 0\ \Rightarrow\ \text{nur punktweise, nicht gleichmäßig.}\]<p>(Symptom: alle \(f_n\) stetig, Grenzfunktion unstetig — das kann bei gleichmäßiger Konvergenz nie passieren.)</p>`,"✗ So zeigt man: verletzt")}
    </div>
    <div class="subcard">
      <div class="subhead">Cauchy-Folge &amp; Cauchy-Kriterium</div>
      <div class="subrule">Konvergenz nachweisen, <b>ohne den Grenzwert zu kennen</b>. In \(\mathbb R,\ \mathbb C,\ \mathbb R^{d}\) (vollständig): Cauchy \(\Leftrightarrow\) konvergent.</div>
      \[(a_n)\ \text{Cauchy}\ :\Longleftrightarrow\ \forall\varepsilon>0\ \exists N\ \forall m,n\ge N:\ |a_n-a_m|<\varepsilon\]
      <div class="subrule">Für Reihen: \(\Big|\sum_{k=n+1}^{m}a_k\Big|<\varepsilon\) für alle \(m>n\ge N\).</div>
      ${exBox(String.raw`<p>Die Folgenglieder rücken untereinander beliebig eng zusammen — nicht nur benachbarte, sondern <b>alle ab Index \(N\)</b>. In vollständigen Räumen ist das dasselbe wie Konvergenz; der Vorteil: man braucht keinen Kandidaten für den Limes.</p>`,"In Worten")}
      ${exBox(String.raw`<p>\(a_n=\frac1n\): für \(m,n\ge N\) beide Glieder abschätzen:</p>\[\Big|\frac1n-\frac1m\Big|\le\frac1n+\frac1m\le\frac{2}{N}<\varepsilon\quad\text{für }N>\tfrac{2}{\varepsilon}\ \Rightarrow\ \text{Cauchy}\ \Rightarrow\ \text{konvergent.}\]`,"✓ So zeigt man: erfüllt")}
      ${exBox(String.raw`<p>Harmonische Reihe: der <b>Block-Trick</b> — vergleiche \(s_{2n}\) mit \(s_n\):</p>\[s_{2n}-s_n=\sum_{k=n+1}^{2n}\frac1k\ \ge\ n\cdot\frac{1}{2n}=\frac12\quad\text{für jedes }n\]<p>Der Abstand wird <b>nie</b> kleiner als \(\tfrac12\) \(\Rightarrow\) keine Cauchy-Folge \(\Rightarrow\) \(\sum\frac1k\) divergiert. Verletzt-Nachweis = ein festes \(\varepsilon_0\) (hier \(\tfrac12\)) finden, das immer wieder gerissen wird.</p>`,"✗ So zeigt man: verletzt")}
    </div>
    <div class="subcard">
      <div class="subhead">Hauptsatz der Differential- &amp; Integralrechnung</div>
      <div class="subrule">Voraussetzung: \(f\) <b>stetig</b> auf \([a,b]\).</div>
      \[F(x)=\int_a^{x}f(t)\,dt\ \Rightarrow\ F'=f\qquad\text{und}\qquad \int_a^{b}f=\Phi(b)-\Phi(a)\ \text{für jede Stammfunktion }\Phi\]
      ${exBox(String.raw`<p>Integrieren und Ableiten sind Umkehroperationen: die „Flächenfunktion" \(F\) wächst an der Stelle \(x\) genau mit der Rate \(f(x)\). Praktische Folge: bestimmte Integrale berechnet man über <b>irgendeine</b> Stammfunktion — Randwerte einsetzen, fertig.</p>`,"In Worten")}
      ${exBox(String.raw`<p>\(\displaystyle\int_0^{1}x^{2}\,dx\): Voraussetzung prüfen (\(x^{2}\) stetig ✓), Stammfunktion \(\Phi=\frac{x^{3}}{3}\) angeben (Probe: \(\Phi'=x^{2}\) ✓), Randwerte:</p>\[\int_0^{1}x^{2}\,dx=\frac{1}{3}-0=\frac13.\]`,"✓ So zeigt man: erfüllt")}
      ${exBox(String.raw`<p><b>Voraussetzung verletzt</b> — \(f=\operatorname{sgn}\) auf \([-1,1]\) (Sprung bei \(0\)):</p>\[F(x)=\int_{-1}^{x}\operatorname{sgn}(t)\,dt=|x|-1\]<p>\(F\) ist stetig, aber bei \(0\) <b>nicht differenzierbar</b> (Knick!) — dort gilt \(F'=f\) nicht. \(F'=f\) gilt nur an <b>Stetigkeitsstellen</b> von \(f\); die Stetigkeit im Satz ist also wesentlich.</p>`,"✗ Wenn die Voraussetzung fehlt")}
    </div>
  </div>`; }

/* =========================================================================
   6) Mindmap-Renderer (generisch, klappbarer Horizontal-Baum)
   tree = {id,title,kcls,kind:'root'|'ch'|'leaf', children:[...], collapsed?, route?}
   onLeaf(node) -> Navigation; Knoten mit children & kind 'ch' klappen auf/zu.
   ========================================================================= */
function Mindmap(svg, tree, opts){
  opts = Object.assign({nodeW:236, nodeH:50, hGap:64, vGap:14}, opts||{});
  const NS="http://www.w3.org/2000/svg";
  let tx=0, ty=0, scale=1;
  const vp = document.createElementNS(NS,"g"); svg.appendChild(vp);

  function layout(){
    let leaf=0, maxD=0; const pos=new Map();
    (function assign(n,d){
      maxD=Math.max(maxD,d);
      const kids = (n.collapsed? [] : (n.children||[]));
      if(!kids.length){ const y=leaf*(opts.nodeH+opts.vGap)+opts.nodeH/2; leaf++; pos.set(n,{x:d*(opts.nodeW+opts.hGap),y}); return y; }
      let f=null,l=0; kids.forEach(k=>{ const ky=assign(k,d+1); if(f===null)f=ky; l=ky; });
      const y=(f+l)/2; pos.set(n,{x:d*(opts.nodeW+opts.hGap),y}); return y;
    })(tree,0);
    return {pos, w:(maxD)*(opts.nodeW+opts.hGap)+opts.nodeW, h:Math.max(leaf,1)*(opts.nodeH+opts.vGap)};
  }

  let dims;
  function render(){
    vp.textContent="";
    const {pos,w,h}=layout(); dims={w,h};
    // Links
    pos.forEach((p,n)=>{
      if(n.collapsed) return;
      (n.children||[]).forEach(c=>{
        const cp=pos.get(c); if(!cp) return;
        const x1=p.x+opts.nodeW, y1=p.y, x2=cp.x, y2=cp.y, mx=(x1+x2)/2;
        const path=document.createElementNS(NS,"path");
        path.setAttribute("d",`M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`);
        path.setAttribute("class","link "+(n.cls||""));
        vp.appendChild(path);
      });
    });
    // Nodes
    pos.forEach((p,n)=>{
      const fo=document.createElementNS(NS,"foreignObject");
      fo.setAttribute("x",p.x); fo.setAttribute("y",p.y-opts.nodeH/2);
      fo.setAttribute("width",opts.nodeW); fo.setAttribute("height",opts.nodeH);
      const div=document.createElement("div");
      let cls="node "+(n.kind==='root'?'root':'')+" "+(n.kind==='ch'?'ch '+(n.cls||''):'');
      div.className=cls.trim();
      const expander = (n.kind==='ch' && n.children&&n.children.length)? `<span class="tw">${n.collapsed?'▸':'▾'}</span>`:'';
      const badge = n.badge? `<span class="badge">${esc(n.badge)}</span>`:'';
      const dn = (n.kind==='leaf' && n.done)? `<span class="done">✓</span>`:'';
      div.innerHTML = `${badge}<span class="lbl">${esc(n.title)}</span>${dn}${expander}`;
      div.title = n.title;
      div.onclick=(ev)=>{ ev.stopPropagation();
        if(n.kind==='ch' && n.children && n.children.length){ n.collapsed=!n.collapsed; render(); }
        else if(n.route){ go(n.route); }
      };
      fo.appendChild(div); vp.appendChild(fo);
    });
    apply();
  }
  function apply(){ vp.setAttribute("transform",`translate(${tx},${ty}) scale(${scale})`); }
  function fit(){
    const r=svg.getBoundingClientRect(); const pad=28;
    const s=Math.min((r.width-2*pad)/dims.w,(r.height-2*pad)/dims.h, 1.15);
    scale=isFinite(s)&&s>0? s:1;
    tx=(r.width-dims.w*scale)/2; ty=(r.height-dims.h*scale)/2; apply();
  }
  // Pan / Zoom
  let drag=null;
  svg.addEventListener("pointerdown",e=>{ if(e.target.closest(".node"))return; drag={x:e.clientX,y:e.clientY,tx,ty}; svg.classList.add("grabbing"); svg.setPointerCapture(e.pointerId); });
  svg.addEventListener("pointermove",e=>{ if(!drag)return; tx=drag.tx+(e.clientX-drag.x); ty=drag.ty+(e.clientY-drag.y); apply(); });
  svg.addEventListener("pointerup",e=>{ drag=null; svg.classList.remove("grabbing"); });
  svg.addEventListener("pointercancel",()=>{ drag=null; svg.classList.remove("grabbing"); });
  svg.addEventListener("wheel",e=>{ e.preventDefault(); const r=svg.getBoundingClientRect();
    const mx=e.clientX-r.left, my=e.clientY-r.top; const f=e.deltaY<0?1.12:1/1.12;
    const ns=Math.max(.25,Math.min(2.2,scale*f)); const k=ns/scale;
    tx=mx-(mx-tx)*k; ty=my-(my-ty)*k; scale=ns; apply();
  },{passive:false});

  render(); requestAnimationFrame(fit);
  return {fit, zoom:f=>{ const r=svg.getBoundingClientRect(); const mx=r.width/2,my=r.height/2;
    const ns=Math.max(.25,Math.min(2.2,scale*f)); const k=ns/scale; tx=mx-(mx-tx)*k; ty=my-(my-ty)*k; scale=ns; apply(); }};
}

      <a class="reftile i13" href="#/ref/kurven"><span class="ti">κ</span><span>Kurven · Länge · Krümmung<small>kartesisch &amp; polar · Rektifizierbarkeit</small></span></a>
      <a class="reftile i14" href="#/ref/diffrechnung"><span class="ti">∇</span><span>Differentialrechnung<small>partiell · Jacobi/Hesse · ∇ · Fréchet</small></span></a>
    </div>

    <h2 class="grp">📦 Übungen &amp; Prüfungen</h2>
    <div class="reftiles">
      <a class="reftile i3" href="#/ref/uebungen"><span class="ti">📝</span><span>Übungsblätter<small>Blatt 01–15 · mit Lösungen</small></span></a>
      <a class="reftile i19" href="#/ref/vortrag"><span class="ti">🗣</span><span>Vortragsübungen<small>Blatt 1–4 · mit Lösungen</small></span></a>
      <a class="reftile i20" href="#/ref/pruefungen"><span class="ti">🎓</span><span>Prüfungen<small>Scheinklausur · Klausur · Lösungen</small></span></a>
    </div>

    <h2 class="grp">🗂️ Schnellzugriff nach Typ</h2>
    <p class="sub">Kategorie anklicken zum Aufklappen, Eintrag anklicken zum Hinspringen — Definitionen · Sätze · Kriterien · Regeln · Verfahren · Anwendungen.</p>
    <div class="mapbox sm">
      <div class="maphint">🖱️ ziehen &amp; zoomen · Kategorie klicken = auf/zu</div>
      <svg class="map" id="svgcat"></svg>
      <div class="maptools"><button class="btn" id="cfit">Einpassen</button></div>
    </div>

    <h2 class="grp">📚 Nach Kapitel</h2>
    <div class="cols">${cols}</div>

    <div class="note" style="margin-top:16px">
      <b>Stand:</b> Struktur/Gerüst — Navigation, Mindmaps und Spickzettel stehen; die ausführlichen Erklärungen der Themen folgen.
      Kap. 3–4 folgen dem Skript, Kap. 5–6 sind aus den Vorlesungs-Tafelbildern (Analysis 2) rekonstruiert.
    </div>`;

  const catTree = { id:"types", title:"Nach Typ", kind:"root",
    children: Object.keys(CAT).map(name=>({
      id:"cat:"+name, title:name, kind:"ch", cls:"cat", badge:String(CAT[name].length), collapsed:true,
      children: CAT[name].map(it=>({ id:it[0], title:it[1], kind:"leaf", cls:"cat", route:it[0] }))
    })) };
  const cm = Mindmap(document.getElementById("svgcat"), catTree, {nodeW:230});
  currentMap = cm;
  document.getElementById("cfit").onclick=()=>cm.fit();
}

function renderRef(key){
  currentMap=null;
  const r=REF[key]; if(!r){ renderHome(); return; }
  app.innerHTML = `
    <nav class="crumbs"><a href="#/">Start</a> <span class="sep">›</span> <span>Schnellzugriff</span> <span class="sep">›</span> <span>${esc(r.title)}</span></nav>
    <div class="titlebar"><span class="num" style="background:${r.color}">${r.icon}</span><h1>${esc(r.title)}</h1></div>
    ${r.note?`<p class="lead">${r.note}</p>`:''}
    ${r.html}`;
}

function renderSection(se){
  currentMap=null;
  const ch=chapterOf(se);
  // Abschnitt ohne Unterthemen -> direkt als Themen-Karte behandeln
  if(se.topics.length===0){ return renderTopic(se); }

  app.innerHTML = `
    ${crumbHtml(se)}
    <div class="titlebar">
      <span class="num" style="background:var(--${ch.key})">${se.id}</span>
      <h1>${esc(se.title)}</h1>
    </div>
    <div class="srcline">
      <span>${se.topics.length} Unterthemen</span>
    </div>
    <div style="display:flex;align-items:center;gap:10px;margin:6px 0 14px">
      <span style="color:var(--muted);font-size:13px">Übersicht als</span>
      <div class="viewtoggle" id="vt">
        <button data-v="map" class="on">Mindmap</button>
        <button data-v="list">Liste</button>
      </div>
    </div>
    <div id="secview"></div>`;

  const host=document.getElementById("secview");
  function showMap(){
    host.innerHTML = `<div class="mapbox sm"><svg class="map" id="svgsec"></svg>
      <div class="maptools"><button class="btn" id="sfit">Einpassen</button></div></div>`;
    const tree={ id:se.id, title:se.id+"  "+se.title, kind:"root",
      children: se.topics.map(tp=>({id:tp.id,title:tp.id+"  "+tp.title,kind:"leaf",cls:ch.key,route:tp.id,done:isDone(tp.id)})) };
    const m=Mindmap(document.getElementById("svgsec"), tree, {nodeW:250});
    document.getElementById("sfit").onclick=()=>m.fit();
  }
  function showList(){
    host.innerHTML = `<div class="grid">`+ se.topics.map(tp=>`
      <a class="card" href="#/${tp.id}">
        <span class="cn">${tp.id}</span>
        <span class="ct">${esc(tp.title)}</span>
        <span class="cf"><span class="pill ${isDone(tp.id)?'done':'todo'}">${isDone(tp.id)?'✓ verstanden':'offen'}</span></span>
      </a>`).join("") + `</div>`;
  }
  document.querySelectorAll("#vt button").forEach(b=> b.onclick=()=>{
    document.querySelectorAll("#vt button").forEach(x=>x.classList.remove("on")); b.classList.add("on");
    b.dataset.v==="map"?showMap():showList();
  });
  showMap();
}

function renderTopic(tp){
  currentMap=null;
  const ch=chapterOf(tp);
  const idx=flat.indexOf(tp);
  const prev=idx>0?flat[idx-1]:null, next=idx<flat.length-1?flat[idx+1]:null;
  const ph = '<div class="placeholder">Inhalt folgt — wird in der nächsten Runde ergänzt.</div>';
  // Falls später tp.body gesetzt ist, wird es hier verwendet; sonst Platzhalter.
  const b = tp.body || {};
  function sec(cls,icon,title,html){ return `<section class="tsec ${cls||''}"><h3>${icon} ${title}</h3><div class="body">${html||ph}</div></section>`; }
  let inner;
  if(b.def!==undefined){
    const exs = (b.erfuellt||b.verletzt)
      ? (b.erfuellt?exBox(b.erfuellt,"✓ Beispiel — erfüllt"):"") + (b.verletzt?exBox(b.verletzt,"✗ Beispiel — verletzt / Gegenbeispiel"):"")
      : (b.beispiel?exBox(b.beispiel,"✏️ Beispiel — Rechenweg"):"");
    inner = sec("", "📐", "Mathematische Definition / Satz", b.def + (b.worte?exBox(b.worte,"🗣 In Worten"):"") + exs)
          + (b.plus? sec("linkh","➕","Gut zu wissen", b.plus) : "");
  } else {
    inner = sec("", "💡", "Kernidee", b.kernidee)
          + sec("", "📐", "Definition / Satz", b.satz)
          + sec("linkh", "🔗", "Zusammenhang (roter Faden)", b.zusammenhang)
          + sec("", "✏️", "Beispiel", b.beispiel)
          + sec("warnh", "⚠️", "Klausur-Falle", b.falle);
  }

  app.innerHTML = `
    ${crumbHtml(tp)}
    <div class="titlebar">
      <span class="num" style="background:var(--${ch.key})">${tp.id}</span>
      <h1>${esc(tp.title)}</h1>
    </div>
    <div class="srcline">
      <label class="chk ${isDone(tp.id)?'on':''}" id="chk">
        <input type="checkbox" ${isDone(tp.id)?'checked':''}> verstanden
      </label>
    </div>
    <div class="topic">${inner}</div>
    <div class="topnav">
      <span>${prev?`<a class="btn" href="#/${prev.id}">← ${esc(prev.id)}</a>`:''}</span>
      <span>${next?`<a class="btn" href="#/${next.id}">${esc(next.id)} →</a>`:''}</span>
    </div>`;

  const chk=document.getElementById("chk");
  chk.querySelector("input").onchange=(e)=>{ setDone(tp.id, e.target.checked); chk.classList.toggle("on", e.target.checked); };
}

/* =========================================================================
   8) Router
   ========================================================================= */
function typeset(){ if(window.renderMathInElement){ const opt={delimiters:[{left:"\\[",right:"\\]",display:true},{left:"\\(",right:"\\)",display:false}],throwOnError:false,errorColor:"#dc2626"};
  try{ renderMathInElement(app,opt); }catch(e){}
  const b=document.querySelector(".brand small"); if(b){ try{ renderMathInElement(b,opt); }catch(e){} } } }
function route(){
  const h=location.hash.replace(/^#\/?/,"");
  if(!h){ renderHome(); }
  else if(h.indexOf("ref/")===0){ renderRef(h.slice(4)); }
  else { const node=byId.get(h);
    if(!node || node.kind==="chapter"){ renderHome(); }
    else if(node.kind==="section"){ renderSection(node); }
    else { renderTopic(node); }
  }
  window.scrollTo(0,0);
  typeset();
}
window.addEventListener("hashchange", route);
window.addEventListener("resize", ()=>{ if(currentMap) currentMap.fit(); });

/* =========================================================================
   9) Suche
   ========================================================================= */
const searchEl=document.getElementById("search"), resEl=document.getElementById("results");
const searchIndex=[];
byId.forEach(n=>{ if(n.kind==="section"||n.kind==="topic") searchIndex.push(n); });
Object.keys(REF).forEach(k=> searchIndex.push({id:"ref/"+k, title:REF[k].title, kind:"ref"}));
let activeRes=-1, curRes=[];
function runSearch(q){
  q=q.trim().toLowerCase();
  if(!q){ resEl.classList.remove("show"); return; }
  curRes = searchIndex.filter(n=> (n.id+" "+n.title).toLowerCase().includes(q)).slice(0,12);
  activeRes=-1;
  resEl.innerHTML = curRes.length? curRes.map((n,i)=>`
     <a href="#/${n.id}" data-i="${i}"><span class="tag">${n.kind==="section"?"Abschnitt":n.kind==="ref"?"Referenz":"Thema"} ${n.kind==="ref"?"":n.id}</span><br>${esc(n.title)}</a>
   `).join("") : `<a><span class="tag">Kein Treffer</span></a>`;
  resEl.classList.add("show");
}
searchEl.addEventListener("input",()=>runSearch(searchEl.value));
searchEl.addEventListener("keydown",e=>{
  if(!resEl.classList.contains("show")||!curRes.length) return;
  if(e.key==="ArrowDown"){ e.preventDefault(); activeRes=Math.min(curRes.length-1,activeRes+1); }
  else if(e.key==="ArrowUp"){ e.preventDefault(); activeRes=Math.max(0,activeRes-1); }
  else if(e.key==="Enter"){ if(activeRes>=0){ e.preventDefault(); go(curRes[activeRes].id); searchEl.value=""; resEl.classList.remove("show"); searchEl.blur(); } return; }
  else return;
  resEl.querySelectorAll("a").forEach((a,i)=>a.classList.toggle("active",i===activeRes));
});
resEl.addEventListener("click",e=>{ const a=e.target.closest("a"); if(a&&a.dataset.i!==undefined){ searchEl.value=""; resEl.classList.remove("show"); } });
document.addEventListener("click",e=>{ if(!e.target.closest(".search")) resEl.classList.remove("show"); });

/* Roadmap-Interaktion (horizontale Konvergenz-Roadmaps) */
app.addEventListener("click", e=>{
  const btn=e.target.closest(".rmnode"); if(!btn) return;
  const rm=btn.closest(".roadmap"); if(!rm) return;
  const panel=rm.querySelector("#"+btn.dataset.rm);
  const wasOpen=panel && !panel.hidden;
  rm.querySelectorAll(".rmpanel").forEach(p=>p.hidden=true);
  rm.querySelectorAll(".rmnode").forEach(n=>n.classList.remove("on"));
  if(panel && !wasOpen){ panel.hidden=false; btn.classList.add("on"); }
});

/* ---- Start ---- */
updateProgress();
route();
</script>
