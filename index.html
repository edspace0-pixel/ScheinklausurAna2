<!DOCTYPE html>

<title>Übersicht Analysis 2 [S26]</title>
<!--
  Interaktive Lern-Übersicht zu Kap. 3 (Differentialrechnung) und Kap. 4 (Integralrechnung)
  aus dem Skript "Analysis 1" von T. Weidl (Uni Stuttgart).

  STAND: Gerüst / Struktur (Phase 1). Inhalte der Themen-Karten sind Platzhalter.
  AUFBAU:  Inhalt = Daten (siehe Konstante CH), Layout = Code.
           Ein Thema mit Inhalt füllen = im passenden Knoten das Feld `body` setzen.
  Siehe WORKFLOW.md im selben Ordner.
-->
<style>
:root{
  --bg:#f4f6fb; --panel:#ffffff; --ink:#1b2430; --muted:#64748b; --line:#e2e8f0;
  --accent:#4f46e5;
  --ch3:#2563eb; --ch3-soft:#dbeafe;
  --ch4:#0d9488; --ch4-soft:#ccfbf1;
  --ch5:#b45309; --ch5-soft:#fef3c7;
  --ch6:#be185d; --ch6-soft:#fce7f3;
  --root:#334155;
  --ok:#16a34a; --warn:#d97706;
  --shadow:0 1px 2px rgba(15,23,42,.06),0 8px 24px rgba(15,23,42,.08);
  --radius:14px;
}
[data-theme="dark"]{
  --bg:#0f141b; --panel:#161d27; --ink:#e6edf6; --muted:#93a1b3; --line:#26303d;
  --accent:#818cf8;
  --ch3:#60a5fa; --ch3-soft:#1e293b;
  --ch4:#2dd4bf; --ch4-soft:#11302d;
  --ch5:#fbbf24; --ch5-soft:#332410;
  --ch6:#f472b6; --ch6-soft:#3a1426;
  --root:#cbd5e1;
  --shadow:0 1px 2px rgba(0,0,0,.3),0 8px 28px rgba(0,0,0,.45);
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{
  background:var(--bg); color:var(--ink); font:15px/1.55 system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  display:flex; flex-direction:column; min-height:100%;
}
a{color:var(--accent)}
button{font:inherit; cursor:pointer}
.btn{
  background:var(--panel); color:var(--ink); border:1px solid var(--line);
  border-radius:10px; padding:6px 12px; box-shadow:var(--shadow);
}
.btn:hover{border-color:var(--accent)}
.btn.primary{background:var(--accent); color:#fff; border-color:transparent}

/* ---------- Header ---------- */
header{
  position:sticky; top:0; z-index:30; background:var(--panel);
  border-bottom:1px solid var(--line); box-shadow:var(--shadow);
}
.hwrap{max-width:1200px; margin:0 auto; padding:10px 18px; display:flex; align-items:center; gap:14px; flex-wrap:wrap}
.brand{display:flex; align-items:center; gap:10px; font-weight:700; letter-spacing:.2px}
.brand .logo{
  width:30px;height:30px;border-radius:9px;display:grid;place-items:center;color:#fff;font-weight:800;
  background:linear-gradient(135deg,var(--ch3),var(--ch4));
}
.brand small{display:block;font-weight:500;color:var(--muted);font-size:11.5px}
.spacer{flex:1}
.search{position:relative}
.search input{
  width:240px; max-width:46vw; padding:8px 12px 8px 32px; border-radius:10px; border:1px solid var(--line);
  background:var(--bg); color:var(--ink);
}
.search .ic{position:absolute; left:10px; top:50%; transform:translateY(-50%); color:var(--muted)}
.results{
  position:absolute; top:108%; left:0; right:0; background:var(--panel); border:1px solid var(--line);
  border-radius:12px; box-shadow:var(--shadow); max-height:320px; overflow:auto; display:none; z-index:40;
}
.results.show{display:block}
.results a{display:block; padding:9px 12px; color:var(--ink); text-decoration:none; border-bottom:1px solid var(--line)}
.results a:last-child{border-bottom:0}
.results a:hover,.results a.active{background:var(--bg)}
.results .tag{font-size:11px;color:var(--muted)}
.progwrap{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--muted)}
.progbar{width:120px;height:8px;border-radius:99px;background:var(--line);overflow:hidden}
.progbar > i{display:block;height:100%;background:linear-gradient(90deg,var(--ch3),var(--ch4));width:0}

/* ---------- Main / layout ---------- */
main{flex:1; width:100%; max-width:1200px; margin:0 auto; padding:18px}
.crumbs{display:flex; gap:6px; flex-wrap:wrap; align-items:center; color:var(--muted); font-size:13px; margin-bottom:14px}
.crumbs a{text-decoration:none}
.crumbs a:hover{text-decoration:underline}
.crumbs .sep{opacity:.5}

.titlebar{display:flex; align-items:flex-start; gap:14px; flex-wrap:wrap; margin-bottom:10px}
.titlebar h1{font-size:23px; margin:0}
.titlebar .num{
  font-variant-numeric:tabular-nums; font-weight:800; color:#fff; padding:3px 9px; border-radius:9px; font-size:14px;
}
.lead{color:var(--muted); margin:2px 0 16px}

.viewtoggle{display:inline-flex; border:1px solid var(--line); border-radius:10px; overflow:hidden; box-shadow:var(--shadow)}
.viewtoggle button{background:var(--panel); border:0; padding:6px 12px; color:var(--muted)}
.viewtoggle button.on{background:var(--accent); color:#fff}

/* ---------- Mindmap ---------- */
.mapbox{position:relative; border:1px solid var(--line); border-radius:var(--radius); background:
  radial-gradient(circle at 1px 1px, var(--line) 1px, transparent 0) 0 0/22px 22px, var(--panel);
  box-shadow:var(--shadow); overflow:hidden}
.mapbox.lg{height:72vh; min-height:460px}
.mapbox.sm{height:48vh; min-height:300px}
svg.map{width:100%; height:100%; display:block; cursor:grab; touch-action:none}
svg.map.grabbing{cursor:grabbing}
.maptools{position:absolute; right:12px; bottom:12px; display:flex; gap:6px; z-index:5}
.maptools .btn{padding:6px 10px}
.maphint{position:absolute; left:12px; top:12px; font-size:12px; color:var(--muted); background:var(--panel);
  border:1px solid var(--line); border-radius:8px; padding:4px 9px; z-index:5; opacity:.92}

/* node = foreignObject content */
.node{
  height:100%; border-radius:12px; padding:7px 11px; display:flex; align-items:center; gap:7px;
  border:1px solid var(--line); background:var(--panel); box-shadow:var(--shadow); cursor:pointer;
  font-size:13px; line-height:1.25; user-select:none; overflow:hidden;
}
.node:hover{border-color:var(--accent); transform:translateY(-1px)}
.node .lbl{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical; overflow:hidden}
.node .badge{font-weight:800; font-size:11px; padding:1px 6px; border-radius:6px; color:#fff; background:var(--accent); white-space:nowrap}
.node .tw{margin-left:auto; color:var(--muted); font-size:11px; white-space:nowrap}
.node.root{background:var(--root); color:#fff; border-color:transparent; font-weight:700}
.node.ch{font-weight:700}
.node.ch3{background:var(--ch3-soft)} .node.ch3 .badge{background:var(--ch3)}
.node.ch4{background:var(--ch4-soft)} .node.ch4 .badge{background:var(--ch4)}
.node.ch5{background:var(--ch5-soft)} .node.ch5 .badge{background:var(--ch5)}
.node.ch6{background:var(--ch6-soft)} .node.ch6 .badge{background:var(--ch6)}
.node .done{color:var(--ok)}
.link{fill:none; stroke:var(--line); stroke-width:2}
.link.ch3{stroke:var(--ch3)} .link.ch4{stroke:var(--ch4)}
.link.ch5{stroke:var(--ch5)} .link.ch6{stroke:var(--ch6)}

/* ---------- Card grid (alternative Übersicht) ---------- */
.grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:12px}
.card{
  background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:14px;
  box-shadow:var(--shadow); text-decoration:none; color:var(--ink); display:flex; flex-direction:column; gap:6px;
  transition:transform .08s, border-color .08s;
}
.card:hover{transform:translateY(-2px); border-color:var(--accent)}
.card .ct{font-weight:600}
.card .cn{font-size:12px; color:var(--muted); font-variant-numeric:tabular-nums}
.card .cf{margin-top:auto; display:flex; align-items:center; gap:8px; font-size:12px; color:var(--muted)}
.pill{font-size:11px; padding:2px 8px; border-radius:99px; border:1px solid var(--line)}
.pill.todo{color:var(--warn)} .pill.done{color:var(--ok); border-color:var(--ok)}

/* ---------- Topic card (Ebene 2) ---------- */
.topic{display:grid; grid-template-columns:1fr; gap:14px; max-width:880px}
.tsec{background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden}
.tsec > h3{margin:0; padding:11px 16px; font-size:14px; border-bottom:1px solid var(--line); display:flex; gap:8px; align-items:center}
.tsec .body{padding:14px 16px}
.tsec.warnh > h3{color:var(--warn)}
.tsec.linkh > h3{color:var(--ch3)}
.placeholder{
  border:1px dashed var(--line); border-radius:10px; padding:14px; color:var(--muted);
  background:repeating-linear-gradient(45deg,transparent,transparent 10px,rgba(127,127,127,.04) 10px,rgba(127,127,127,.04) 20px);
}
.topnav{display:flex; justify-content:space-between; gap:10px; margin-top:6px}
.srcline{display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin:2px 0 4px; font-size:13px; color:var(--muted)}
.chk{display:inline-flex; align-items:center; gap:8px; cursor:pointer; user-select:none;
  border:1px solid var(--line); border-radius:10px; padding:7px 12px; background:var(--panel); box-shadow:var(--shadow)}
.chk input{width:16px;height:16px}
.chk.on{border-color:var(--ok); color:var(--ok)}

.note{background:var(--ch3-soft); border:1px solid var(--line); border-radius:var(--radius); padding:12px 14px; font-size:13.5px; color:var(--ink)}

/* ---------- Start: Themen-Liste ---------- */
.cols{display:grid; grid-template-columns:1fr 1fr; gap:16px; align-items:start}
@media (max-width:860px){ .cols{grid-template-columns:1fr} }
.chcol{background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden}
.chhead{margin:0; padding:12px 16px; font-size:15px; color:#fff; display:flex; align-items:center; gap:10px}
.chhead.ch3{background:linear-gradient(135deg,var(--ch3),#1e40af)}
.chhead.ch4{background:linear-gradient(135deg,var(--ch4),#0f766e)}
.chhead.ch5{background:linear-gradient(135deg,#d97706,#92400e)}
.chhead.ch6{background:linear-gradient(135deg,#db2777,#831843)}
.chhead .cc{margin-left:auto; font-weight:500; font-size:12px; opacity:.92; white-space:nowrap}
.seclist{display:flex; flex-direction:column}
.secrow{display:flex; gap:12px; align-items:flex-start; padding:11px 14px; border-top:1px solid var(--line); text-decoration:none; color:var(--ink)}
.secrow:hover{background:var(--bg)}
.secrow .snum{flex:none; font-variant-numeric:tabular-nums; font-weight:800; color:#fff; border-radius:8px; padding:3px 8px; font-size:12.5px; min-width:44px; text-align:center}
.srbody{flex:1; min-width:0; display:flex; flex-direction:column}
.srtitle{font-weight:600; line-height:1.3}
.srtitle .done{color:#fff; background:var(--ok); border-radius:99px; font-size:11px; padding:1px 7px; margin-left:7px; vertical-align:middle}
.kws{display:flex; flex-wrap:wrap; gap:5px; margin-top:6px}
.kw{font-size:11px; padding:2px 8px; border-radius:99px; background:var(--bg); border:1px solid var(--line); color:var(--muted); white-space:nowrap}
.srgo{flex:none; align-self:center; color:var(--muted); font-size:18px}
.secrow:hover .srgo{color:var(--accent)}

/* ---------- Schnellzugriff-Kacheln & Gruppen-Header ---------- */
.grp{font-size:15px; margin:22px 0 4px; display:flex; align-items:center; gap:8px}
.sub{color:var(--muted); font-size:13px; margin:0 0 10px}
.reftiles{display:grid; grid-template-columns:repeat(auto-fit,minmax(232px,1fr)); gap:12px; margin:6px 0}
.grpsub{font-size:12px; font-weight:700; color:var(--muted); margin:14px 0 2px; text-transform:uppercase; letter-spacing:.6px}
.reftile{display:flex; align-items:center; gap:14px; padding:14px 16px; border-radius:var(--radius); text-decoration:none; color:#fff; box-shadow:var(--shadow); font-weight:600; transition:transform .08s}
.reftile:hover{transform:translateY(-2px)}
.reftile .ti{font-size:26px; line-height:1}
.reftile small{display:block; font-weight:500; opacity:.92; font-size:12px; margin-top:2px}
.reftile.i1{background:linear-gradient(135deg,var(--ch4),#0f766e)}
.reftile.i2{background:linear-gradient(135deg,#7c3aed,#4f46e5)}
.reftile.i3{background:linear-gradient(135deg,#f59e0b,#d97706)}
.reftile.i4{background:linear-gradient(135deg,#fb7185,#e11d48)}
.matgrid{display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:12px}
.matcard{background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:12px 14px; box-shadow:var(--shadow); display:flex; flex-direction:column; gap:7px}
.matcard .mct{font-weight:600}
.matcard .mcl{display:flex; flex-wrap:wrap; gap:12px; font-size:14px}
.matcard .mcl a{text-decoration:none}
.matcard .mcph{font-size:12px; color:var(--muted); border-top:1px dashed var(--line); padding-top:7px}
.reftile.i5{background:linear-gradient(135deg,#22d3ee,#0891b2)}
.reftile.i6{background:linear-gradient(135deg,#a78bfa,#7c3aed)}
.reftile.i7{background:linear-gradient(135deg,#f472b6,#db2777)}
.reftile.i8{background:linear-gradient(135deg,#34d399,#059669)}
.reftile.i9{background:linear-gradient(135deg,#fbbf24,#ea580c)}
.reftile.i10{background:linear-gradient(135deg,#e879f9,#c026d3)}
.reftile.i11{background:linear-gradient(135deg,#2dd4bf,#0d9488)}
.reftile.i12{background:linear-gradient(135deg,#38bdf8,#0369a1)}
.reftile.i13{background:linear-gradient(135deg,#c084fc,#9333ea)}
.reftile.i14{background:linear-gradient(135deg,#818cf8,#4338ca)}
.reftile.i15{background:linear-gradient(135deg,#fb923c,#c2410c)}
.reftile.i16{background:linear-gradient(135deg,#94a3b8,#475569)}
.reftile.i17{background:linear-gradient(135deg,#4ade80,#166534)}
.reftile.i18{background:linear-gradient(135deg,#60a5fa,#1d4ed8)}
.reftile.i19{background:linear-gradient(135deg,#67e8f9,#0e7490)}
.reftile.i20{background:linear-gradient(135deg,#f87171,#b91c1c)}
.example{margin:8px 0;border:1px solid var(--line);border-radius:10px;background:var(--bg);overflow:hidden}
.example>summary{cursor:pointer;padding:8px 12px;font-size:13px;font-weight:600;color:var(--accent);list-style:none;user-select:none}
.example>summary::-webkit-details-marker{display:none}
.example>summary::before{content:"\25B8  "}
.example[open]>summary::before{content:"\25BE  "}
.example[open]>summary{border-bottom:1px solid var(--line)}
.exbody{padding:10px 14px;overflow-x:auto}
.exbody p{margin:6px 0;color:var(--muted)}
.subgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:760px){.subgrid{grid-template-columns:1fr}}
.subcard{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 14px;box-shadow:var(--shadow)}
.subhead{font-size:16px;margin-bottom:4px}
.subrule{color:var(--muted);font-size:14px;margin-bottom:6px}
.when{display:block;font-size:12px;color:var(--muted);margin-top:4px}
.when::before{content:"→ "}
.node.ch.cat{background:var(--panel); border-color:var(--accent)}

/* ---------- Referenz-Seiten (Spickzettel) ---------- */
.twocol{display:grid; grid-template-columns:1fr 1fr; gap:18px; align-items:start}
@media(max-width:760px){ .twocol{grid-template-columns:1fr} }
.refblock{margin:0 0 16px}
.refblock h3{font-size:14px; margin:0 0 8px; color:var(--accent)}
.fml{font-family:"Cambria Math","Latin Modern Math","STIX Two Math",Georgia,serif; font-size:16px}
.reftable{width:100%; border-collapse:collapse; background:var(--panel); border:1px solid var(--line); border-radius:10px; overflow:hidden}
.reftable td{padding:8px 13px; border-bottom:1px solid var(--line); vertical-align:middle}
.reftable tr:last-child td{border-bottom:0}
.reftable td.lhs{white-space:nowrap}
.reftable td.cond{color:var(--muted); font-size:12px; text-align:right; white-space:nowrap; font-family:system-ui,sans-serif}
.frac{display:inline-flex; flex-direction:column; text-align:center; vertical-align:middle; margin:0 .18em}
.frac>span{padding:0 .4em; display:block}
.frac>span:first-child{border-bottom:1.5px solid currentColor}
footer{max-width:1200px;margin:0 auto;padding:14px 18px;color:var(--muted);font-size:12px}
.kbd{font:12px/1 ui-monospace,Consolas,monospace; border:1px solid var(--line); border-bottom-width:2px; border-radius:6px; padding:2px 6px; background:var(--panel)}
@media (max-width:600px){ .search input{width:160px} .progwrap{display:none} }

<script>
"use strict";

/* =========================================================================
   1) DATEN  —  hier wächst der Inhalt.
   Jeder Knoten kann später ein Feld `body:{...}` bekommen (siehe renderTopic).
   topics:  [id, Titel, Quelldatei]
   ========================================================================= */
const SRCDIR = "assets/skript_html_files/";
const CH = [
 { id:"3", title:"Differentialrechnung von Funktionen einer Variablen", key:"ch3",
   sections:[
    {id:"3.1",  t:"Zur Definition der Ableitung", src:"skriptse28.html", topics:[
       {id:"3.1.1", title:"Die Ableitung einer Funktion", src:"skriptsu111.html", body:{
 kernidee: String.raw`Die Ableitung misst die <b>momentane Änderungsrate</b> — die Steigung der Tangente. Man zoomt in den Graphen hinein, bis er gerade aussieht; diese Steigung ist \(f'(x_0)\).`,
 satz: String.raw`\[f'(x_0)=\lim_{h\to0}\frac{f(x_0+h)-f(x_0)}{h}\]Existiert dieser Grenzwert (endlich), heißt \(f\) in \(x_0\) <b>differenzierbar</b>. Es gilt: differenzierbar \(\Rightarrow\) stetig (aber nicht umgekehrt).`,
 zusammenhang: String.raw`Fundament für alles Weitere: Ableitungsregeln, Monotonie (\(f'>0\)), Extrema (\(f'=0\)), Krümmung (\(f''\)), Taylor. Der Differenzenquotient ist die diskrete Version, die Ableitung sein Grenzwert.`,
 beispiel: String.raw`Für \(f(x)=x^2\):\[\frac{(x+h)^2-x^2}{h}=\frac{2xh+h^2}{h}=2x+h\ \longrightarrow\ 2x\quad(h\to0).\]Also \(f'(x)=2x\).`,
 falle: String.raw`<b>\(|x|\) ist in \(0\) nicht differenzierbar</b> (Knick: links Steigung \(-1\), rechts \(+1\)). Differenzierbarkeit ist echt stärker als Stetigkeit.`
}},
       ["3.1.2","Ableitungen in reellen und komplexen Variablen","skriptsu112.html"],
       ["3.1.2b","Diskussion: reelle vs. komplexe Ableitung","skriptli2.html"],
       {id:"3.1.3", title:"Geometrische Interpretation der Ableitung", src:"skriptsu113.html", body:{
 kernidee: String.raw`\(f'(x_0)\) ist die <b>Steigung der Tangente</b> in \((x_0,f(x_0))\). Positiv → Graph steigt, negativ → fällt, null → waagrechte Tangente.`,
 satz: String.raw`Tangente an \(f\) in \(x_0\):\[t(x)=f(x_0)+f'(x_0)\,(x-x_0).\]Sie ist die <b>beste lineare Näherung</b> von \(f\) nahe \(x_0\) (Fehler von der Ordnung \(o(x-x_0)\)).`,
 zusammenhang: String.raw`Brücke zu den Landau-Symbolen (3.2) und zum Differential (3.9). Die zweite Ableitung \(f''\) beschreibt die Krümmung (Konvexität, 3.11).`,
 beispiel: String.raw`\(f(x)=\sqrt{x}\) in \(x_0=1\): \(f'(x)=\frac{1}{2\sqrt{x}}\), also \(f'(1)=\tfrac12\). Tangente \(t(x)=1+\tfrac12(x-1)\) liefert die Schätzung \(\sqrt{1{,}1}\approx 1{,}05\).`,
 falle: String.raw`Tangente \(\neq\) Sekante: die Tangente berührt lokal in <i>einem</i> Punkt, die Sekante schneidet <i>zwei</i>. Für \(h\to0\) geht die Sekantensteigung in die Tangentensteigung über.`
}}]},
    {id:"3.2",  t:"Die Landau-Symbole o und O", src:"skriptse29.html", topics:[
       ["3.2.1","Definition der Landau-Symbole","skriptsu114.html"],
       ["3.2.2","Eigenschaften der Landau-Symbole","skriptsu115.html"],
       ["3.2.3","Beispiele für o und O","skriptsu116.html"],
       ["3.2.4","Anwendungen der Landau-Symbolik","skriptsu117.html"]]},
    {id:"3.3",  t:"Das Rechnen mit Ableitungen", src:"skriptse30.html", topics:[
       {id:"3.3.1", title:"Linearität, Produkt- und Kettenregel", src:"skriptsu118.html", body:{
 kernidee: String.raw`Drei Bausteine, mit denen man fast alles ableitet: <b>linear</b> durchziehen, Produkte über die <b>Produktregel</b>, Verkettungen über die <b>Kettenregel</b>.`,
 satz: String.raw`\[(af+bg)'=af'+bg'\]\[(fg)'=f'g+fg'\]\[(f\circ g)'(x)=f'(g(x))\cdot g'(x)\]`,
 zusammenhang: String.raw`Die Kettenregel ist der Motor der Substitution beim Integrieren (4.6) und der impliziten Ableitung (3.3.3). Aus der Produktregel folgt die Leibniz-Formel für höhere Ableitungen (3.7).`,
 beispiel: String.raw`Kette: \(\big(\sin(x^2)\big)'=\cos(x^2)\cdot 2x\). Produkt: \(\big(x^2 e^x\big)'=2xe^x+x^2e^x=(x^2+2x)e^x\).`,
 falle: String.raw`<b>Innere Ableitung nicht vergessen!</b> \((\sin(2x))'=2\cos(2x)\), nicht \(\cos(2x)\). Das ist der häufigste Flüchtigkeitsfehler überhaupt.`
}},
       {id:"3.3.2", title:"Die Quotientenregel", src:"skriptsu119.html", body:{
 kernidee: String.raw`Ableitung eines Bruchs \(\frac{f}{g}\). Merkspruch: „<b>NAZ minus ZAN, über N-Quadrat</b>" (Nenner·Abl. Zähler minus Zähler·Abl. Nenner, geteilt durch Nenner-Quadrat).`,
 satz: String.raw`\[\left(\frac{f}{g}\right)'=\frac{f'g-fg'}{g^{2}}\qquad(g\neq0)\]`,
 zusammenhang: String.raw`Folgt aus Produkt- und Kettenregel via \(\frac{f}{g}=f\cdot g^{-1}\). Liefert z. B. \((\tan x)'=\frac{1}{\cos^{2}x}\).`,
 beispiel: String.raw`\[\left(\frac{x}{x^{2}+1}\right)'=\frac{1\cdot(x^{2}+1)-x\cdot 2x}{(x^{2}+1)^{2}}=\frac{1-x^{2}}{(x^{2}+1)^{2}}.\]`,
 falle: String.raw`<b>Reihenfolge im Zähler</b> (\(f'g-fg'\), nicht umgekehrt) — das Vorzeichen ist die typische Falle. Und im Nenner steht \(g^{2}\), nicht \(g\).`
}},
       ["3.3.3","Ableitung impliziter Funktionen","skriptsu120.html"]]},

    {id:"3.5",  t:"Sätze von Fermat & Rolle; Formeln von Cauchy & Lagrange", src:"skriptse32.html", topics:[
       {id:"3.5.1", title:"Der Satz von Fermat", src:"skriptsu125.html", body:{
 kernidee: String.raw`An einem <b>inneren Extremum</b> einer differenzierbaren Funktion ist die Tangente waagrecht: \(f'=0\). Das ist die notwendige Bedingung fürs Suchen von Hoch-/Tiefpunkten.`,
 satz: String.raw`Hat \(f\) in einem <i>inneren</i> Punkt \(x_0\) ein lokales Extremum und ist dort differenzierbar, so gilt\[f'(x_0)=0.\]\(x_0\) heißt dann <b>kritischer</b> (stationärer) Punkt.`,
 zusammenhang: String.raw`Startpunkt der ganzen Kette: <b>Fermat \(\Rightarrow\) Rolle \(\Rightarrow\) Mittelwertsatz</b>. Liefert die „Kandidaten" für Extrema (3.10.3).`,
 beispiel: String.raw`\(f(x)=x^{2}\) hat sein Minimum in \(0\), und tatsächlich \(f'(0)=0\). ✓`,
 falle: String.raw`Nur <b>notwendig, nicht hinreichend</b>: \(f(x)=x^{3}\) hat \(f'(0)=0\), aber kein Extremum (Sattelpunkt). Und nur für <b>innere</b> Punkte — am Rand von \([a,b]\) kann ein Extremum ohne \(f'=0\) liegen.`
}},
       {id:"3.5.2", title:"Der Satz von Rolle", src:"skriptsu126.html", body:{
 kernidee: String.raw`Wenn eine glatte Kurve bei \(a\) und \(b\) auf <b>gleicher Höhe</b> beginnt und endet, muss sie dazwischen mindestens einmal eine <b>waagrechte Tangente</b> haben.`,
 satz: String.raw`\(f\) stetig auf \([a,b]\), differenzierbar auf \((a,b)\), \(f(a)=f(b)\). Dann gibt es ein \(\xi\in(a,b)\) mit\[f'(\xi)=0.\]`,
 zusammenhang: String.raw`Spezialfall des Mittelwertsatzes (3.5.4) für \(f(a)=f(b)\); bewiesen über Fermat (Extremum im Inneren). Zentrales Werkzeug für Nullstellen-Argumente.`,
 beispiel: String.raw`\(f(x)=x^{2}-x\) auf \([0,1]\): \(f(0)=f(1)=0\). \(f'(x)=2x-1=0\) bei \(\xi=\tfrac12\). ✓`,
 falle: String.raw`<b>Alle drei Voraussetzungen nötig.</b> \(f(x)=|x|\) auf \([-1,1]\) erfüllt \(f(-1)=f(1)\), aber nie \(f'=0\) — weil in \(0\) nicht differenzierbar.`
}},
       {id:"3.5.3", title:"Die Formel von Cauchy (verallg. MWS)", src:"skriptsu127.html", body:{
 kernidee: String.raw`Der Mittelwertsatz für <b>zwei Funktionen gleichzeitig</b> — er vergleicht ihre Änderungsraten. Die Grundlage für l'Hospital.`,
 satz: String.raw`\(f,g\) stetig auf \([a,b]\), differenzierbar auf \((a,b)\), \(g'\neq0\). Dann gibt es \(\xi\in(a,b)\) mit\[\frac{f(b)-f(a)}{g(b)-g(a)}=\frac{f'(\xi)}{g'(\xi)}.\]`,
 zusammenhang: String.raw`Mit \(g(x)=x\) wird daraus der gewöhnliche MWS (3.5.4). Direkter Beweismotor der <b>Regel von l'Hospital</b> (3.12).`,
 beispiel: String.raw`Der Quotient der beiden Sekantensteigungen (von \(f\) und \(g\)) wird an einer gemeinsamen Stelle \(\xi\) vom Quotient der Tangentensteigungen getroffen.`,
 falle: String.raw`Es ist <b>nicht</b> „MWS für \(f\) geteilt durch MWS für \(g\)" — das gäbe zwei verschiedene Stellen. Cauchy garantiert <b>ein gemeinsames</b> \(\xi\).`
}},
       {id:"3.5.4", title:"Die Formel von Lagrange (MWS)", src:"skriptsu128.html", body:{
 kernidee: String.raw`Zwischen \(a\) und \(b\) gibt es eine Stelle, an der die <b>Tangente parallel zur Sekante</b> ist — die momentane Änderungsrate trifft irgendwo die durchschnittliche.`,
 satz: String.raw`\(f\) stetig auf \([a,b]\), differenzierbar auf \((a,b)\). Dann gibt es \(\xi\in(a,b)\) mit\[f'(\xi)=\frac{f(b)-f(a)}{b-a}.\]`,
 zusammenhang: String.raw`<b>Das Arbeitspferd</b> der Differentialrechnung: liefert Monotonie (\(f'>0\Rightarrow\) streng wachsend, 3.10.2), Konstanz (\(f'\equiv0\Rightarrow f\) konstant), Schranken und das Taylor-Restglied.`,
 beispiel: String.raw`\(f(x)=x^{2}\) auf \([0,2]\): Sekantensteigung \(\frac{4-0}{2-0}=2\). Aus \(f'(\xi)=2\xi=2\) folgt \(\xi=1\). ✓`,
 falle: String.raw`Der Satz sichert die <b>Existenz</b> von \(\xi\), gibt aber <b>keine Formel</b> dafür — man weiß nur, <i>dass</i> es existiert. Voraussetzungen genau einhalten (stetig auf \([a,b]\), differenzierbar auf \((a,b)\)).`
}}]},

    {id:"3.10", t:"Monotonie und Extremwerte von Funktionen", src:"skriptse37.html", topics:[
       ["3.10.1","Konstante Funktionen","skriptsu139.html"],
       {id:"3.10.2", title:"Monotone Funktionen", src:"skriptsu140.html", body:{
 kernidee: String.raw`<b>Vorzeichen von \(f'\) = Wachstumsrichtung.</b> \(f'>0\) heißt steigend, \(f'<0\) fallend. Das ist das Monotonie-Kriterium.`,
 satz: String.raw`Auf einem Intervall gilt\[f'\ge0\iff f\ \text{monoton wachsend},\qquad f'>0\Rightarrow f\ \text{streng wachsend}\](analog für fallend). Beweis über den Mittelwertsatz.`,
 zusammenhang: String.raw`Direkte Folge des Mittelwertsatzes (3.5.4). Grundlage der Extremwert-Bestimmung (3.10.3, Vorzeichenwechsel von \(f'\)) und der Kurvendiskussion (3.13).`,
 beispiel: String.raw`\(f(x)=x^{3}\): \(f'(x)=3x^{2}\ge0\) überall \(\Rightarrow\) streng wachsend, obwohl \(f'(0)=0\).`,
 falle: String.raw`\(f'>0\) ist <b>hinreichend, nicht notwendig</b> für streng wachsend (siehe \(x^{3}\)). „Streng wachsend" verträgt einzelne Nullstellen von \(f'\).`
}},
       {id:"3.10.3", title:"Extremwerte einer Funktion", src:"skriptsu141.html", body:{
 kernidee: String.raw`Extrema findet man in zwei Schritten: <b>Kandidaten</b> über \(f'=0\) (Fermat), dann <b>entscheiden</b> über den Vorzeichenwechsel von \(f'\) oder das Vorzeichen von \(f''\).`,
 satz: String.raw`Notwendig: \(f'(x_0)=0\). Hinreichend:\[f'(x_0)=0,\ f''(x_0)>0\ \Rightarrow\ \text{lok. Minimum},\]\[f'(x_0)=0,\ f''(x_0)<0\ \Rightarrow\ \text{lok. Maximum}.\]`,
 zusammenhang: String.raw`Kombiniert Fermat (3.5.1), Monotonie (3.10.2) und Krümmung (3.11). Bei \(f''(x_0)=0\) entscheidet der Vorzeichenwechsel von \(f'\) (oder die nächste nicht-verschwindende Ableitung).`,
 beispiel: String.raw`\(f(x)=x^{3}-3x\): \(f'(x)=3x^{2}-3=0\Rightarrow x=\pm1\). Mit \(f''(x)=6x\): \(f''(1)=6>0\) (Min), \(f''(-1)=-6<0\) (Max).`,
 falle: String.raw`\(f''(x_0)=0\) bedeutet <b>nicht</b> automatisch „kein Extremum": \(f(x)=x^{4}\) hat \(f'(0)=f''(0)=0\) und trotzdem ein Minimum. Dann Vorzeichenwechsel von \(f'\) prüfen.`
}}]},
    {id:"3.11", t:"Konvexe und konkave Funktionen", src:"skriptse38.html", topics:[
       ["3.11.1","Definition und äquivalente Beschreibungen","skriptsu142.html"],
       ["3.11.2","Differenzierbare konvexe/konkave Funktionen","skriptsu143.html"],
       {id:"3.11.3", title:"Wendepunkte", src:"skriptsu144.html", body:{
 kernidee: String.raw`Ein <b>Wendepunkt</b> ist, wo die Krümmung ihr Vorzeichen wechselt — von Links- auf Rechtskurve (konvex \(\leftrightarrow\) konkav).`,
 satz: String.raw`Notwendig: \(f''(x_0)=0\). Hinreichend: \(f''(x_0)=0\) und \(f''\) wechselt dort das Vorzeichen (z. B. wenn \(f^{(3)}(x_0)\neq0\)).`,
 zusammenhang: String.raw`\(f''\) verhält sich zur Konvexität (3.11) wie \(f'\) zur Monotonie (3.10). Ein Wendepunkt ist ein Extremum von \(f'\) — die steilste/flachste Stelle.`,
 beispiel: String.raw`\(f(x)=x^{3}\): \(f''(x)=6x=0\) bei \(x=0\); \(f''\) wechselt von \(-\) nach \(+\) \(\Rightarrow\) Wendepunkt in \(0\).`,
 falle: String.raw`\(f''(x_0)=0\) allein reicht nicht: \(f(x)=x^{4}\) hat \(f''(0)=0\), aber <b>keinen</b> Wendepunkt (Krümmung wechselt nicht). Der Vorzeichenwechsel ist entscheidend.`
}}]},
    {id:"3.12", t:"Unbestimmtheiten 0/0 und ∞/∞ (l’Hospital)", src:"skriptse39.html", topics:[
       {id:"3.12.1", title:"Unbestimmtheiten vom Typ 0/0", src:"skriptsu145.html", body:{
 kernidee: String.raw`Bei \(\frac{0}{0}\) darf man <b>Zähler und Nenner getrennt ableiten</b> und den Grenzwert erneut versuchen — er bleibt gleich (falls der neue existiert). Das ist die Regel von l'Hospital.`,
 satz: String.raw`Ist \(\lim\frac{f}{g}\) vom Typ \(\frac{0}{0}\) und existiert \(\lim\frac{f'}{g'}\), so\[\lim\frac{f(x)}{g(x)}=\lim\frac{f'(x)}{g'(x)}.\]`,
 zusammenhang: String.raw`Bewiesen über den verallgemeinerten Mittelwertsatz von <b>Cauchy</b> (3.5.3). Erklärt viele Standardgrenzwerte (siehe Spickzettel „Grenzwerte").`,
 beispiel: String.raw`\[\lim_{x\to0}\frac{\sin x}{x}=\lim_{x\to0}\frac{\cos x}{1}=1\quad(\text{Typ }0/0).\]`,
 falle: String.raw`<b>Nur bei \(\frac{0}{0}\) oder \(\frac{\infty}{\infty}\) anwenden</b> — vorher den Typ prüfen! Und es ist \(\frac{f'}{g'}\), <b>nicht</b> die Quotientenregel \(\left(\frac{f}{g}\right)'\).`
}},
       ["3.12.2","Unbestimmtheiten vom Typ ∞/∞","skriptsu146.html"]]},
